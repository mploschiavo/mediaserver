apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
      - env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        image: lscr.io/linuxserver/bazarr@sha256:9a631194c0dee21c85b5bff59e23610e1ae2f54594e922973949d271102e585e
        livenessProbe:
          httpGet:
            path: /
            port: 6767
          initialDelaySeconds: 10
          periodSeconds: 10
        name: bazarr
        ports:
        - containerPort: 6767
        readinessProbe:
          httpGet:
            path: /
            port: 6767
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /
            port: 6767
          periodSeconds: 10
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /media
          name: media
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: media-stack-config-bazarr
      - name: media
        persistentVolumeClaim:
          claimName: media-stack-media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
      - args:
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - media-stack-edge
        - --log-level
        - info
        image: envoyproxy/envoy:v1.31.2
        livenessProbe:
          httpGet:
            path: /ready
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 30
        name: envoy
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9901
          name: admin
        readinessProbe:
          httpGet:
            path: /ready
            port: admin
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/envoy
          name: envoy-config
          readOnly: true
      initContainers:
      - command:
        - sh
        - -c
        - |
          if [ ! -f /etc/envoy/envoy.yaml ]; then
            echo "Seeding base envoy config from template..."
            cp /base-template/envoy.runtime.base.yaml /etc/envoy/envoy.yaml
          elif grep -q 'port_value: 80$' /etc/envoy/envoy.yaml 2>/dev/null; then
            echo "Stale config detected (port 80). Reseeding from template..."
            cp /base-template/envoy.runtime.base.yaml /etc/envoy/envoy.yaml
          else
            echo "envoy.yaml already exists and looks valid, skipping seed."
          fi
        image: busybox:1.36
        name: seed-base-config
        volumeMounts:
        - mountPath: /etc/envoy
          name: envoy-config
        - mountPath: /base-template
          name: envoy-base-template
          readOnly: true
      volumes:
      - name: envoy-config
        persistentVolumeClaim:
          claimName: media-stack-config-envoy
      - configMap:
          name: media-stack-envoy-base-template
        name: envoy-base-template
---
