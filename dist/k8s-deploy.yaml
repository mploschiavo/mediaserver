---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
      - image: jellyfin/jellyfin@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
        livenessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 10
          periodSeconds: 10
        name: jellyfin
        ports:
        - containerPort: 8096
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /health
            port: 8096
          periodSeconds: 10
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /cache
          name: transcode
        - mountPath: /media
          name: media
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: media-stack-config-jellyfin
      - name: transcode
        persistentVolumeClaim:
          claimName: media-stack-data-transcode
      - name: media
        persistentVolumeClaim:
          claimName: media-stack-media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-auto-collections
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin-auto-collections
  template:
    metadata:
      labels:
        app: jellyfin-auto-collections
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          until [ -f /config/config.yaml ]; do
            echo "[WAIT] jellyfin-auto-collections: waiting for /config/config.yaml from bootstrap..."
            sleep 15
          done
          ln -sf /config/config.yaml /app/config.yaml
          exec python /app/main.py
        env:
        - name: CRONTAB
          value: 0 */6 * * *
        - name: TZ
          value: America/Chicago
        - name: JELLYFIN_SERVER_URL
          value: http://jellyfin:8096
        - name: JELLYFIN_API_KEY
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_API_KEY
              name: media-stack-secrets
              optional: true
        - name: JELLYFIN_USER_ID
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_USER_ID
              name: media-stack-secrets
              optional: true
        image: ghcr.io/ghomashudson/jellyfin-auto-collections:latest
        imagePullPolicy: IfNotPresent
        name: jellyfin-auto-collections
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /config
          name: config-dir
      volumes:
      - name: config-dir
        persistentVolumeClaim:
          claimName: media-stack-config-jellyfin-auto-collections
---
