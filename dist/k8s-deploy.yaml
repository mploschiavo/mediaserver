apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      containers:
      - env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        image: lscr.io/linuxserver/lidarr@sha256:dbffcf91da47d48e09e613857032c95a62755b928a71a7718688e3ab03fbbd26
        livenessProbe:
          httpGet:
            path: /ping
            port: 8686
          initialDelaySeconds: 60
          periodSeconds: 30
        name: lidarr
        ports:
        - containerPort: 8686
        readinessProbe:
          httpGet:
            path: /ping
            port: 8686
          initialDelaySeconds: 20
          periodSeconds: 15
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /ping
            port: 8686
          periodSeconds: 10
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /media
          name: media
        - mountPath: /data/torrents
          name: torrents
        - mountPath: /data/usenet
          name: usenet
      initContainers:
      - command:
        - sh
        - -c
        - mkdir -p /media/tv /media/movies /media/music /media/books /data/torrents/incomplete
          /data/torrents/completed/tv /data/torrents/completed/movies /data/torrents/completed/music
          /data/torrents/completed/books /data/usenet/incomplete /data/usenet/completed
          /data/usenet/completed/tv /data/usenet/completed/movies /data/usenet/completed/music
          /data/usenet/completed/books && chmod -R 0777 /media /data/torrents /data/usenet
        image: busybox:1.36
        name: init-media-dirs
        volumeMounts:
        - mountPath: /media
          name: media
        - mountPath: /data/torrents
          name: torrents
        - mountPath: /data/usenet
          name: usenet
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: media-stack-config-lidarr
      - name: media
        persistentVolumeClaim:
          claimName: media-stack-media
      - name: torrents
        persistentVolumeClaim:
          claimName: media-stack-data-torrents
      - name: usenet
        persistentVolumeClaim:
          claimName: media-stack-data-usenet
