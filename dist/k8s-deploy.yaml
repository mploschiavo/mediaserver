# Media Automation Stack — Kubernetes Single-File Deploy
#
# Deploy:   kubectl apply -f k8s-deploy.yaml
# Status:   kubectl -n media-stack get pods
# Dashboard: kubectl -n media-stack port-forward svc/media-stack-controller 9100:9100
#            Then open http://localhost:9100
# Teardown: kubectl delete -f k8s-deploy.yaml
#
# Prerequisites: Kubernetes cluster with default StorageClass
# More info: https://github.com/mploschiavo/mediaserver
---
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
    media-stack.io/site: https://matthewloschiavo.com
  name: media-stack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-stack-controller
  namespace: media-stack
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-stack-controller
  namespace: media-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-stack-controller
subjects:
- kind: ServiceAccount
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: v1
data:
  envoy.runtime.base.yaml: |
    # Base template — the envoy-config-init job merges routes/clusters into this.
    # This is a placeholder that gets overwritten by the init job.
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: media_stack_routes
                      virtual_hosts: []
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters: []
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
kind: ConfigMap
metadata:
  name: media-stack-envoy-base-template
  namespace: media-stack
---
# Controller config — created with defaults here; deploy-k8s.sh overlays
# the real config.json and profile. CronJobs and the controller Deployment
# reference this ConfigMap, so it MUST exist for pods to schedule.
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-controller-config
  namespace: media-stack
data:
  config.json: "{}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-controller-profile
  namespace: media-stack
data:
  profile.yaml: |
    install_profile: standard
    routing:
      gateway_host: k8s.my
      base_domain: my
      stack_subdomain: k8s
      gateway_port: 80
      app_path_prefix: /app
---
apiVersion: v1
kind: Secret
metadata:
  name: media-stack-secrets
  namespace: media-stack
stringData:
  BAZARR_API_KEY: ""
  JELLYFIN_API_KEY: ""
  JELLYFIN_USER_ID: ""
  JELLYSEERR_API_KEY: ""
  LIDARR_API_KEY: ""
  PROWLARR_API_KEY: ""
  RADARR_API_KEY: ""
  READARR_API_KEY: ""
  SABNZBD_API_KEY: ""
  SONARR_API_KEY: ""
  STACK_ADMIN_PASSWORD: media-stack
  STACK_ADMIN_USERNAME: admin
  TAUTULLI_API_KEY: ""
type: Opaque
