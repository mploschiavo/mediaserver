              key: SABNZBD_API_KEY
              name: media-stack-secrets
              optional: true
        - name: JELLYFIN_API_KEY
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_API_KEY
              name: media-stack-secrets
              optional: true
        - name: JELLYFIN_USER_ID
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_USER_ID
              name: media-stack-secrets
              optional: true
        - name: JELLYSEERR_API_KEY
          valueFrom:
            secretKeyRef:
              key: JELLYSEERR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: TAUTULLI_API_KEY
          valueFrom:
            secretKeyRef:
              key: TAUTULLI_API_KEY
              name: media-stack-secrets
              optional: true
        - name: STACK_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              key: STACK_ADMIN_USERNAME
              name: media-stack-secrets
              optional: true
        - name: STACK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: STACK_ADMIN_PASSWORD
              name: media-stack-secrets
              optional: true
        - name: SONARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: SONARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: RADARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: RADARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: LIDARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: LIDARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: READARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: READARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: PROWLARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: PROWLARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: BAZARR_API_KEY
          valueFrom:
            secretKeyRef:
              key: BAZARR_API_KEY
              name: media-stack-secrets
              optional: true
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: FULLY_PRECONFIGURED
          value: "1"
        - name: BOOTSTRAP_API_PORT
          value: "9100"
        - name: BOOTSTRAP_WAIT_INTERVAL_SECONDS
          value: "3"
        - name: BOOTSTRAP_WAIT_HEARTBEAT_SECONDS
          value: "15"
        - name: AUTO_INDEXER_HEARTBEAT_EVERY
          value: "25"
        - name: BOOTSTRAP_PROFILE_FILE
          value: /profile/profile.yaml
        - name: BOOTSTRAP_CONFIG_FILE
          value: /bootstrap-config/config.json
        image: harbor.iomio.io/library/media-stack-controller:v1.0.1
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: api
          initialDelaySeconds: 5
          periodSeconds: 10
        name: controller
        ports:
        - containerPort: 9100
          name: api
        readinessProbe:
          httpGet:
            path: /readyz
            port: api
          initialDelaySeconds: 10
          periodSeconds: 5
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /healthz
            port: api
          periodSeconds: 10
        volumeMounts:
        - mountPath: /bootstrap-config
          name: bootstrap-config
          readOnly: true
        - mountPath: /profile
          name: bootstrap-profile
          readOnly: true
        - mountPath: /srv-config/jellyfin
          name: cfg-jellyfin
        - mountPath: /srv-config/jellyseerr
          name: cfg-jellyseerr
        - mountPath: /srv-config/sonarr
          name: cfg-sonarr
        - mountPath: /srv-config/radarr
          name: cfg-radarr
        - mountPath: /srv-config/lidarr
          name: cfg-lidarr
        - mountPath: /srv-config/readarr
          name: cfg-readarr
        - mountPath: /srv-config/bazarr
          name: cfg-bazarr
        - mountPath: /srv-config/prowlarr
          name: cfg-prowlarr
        - mountPath: /srv-config/sabnzbd
          name: cfg-sabnzbd
        - mountPath: /srv-config/homepage
          name: cfg-homepage
        - mountPath: /srv-config/maintainerr
          name: cfg-maintainerr
        - mountPath: /srv-config/jellyfin-auto-collections
          name: cfg-jellyfin-auto-collections
        - mountPath: /srv-config/envoy
          name: cfg-envoy
        - mountPath: /srv-stack/data/torrents
          name: stack-torrents
        - mountPath: /srv-stack/data/usenet
          name: stack-usenet
        - mountPath: /srv-stack/media
          name: stack-media
      serviceAccountName: media-stack-controller
      volumes:
      - configMap:
          name: media-stack-controller-config
          optional: true
        name: bootstrap-config
      - configMap:
          name: media-stack-controller-profile
          optional: true
        name: bootstrap-profile
      - name: cfg-jellyfin
        persistentVolumeClaim:
          claimName: media-stack-config-jellyfin
      - name: cfg-jellyseerr
        persistentVolumeClaim:
          claimName: media-stack-config-jellyseerr
      - name: cfg-sonarr
        persistentVolumeClaim:
          claimName: media-stack-config-sonarr
      - name: cfg-radarr
        persistentVolumeClaim:
          claimName: media-stack-config-radarr
      - name: cfg-lidarr
        persistentVolumeClaim:
          claimName: media-stack-config-lidarr
      - name: cfg-readarr
        persistentVolumeClaim:
          claimName: media-stack-config-readarr
      - name: cfg-bazarr
        persistentVolumeClaim:
