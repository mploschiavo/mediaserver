# Media Automation Stack — Kubernetes Single-File Deploy
#
# Deploy:   kubectl apply -f k8s-deploy.yaml
# Status:   kubectl get pods -n media-stack
# Dashboard: kubectl port-forward -n media-stack svc/media-stack-controller 9100:9100
# Teardown: kubectl delete -f k8s-deploy.yaml
#
# Prerequisites: Kubernetes 1.25+ with a default StorageClass
# More info: https://github.com/mploschiavo/mediaserver
#
# Generated from k8s/ manifests (kubectl kustomize k8s/).
# Do NOT hand-edit — regenerate with `bin/regen-dist.sh`.
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
    media-stack.io/site: https://matthewloschiavo.com
  name: media-stack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-stack-controller
  namespace: media-stack
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-stack-controller
  namespace: media-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-stack-controller
subjects:
- kind: ServiceAccount
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: v1
data:
  configuration.yml: |
    server:
      address: tcp://0.0.0.0:9091
    log:
      level: info
    theme: auto
    identity_validation:
      reset_password:
        jwt_secret: PLACEHOLDER_JWT_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXXXXXX
    authentication_backend:
      file:
        path: /config/users_database.yml
    access_control:
      default_policy: deny
      rules:
        - domain: ["*.media-stack.local"]
          policy: one_factor
    session:
      secret: PLACEHOLDER_SESSION_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      cookies:
        - domain: media-stack.local
          authelia_url: https://auth.media-stack.local
          default_redirection_url: https://apps.media-stack.local
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    storage:
      encryption_key: PLACEHOLDER_STORAGE_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      local:
        path: /config/db.sqlite3
    notifier:
      filesystem:
        filename: /config/notification.txt
  users_database.yml: |
    users:
      admin:
        disabled: false
        displayname: Media Stack Admin
        email: admin@local
        groups:
          - admins
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: media-stack
---
apiVersion: v1
data:
  envoy.runtime.base.yaml: |
    # Keep in sync with config/defaults/compose/envoy.runtime.base.yaml
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8880
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: media_stack_routes
                      virtual_hosts: []
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            local function media_stack_escape_js_string(value)
                              if value == nil then
                                return ""
                              end
                              local escaped = tostring(value)
                              escaped = string.gsub(escaped, "\\", "\\\\")
                              escaped = string.gsub(escaped, "'", "\\'")
                              return escaped
                            end

                            local function media_stack_rewrite_base_href(html, prefix)
                              if prefix == nil or prefix == "" or prefix == "/" then
                                return html
                              end
                              local new_base = prefix .. "/"
                              html = string.gsub(html, '<base%s+href="/"', '<base href="' .. new_base .. '"')
                              html = string.gsub(html, "<base%s+href='/'", "<base href='" .. new_base .. "'")
                              return html
                            end

                            local function media_stack_inject_prefix_patch(handle, prefix)
                              if prefix == nil or prefix == "" or prefix == "/" then
                                return
                              end
                              local content_type = string.lower(handle:headers():get("content-type") or "")
                              if not string.find(content_type, "text/html", 1, true) then
                                return
                              end
                              local body = handle:body()
                              if body == nil then
                                return
                              end
                              local length = body:length()
                              if length == nil or length == 0 then
                                return
                              end
                              local html = body:getBytes(0, length) or ""
                              if html == "" then
                                return
                              end
                              if string.find(html, "data-media-stack-prefix-patch=", 1, true) ~= nil then
                                return
                              end

                              html = media_stack_rewrite_base_href(html, prefix)

                              local escaped_prefix = media_stack_escape_js_string(prefix)
                              local script = "<script data-media-stack-prefix-patch='" .. escaped_prefix .. "'>(function(){var prefix='" .. escaped_prefix .. "';if(!prefix||prefix==='/'||typeof window==='undefined'){return;}var parts=prefix.split('/');var appRoot=parts.length>=2?'/'+parts[1]+'/':'';function normalize(url){if(typeof url!=='string'||url===''){return url;}if(url.indexOf('javascript:')===0||url.indexOf('mailto:')===0||url.indexOf('tel:')===0||url.indexOf('#')===0){return url;}try{var u=new URL(url,window.location.origin);if(u.origin!==window.location.origin){return url;}if(u.pathname===prefix||u.pathname.indexOf(prefix+'/')===0){return u.pathname+u.search+u.hash;}if(appRoot&&u.pathname.indexOf(appRoot)===0&&u.pathname!==prefix){return u.pathname+u.search+u.hash;}if(u.pathname.indexOf('/')===0){return prefix+u.pathname+u.search+u.hash;}return url;}catch(e){return url;}}function patchAnchor(a){if(!a){return;}var href=a.getAttribute('href');var next=normalize(href);if(next&&href!==next){a.setAttribute('href',next);}}function patchAll(){var anchors=document.querySelectorAll('a[href^=\"/\"]');for(var i=0;i<anchors.length;i++){patchAnchor(anchors[i]);}}var push=history.pushState;history.pushState=function(state,title,url){return push.call(this,state,title,normalize(url));};var replace=history.replaceState;history.replaceState=function(state,title,url){return replace.call(this,state,title,normalize(url));};var current=normalize(window.location.pathname+window.location.search+window.location.hash);if(current&&current!==(window.location.pathname+window.location.search+window.location.hash)){replace.call(history,history.state,document.title,current);}document.addEventListener('click',function(ev){var el=ev.target;while(el&&el.tagName!=='A'){el=el.parentElement;}if(el){patchAnchor(el);}},true);if(document.documentElement&&typeof MutationObserver!=='undefined'){(new MutationObserver(function(){patchAll();})).observe(document.documentElement,{childList:true,subtree:true,attributes:true,attributeFilter:['href']});}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',patchAll,{once:true});}else{patchAll();}})();</script>"

                              local rewritten = nil
                              local head_start, head_end = string.find(html, "</head>", 1, true)
                              if head_start ~= nil then
                                rewritten = string.sub(html, 1, head_start - 1) .. script .. string.sub(html, head_start)
                              else
                                local body_start, body_end = string.find(html, "</body>", 1, true)
                                if body_start ~= nil then
                                  rewritten = string.sub(html, 1, body_start - 1) .. script .. string.sub(html, body_start)
                                else
                                  rewritten = html .. script
                                end
                              end

                              if rewritten ~= nil and rewritten ~= html then
                                body:setBytes(rewritten)
                                handle:headers():remove("content-length")
                              end
                            end

                            function envoy_on_response(handle)
                              local prefix = handle:headers():get("x-media-stack-prefix")
                              if prefix == nil or prefix == "" then
                                return
                              end
                              local host_hint = handle:headers():get("x-media-stack-host")
                              local location = handle:headers():get("location")
                              if location ~= nil and location ~= "" then
                                local normalized = nil
                                local is_absolute_uri = string.match(location, "^[a-zA-Z][a-zA-Z0-9+.-]*://") ~= nil
                                local is_scheme_relative = string.sub(location, 1, 2) == "//"
                                if not is_scheme_relative then
                                  if is_absolute_uri then
                                    if host_hint ~= nil and host_hint ~= "" then
                                      local scheme_sep = string.find(location, "://", 1, true)
                                      if scheme_sep ~= nil then
                                        local authority_start = scheme_sep + 3
                                        local path_start = string.find(location, "/", authority_start, true)
                                        local authority = nil
                                        if path_start ~= nil then
                                          authority = string.sub(location, authority_start, path_start - 1)
                                        else
                                          authority = string.sub(location, authority_start)
                                        end
                                        local authority_lower = string.lower(authority or "")
                                        local host_lower = string.lower(host_hint)
                                        local host_port_prefix = host_lower .. ":"
                                        if authority_lower == host_lower or string.sub(authority_lower, 1, string.len(host_port_prefix)) == host_port_prefix then
                                          if path_start ~= nil then
                                            normalized = string.sub(location, path_start)
                                          else
                                            normalized = "/"
                                          end
                                        end
                                      end
                                    end
                                  else
                                    normalized = location
                                  end

                                  if normalized ~= nil and normalized ~= "" then
                                    if string.sub(normalized, 1, 1) ~= "/" then
                                      normalized = "/" .. normalized
                                    end
                                    if string.sub(normalized, 1, string.len(prefix)) ~= prefix then
                                      handle:headers():replace("location", prefix .. normalized)
                                    end
                                  end
                                end
                              end
                              media_stack_inject_prefix_patch(handle, prefix)
                              handle:headers():remove("x-media-stack-prefix")
                              handle:headers():remove("x-media-stack-host")
                            end
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters: []
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
      access_log_path: /dev/null
