name: media-stack-ci

on:
  push:
  pull_request:

jobs:
  preflight-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fast Python compile check (migrated scripts)
        run: |
          python3 -m py_compile scripts/core/*.py scripts/bootstrap_services/*.py
          python3 -m py_compile scripts/cli/*.py

      - name: Fast migrated unit tests + shell wrapper contracts
        run: |
          python3 -m unittest \
            tests.unit.test_core_decorators \
            tests.unit.test_ensure_sabnzbd_api_access \
            tests.unit.test_set_pvc_storage_class \
            tests.unit.test_sync_unpackerr_keys \
            tests.unit.test_shell_wrapper_contracts \
            tests.unit.test_bootstrap_config_golden

  validate:
    runs-on: ubuntu-latest
    needs: preflight-fast
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-yaml python3-jsonschema
          python3 -m pip install --user \
            yamllint==1.35.1 \
            ruff==0.15.6 \
            black==24.10.0 \
            mypy==1.11.2

      - name: Shell syntax check
        run: bash -n scripts/*.sh

      - name: Shellcheck
        run: shellcheck scripts/*.sh

      - name: Python compile check
        run: |
          python3 -m py_compile scripts/bootstrap-apps.py
          python3 -m py_compile scripts/bootstrap_lib/common.py scripts/bootstrap_lib/http_client.py scripts/bootstrap_lib/servarr.py
          python3 -m py_compile scripts/core/*.py scripts/bootstrap_services/*.py
          python3 -m py_compile scripts/cli/*.py
          python3 -m py_compile tests/e2e/api/verify_api_relationships.py

      - name: Python style (ruff + black)
        run: |
          ~/.local/bin/ruff check \
            scripts/core \
            scripts/bootstrap_services \
            scripts/cli \
            tests/unit
          ~/.local/bin/black --check \
            scripts/bootstrap-apps.py \
            scripts/bootstrap_services/runtime_factory \
            scripts/bootstrap_services/plugin_manifest_loader.py \
            scripts/bootstrap_services/technology_catalog.py \
            scripts/bootstrap_services/config_models_discovery.py \
            scripts/bootstrap_services/runtime_servarr \
            scripts/cli/backup_stack_main.py \
            scripts/cli/restore_stack_main.py \
            scripts/cli/render_architecture_diagrams_main.py \
            scripts/cli/setup_lan_tls_main.py \
            scripts/cli/seed_jellyseerr_local_admin_main.py

      - name: Python type checks (mypy)
        run: |
          ~/.local/bin/mypy --config-file mypy.ini \
            scripts/bootstrap_services/runtime_factory \
            scripts/bootstrap_services/config_models_discovery.py \
            scripts/cli/backup_stack_main.py \
            scripts/cli/restore_stack_main.py \
            scripts/cli/render_architecture_diagrams_main.py \
            scripts/cli/setup_lan_tls_main.py \
            scripts/cli/seed_jellyseerr_local_admin_main.py

      - name: Bootstrap config schema validation
        run: python3 scripts/cli/validate_bootstrap_config_main.py

      - name: Python unit tests
        run: python3 -m unittest discover -s tests/unit -p 'test_*.py'

      - name: YAML lint
        run: |
          ~/.local/bin/yamllint -d '{"extends":"default","rules":{"line-length":"disable"}}' k8s docs .github/workflows

      - name: Kubernetes YAML parse (multi-doc safe)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path("k8s").rglob("*.yaml"):
              with path.open() as f:
                  list(yaml.safe_load_all(f))
          print("k8s-yaml-ok")
          PY

      - name: Kustomize build profiles
        run: |
          for profile in minimal full public-demo power-user; do
            kubectl kustomize "k8s/profiles/${profile}" >/dev/null
          done

  kind-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - uses: helm/kind-action@v1.10.0

      - name: Apply minimal profile to kind
        run: |
          kubectl apply -k k8s/profiles/minimal
          kubectl -n media-stack get deploy
          kubectl -n media-stack get pods

  playwright-spec-check:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright test deps
        working-directory: tests/e2e/playwright
        run: npm ci

      - name: Validate Playwright test discovery
        working-directory: tests/e2e/playwright
        run: npx playwright test --list
