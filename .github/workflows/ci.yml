name: media-stack-ci

on:
  push:
  pull_request:

jobs:
  preflight-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fast Python compile check (migrated scripts)
        run: |
          python3 -m py_compile src/media_stack/core/*.py src/media_stack/services/*.py
          python3 -m py_compile src/media_stack/cli/commands/*.py

      - name: Fast migrated unit tests + shell wrapper contracts
        run: |
          python3 -m unittest \
            tests.unit.test_core_decorators \
            tests.unit.test_ensure_sabnzbd_api_access \
            tests.unit.test_set_pvc_storage_class \
            tests.unit.test_sync_unpackerr_keys \
            tests.unit.test_shell_wrapper_contracts \
            tests.unit.test_bootstrap_config_golden

  validate:
    runs-on: ubuntu-latest
    needs: preflight-fast
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-yaml python3-jsonschema
          python3 -m pip install --user \
            yamllint==1.35.1 \
            ruff==0.15.6 \
            black==24.10.0 \
            mypy==1.11.2

      - name: Shell syntax check
        run: bash -n bin/*.sh

      - name: Shellcheck
        run: shellcheck bin/*.sh

      - name: Python compile check
        run: |
          python3 -m py_compile bin/controller.py
          python3 -m py_compile src/media_stack/adapters/common.py src/media_stack/adapters/http_client.py src/media_stack/adapters/servarr.py
          python3 -m py_compile src/media_stack/core/*.py src/media_stack/services/*.py
          python3 -m py_compile src/media_stack/cli/commands/*.py
          python3 -m py_compile tests/e2e/api/verify_api_relationships.py

      - name: Python style (ruff + black)
        run: |
          ~/.local/bin/ruff check \
            src/media_stack/core \
            src/media_stack/services \
            src/media_stack/cli \
            tests/unit
          ~/.local/bin/black --check \
            bin/controller.py \
            src/media_stack/services/runtime_factory \
            src/media_stack/services/plugin_manifest_loader.py \
            src/media_stack/services/technology_catalog.py \
            src/media_stack/cli/commands/backup_stack_main.py \
            src/media_stack/cli/commands/restore_stack_main.py \
            src/media_stack/cli/commands/render_architecture_diagrams_main.py \
            src/media_stack/cli/commands/setup_lan_tls_main.py \
            src/media_stack/services/apps/jellyseerr/cli/seed_jellyseerr_local_admin_main.py

      - name: Python type checks (mypy)
        run: |
          ~/.local/bin/mypy --config-file mypy.ini \
            src/media_stack/services/runtime_factory \
            src/media_stack/cli/commands/backup_stack_main.py \
            src/media_stack/cli/commands/restore_stack_main.py \
            src/media_stack/cli/commands/render_architecture_diagrams_main.py \
            src/media_stack/cli/commands/setup_lan_tls_main.py \
            src/media_stack/services/apps/jellyseerr/cli/seed_jellyseerr_local_admin_main.py

      - name: Bootstrap config schema validation
        run: python3 src/media_stack/cli/commands/validate_bootstrap_config_main.py

      - name: Python unit tests
        run: python3 -m unittest discover -s tests/unit -p 'test_*.py'

      - name: YAML lint
        run: |
          ~/.local/bin/yamllint -d '{"extends":"default","rules":{"line-length":"disable"}}' k8s docs .github/workflows

      - name: Kubernetes YAML parse (multi-doc safe)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path("k8s").rglob("*.yaml"):
              with path.open() as f:
                  list(yaml.safe_load_all(f))
          print("k8s-yaml-ok")
          PY

      - name: Kustomize build profiles
        run: |
          for profile in minimal full public-demo power-user; do
            kubectl kustomize "k8s/profiles/${profile}" >/dev/null
          done

  kind-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - uses: helm/kind-action@v1.10.0

      - name: Apply minimal profile to kind
        run: |
          kubectl apply -k k8s/profiles/minimal
          kubectl -n media-stack get deploy
          kubectl -n media-stack get pods

  security-baseline-harness:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The SecurityAuditRunner harness is pure-HTTP + stubbable. These
      # tests lock in the pass/fail decision logic without needing a
      # live service — every time the harness changes, the unit tests
      # surface regressions (e.g. "my new check accidentally passes
      # when the header is missing"). The live per-service suites
      # under tests/security/test_*_security_baseline.py skip when
      # the target isn't reachable, so this same job also runs them
      # and reports any targets that ARE reachable (e.g. Envoy sidecar
      # in a future CI integration profile).
      - name: Security harness decision tests
        env:
          PYTHONPATH: src
        run: |
          python3 -m pytest tests/unit/test_security_audit_harness.py \
                             tests/unit/test_trusted_proxy_auth.py \
                             tests/unit/test_ip_lockout.py -v

      - name: Live baseline (auto-skips if no service reachable)
        env:
          PYTHONPATH: src
        run: |
          python3 -m pytest tests/security/ -v || true
          # Non-fatal: targets aren't reachable inside GHA runners by
          # default. When a staging cluster URL is set in the env,
          # the suites run live and this step becomes a gate.

  image-supply-chain:
    # Builds the controller image, generates an SBOM, and (on tag
    # pushes) signs both with keyless cosign. Pure verification on
    # branch pushes — no registry writes.
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write   # keyless cosign via Fulcio OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build controller image (local only, no push)
        run: |
          PUSH_IMAGE=0 bin/build-controller-image.sh \
            --image media-stack-controller:ci-${{ github.sha }}

      - uses: anchore/sbom-action@v0
        with:
          image: media-stack-controller:ci-${{ github.sha }}
          format: spdx-json
          output-file: artifacts/sbom/ci.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign + attest (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: media-stack-controller:ci-${{ github.sha }}
        run: bin/sign-image.sh --with-sbom

      - name: SBOM summary
        run: |
          python3 - <<'PY'
          import json
          d = json.load(open("artifacts/sbom/ci.spdx.json"))
          pkgs = d.get("packages", [])
          print(f"::notice::SBOM cataloged {len(pkgs)} packages")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom/ci.spdx.json

  playwright-spec-check:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright test deps
        working-directory: tests/browser
        run: npm ci

      - name: Validate Playwright test discovery
        working-directory: tests/browser
        run: npx playwright test --list

  console-scripts-smoke:
    # ADR-0001 Phase 12-F gate. Locks the contract that every
    # `[project.scripts]` entry-point in pyproject.toml resolves to
    # a real importable module + callable, and (where the module
    # uses argparse) responds to `--help` with exit 0. Catches the
    # regression class where a CLI module moves and pyproject.toml
    # isn't updated — invisible to ruff/mypy/pytest, only surfaces
    # when the controller image (which since Phase 12-C runs
    # `media-stack-controller` as ENTRYPOINT) crash-loops at boot.
    runs-on: ubuntu-latest
    needs: preflight-fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Editable install
        run: |
          python3 -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          # `.[dev]` pulls pytest + the runtime deps the entry
          # points need at import time (docker, kubernetes, yaml,
          # requests, jsonschema, argon2-cffi, bcrypt).
          pip install -e ".[dev]"

      - name: List installed console-scripts
        run: |
          . .venv-smoke/bin/activate
          ls -1 .venv-smoke/bin | grep '^media-stack-' | sort

      - name: Console-scripts smoke tests
        run: |
          . .venv-smoke/bin/activate
          # NOTE: per-test --help subprocess uses a 30s timeout
          # (subprocess.run timeout=30) so we don't need
          # pytest-timeout here; keeps the dev-deps minimal.
          python -m pytest tests/smoke/test_console_scripts.py \
            --tb=short -v
