---
# Minimal Authelia users_database bootstrap. The controller's
# configure-auth job overwrites this on first run with an admin
# entry whose password hash comes from STACK_ADMIN_PASSWORD.
#
# No password is set here so the generator's merge path sees an
# empty existing password and emits a real argon2 hash. A stale
# bcrypt hash here would be preserved by _resolve_admin_hash's
# "seed-only" rule and ship every fresh install with a well-known
# default credential — which is exactly the class of bug the admin
# bootstrap redesign is closing.
users:
  admin:
    disabled: false
    displayname: Media Stack Admin
    email: admin@local
    groups:
      - admins
