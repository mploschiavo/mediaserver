---
# Minimal Authelia 4.38 bootstrap config. Seeded into
# /config on first container start when no user-written
# configuration.yml exists yet. The controller's
# configure-auth job overwrites this the first time it
# runs with real secrets and the correct cookie domain
# from the active profile. The "PLACEHOLDER_*" secret
# values below are treated as unset by _reuse_existing_secrets
# so the first regen always generates real ones.

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

theme: auto

identity_validation:
  reset_password:
    jwt_secret: PLACEHOLDER_JWT_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXXXXXX

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain:
        - "*.media-stack.local"
      policy: one_factor

session:
  secret: PLACEHOLDER_SESSION_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
  cookies:
    - domain: media-stack.local
      authelia_url: https://auth.media-stack.local
      default_redirection_url: https://apps.media-stack.local

regulation:
  max_retries: 3
  find_time: 120
  ban_time: 300

storage:
  encryption_key: PLACEHOLDER_STORAGE_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
