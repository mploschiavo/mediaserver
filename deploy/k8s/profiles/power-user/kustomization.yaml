apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/namespace.yaml
  - ../../base/hardening.yaml
  - ../../base/secrets.example.yaml
  - ../../base/storage/storage-pvc.yaml
  - ../../base/apps/core.yaml
  - ../../base/apps/optional.yaml
  - ../../base/edge/envoy.yaml
  - ../../base/controller/controller.yaml
  - ../../base/ui/ui.yaml
  - ../../base/auth/auth-authelia.yaml
  - ../../base/edge/networkpolicy.yaml   # zero-trust tier isolation (opt-in)
  - ../../base/edge/ingress-traefik.yaml
  - ../../base/apps/unpackerr.yaml
  - ../../base/scale-policy.yaml
images:
  - name: harbor.iomio.io/library/media-stack-controller
    newName: harbor.iomio.io/library/media-stack-controller
    newTag: v1.0.364
patches:
  - path: ingress-tls-patch.yaml
