apiVersion: v1
kind: Secret
metadata:
  name: media-stack-secrets
  namespace: media-stack
type: Opaque
stringData:
  STACK_ADMIN_USERNAME: "admin"
  # Seed credential only — the dashboard's forced-rotation flow
  # closes this window on first login (source=env-legacy → rotated).
  # MUST stay in lockstep with the compose default so both
  # platforms boot with the same admin credential. See project
  # memory "Admin bootstrap redesign".
  STACK_ADMIN_PASSWORD: "admin"
  SABNZBD_API_KEY: ""
  JELLYFIN_API_KEY: ""
  JELLYFIN_USER_ID: ""
  JELLYSEERR_API_KEY: ""
  TAUTULLI_API_KEY: ""
  SONARR_API_KEY: ""
  RADARR_API_KEY: ""
  LIDARR_API_KEY: ""
  READARR_API_KEY: ""
  PROWLARR_API_KEY: ""
