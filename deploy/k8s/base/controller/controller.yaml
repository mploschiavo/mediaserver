apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-stack-controller
  namespace: media-stack
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  # The controller's ingress-config job patches media-stack-ingress
  # spec.rules + spec.tls.hosts when routing config changes in the
  # dashboard. Without these verbs the K8s client raises 403 and the
  # dashboard's "Save Routing" only updates envoy — leaving the
  # Ingress controller routing the OLD hostnames. (v1.0.162.)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-stack-controller
  namespace: media-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-stack-controller
subjects:
  - kind: ServiceAccount
    name: media-stack-controller
    namespace: media-stack
---
# ClusterRole — needed for cluster-scoped reads. The Routing tab's
# DNS-reachability check resolves the cluster's external IP by
# reading Node.status.addresses; nodes are cluster-scoped so a
# namespaced Role can't grant it. Read-only on Nodes is the safest
# scope — no list-write/patch/delete. (v1.0.163 added this; before
# it the dns_check fell back to socket-trick + returned 127.0.0.1
# on MicroK8s, which made every legitimate hostname resolve as
# "doesn't match cluster IP".)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: media-stack-controller-cluster
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: media-stack-controller-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: media-stack-controller-cluster
subjects:
  - kind: ServiceAccount
    name: media-stack-controller
    namespace: media-stack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-stack-controller
  namespace: media-stack
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/site: https://matthewloschiavo.com
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: media-stack-controller
  template:
    metadata:
      labels:
        app: media-stack-controller
    spec:
      serviceAccountName: media-stack-controller
      imagePullSecrets:
      - name: harbor-pull
      containers:
        - name: controller
          image: harbor.iomio.io/library/media-stack-controller:v1.0.345
          imagePullPolicy: Always
          env:
            - name: SABNZBD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: SABNZBD_API_KEY
                  optional: true
            - name: JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYFIN_API_KEY
                  optional: true
            - name: JELLYFIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYFIN_USER_ID
                  optional: true
            - name: JELLYSEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYSEERR_API_KEY
                  optional: true
            - name: TAUTULLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: TAUTULLI_API_KEY
                  optional: true
            - name: STACK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: STACK_ADMIN_USERNAME
                  optional: true
            - name: STACK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: STACK_ADMIN_PASSWORD
                  optional: true
            # Trust Remote-User when Envoy (inside the cluster) forwards an
            # Authelia-authenticated request. Matches the pod CIDR used by
            # microk8s / kubeadm; override via the secret for other CNIs.
            - name: CONTROLLER_TRUSTED_PROXY_CIDRS
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: CONTROLLER_TRUSTED_PROXY_CIDRS
                  optional: true
            - name: CONTROLLER_TRUSTED_PROXY_HEADER
              value: "Remote-User"
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: SONARR_API_KEY
                  optional: true
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: RADARR_API_KEY
                  optional: true
            - name: LIDARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: LIDARR_API_KEY
                  optional: true
            - name: READARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: READARR_API_KEY
                  optional: true
            - name: PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: PROWLARR_API_KEY
                  optional: true
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MEDIA_STACK_LOG_LEVEL
              value: "INFO"
            - name: FULLY_PRECONFIGURED
              value: "1"
            - name: BOOTSTRAP_API_PORT
              value: "9100"
            # MUST match the K8s Envoy Service targetPort (8880).
            # The envoy-config job runs INSIDE this container and
            # regenerates envoy.yaml; without this env, the
            # generator silently emits ``listener: 0.0.0.0:80``,
            # which Envoy on K8s can't bind (non-root container,
            # no CAP_NET_BIND_SERVICE), CrashLoop. Same env exists
            # on docker/docker-compose.yml for the compose path.
            # (v1.0.149 root-cause for compose; v1.0.158 reproduced
            # on K8s during the fresh-install — added here.)
            - name: ENVOY_LISTENER_PORT
              value: "8880"
            # ADR-0003 Phase 5 staged-rollout allowlist. Comma-
            # separated service ids whose orchestrator-driven
            # ensurers run for real (vs Phase-4c dry-run-shadow).
            # 5a: jellyfin only. 5b: + Servarr family. 5c (current):
            # all 16 Phase-3-covered services. 5d retires legacy
            # auto-heal hooks. 5e deletes legacy preflight code.
            # Operators can flip with `kubectl set env` to roll
            # back without re-deploying the image.
            - name: ORCHESTRATOR_LIVE_SERVICES
              value: "jellyfin,sonarr,radarr,lidarr,readarr,prowlarr,qbittorrent,sabnzbd,bazarr,jellyseerr,maintainerr,authelia,authentik,homepage,flaresolverr,envoy"
            # In-place upgrade button on the dashboard. See
            # docker/docker-compose.yml for the long rationale.
            - name: STACK_UPDATE_ALLOW_INPLACE
              value: "true"
            - name: BOOTSTRAP_WAIT_INTERVAL_SECONDS
              value: "3"
            - name: BOOTSTRAP_WAIT_HEARTBEAT_SECONDS
              value: "15"
            - name: AUTO_INDEXER_HEARTBEAT_EVERY
              value: "25"
            - name: BOOTSTRAP_PROFILE_FILE
              value: /profile/profile.yaml
            - name: BOOTSTRAP_CONFIG_FILE
              value: /controller-config/config.json
          command:
            - media-stack-controller
            - --serve
            - --config
            - /controller-config/config.json
            - --config-root
            - /srv-config
            - --wait-timeout
            - "600"
          ports:
            - containerPort: 9100
              name: api
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: api
            failureThreshold: 60
            periodSeconds: 10
          volumeMounts:
            - name: controller-config
              mountPath: /controller-config
              readOnly: true
            - name: controller-profile
              mountPath: /profile
              readOnly: true
            - name: cfg-jellyfin
              mountPath: /srv-config/jellyfin
            - name: cfg-jellyseerr
              mountPath: /srv-config/jellyseerr
            - name: cfg-sonarr
              mountPath: /srv-config/sonarr
            - name: cfg-radarr
              mountPath: /srv-config/radarr
            - name: cfg-lidarr
              mountPath: /srv-config/lidarr
            - name: cfg-readarr
              mountPath: /srv-config/readarr
            - name: cfg-bazarr
              mountPath: /srv-config/bazarr
            - name: cfg-prowlarr
              mountPath: /srv-config/prowlarr
            - name: cfg-sabnzbd
              mountPath: /srv-config/sabnzbd
            - name: cfg-homepage
              mountPath: /srv-config/homepage
            - name: cfg-maintainerr
              mountPath: /srv-config/maintainerr
            - name: cfg-jellyfin-auto-collections
              mountPath: /srv-config/jellyfin-auto-collections
            - name: cfg-envoy
              mountPath: /srv-config/envoy
            # Parity with compose: the controller must have write
            # access to Authelia's config volume so
            # _run_boot_configure_auth writes a real configuration.yml
            # the Authelia pod picks up. Without this mount, the
            # controller writes to container-local disk that
            # Authelia never sees, and Authelia starts with only
            # whatever the ConfigMap seeded (no OIDC block → SSO
            # broken).
            - name: cfg-authelia
              mountPath: /srv-config/authelia
            # Controller's own state: users.json, audit.log.jsonl,
            # api_tokens.json, password-policy.yaml, schedules.json,
            # job-history.json, runtime-config.json,
            # routing-overrides.yaml. Without a PVC here EVERYTHING
            # the dashboard writes is ephemeral — every pod restart
            # wipes users, audit chain, rotated passwords, API
            # tokens, dashboard-edited routing, scheduled jobs, and
            # the job-history log. The mountPath has a leading dot
            # because state.py uses ``/srv-config/.controller/...``;
            # before v1.0.162 this was mounted at
            # ``/srv-config/controller`` (no dot) which left the PVC
            # bound but unused while every dashboard "Save Routing"
            # silently no-op'd on K8s.
            - name: cfg-controller
              mountPath: /srv-config/.controller
            - name: stack-torrents
              mountPath: /srv-stack/data/torrents
            - name: stack-usenet
              mountPath: /srv-stack/data/usenet
            - name: stack-media
              mountPath: /srv-stack/media
      volumes:
        - name: controller-config
          configMap:
            name: media-stack-controller-config
            optional: true
        - name: controller-profile
          configMap:
            name: media-stack-controller-profile
            # NOT optional — the kustomization ships a baked-in
            # standard profile so clean deploys produce the same
            # working state every time. If the ConfigMap is absent
            # the controller fails to start rather than silently
            # falling back to .local LAN defaults. (v1.0.169.)
        - name: cfg-jellyfin
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin
        - name: cfg-jellyseerr
          persistentVolumeClaim:
            claimName: media-stack-config-jellyseerr
        - name: cfg-sonarr
          persistentVolumeClaim:
            claimName: media-stack-config-sonarr
        - name: cfg-radarr
          persistentVolumeClaim:
            claimName: media-stack-config-radarr
        - name: cfg-lidarr
          persistentVolumeClaim:
            claimName: media-stack-config-lidarr
        - name: cfg-readarr
          persistentVolumeClaim:
            claimName: media-stack-config-readarr
        - name: cfg-bazarr
          persistentVolumeClaim:
            claimName: media-stack-config-bazarr
        - name: cfg-prowlarr
          persistentVolumeClaim:
            claimName: media-stack-config-prowlarr
        - name: cfg-sabnzbd
          persistentVolumeClaim:
            claimName: media-stack-config-sabnzbd
        - name: cfg-homepage
          persistentVolumeClaim:
            claimName: media-stack-config-homepage
        - name: cfg-maintainerr
          persistentVolumeClaim:
            claimName: media-stack-config-maintainerr
        - name: cfg-jellyfin-auto-collections
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin-auto-collections
        - name: cfg-envoy
          persistentVolumeClaim:
            claimName: media-stack-config-envoy
        - name: cfg-authelia
          persistentVolumeClaim:
            claimName: media-stack-config-authelia
        - name: cfg-controller
          persistentVolumeClaim:
            claimName: media-stack-config-controller
        - name: stack-torrents
          persistentVolumeClaim:
            claimName: media-stack-data-torrents
        - name: stack-usenet
          persistentVolumeClaim:
            claimName: media-stack-data-usenet
        - name: stack-media
          persistentVolumeClaim:
            claimName: media-stack-media
---
apiVersion: v1
kind: Service
metadata:
  name: media-stack-controller
  namespace: media-stack
spec:
  selector:
    app: media-stack-controller
  ports:
    - name: api
      port: 9100
      targetPort: 9100
