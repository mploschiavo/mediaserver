server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver — required so the variable-form ``proxy_pass``
    # below can re-resolve upstream hostnames at request time
    # instead of caching the IP from container startup.
    # ``${RESOLVER}`` is extracted from /etc/resolv.conf by the
    # ``/docker-entrypoint.d/15-set-resolver.envsh`` hook so this
    # works on both compose (Docker DNS at 127.0.0.11) and
    # kubernetes (CoreDNS via the kubelet's injected resolv.conf).
    # ``valid=10s`` caps how long a resolved IP is cached; after
    # that the next request re-resolves. ``ipv6=off`` avoids spurious
    # AAAA lookups on Docker bridge networks where IPv6 is disabled.
    resolver ${RESOLVER} valid=10s ipv6=off;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/xhtml+xml image/svg+xml;

    location = /healthz {
        access_log off;
        add_header Content-Type "application/json" always;
        return 200 '{"status":"ok"}';
    }

    # Vite emits hashed asset filenames under /assets/. Hash is the
    # cache key — long-cache safely (the HTML references the new
    # hash on each deploy).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Public files (favicon, branding) — short cache.
    location ~* \.(svg|png|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # API reverse proxy.
    #
    # ``set $controller_upstream`` + ``proxy_pass http://$controller_upstream;``
    # is the variable form that defers DNS resolution to request
    # time (rather than caching at config-load time). Combined
    # with the ``resolver`` directive at the top of this server
    # block, this prevents the ``Bad Gateway`` symptom that
    # otherwise appears for ~15 minutes after every controller
    # container ``force-recreate`` — until the UI container is
    # itself restarted to refresh its cached upstream IP.
    location /api/ {
        set $controller_upstream "${API_UPSTREAM}";
        proxy_pass http://$controller_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # Service-worker runtime config — fetched by the dashboard's
    # PWA SW on install/update. Public (no auth) so the SW can read
    # it before the user signs in. The controller derives the
    # response from the live routing engine, so a renamed dashboard
    # mount or a new sister app shows up here on the next pod
    # restart with no rebuild needed. Same proxy block as /api/ so
    # the controller's response headers (cache-control, etc.) reach
    # the SW unchanged.
    location = /sw-config.json {
        set $controller_upstream "${API_UPSTREAM}";
        proxy_pass http://$controller_upstream/sw-config.json;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # SPA fallback — every unknown route serves index.html so the
    # client-side router can take over. Cache must be no-cache so
    # deploys flip the index.html instantly while assets/* stays
    # long-cached.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
