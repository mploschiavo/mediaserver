# Per-service native auth: Forms login on the *arr family etc.
# Disabled for local-network addresses so the controller's API
# calls work without bouncing through a login form.
app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses

# Gateway-level SSO via Authelia is ON by default. The compose
# file ships Authelia unconditionally (no ``--profile`` needed),
# and Authelia's access_control rule lets RFC 1918 / loopback
# clients through with ``policy: bypass`` — so a couch + iPad on
# the home LAN never sees a sign-in screen. Anything from outside
# those ranges hits the one_factor / two_factor rules.
#
# To turn SSO off entirely, flip ``enabled: false`` here AND set
# ``--profile no-authelia`` on compose (or remove the service);
# leaving them out of sync caused the 2026-04-21 403 incident.
auth:
  enabled: true
  provider: authelia
  mode: authelia
bootstrap:
  apply_initial_preferences: true
  preconfigure_api_keys: true
  preconfigure_apps: true
  # Out-of-the-box auto-downloading. When true:
  #  - Prowlarr's auto_add_tested_indexers runs on first bootstrap
  #  - *arr import lists get enableAuto=true so new items auto-add
  #  - Sonarr's seed_series list auto-adds a few popular titles
  #  - Jellyseerr's "prevent_search" is left off so requests grab
  # The dashboard's "Auto-Downloads" toggle flips this at runtime.
  # Aligned with the k8s-standard default (false) so a fresh standard
  # install doesn't grab content before the operator's seen the
  # dashboard. Operators who want OTB downloads flip the dashboard
  # toggle or use ``media-compose-full``.
  auto_download_content: false
  trigger_indexer_sync: true
  refresh_health_after_setup: true
chaos:
  enabled: false
  duration_minutes: 5
  interval_seconds: 60
  actions:
  - restart_container
  - pause_container
  - network_disconnect
live_tv_defaults:
  tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
  guide_url: https://iptv-epg.org/files/epg-us.xml
  default_program_icon_urls:
  - https://raw.githubusercontent.com/iptv-org/logo/master/tv.png
install_profile: standard
kind: media_stack_profile
metadata:
  country: US
  description: Standard local stack profile
  language: en
  name: media-stack
  platform: compose
  purpose: standard
resources:
  disk_space_gb: 50
  network_cidr: 192.168.1.0/24
routing:
  app_path_prefix: /app
  base_domain: local
  # Empty media_server lets the envoy generator auto-derive
  # ``<media_server>.<stack_subdomain>.<base_domain>``
  # (e.g. ``jellyfin.media-stack.local``). Operators who terminate
  # TLS at a real domain set this to ``jellyfin.media.example.com``
  # — see ``media-compose-full.yaml``.
  direct_hosts:
    media_server: ""
  gateway_host: apps.media-stack.local
  gateway_port: 443
  internet_exposed: false
  provider: envoy
  scheme: https
  stack_subdomain: media-stack
  strategy: hybrid
schema_version: 1
technology_bindings:
  indexer_manager: prowlarr
  media_server: jellyfin
  request_manager: jellyseerr
  torrent_client: qbittorrent
  usenet_client: sabnzbd
# ADR-0008 disk-guardrails: per-install pressure thresholds.
# Uncomment and override any keys from
# contracts/defaults/operations.yaml::disk_guardrails. The values
# below are the laptop-tuned defaults from ADR-0008 Phase 4; remove
# or adjust for bigger servers. Three-tier merge order at runtime:
# operations.yaml defaults -> profile.yaml -> guardrails.json
# (UI-saved, highest priority). The Registry's UI overrides at
# /srv-config/.controller/guardrails.json always win at runtime.
# disk_guardrails:
#   max_used_percent: 50
#   target_used_percent: 40
#   lockdown_percent: 75
#   release_percent: 60
