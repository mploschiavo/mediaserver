# Media Automation Stack — Docker Compose Single-File Deploy (distribution snapshot)
#
# Deploy:   docker compose -f docker-compose.yml up -d
# Status:   docker compose -f docker-compose.yml ps
# Dashboard: http://localhost:9100
# Teardown: docker compose -f docker-compose.yml down -v
#
# Prerequisites: Docker Engine 24+ with Compose V2.
#
# NOTE: This file expects to run from a repo checkout. Bind mounts reference
# ../../config, ../../contracts, ../examples. If you are using this file
# standalone, clone the repo and run from the deploy/compose/ directory instead:
#   git clone https://github.com/mploschiavo/mediaserver.git && cd mediaserver/deploy/compose
#   docker compose up -d
#
# Regenerate this file after editing deploy/compose/docker-compose.yml:
#   bin/release/regen-dist.sh
name: ${COMPOSE_PROJECT_NAME:-media-stack}
# Image references are digest-pinned as of 2026-03-28.
#
# Usage:
#   docker compose up -d                          # minimal (core services)
#   docker compose --profile standard up -d       # standard (+ usenet, subtitles, etc.)
#   docker compose --profile full up -d           # full (+ lidarr, readarr)
#
# All settings come from the profile YAML mounted into init/bootstrap containers.
# Storage paths default to ../../config, ../../media, ../../data relative to
# this file (i.e. the repo root, since this file lives at deploy/compose/).
# Override via .env or shell: CONFIG_ROOT=/srv/media-stack/config

x-arr-env: &arr-env
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-UTC}

x-media-vols: &media-vols
  - ${MEDIA_ROOT:-../../media}:/media
  - ${DATA_ROOT:-../../data}/torrents:/data/torrents
  - ${DATA_ROOT:-../../data}/usenet:/data/usenet

services:
  # Init service: create config/data directories with correct ownership.
  # Docker creates bind-mount host dirs as root, but services run as UID 1000.
  init-permissions:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-media-stack}-init-permissions
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for d in \
          /cfg/jellyfin /cfg/jellyseerr /cfg/sonarr /cfg/radarr /cfg/lidarr \
          /cfg/readarr /cfg/prowlarr /cfg/bazarr /cfg/qbittorrent \
          /cfg/maintainerr /cfg/homepage /cfg/envoy /cfg/unpackerr \
          /data/torrents /data/usenet /data/transcode \
          /data/torrents/incomplete \
          /data/torrents/completed \
          /data/torrents/completed/tv \
          /data/torrents/completed/movies \
          /data/torrents/completed/music \
          /data/torrents/completed/books \
          /data/usenet/incomplete \
          /data/usenet/completed \
          /data/usenet/completed/tv \
          /data/usenet/completed/movies \
          /data/usenet/completed/music \
          /data/usenet/completed/books \
          /media /media/movies /media/tv /media/music /media/books; do
          mkdir -p "$$d"
        done
        chown -R ${PUID:-1000}:${PGID:-1000} /cfg /data /media
    volumes:
      - ${CONFIG_ROOT:-../../config}:/cfg
      - ${DATA_ROOT:-../../data}:/data
      - ${MEDIA_ROOT:-../../media}:/media
    restart: "no"

  traefik:
    image: traefik@sha256:74d72c7a1345984f186bddbabcc462b2128d0d8054177dc84afaeac4db1f0f56
    container_name: traefik
    profiles: ["traefik"]
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=false
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --ping=true
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:8880"
      - "${TRAEFIK_DASHBOARD_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONFIG_ROOT:-../../config}/traefik/dynamic:/etc/traefik/dynamic:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  authelia:
    image: authelia/authelia:4.38
    container_name: authelia
    # SSO is ON by default — right out-of-the-box posture for any
    # stack that might end up exposed to the internet. LAN clients
    # bypass the SSO challenge automatically via Authelia's
    # per-network access_control rule (see
    # core/auth/authelia_config_generator.py::_build_access_control).
    # Wait until the controller is healthy before starting. The
    # controller runs configure-auth synchronously at boot (before
    # the /readyz health probe returns ok), so by the time Authelia
    # starts, /config/configuration.yml already has REAL secrets —
    # never the PLACEHOLDER_* sentinels. Without this ordering,
    # Authelia would encrypt db.sqlite3 with placeholder secrets
    # and every subsequent configure-auth run would brick startup.
    depends_on:
      media-stack-controller:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if [ ! -f /config/configuration.yml ]; then
          cp /defaults/configuration.yml /config/configuration.yml
        fi
        if [ ! -f /config/users_database.yml ]; then
          cp /defaults/users_database.yml /config/users_database.yml
        fi
        exec authelia --config /config/configuration.yml
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ${CONFIG_ROOT:-../../config}/authelia:/config
      - ../../config/defaults/compose/auth/authelia:/defaults:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.authelia.rule=Host(`authelia.local`)
      - traefik.http.services.authelia.loadbalancer.server.port=9091
      - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth
      - traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email

  authentik-postgresql:
    image: docker.io/library/postgres:16-alpine
    container_name: authentik-postgresql
    profiles: ["auth-authentik"]
    environment:
      POSTGRES_DB: ${AUTHENTIK_PG_DB:-authentik}
      POSTGRES_USER: ${AUTHENTIK_PG_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:-authentik}
    volumes:
      - ${DATA_ROOT:-../../data}/authentik/postgresql:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB:-authentik} -U $${POSTGRES_USER:-authentik}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  authentik:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2-rc1}
    container_name: authentik
    profiles: ["auth-authentik"]
    command: ["server"]
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-replace-this-authentik-secret-key}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-authentik}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
    volumes:
      - ${CONFIG_ROOT:-../../config}/authentik/data:/data
      - ${CONFIG_ROOT:-../../config}/authentik/custom-templates:/templates
    restart: unless-stopped
    shm_size: 512mb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/-/health/live/"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.authentik.rule=Host(`authentik.local`)
      - traefik.http.services.authentik.loadbalancer.server.port=9000
      - traefik.http.middlewares.authentik.forwardauth.address=http://authentik:9000/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid

  authentik-worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2-rc1}
    container_name: authentik-worker
    profiles: ["auth-authentik"]
    command: ["worker"]
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-replace-this-authentik-secret-key}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-authentik}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_ROOT:-../../config}/authentik/data:/data
      - ${CONFIG_ROOT:-../../config}/authentik/certs:/certs
      - ${CONFIG_ROOT:-../../config}/authentik/custom-templates:/templates
    restart: unless-stopped
    shm_size: 512mb

  envoy-config-init:
    image: ${BOOTSTRAP_RUNNER_IMAGE:-harbor.iomio.io/library/media-stack-controller:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-media-dev}-envoy-config-init
    # Image ENTRYPOINT is "media-stack-controller" — for the
    # one-shot envoy generator we need plain python3, so override.
    # The generator is shipped as an installed module, so use -m
    # rather than a baked-in source path (which doesn't exist on the
    # wheel-built image).
    entrypoint: ["python3"]
    command:
      - -m
      - media_stack.services.edge.envoy_config_generator
    environment:
      COMPOSE_FILE: /compose/docker-compose.yml
      CONFIG_ROOT: /runtime-config
      BOOTSTRAP_PROFILE_FILE: /profile/profile.yaml
      BOOTSTRAP_CONFIG_FILE: /contracts/media-stack.config.json
      # Read service contracts from the bind-mount, not the image's
      # baked-in copy. Lets contract YAML edits (add a Jellyfin
      # plugin, tweak a job, etc.) take effect on next job run
      # without a controller image rebuild. (v1.0.147.)
      SERVICES_REGISTRY_DIR: /contracts/services
      # Match the compose port mapping (host:443 → envoy:8880,
      # host:80 → envoy:8080). Without this, the generator's base
      # template binds the listener at port 80 INSIDE the container
      # — docker forwards to 8880 instead, nothing is listening
      # there, and every gateway/subdomain HTTPS URL silently dies
      # (TCP accept then EOF before TLS handshake completes). The
      # symptom is "all routes broken" in the dashboard's Routes
      # test panel + the OIDC discovery URL unreachable from
      # downstream apps. (v1.0.147 root-cause.)
      ENVOY_LISTENER_PORT: "8880"
      # The runtime template ships with the repo (not in the wheel),
      # so point the generator at the bind-mounted defaults dir.
      # Without this, the generator probes a path computed from
      # __file__ which only resolves correctly from a source checkout.
      ENVOY_RUNTIME_TEMPLATE_FILE: /defaults/compose/envoy.runtime.base.yaml
    volumes:
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ${BOOTSTRAP_PROFILE_FILE:-../examples/bootstrap-profiles/media-compose-standard.yaml}:/profile/profile.yaml:ro
      - ${CONFIG_ROOT:-../../config}:/runtime-config:rw
      - ../../contracts:/contracts:ro
      - ../../config/defaults:/defaults:ro
      # RW so the generator can mint a self-signed cert the first time
      # the stack comes up (see _resolve_or_mint_certs in
      # core/platforms/compose/edge/providers/envoy/dynamic_config.py).
      # envoy itself still mounts this read-only below.
      - ${CONFIG_ROOT:-../../config}/certs:/certs:rw
    restart: "no"

  envoy:
    image: envoyproxy/envoy:v1.31.2
    container_name: envoy
    depends_on:
      envoy-config-init:
        condition: service_completed_successfully
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --service-cluster
      - media-stack-edge
      - --log-level
      - info
    ports:
      - "${TRAEFIK_HTTP_PORT:-443}:8880"
      - "80:8080"
      - "${ENVOY_ADMIN_PORT:-9901}:9901"
    volumes:
      - ${CONFIG_ROOT:-../../config}/envoy:/etc/envoy:ro
      - ${CONFIG_ROOT:-../../config}/certs:/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "envoy", "--mode", "validate", "-c", "/etc/envoy/envoy.yaml"]
      interval: 10s
      timeout: 10s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.envoy.rule=Host(`envoy.local`)
      - traefik.http.services.envoy.loadbalancer.server.port=9901

  homepage:
    image: ghcr.io/gethomepage/homepage@sha256:9627769818fbfb14147d3e633e57cef9c27c0c5f07585f5a1d6c3d3425b3b33c
    container_name: homepage
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      HOMEPAGE_ALLOWED_HOSTS: "*"
    volumes:
      - ${CONFIG_ROOT:-../../config}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage.rule=Host(`homepage.local`)
      - traefik.http.services.homepage.loadbalancer.server.port=3000

  jellyfin:
    image: jellyfin/jellyfin@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
    container_name: jellyfin
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    # Hardware transcoding: uncomment on Linux with Intel QSV/VA-API GPU.
    # group_add: ["44","109"]
    # devices:
    #   - /dev/dri:/dev/dri
    environment:
      TZ: ${TZ:-UTC}
      JELLYFIN_PublishedServerUrl: ""
    volumes:
      - ${CONFIG_ROOT:-../../config}/jellyfin:/config
      - ${DATA_ROOT:-../../data}/transcode:/cache
      - ${MEDIA_ROOT:-../../media}:/media
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8096/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.local`)
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  jellyseerr:
    image: fallenbagel/jellyseerr:preview-OIDC
    container_name: jellyseerr
    extra_hosts:
      - "auth.media-stack.local:host-gateway"
      - "apps.media-stack.local:host-gateway"
      # Jellyseerr's OIDC back-channel hits the issuer URL directly
      # (discovery, token exchange, userinfo) — must resolve INSIDE
      # the container. The host machine's /etc/hosts already maps
      # this to localhost; ``host-gateway`` makes the container
      # reach it via the docker bridge. Without this, "Sign in with
      # Authelia" fails with "An error occurred while logging in"
      # and Jellyseerr's debug log shows DNS lookup failed for
      # authelia.media-stack.local. (v1.0.146.)
      - "authelia.media-stack.local:host-gateway"
    environment:
      TZ: ${TZ:-UTC}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      BASE_URL: ${JELLYSEERR_BASE_PATH:-}
    volumes:
      - ${CONFIG_ROOT:-../../config}/jellyseerr:/app/config
    ports:
      - "${JELLYSEERR_PORT:-5055}:5055"
    restart: unless-stopped
    depends_on:
      jellyfin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5055${JELLYSEERR_BASE_PATH:-}/api/v1/status"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.local`)
      - traefik.http.services.jellyseerr.loadbalancer.server.port=5055

  prowlarr:
    image: lscr.io/linuxserver/prowlarr@sha256:c5de2a8758a05594319263e7691c1dce56899442ed1720d6eca216c0958f4caf
    container_name: prowlarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/prowlarr:/config
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9696/ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.local`)
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent@sha256:570aeb63bdedcb5f9dd2500bd8f0a75581ba07c518c05cabbef0cfeb15451b3f
    container_name: qbittorrent
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
      QBT_WEBUI_PORT: 8080
    volumes:
      - ${CONFIG_ROOT:-../../config}/qbittorrent:/config
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
    ports:
      - "${QBITTORRENT_PUBLISHED_PORT:-8080}:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local`)
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

  sonarr:
    image: lscr.io/linuxserver/sonarr@sha256:76414c033f290d3c9f1f9dfad71150abe71d92592369a3377a5903d579e6e2b2
    container_name: sonarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/sonarr:/config
      - ${MEDIA_ROOT:-../../media}:/media
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
      - ${DATA_ROOT:-../../data}/usenet:/data/usenet
    ports:
      - "${SONARR_PORT:-8989}:8989"
    restart: unless-stopped
    depends_on: [qbittorrent, prowlarr]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8989/ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.local`)
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

  radarr:
    image: lscr.io/linuxserver/radarr@sha256:b01097ad2d948c9f5eca39eb60bb529e2e55b0738c4bf7db09383bef0abab59d
    container_name: radarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/radarr:/config
      - ${MEDIA_ROOT:-../../media}:/media
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
      - ${DATA_ROOT:-../../data}/usenet:/data/usenet
    ports:
      - "${RADARR_PORT:-7878}:7878"
    restart: unless-stopped
    depends_on: [qbittorrent, prowlarr]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7878/ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.local`)
      - traefik.http.services.radarr.loadbalancer.server.port=7878

  lidarr:
    image: lscr.io/linuxserver/lidarr@sha256:dbffcf91da47d48e09e613857032c95a62755b928a71a7718688e3ab03fbbd26
    container_name: lidarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/lidarr:/config
      - ${MEDIA_ROOT:-../../media}:/media
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
      - ${DATA_ROOT:-../../data}/usenet:/data/usenet
    ports:
      - "${LIDARR_PORT:-8686}:8686"
    restart: unless-stopped
    depends_on: [qbittorrent, prowlarr]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8686/ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.local`)
      - traefik.http.services.lidarr.loadbalancer.server.port=8686

  readarr:
    image: docker.io/linuxserver/readarr@sha256:4f291128d1a5538be73c2a30473d7cdd0820e223dc8b8533b0cbc5659000dcbe
    container_name: readarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/readarr:/config
      - ${MEDIA_ROOT:-../../media}:/media
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
      - ${DATA_ROOT:-../../data}/usenet:/data/usenet
    ports:
      - "${READARR_PORT:-8787}:8787"
    restart: unless-stopped
    depends_on: [qbittorrent, prowlarr]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.readarr.rule=Host(`readarr.local`)
      - traefik.http.services.readarr.loadbalancer.server.port=8787

  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    environment: *arr-env
    volumes:
      - ${CONFIG_ROOT:-../../config}/bazarr:/config
      - ${MEDIA_ROOT:-../../media}:/media
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    restart: unless-stopped
    depends_on: [sonarr, radarr]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6767"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.local`)
      - traefik.http.services.bazarr.loadbalancer.server.port=6767

  unpackerr:
    image: ghcr.io/unpackerr/unpackerr@sha256:89e13608521ece21dd300c39229fd595a55fbf4b8152771af5670a7455b5c747
    container_name: unpackerr
    environment:
      TZ: ${TZ:-UTC}
      UN_CONFIG_FILE: /etc/unpackerr/unpackerr.conf
    volumes:
      - ${CONFIG_ROOT:-../../config}/unpackerr:/etc/unpackerr:ro
      - ${DATA_ROOT:-../../data}/torrents:/data/torrents
      - ${DATA_ROOT:-../../data}/usenet:/data/usenet
    restart: unless-stopped
    depends_on: [sonarr, radarr, lidarr, readarr]

  # Recyclarr was previously stubbed via hashicorp/http-echo so the
  # service tile + DNS host could resolve before a real Recyclarr
  # runtime was wired in. The placeholder did nothing and surfaced
  # as a confusing "Recyclarr stub endpoint" string in browsers
  # that hit it. Removed in v1.0.137. To bring Recyclarr back, add
  # a service block using ghcr.io/recyclarr/recyclarr (cron-based)
  # and re-enable the homepage tile via the bootstrap profile.

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:3.3.0
    container_name: maintainerr
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ:-UTC}
      UI_HOSTNAME: 0.0.0.0
      UI_PORT: 6246
      BASE_PATH: ${MAINTAINERR_BASE_PATH:-/app/maintainerr}
    volumes:
      - ${CONFIG_ROOT:-../../config}/maintainerr:/opt/data
    ports:
      - "${MAINTAINERR_PORT:-6246}:6246"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6246${MAINTAINERR_BASE_PATH:-/app/maintainerr}/api/settings || wget -qO- http://127.0.0.1:6246/"]
      interval: 10s
      timeout: 10s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.maintainerr.rule=Host(`maintainerr.local`)
      - traefik.http.services.maintainerr.loadbalancer.server.port=6246

  # sabnzbd was retired from the default stack on 2026-04-26 — qBittorrent
  # covers torrent fetches and the team isn't using usenet today. Re-add
  # under a ``profiles: ["usenet"]`` if/when needed.

  plex:
    image: lscr.io/linuxserver/plex@sha256:a27f1ce1e1d14cd3627ed217f042bf8de0f796ed274fb27b2dc971ae22a64b95
    container_name: plex
    profiles: ["plex"]
    network_mode: host
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      VERSION: docker
    volumes:
      - ${CONFIG_ROOT:-../../config}/plex:/config
      - ${MEDIA_ROOT:-../../media}:/media
      - ${DATA_ROOT:-../../data}/transcode:/transcode
    restart: unless-stopped

  # tautulli was retired from the default stack on 2026-04-26 — Jellyfin
  # is the only media server in the standard profile and Tautulli is
  # Plex-only. Re-add under a ``profiles: ["plex"]`` if a Plex deploy
  # needs it.

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    environment:
      TZ: ${TZ:-UTC}
      LOG_LEVEL: info
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.flaresolverr.rule=Host(`flaresolverr.local`)
      - traefik.http.services.flaresolverr.loadbalancer.server.port=8191

  jellyfin-nvidia:
    image: jellyfin/jellyfin@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
    container_name: jellyfin-nvidia
    profiles: ["nvidia"]
    runtime: nvidia
    environment:
      TZ: ${TZ:-UTC}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - ${CONFIG_ROOT:-../../config}/jellyfin:/config
      - ${DATA_ROOT:-../../data}/transcode:/cache
      - ${MEDIA_ROOT:-../../media}:/media
    restart: unless-stopped

  media-stack-controller:
    image: ${BOOTSTRAP_RUNNER_IMAGE:-harbor.iomio.io/library/media-stack-controller:v1.0.332}
    container_name: media-stack-controller
    # Image ENTRYPOINT is already "media-stack-controller" — only
    # pass flags here, otherwise the binary's own name re-arrives as
    # an unrecognized positional arg.
    command:
      - --serve
      - --config
      - /contracts/media-stack.config.json
      - --config-root
      - /srv-config
      - --wait-timeout
      - "600"
    environment:
      BOOTSTRAP_PROFILE_FILE: /profile/profile.yaml
      BOOTSTRAP_CONFIG_FILE: /contracts/media-stack.config.json
      # Read service contracts from the bind-mount, not the baked
      # image copy (v1.0.147). Same rationale as envoy-config-init.
      SERVICES_REGISTRY_DIR: /contracts/services
      # MUST match the envoy-config-init env. The ``envoy-config``
      # JOB runs INSIDE this container (triggered by phase reorder
      # or routing-config edits) and regenerates envoy.yaml. Without
      # this env, the regeneration silently downgrades the HTTPS
      # listener back to port 80, killing every gateway/subdomain
      # HTTPS route. (v1.0.149 — caught when phase-reorder forced
      # an envoy-config re-run.)
      ENVOY_LISTENER_PORT: "8880"
      BOOTSTRAP_API_PORT: "9100"
      FULLY_PRECONFIGURED: "1"
      # ADR-0003 Phase 5 staged rollout knob. Comma-separated list
      # of service ids whose ensurers run for real (the orchestrator
      # remains in dry-run-shadow for everything else). Empty/unset
      # = full Phase-4c shadow. 5a: jellyfin only. 5b: + Servarr
      # family. 5c (current): all 16 Phase-3-covered services. 5d
      # retires the legacy auto-heal hooks. 5e deletes the legacy
      # preflight code. Operator can shrink to roll back without
      # rebuilding.
      ORCHESTRATOR_LIVE_SERVICES: "${ORCHESTRATOR_LIVE_SERVICES:-jellyfin,sonarr,radarr,lidarr,readarr,prowlarr,qbittorrent,sabnzbd,bazarr,jellyseerr,maintainerr,authelia,authentik,homepage,flaresolverr,envoy}"
      # In-place upgrade button on the dashboard. When set, the
      # controller exposes /api/stack/upgrade which spawns a
      # docker:cli sibling container holding the docker socket and
      # runs ``compose pull controller && up -d --force-recreate
      # controller``. Off by default everywhere else because the
      # sibling container has full docker-socket access; only enable
      # when you trust everyone with admin access to the dashboard.
      # See docs/upgrades.md for the rationale.
      STACK_UPDATE_ALLOW_INPLACE: "${STACK_UPDATE_ALLOW_INPLACE:-true}"
      BOOTSTRAP_WAIT_INTERVAL_SECONDS: "3"
      BOOTSTRAP_WAIT_HEARTBEAT_SECONDS: "15"
      AUTO_INDEXER_HEARTBEAT_EVERY: "25"
      STACK_ADMIN_USERNAME: "${STACK_ADMIN_USERNAME:-admin}"
      # Default is intentionally trivial (admin/admin). The controller's
      # admin-bootstrap flow seeds this into the user store and the
      # dashboard forces a rotation on first login (source=env-seed/
      # env-legacy → blocking modal). The env password stops working
      # the moment rotation commits, so the weak default lives for
      # exactly one sign-in. See project memory
      # "Admin bootstrap redesign".
      STACK_ADMIN_PASSWORD: "${STACK_ADMIN_PASSWORD:-admin}"
      # Testing escape hatch: set to 1/true to suppress the
      # "rotate password on first login" modal so a tester running
      # ``compose down -v && up`` repeatedly doesn't have to reset
      # the admin password every cycle. NEVER set on a stack
      # exposed to the internet — the env-seed credential is a
      # well-known default. (Default empty = forced rotation ON.)
      STACK_ADMIN_SKIP_FORCED_ROTATION: "${STACK_ADMIN_SKIP_FORCED_ROTATION:-}"
      # Trust Remote-User when Envoy (inside the compose network) forwards
      # an Authelia-authenticated request. Without this, users who log in
      # through the gateway get a SECOND basic-auth prompt when visiting
      # /app/media-stack-controller/ because the controller can't tell
      # that upstream auth already happened.
      CONTROLLER_TRUSTED_PROXY_CIDRS: "${CONTROLLER_TRUSTED_PROXY_CIDRS:-172.21.0.0/16}"
      CONTROLLER_TRUSTED_PROXY_HEADER: "${CONTROLLER_TRUSTED_PROXY_HEADER:-Remote-User}"
      SONARR_API_KEY: "${SONARR_API_KEY:-}"
      RADARR_API_KEY: "${RADARR_API_KEY:-}"
      LIDARR_API_KEY: "${LIDARR_API_KEY:-}"
      READARR_API_KEY: "${READARR_API_KEY:-}"
      PROWLARR_API_KEY: "${PROWLARR_API_KEY:-}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY:-}"
      JELLYSEERR_API_KEY: "${JELLYSEERR_API_KEY:-}"
      SABNZBD_API_KEY: "${SABNZBD_API_KEY:-}"
      TAUTULLI_API_KEY: "${TAUTULLI_API_KEY:-}"
    volumes:
      - ${BOOTSTRAP_PROFILE_FILE:-../examples/bootstrap-profiles/media-compose-standard.yaml}:/profile/profile.yaml:rw
      - ../../contracts:/contracts:ro
      - ${CONFIG_ROOT:-../../config}:/srv-config:rw
      - /var/run/docker.sock:/var/run/docker.sock
      # MUST match the envoy-config-init mount. The controller also
      # runs the Envoy config generator in-process (on /api/routing,
      # /api/auth-config, TLS cert installs, and startup hooks). Without
      # this mount, the generator can't find the cert, returns (None,
      # None) from _resolve_or_mint_certs, and silently emits a plain-
      # HTTP envoy.yaml — which overwrites the working TLS config and
      # breaks HTTPS on :443 until envoy-config-init is rerun by hand.
      # This was a recurring regression before the mount was added.
      - ${CONFIG_ROOT:-../../config}/certs:/certs:rw
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    ports:
      - "${BOOTSTRAP_API_PORT:-9100}:9100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9100/readyz"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.media-stack-controller.rule=Host(`controller.local`)
      - traefik.http.services.media-stack-controller.loadbalancer.server.port=9100

  media-stack-ui:
    container_name: ${COMPOSE_PROJECT_NAME:-media-stack}-ui
    image: ${UI_RUNNER_IMAGE:-harbor.iomio.io/library/media-stack-ui:v1.3.83}
    restart: unless-stopped
    depends_on:
      media-stack-controller:
        condition: service_healthy
    environment:
      # The compose API service container/alias is media-stack-controller
      # (NOT "bootstrap" — that's the conceptual name in the controller
      # codebase). The UI proxies /api/* to this upstream over the
      # default compose network.
      API_UPSTREAM: media-stack-controller:9100
    ports:
      # Expose the dashboard on the host. Envoy normally fronts this
      # at /app/media-stack-ui/, but giving the UI container its own
      # host port lets operators bypass Envoy for debugging — same
      # pattern Radarr/Sonarr/etc. use with their *_PORT vars.
      - "${UI_PORT:-9101}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
        reservations:
          memory: 32M
          cpus: "0.025"
    labels:
      - "media-stack.io/role=ui"
      - "media-stack.io/version=1.0.0"
      - traefik.enable=true
      - traefik.http.routers.media-stack-ui.rule=Host(`ui.local`)
      - traefik.http.services.media-stack-ui.loadbalancer.server.port=8080
