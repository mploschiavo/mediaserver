---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-auto-collections
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin-auto-collections
  template:
    metadata:
      labels:
        app: jellyfin-auto-collections
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          until [ -f /config/config.yaml ]; do
            echo "[WAIT] jellyfin-auto-collections: waiting for /config/config.yaml from controller..."
            sleep 15
          done
          ln -sf /config/config.yaml /app/config.yaml
          exec python /app/main.py
        env:
        - name: CRONTAB
          value: 0 */6 * * *
        - name: TZ
          value: America/Chicago
        - name: JELLYFIN_SERVER_URL
          value: http://jellyfin:8096
        - name: JELLYFIN_API_KEY
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_API_KEY
              name: media-stack-secrets
              optional: true
        - name: JELLYFIN_USER_ID
          valueFrom:
            secretKeyRef:
              key: JELLYFIN_USER_ID
              name: media-stack-secrets
              optional: true
        image: ghcr.io/ghomashudson/jellyfin-auto-collections:latest
        imagePullPolicy: IfNotPresent
        name: jellyfin-auto-collections
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /config
          name: config-dir
      volumes:
      - name: config-dir
        persistentVolumeClaim:
          claimName: media-stack-config-jellyfin-auto-collections
