apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
    media-stack.io/site: https://matthewloschiavo.com
  labels:
    app: media-stack-ui
  name: media-stack-ui
  namespace: media-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-stack-ui
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: media-stack-ui
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: media-stack-ui
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - env:
        - name: API_UPSTREAM
          value: media-stack-controller:9100
        image: harbor.iomio.io/library/media-stack-ui:v1.3.20
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
        name: ui
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 101
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 12
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 5
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      imagePullSecrets:
      - name: harbor-pull
      securityContext:
        fsGroup: 101
      serviceAccountName: media-stack-ui
      terminationGracePeriodSeconds: 15
