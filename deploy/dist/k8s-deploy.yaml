---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: authelia
    spec:
      containers:
      - args:
        - --config
        - /config/configuration.yml
        image: authelia/authelia:4.38
        livenessProbe:
          httpGet:
            path: /api/health
            port: 9091
          initialDelaySeconds: 15
          periodSeconds: 30
        name: authelia
        ports:
        - containerPort: 9091
        readinessProbe:
          httpGet:
            path: /api/health
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /config
          name: config
      enableServiceLinks: false
      initContainers:
      - command:
        - sh
        - -c
        - |
          if [ ! -f /config/configuration.yml ]; then
            cp /cm/configuration.yml /config/configuration.yml
          fi
          if [ ! -f /config/users_database.yml ]; then
            cp /cm/users_database.yml /config/users_database.yml
          fi
        image: busybox:1.36
        name: init-config
        volumeMounts:
        - mountPath: /cm
          name: configmap
          readOnly: true
        - mountPath: /config
          name: config
      volumes:
      - configMap:
          name: authelia-config
        name: configmap
      - name: config
        persistentVolumeClaim:
          claimName: media-stack-config-authelia
