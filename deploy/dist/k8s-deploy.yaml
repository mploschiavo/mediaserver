# Media Automation Stack — Kubernetes Single-File Deploy
#
# Deploy:   kubectl apply -f k8s-deploy.yaml
# Status:   kubectl get pods -n media-stack
# Dashboard: kubectl port-forward -n media-stack svc/media-stack-controller 9100:9100
# Teardown: kubectl delete -f k8s-deploy.yaml
#
# Prerequisites: Kubernetes 1.25+ with a default StorageClass
# More info: https://github.com/mploschiavo/mediaserver
#
# Generated from deploy/k8s/ manifests (kubectl kustomize deploy/k8s/).
# Do NOT hand-edit — regenerate with `bin/release/regen-dist.sh`.
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
    media-stack.io/site: https://matthewloschiavo.com
  name: media-stack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-ui
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-stack-controller
  namespace: media-stack
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - patch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: media-stack-controller-cluster
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-stack-controller
  namespace: media-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-stack-controller
subjects:
- kind: ServiceAccount
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: media-stack-controller-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: media-stack-controller-cluster
subjects:
- kind: ServiceAccount
  name: media-stack-controller
  namespace: media-stack
---
apiVersion: v1
data:
  configuration.yml: |
    server:
      address: tcp://0.0.0.0:9091
    log:
      level: info
    theme: auto
    identity_validation:
      reset_password:
        jwt_secret: PLACEHOLDER_JWT_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXXXXXX
    authentication_backend:
      file:
        path: /config/users_database.yml
    access_control:
      default_policy: deny
      rules:
        - domain: ["*.media-stack.local"]
          policy: one_factor
    session:
      secret: PLACEHOLDER_SESSION_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      cookies:
        - domain: media-stack.local
          authelia_url: https://auth.media-stack.local
          default_redirection_url: https://apps.media-stack.local
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    storage:
      encryption_key: PLACEHOLDER_STORAGE_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      local:
        path: /config/db.sqlite3
    notifier:
      filesystem:
        filename: /config/notification.txt
  users_database.yml: |
    users:
      admin:
        disabled: false
        displayname: Media Stack Admin
        email: admin@local
        groups:
          - admins
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: media-stack
---
apiVersion: v1
data:
  profile.yaml: |
    schema_version: 1
    kind: media_stack_profile
    metadata:
      name: media-stack
      platform: k8s
      purpose: standard
      country: US
      description: Standard k8s stack profile
      language: en
    resources:
      disk_space_gb: 500
      network_cidr: 192.168.1.0/24
    install_profile: standard
    bootstrap:
      preconfigure_apps: true
      preconfigure_api_keys: true
      apply_initial_preferences: true
      auto_download_content: false
      trigger_indexer_sync: true
      refresh_health_after_setup: true
    routing:
      internet_exposed: false
      strategy: hybrid
      provider: envoy
      base_domain: local
      gateway_port: 80
      app_path_prefix: /app
      media_server_service_names:
      - jellyfin
      - jellyfin-nvidia
      gateway_host: k8.media-stack.local
      direct_hosts:
        media_server: jellyfin.k8.media-stack.local
    # Auth defaults to Authelia on K8s — clusters are typically reachable
    # via real DNS even when ``internet_exposed: false`` (the operator's
    # router exposes ports, family members access from outside the LAN,
    # etc.). A ``provider: none`` default would mean every fresh K8s
    # install is wide open by default, which is exactly the v1.0.166
    # incident the security promises now catch. Operators who want a
    # pure-LAN no-auth setup can override this in their own profile.
    auth:
      enabled: true
      provider: authelia
    chaos:
      enabled: false
      duration_minutes: 5
      interval_seconds: 60
      actions:
      - restart_container
      - pause_container
      - network_disconnect
    live_tv_defaults:
      tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
      guide_url: https://iptv-epg.org/files/epg-us.xml
      default_program_icon_urls:
      - https://raw.githubusercontent.com/iptv-org/logo/master/tv.png
    technology_bindings:
      torrent_client: qbittorrent
      usenet_client: sabnzbd
      media_server: jellyfin
      request_manager: jellyseerr
      indexer_manager: prowlarr
    app_auth:
      enabled: true
      method: Forms
      required: DisabledForLocalAddresses
      fail_on_error: false
      username_env: STACK_ADMIN_USERNAME
      password_env: STACK_ADMIN_PASSWORD
    # ADR-0008 disk-guardrails: per-install pressure thresholds.
    # Uncomment and override any keys from
    # contracts/defaults/operations.yaml::disk_guardrails. The values
    # below are the laptop-tuned defaults from ADR-0008 Phase 4; remove
    # or adjust for bigger servers. Three-tier merge order at runtime:
    # operations.yaml defaults -> profile.yaml -> guardrails.json
    # (UI-saved, highest priority). The Registry's UI overrides at
    # /srv-config/.controller/guardrails.json always win at runtime.
    # disk_guardrails:
    #   max_used_percent: 50
    #   target_used_percent: 40
    #   lockdown_percent: 75
    #   release_percent: 60
kind: ConfigMap
metadata:
  name: media-stack-controller-profile
  namespace: media-stack
---
apiVersion: v1
data:
  envoy.runtime.base.yaml: |
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8880
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    # === Real client IP via XFF ===
                    # Without this, downstream_remote_address is the
                    # immediate proxy hop (nginx-ingress / Cloudflare /
                    # Traefik / docker bridge), not the actual client.
                    # ``use_remote_address: true`` tells Envoy to walk the
                    # X-Forwarded-For chain and substitute that as the
                    # source address; ``xff_num_trusted_hops`` controls
                    # how far back to walk. v1.0.252 default is 1 (one
                    # proxy: K8s ingress controller). Override via
                    # ``MEDIA_STACK_TRUSTED_PROXY_HOPS`` env at deploy
                    # time:
                    #   * 1 → bare K8s Ingress / direct compose
                    #   * 2 → Cloudflare in front of an ingress controller
                    #   * 3 → CDN + ingress + extra proxy
                    # Wrong value class:
                    #   - too high: client can spoof its IP by stuffing
                    #     XFF headers (we'd trust them).
                    #   - too low: we still see the proxy IP.
                    use_remote_address: true
                    xff_num_trusted_hops: 1
                    # === Access log to stdout (JSON) ===
                    # Envoy's container stdout is captured by docker /
                    # K8s, so the controller can tail it via the K8s API
                    # or ``docker compose logs`` without a shared volume.
                    # JSON format keeps parsing trivial; the controller's
                    # access-log service reads the documented key
                    # synonyms (start_time / x-forwarded-for / etc.).
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              # Timestamp + request line.
                              ts: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(:PATH)%"
                              protocol: "%PROTOCOL%"
                              # Status + duration.
                              status: "%RESPONSE_CODE%"
                              response_flags: "%RESPONSE_FLAGS%"
                              duration_ms: "%DURATION%"
                              bytes_sent: "%BYTES_SENT%"
                              bytes_received: "%BYTES_RECEIVED%"
                              # Source identity — three layers, in order
                              # of trust:
                              # 1. ``client_ip`` — Envoy's resolved
                              #    downstream_remote_address AFTER the
                              #    use_remote_address/xff trim. This is
                              #    the source the operator should care
                              #    about; the others are audit trail.
                              # 2. ``x_forwarded_for`` — full chain as
                              #    received, useful when an extra hop
                              #    is added between deploys.
                              # 3. ``cf_connecting_ip`` — Cloudflare's
                              #    authoritative client IP (CF strips
                              #    inbound CF-* headers, so it's safe).
                              client_ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                              x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
                              cf_connecting_ip: "%REQ(CF-CONNECTING-IP)%"
                              x_real_ip: "%REQ(X-REAL-IP)%"
                              # Routing identity.
                              host: "%REQ(:AUTHORITY)%"
                              upstream_cluster: "%UPSTREAM_CLUSTER%"
                              upstream_host: "%UPSTREAM_HOST%"
                              # Useful for triage.
                              user_agent: "%REQ(USER-AGENT)%"
                              referer: "%REQ(REFERER)%"
                              request_id: "%REQ(X-REQUEST-ID)%"
                    route_config:
                      name: media_stack_routes
                      virtual_hosts: []
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            local function media_stack_escape_js_string(value)
                              if value == nil then
                                return ""
                              end
                              local escaped = tostring(value)
                              escaped = string.gsub(escaped, "\\", "\\\\")
                              escaped = string.gsub(escaped, "'", "\\'")
                              return escaped
                            end

                            local function media_stack_rewrite_base_href(html, prefix)
                              -- Rewrite <base href="/"> to <base href="/app/<service>/">.
                              -- SPAs like Bazarr emit <base href="/"> with ./ relative asset
                              -- paths. With prefix stripping, the browser resolves ./assets/foo.js
                              -- to /assets/foo.js (root), bypassing the app prefix route.
                              -- Rewriting the <base> tag makes ALL relative URLs resolve through
                              -- the prefix: ./assets/foo.js -> /app/bazarr/assets/foo.js.
                              -- Dynamic import() also resolves correctly since the importing
                              -- module URL is under the prefixed path.
                              if prefix == nil or prefix == "" or prefix == "/" then
                                return html
                              end
                              local new_base = prefix .. "/"
                              html = string.gsub(html, '<base%s+href="/"', '<base href="' .. new_base .. '"')
                              html = string.gsub(html, "<base%s+href='/'", "<base href='" .. new_base .. "'")
                              return html
                            end

                            local function media_stack_inject_prefix_patch(handle, prefix)
                              if prefix == nil or prefix == "" or prefix == "/" then
                                return
                              end
                              local content_type = string.lower(handle:headers():get("content-type") or "")
                              if not string.find(content_type, "text/html", 1, true) then
                                return
                              end
                              local body = handle:body()
                              if body == nil then
                                return
                              end
                              local length = body:length()
                              if length == nil or length == 0 then
                                return
                              end
                              local html = body:getBytes(0, length) or ""
                              if html == "" then
                                return
                              end
                              if string.find(html, "data-media-stack-prefix-patch=", 1, true) ~= nil then
                                return
                              end

                              -- Rewrite <base href="/"> so relative assets route through the prefix
                              html = media_stack_rewrite_base_href(html, prefix)

                              local escaped_prefix = media_stack_escape_js_string(prefix)
                              local script = "<script data-media-stack-prefix-patch='" .. escaped_prefix .. "'>(function(){var prefix='" .. escaped_prefix .. "';if(!prefix||prefix==='/'||typeof window==='undefined'){return;}var parts=prefix.split('/');var appRoot=parts.length>=2?'/'+parts[1]+'/':'';function normalize(url){if(typeof url!=='string'||url===''){return url;}if(url.indexOf('javascript:')===0||url.indexOf('mailto:')===0||url.indexOf('tel:')===0||url.indexOf('#')===0){return url;}try{var u=new URL(url,window.location.origin);if(u.origin!==window.location.origin){return url;}if(u.pathname===prefix||u.pathname.indexOf(prefix+'/')===0){return u.pathname+u.search+u.hash;}if(appRoot&&u.pathname.indexOf(appRoot)===0&&u.pathname!==prefix){return u.pathname+u.search+u.hash;}if(u.pathname.indexOf('/')===0){return prefix+u.pathname+u.search+u.hash;}return url;}catch(e){return url;}}function patchAnchor(a){if(!a){return;}var href=a.getAttribute('href');var next=normalize(href);if(next&&href!==next){a.setAttribute('href',next);}}function patchAll(){var anchors=document.querySelectorAll('a[href^=\"/\"]');for(var i=0;i<anchors.length;i++){patchAnchor(anchors[i]);}}var push=history.pushState;history.pushState=function(state,title,url){return push.call(this,state,title,normalize(url));};var replace=history.replaceState;history.replaceState=function(state,title,url){return replace.call(this,state,title,normalize(url));};var current=normalize(window.location.pathname+window.location.search+window.location.hash);if(current&&current!==(window.location.pathname+window.location.search+window.location.hash)){replace.call(history,history.state,document.title,current);}document.addEventListener('click',function(ev){var el=ev.target;while(el&&el.tagName!=='A'){el=el.parentElement;}if(el){patchAnchor(el);}},true);if(document.documentElement&&typeof MutationObserver!=='undefined'){(new MutationObserver(function(){patchAll();})).observe(document.documentElement,{childList:true,subtree:true,attributes:true,attributeFilter:['href']});}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',patchAll,{once:true});}else{patchAll();}})();</script>"

                              local rewritten = nil
                              local head_start, head_end = string.find(html, "</head>", 1, true)
                              if head_start ~= nil then
                                rewritten = string.sub(html, 1, head_start - 1) .. script .. string.sub(html, head_start)
                              else
                                local body_start, body_end = string.find(html, "</body>", 1, true)
                                if body_start ~= nil then
                                  rewritten = string.sub(html, 1, body_start - 1) .. script .. string.sub(html, body_start)
                                else
                                  rewritten = html .. script
                                end
                              end

                              if rewritten ~= nil and rewritten ~= html then
                                body:setBytes(rewritten)
                                handle:headers():remove("content-length")
                              end
                            end

                            function envoy_on_response(handle)
                              local prefix = handle:headers():get("x-media-stack-prefix")
                              if prefix == nil or prefix == "" then
                                return
                              end
                              local host_hint = handle:headers():get("x-media-stack-host")
                              local location = handle:headers():get("location")
                              if location ~= nil and location ~= "" then
                                local normalized = nil
                                local is_absolute_uri = string.match(location, "^[a-zA-Z][a-zA-Z0-9+.-]*://") ~= nil
                                local is_scheme_relative = string.sub(location, 1, 2) == "//"
                                if not is_scheme_relative then
                                  if is_absolute_uri then
                                    if host_hint ~= nil and host_hint ~= "" then
                                      local scheme_sep = string.find(location, "://", 1, true)
                                      if scheme_sep ~= nil then
                                        local authority_start = scheme_sep + 3
                                        local path_start = string.find(location, "/", authority_start, true)
                                        local authority = nil
                                        if path_start ~= nil then
                                          authority = string.sub(location, authority_start, path_start - 1)
                                        else
                                          authority = string.sub(location, authority_start)
                                        end
                                        local authority_lower = string.lower(authority or "")
                                        local host_lower = string.lower(host_hint)
                                        local host_port_prefix = host_lower .. ":"
                                        if authority_lower == host_lower or string.sub(authority_lower, 1, string.len(host_port_prefix)) == host_port_prefix then
                                          if path_start ~= nil then
                                            normalized = string.sub(location, path_start)
                                          else
                                            normalized = "/"
                                          end
                                        end
                                      end
                                    end
                                  else
                                    normalized = location
                                  end

                                  if normalized ~= nil and normalized ~= "" then
                                    if string.sub(normalized, 1, 1) ~= "/" then
                                      normalized = "/" .. normalized
                                    end
                                    if string.sub(normalized, 1, string.len(prefix)) ~= prefix then
                                      handle:headers():replace("location", prefix .. normalized)
                                    end
                                  end
                                end
                              end
                              media_stack_inject_prefix_patch(handle, prefix)
                              handle:headers():remove("x-media-stack-prefix")
                              handle:headers():remove("x-media-stack-host")
                            end
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters: []
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
      access_log_path: /dev/null
