[tool.black]
line-length = 100
target-version = ["py311"]
include = "\\.pyi?$"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/media_stack/services/runtime_media_ops.py" = ["F405"]
"src/media_stack/services/runtime_servarr/*.py" = ["F405"]
"tests/unit/*.py" = ["E402", "I001"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
markers = [
    "integration: talks to real external services; requires env-var-gated setup",
    "smoke: full-stack docker compose smoke test; opt-in via -m smoke",
]
