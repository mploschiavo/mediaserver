[tool.black]
line-length = 100
target-version = ["py311"]
include = "\\.pyi?$"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/bootstrap_services/runtime_media_ops.py" = ["F405"]
"scripts/bootstrap_services/runtime_servarr/*.py" = ["F405"]
"tests/unit/*.py" = ["E402", "I001"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
