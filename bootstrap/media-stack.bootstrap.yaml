schema_version: 1
kind: media_stack_profile

metadata:
  name: media-dev
  platform: compose
  purpose: dev
  description: Standard local stack profile for Docker Compose

resources:
  disk_space_gb: 500
  network_cidr: 192.168.1.0/24

install_profile: standard

# Optional app-level overrides on top of install_profile preset.
apps:
  lidarr: false
  readarr: false
  tautulli: false

bootstrap:
  preconfigure_apps: true
  preconfigure_api_keys: true
  apply_initial_preferences: true
  auto_download_content: false

routing:
  internet_exposed: false
  strategy: hybrid
  base_domain: local
  stack_subdomain: media-dev
  gateway_host: apps.media-dev.local
  app_path_prefix: /app
  direct_hosts:
    media_server: jellyfin.media-dev.local

auth:
  enabled: false
  provider: none
  middleware: ""

# Canonical Live TV defaults currently used by bootstrap config logic.
live_tv_defaults:
  tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
  guide_url: https://iptv-epg.org/files/epg-us.xml
  default_program_icon_url: https://raw.githubusercontent.com/iptv-org/logo/master/tv.png
