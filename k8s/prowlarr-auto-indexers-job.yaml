apiVersion: batch/v1
kind: Job
metadata:
  name: media-stack-prowlarr-auto-indexers
  namespace: media-stack
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: media-stack-prowlarr-auto-indexers
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: PROWLARR_API_KEY
                  optional: true
            - name: BOOTSTRAP_WAIT_INTERVAL_SECONDS
              value: "3"
            - name: BOOTSTRAP_WAIT_HEARTBEAT_SECONDS
              value: "15"
            - name: AUTO_INDEXER_HEARTBEAT_EVERY
              value: "25"
            - name: BOOTSTRAP_ALT_CONFIG_ROOT
              value: /srv-host-config
          command:
            - python
            - /bootstrap/bootstrap_apps.py
            - --config
            - /bootstrap-config/config.json
            - --config-root
            - /srv-config
            - --auto-prowlarr-indexers
          volumeMounts:
            - name: bootstrap-script
              mountPath: /bootstrap
              readOnly: true
            - name: bootstrap-config
              mountPath: /bootstrap-config
              readOnly: true
            - name: cfg-jellyfin
              mountPath: /srv-config/jellyfin
            - name: cfg-jellyseerr
              mountPath: /srv-config/jellyseerr
            - name: cfg-sonarr
              mountPath: /srv-config/sonarr
            - name: cfg-radarr
              mountPath: /srv-config/radarr
            - name: cfg-lidarr
              mountPath: /srv-config/lidarr
            - name: cfg-readarr
              mountPath: /srv-config/readarr
            - name: cfg-bazarr
              mountPath: /srv-config/bazarr
            - name: cfg-prowlarr
              mountPath: /srv-config/prowlarr
            - name: cfg-sabnzbd
              mountPath: /srv-config/sabnzbd
            - name: cfg-homepage
              mountPath: /srv-config/homepage
            - name: cfg-maintainerr
              mountPath: /srv-config/maintainerr
            - name: cfg-jellyfin-auto-collections
              mountPath: /srv-config/jellyfin-auto-collections
            - name: host-config-fallback
              mountPath: /srv-host-config
              readOnly: true
            - name: stack-torrents
              mountPath: /srv-stack/data/torrents
            - name: stack-usenet
              mountPath: /srv-stack/data/usenet
            - name: stack-media
              mountPath: /srv-stack/media
      volumes:
        - name: bootstrap-script
          configMap:
            name: media-stack-bootstrap-script
            defaultMode: 0555
            items:
              - key: bootstrap_apps.py
                path: bootstrap_apps.py
              - key: bootstrap_lib__init__.py
                path: bootstrap_lib/__init__.py
              - key: bootstrap_lib__common.py
                path: bootstrap_lib/common.py
              - key: bootstrap_lib__http_client.py
                path: bootstrap_lib/http_client.py
              - key: bootstrap_lib__servarr.py
                path: bootstrap_lib/servarr.py
              - key: bootstrap_lib__homepage.py
                path: bootstrap_lib/homepage.py
              - key: bootstrap_lib__bazarr.py
                path: bootstrap_lib/bazarr.py
              - key: bootstrap_lib__jellyfin.py
                path: bootstrap_lib/jellyfin.py
              - key: bootstrap_lib__defaults.py
                path: bootstrap_lib/defaults.py
              - key: bootstrap_defaults__maintainerr_policy.json
                path: bootstrap_defaults/maintainerr_policy.json
              - key: bootstrap_defaults__jellyfin_home_rails.json
                path: bootstrap_defaults/jellyfin_home_rails.json
              - key: bootstrap_defaults__adapter_hooks.json
                path: bootstrap_defaults/adapter_hooks.json
              - key: bootstrap_defaults__app_capability_defaults.json
                path: bootstrap_defaults/app_capability_defaults.json
              - key: bootstrap_defaults__media_server_operation_plans.json
                path: bootstrap_defaults/media_server_operation_plans.json
              - key: bootstrap_services__init__.py
                path: bootstrap_services/__init__.py
              - key: bootstrap_services__arr_service.py
                path: bootstrap_services/arr_service.py
              - key: bootstrap_services__arr_queue_cleanup_service.py
                path: bootstrap_services/arr_queue_cleanup_service.py
              - key: bootstrap_services__adapter_reflection.py
                path: bootstrap_services/adapter_reflection.py
              - key: bootstrap_services__api_keys_service.py
                path: bootstrap_services/api_keys_service.py
              - key: bootstrap_services__auth_service.py
                path: bootstrap_services/auth_service.py
              - key: bootstrap_services__bootstrap_runner_service.py
                path: bootstrap_services/bootstrap_runner_service.py
              - key: bootstrap_services__download_client_pipeline_service.py
                path: bootstrap_services/download_client_pipeline_service.py
              - key: bootstrap_services__download_client_adapters__init__.py
                path: bootstrap_services/download_client_adapters/__init__.py
              - key: bootstrap_services__download_client_adapters__base.py
                path: bootstrap_services/download_client_adapters/base.py
              - key: bootstrap_services__download_client_adapters__factory.py
                path: bootstrap_services/download_client_adapters/factory.py
              - key: bootstrap_services__download_client_adapters__generic.py
                path: bootstrap_services/download_client_adapters/generic.py
              - key: bootstrap_services__download_client_adapters__qbittorrent.py
                path: bootstrap_services/download_client_adapters/qbittorrent.py
              - key: bootstrap_services__download_client_adapters__sabnzbd.py
                path: bootstrap_services/download_client_adapters/sabnzbd.py
              - key: bootstrap_services__download_client_adapters__transmission.py
                path: bootstrap_services/download_client_adapters/transmission.py
              - key: bootstrap_services__media_server_adapters__init__.py
                path: bootstrap_services/media_server_adapters/__init__.py
              - key: bootstrap_services__media_server_adapters__base.py
                path: bootstrap_services/media_server_adapters/base.py
              - key: bootstrap_services__media_server_adapters__factory.py
                path: bootstrap_services/media_server_adapters/factory.py
              - key: bootstrap_services__media_server_adapters__generic.py
                path: bootstrap_services/media_server_adapters/generic.py
              - key: bootstrap_services__media_server_adapters__jellyfin.py
                path: bootstrap_services/media_server_adapters/jellyfin.py
              - key: bootstrap_services__media_server_adapters__plans.py
                path: bootstrap_services/media_server_adapters/plans.py
              - key: bootstrap_services__runtime_factory_service.py
                path: bootstrap_services/runtime_factory_service.py
              - key: bootstrap_services__operation_wiring.py
                path: bootstrap_services/operation_wiring.py
              - key: bootstrap_services__runtime_helpers.py
                path: bootstrap_services/runtime_helpers.py
              - key: bootstrap_services__runner_operations_service.py
                path: bootstrap_services/runner_operations_service.py
              - key: bootstrap_services__config_models.py
                path: bootstrap_services/config_models.py
              - key: bootstrap_services__disk_guardrails_service.py
                path: bootstrap_services/disk_guardrails_service.py
              - key: bootstrap_services__discovery_lists_service.py
                path: bootstrap_services/discovery_lists_service.py
              - key: bootstrap_services__enums.py
                path: bootstrap_services/enums.py
              - key: bootstrap_services__health_service.py
                path: bootstrap_services/health_service.py
              - key: bootstrap_services__bazarr_service.py
                path: bootstrap_services/bazarr_service.py
              - key: bootstrap_services__jellyfin_service.py
                path: bootstrap_services/jellyfin_service.py
              - key: bootstrap_services__jellyfin_livetv_source_service.py
                path: bootstrap_services/jellyfin_livetv_source_service.py
              - key: bootstrap_services__jellyfin_livetv_state_service.py
                path: bootstrap_services/jellyfin_livetv_state_service.py
              - key: bootstrap_services__jellyfin_libraries_service.py
                path: bootstrap_services/jellyfin_libraries_service.py
              - key: bootstrap_services__jellyfin_home_rails_service.py
                path: bootstrap_services/jellyfin_home_rails_service.py
              - key: bootstrap_services__jellyfin_playback_service.py
                path: bootstrap_services/jellyfin_playback_service.py
              - key: bootstrap_services__jellyfin_plugins_service.py
                path: bootstrap_services/jellyfin_plugins_service.py
              - key: bootstrap_services__jellyfin_prewarm_service.py
                path: bootstrap_services/jellyfin_prewarm_service.py
              - key: bootstrap_services__jellyseerr_service.py
                path: bootstrap_services/jellyseerr_service.py
              - key: bootstrap_services__media_hygiene_ops_service.py
                path: bootstrap_services/media_hygiene_ops_service.py
              - key: bootstrap_services__media_hygiene_service.py
                path: bootstrap_services/media_hygiene_service.py
              - key: bootstrap_services__prowlarr_service.py
                path: bootstrap_services/prowlarr_service.py
              - key: bootstrap_services__qbit_service.py
                path: bootstrap_services/qbit_service.py
              - key: bootstrap_services__sabnzbd_service.py
                path: bootstrap_services/sabnzbd_service.py
              - key: bootstrap_services__servarr_adapters.py
                path: bootstrap_services/servarr_adapters.py
              - key: bootstrap_services__servarr_technology_adapters.py
                path: bootstrap_services/servarr_technology_adapters.py
              - key: bootstrap_services__servarr_technologies__init__.py
                path: bootstrap_services/servarr_technologies/__init__.py
              - key: bootstrap_services__servarr_technologies__base.py
                path: bootstrap_services/servarr_technologies/base.py
              - key: bootstrap_services__servarr_technologies__factory.py
                path: bootstrap_services/servarr_technologies/factory.py
              - key: bootstrap_services__servarr_technologies__generic.py
                path: bootstrap_services/servarr_technologies/generic.py
              - key: bootstrap_services__servarr_technologies__sonarr.py
                path: bootstrap_services/servarr_technologies/sonarr.py
              - key: bootstrap_services__servarr_technologies__radarr.py
                path: bootstrap_services/servarr_technologies/radarr.py
              - key: bootstrap_services__servarr_technologies__lidarr.py
                path: bootstrap_services/servarr_technologies/lidarr.py
              - key: bootstrap_services__servarr_technologies__readarr.py
                path: bootstrap_services/servarr_technologies/readarr.py
              - key: bootstrap_services__servarr_types.py
                path: bootstrap_services/servarr_types.py
              - key: bootstrap_services__technology_catalog.py
                path: bootstrap_services/technology_catalog.py
              - key: bootstrap_services__technology_lifecycle_service.py
                path: bootstrap_services/technology_lifecycle_service.py
              - key: bootstrap_services__servarr_policy_service.py
                path: bootstrap_services/servarr_policy_service.py
              - key: bootstrap_services__servarr_pipeline_service.py
                path: bootstrap_services/servarr_pipeline_service.py
              - key: bootstrap_services__config_artifacts_service.py
                path: bootstrap_services/config_artifacts_service.py
              - key: core__init__.py
                path: core/__init__.py
              - key: core__decorators.py
                path: core/decorators.py
              - key: core__http.py
                path: core/http.py
        - name: bootstrap-config
          configMap:
            name: media-stack-bootstrap-config-auto
        - name: cfg-jellyfin
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin
        - name: cfg-jellyseerr
          persistentVolumeClaim:
            claimName: media-stack-config-jellyseerr
        - name: cfg-sonarr
          persistentVolumeClaim:
            claimName: media-stack-config-sonarr
        - name: cfg-radarr
          persistentVolumeClaim:
            claimName: media-stack-config-radarr
        - name: cfg-lidarr
          persistentVolumeClaim:
            claimName: media-stack-config-lidarr
        - name: cfg-readarr
          persistentVolumeClaim:
            claimName: media-stack-config-readarr
        - name: cfg-bazarr
          persistentVolumeClaim:
            claimName: media-stack-config-bazarr
        - name: cfg-prowlarr
          persistentVolumeClaim:
            claimName: media-stack-config-prowlarr
        - name: cfg-sabnzbd
          persistentVolumeClaim:
            claimName: media-stack-config-sabnzbd
        - name: cfg-homepage
          persistentVolumeClaim:
            claimName: media-stack-config-homepage
        - name: cfg-maintainerr
          persistentVolumeClaim:
            claimName: media-stack-config-maintainerr
        - name: cfg-jellyfin-auto-collections
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin-auto-collections
        - name: host-config-fallback
          hostPath:
            path: /srv/media-stack/config
            type: DirectoryOrCreate
        - name: stack-torrents
          persistentVolumeClaim:
            claimName: media-stack-data-torrents
        - name: stack-usenet
          persistentVolumeClaim:
            claimName: media-stack-data-usenet
        - name: stack-media
          persistentVolumeClaim:
            claimName: media-stack-media
