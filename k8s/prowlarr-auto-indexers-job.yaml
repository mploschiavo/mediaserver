apiVersion: batch/v1
kind: Job
metadata:
  name: media-stack-prowlarr-auto-indexers
  namespace: media-stack
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: media-stack-prowlarr-auto-indexers
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: PROWLARR_API_KEY
                  optional: true
            - name: BOOTSTRAP_WAIT_INTERVAL_SECONDS
              value: "3"
            - name: BOOTSTRAP_WAIT_HEARTBEAT_SECONDS
              value: "15"
            - name: AUTO_INDEXER_HEARTBEAT_EVERY
              value: "25"
            - name: BOOTSTRAP_ALT_CONFIG_ROOT
              value: /srv-host-config
          command:
            - python
            - /bootstrap/bootstrap_apps.py
            - --config
            - /bootstrap-config/config.json
            - --config-root
            - /srv-config
            - --auto-prowlarr-indexers
          volumeMounts:
            - name: bootstrap-script
              mountPath: /bootstrap
              readOnly: true
            - name: bootstrap-config
              mountPath: /bootstrap-config
              readOnly: true
            - name: cfg-jellyfin
              mountPath: /srv-config/jellyfin
            - name: cfg-jellyseerr
              mountPath: /srv-config/jellyseerr
            - name: cfg-sonarr
              mountPath: /srv-config/sonarr
            - name: cfg-radarr
              mountPath: /srv-config/radarr
            - name: cfg-lidarr
              mountPath: /srv-config/lidarr
            - name: cfg-readarr
              mountPath: /srv-config/readarr
            - name: cfg-bazarr
              mountPath: /srv-config/bazarr
            - name: cfg-prowlarr
              mountPath: /srv-config/prowlarr
            - name: cfg-sabnzbd
              mountPath: /srv-config/sabnzbd
            - name: cfg-homepage
              mountPath: /srv-config/homepage
            - name: cfg-maintainerr
              mountPath: /srv-config/maintainerr
            - name: cfg-jellyfin-auto-collections
              mountPath: /srv-config/jellyfin-auto-collections
            - name: host-config-fallback
              mountPath: /srv-host-config
              readOnly: true
            - name: stack-torrents
              mountPath: /srv-stack/data/torrents
            - name: stack-usenet
              mountPath: /srv-stack/data/usenet
            - name: stack-media
              mountPath: /srv-stack/media
      volumes:
        - name: bootstrap-script
          configMap:
            name: media-stack-bootstrap-script
            defaultMode: 0555
            items:
              - key: bootstrap_apps.py
                path: bootstrap_apps.py
              - key: bootstrap_lib__init__.py
                path: bootstrap_lib/__init__.py
              - key: bootstrap_lib__common.py
                path: bootstrap_lib/common.py
              - key: bootstrap_lib__http_client.py
                path: bootstrap_lib/http_client.py
              - key: bootstrap_lib__servarr.py
                path: bootstrap_lib/servarr.py
              - key: bootstrap_lib__homepage.py
                path: bootstrap_lib/homepage.py
              - key: bootstrap_lib__bazarr.py
                path: bootstrap_lib/bazarr.py
              - key: bootstrap_lib__jellyfin.py
                path: bootstrap_lib/jellyfin.py
              - key: bootstrap_services__init__.py
                path: bootstrap_services/__init__.py
              - key: bootstrap_services__arr_service.py
                path: bootstrap_services/arr_service.py
              - key: bootstrap_services__arr_queue_cleanup_service.py
                path: bootstrap_services/arr_queue_cleanup_service.py
              - key: bootstrap_services__auth_service.py
                path: bootstrap_services/auth_service.py
              - key: bootstrap_services__config_models.py
                path: bootstrap_services/config_models.py
              - key: bootstrap_services__discovery_lists_service.py
                path: bootstrap_services/discovery_lists_service.py
              - key: bootstrap_services__health_service.py
                path: bootstrap_services/health_service.py
              - key: bootstrap_services__bazarr_service.py
                path: bootstrap_services/bazarr_service.py
              - key: bootstrap_services__jellyfin_service.py
                path: bootstrap_services/jellyfin_service.py
              - key: bootstrap_services__jellyfin_home_rails_service.py
                path: bootstrap_services/jellyfin_home_rails_service.py
              - key: bootstrap_services__jellyseerr_service.py
                path: bootstrap_services/jellyseerr_service.py
              - key: bootstrap_services__media_hygiene_ops_service.py
                path: bootstrap_services/media_hygiene_ops_service.py
              - key: bootstrap_services__media_hygiene_service.py
                path: bootstrap_services/media_hygiene_service.py
              - key: bootstrap_services__qbit_service.py
                path: bootstrap_services/qbit_service.py
              - key: core__init__.py
                path: core/__init__.py
              - key: core__decorators.py
                path: core/decorators.py
              - key: core__http.py
                path: core/http.py
        - name: bootstrap-config
          configMap:
            name: media-stack-bootstrap-config-auto
        - name: cfg-jellyfin
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin
        - name: cfg-jellyseerr
          persistentVolumeClaim:
            claimName: media-stack-config-jellyseerr
        - name: cfg-sonarr
          persistentVolumeClaim:
            claimName: media-stack-config-sonarr
        - name: cfg-radarr
          persistentVolumeClaim:
            claimName: media-stack-config-radarr
        - name: cfg-lidarr
          persistentVolumeClaim:
            claimName: media-stack-config-lidarr
        - name: cfg-readarr
          persistentVolumeClaim:
            claimName: media-stack-config-readarr
        - name: cfg-bazarr
          persistentVolumeClaim:
            claimName: media-stack-config-bazarr
        - name: cfg-prowlarr
          persistentVolumeClaim:
            claimName: media-stack-config-prowlarr
        - name: cfg-sabnzbd
          persistentVolumeClaim:
            claimName: media-stack-config-sabnzbd
        - name: cfg-homepage
          persistentVolumeClaim:
            claimName: media-stack-config-homepage
        - name: cfg-maintainerr
          persistentVolumeClaim:
            claimName: media-stack-config-maintainerr
        - name: cfg-jellyfin-auto-collections
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin-auto-collections
        - name: host-config-fallback
          hostPath:
            path: /srv/media-stack/config
            type: DirectoryOrCreate
        - name: stack-torrents
          persistentVolumeClaim:
            claimName: media-stack-data-torrents
        - name: stack-usenet
          persistentVolumeClaim:
            claimName: media-stack-data-usenet
        - name: stack-media
          persistentVolumeClaim:
            claimName: media-stack-media
