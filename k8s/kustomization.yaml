apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - hardening.yaml
  - secrets.example.yaml
  - storage-pvc.yaml
  - core.yaml
  - optional.yaml
  - envoy.yaml
  - controller.yaml
  - ui.yaml
  - auth-authelia.yaml
  - ingress-traefik.yaml
  - unpackerr.yaml
  - scale-policy.yaml

# Controller profile ConfigMap — baked in by default so a clean
# ``kubectl apply -k k8s/`` on an empty cluster produces a working
# stack without further operator action. Previously this block was
# commented out and the profile volume carried ``optional: true`` —
# the controller silently fell back to ``.local`` LAN defaults and
# every request 404'd at the ingress layer. Shipped baked-in from
# v1.0.169. To customize, replace the file reference or patch the
# generated ConfigMap's ``data.profile.yaml`` entry.
configMapGenerator:
  - name: media-stack-controller-profile
    namespace: media-stack
    files:
      - profile.yaml=../examples/bootstrap-profiles/media-k8s-standard.yaml
    options:
      disableNameSuffixHash: true

# Controller image — change registry/tag here; kustomize patches all manifests.
images:
  - name: harbor.iomio.io/library/media-stack-controller
    newName: harbor.iomio.io/library/media-stack-controller
    newTag: v1.0.192
