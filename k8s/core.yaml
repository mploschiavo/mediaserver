# Image references are digest-pinned as of 2026-03-28.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels: {app: jellyfin}
  template:
    metadata:
      labels: {app: jellyfin}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          ports:
            - containerPort: 8096
          volumeMounts:
            - {name: config, mountPath: /config}
            - {name: transcode, mountPath: /cache}
            - {name: media, mountPath: /media}
          readinessProbe:
            httpGet: {path: /health, port: 8096}
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /health, port: 8096}
            initialDelaySeconds: 60
            periodSeconds: 30
          startupProbe:
            httpGet: {path: /health, port: 8096}
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim: {claimName: media-stack-config-jellyfin}
        - name: transcode
          persistentVolumeClaim: {claimName: media-stack-data-transcode}
        - name: media
          persistentVolumeClaim: {claimName: media-stack-media}
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media-stack
spec:
  selector: {app: jellyfin}
  ports:
    - port: 8096
      targetPort: 8096

