apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-envoy-base-template
  namespace: media-stack
data:
  envoy.runtime.base.yaml: |
    # Base template — the envoy-config-init job merges routes/clusters into this.
    # This is a placeholder that gets overwritten by the init job.
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: media_stack_routes
                      virtual_hosts: []
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters: []
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-stack-config-envoy
  namespace: media-stack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Mi
---
# Envoy config is now generated by the bootstrap service
# via POST /actions/envoy-config (replaces the envoy-config-init Job).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      initContainers:
        - name: seed-base-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /etc/envoy/envoy.yaml ]; then
                echo "Seeding base envoy config from template..."
                cp /base-template/envoy.runtime.base.yaml /etc/envoy/envoy.yaml
              else
                echo "envoy.yaml already exists, skipping seed."
              fi
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: envoy-base-template
              mountPath: /base-template
              readOnly: true
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31.2
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --service-cluster
            - media-stack-edge
            - --log-level
            - info
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9901
              name: admin
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: envoy-config
          persistentVolumeClaim:
            claimName: media-stack-config-envoy
        - name: envoy-base-template
          configMap:
            name: media-stack-envoy-base-template
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: media-stack
spec:
  type: NodePort
  selector:
    app: envoy
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30180
    - name: admin
      port: 9901
      targetPort: 9901
