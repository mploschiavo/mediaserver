apiVersion: v1
kind: ConfigMap
metadata:
  name: media-stack-envoy-base-template
  namespace: media-stack
data:
  envoy.runtime.base.yaml: |
    # Base template — the envoy-config-init job merges routes/clusters into this.
    # This is a placeholder that gets overwritten by the init job.
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 80
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: media_stack_routes
                      virtual_hosts: []
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters: []
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-stack-config-envoy
  namespace: media-stack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: media-stack-envoy-config-init
  namespace: media-stack
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: media-stack-envoy-config-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: config-gen
          image: 192.168.1.60:30002/library/media-stack-bootstrap-runner:latest
          imagePullPolicy: Always
          env:
            - name: COMPOSE_FILE
              value: /dev/null
            - name: CONFIG_ROOT
              value: /envoy-config
            - name: BOOTSTRAP_PROFILE_FILE
              value: /profile/profile.yaml
            - name: BOOTSTRAP_CONFIG_FILE
              value: /bootstrap-config/config.json
            - name: ENVOY_LISTENER_PORT
              value: "8080"
          command:
            - python3
            - /opt/media-stack/scripts/cli/generate_envoy_config_main.py
          volumeMounts:
            - name: envoy-config
              mountPath: /envoy-config/envoy
            - name: bootstrap-config
              mountPath: /bootstrap-config
              readOnly: true
            - name: bootstrap-profile
              mountPath: /profile
              readOnly: true
      volumes:
        - name: envoy-config
          persistentVolumeClaim:
            claimName: media-stack-config-envoy
        - name: bootstrap-config
          configMap:
            name: media-stack-bootstrap-config
            optional: true
        - name: bootstrap-profile
          configMap:
            name: media-stack-bootstrap-profile
            optional: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      initContainers:
        - name: wait-for-config
          image: busybox:1.36
          command: ["sh", "-c", "until [ -f /etc/envoy/envoy.yaml ]; do echo 'Waiting for envoy.yaml...'; sleep 2; done"]
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31.2
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --service-cluster
            - media-stack-edge
            - --log-level
            - info
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9901
              name: admin
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: envoy-config
          persistentVolumeClaim:
            claimName: media-stack-config-envoy
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: media-stack
spec:
  type: NodePort
  selector:
    app: envoy
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30180
    - name: admin
      port: 9901
      targetPort: 9901
