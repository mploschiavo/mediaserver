# Authelia authentication provider for K8s.
# Includes: ConfigMap (config + users), Deployment, Service, PVC.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: media-stack
data:
  # Seed-only — this fires ONLY on first-boot (when the PVC is
  # empty). The controller's _run_boot_configure_auth regenerates
  # this file on every controller start with real secrets + OIDC
  # + auth_policy rules. The PLACEHOLDER_* values trigger the
  # generator's _real_secret detection so the first regen swaps
  # them for fresh random secrets. See authelia_config_generator.py.
  configuration.yml: |
    server:
      address: tcp://0.0.0.0:9091
    log:
      level: info
    theme: auto
    identity_validation:
      reset_password:
        jwt_secret: PLACEHOLDER_JWT_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXXXXXX
    authentication_backend:
      file:
        path: /config/users_database.yml
    access_control:
      default_policy: deny
      rules:
        - domain: ["*.media-stack.local"]
          policy: one_factor
    session:
      secret: PLACEHOLDER_SESSION_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      cookies:
        - domain: media-stack.local
          authelia_url: https://auth.media-stack.local
          default_redirection_url: https://apps.media-stack.local
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    storage:
      encryption_key: PLACEHOLDER_STORAGE_REPLACE_ON_FIRST_REGEN_XXXXXXXXXXXXXXXXXXXX
      local:
        path: /config/db.sqlite3
    notifier:
      filesystem:
        filename: /config/notification.txt
  # Seed users_database — no password set. Controller's admin-
  # bootstrap flow writes the real password from STACK_ADMIN_PASSWORD
  # via AutheliaProvider.set_password. Shipping a hardcoded hash
  # here would leak a known credential; shipping an EMPTY password
  # lets the first-boot seed be operator-controlled.
  users_database.yml: |
    users:
      admin:
        disabled: false
        displayname: Media Stack Admin
        email: admin@local
        groups:
          - admins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels: {app: authelia}
  template:
    metadata:
      labels: {app: authelia}
    spec:
      initContainers:
        # Seed-only, identical to the compose container's inline
        # command: only copy from the ConfigMap when the file
        # doesn't already exist on the PVC. The real config is
        # regenerated by the controller's boot configure-auth
        # hook and written to this same PVC — clobbering on every
        # pod restart would rotate OIDC secrets and invalidate
        # every id_token in flight, which is the bug this seeding
        # rule closes.
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/configuration.yml ]; then
                cp /cm/configuration.yml /config/configuration.yml
              fi
              if [ ! -f /config/users_database.yml ]; then
                cp /cm/users_database.yml /config/users_database.yml
              fi
          volumeMounts:
            - {name: configmap, mountPath: /cm, readOnly: true}
            - {name: config, mountPath: /config}
      containers:
        - name: authelia
          image: authelia/authelia:4.38
          args: ["--config", "/config/configuration.yml"]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          ports:
            - containerPort: 9091
          volumeMounts:
            # Shared with the controller pod at /srv-config/authelia
            # so _run_boot_configure_auth writes directly to the
            # file Authelia reads. Matches the compose model where
            # both services bind-mount the same host path. db.sqlite3
            # lives under /config too (storage.local.path is
            # /config/db.sqlite3), so the old separate /data PVC is
            # merged into this one.
            - {name: config, mountPath: /config}
          readinessProbe:
            httpGet: {path: /api/health, port: 9091}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: 9091}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: configmap
          configMap: {name: authelia-config}
        - name: config
          persistentVolumeClaim: {claimName: media-stack-config-authelia}
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: media-stack
spec:
  selector: {app: authelia}
  ports:
    - port: 9091
      targetPort: 9091
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-stack-config-authelia
  namespace: media-stack
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
