apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../namespace.yaml
  - ../../hardening.yaml
  - ../../secrets.example.yaml
  - ../../storage-pvc.yaml
  - ../../core.yaml
  - ../../optional.yaml
  - ../../envoy.yaml
  - ../../controller.yaml
  - ../../auth-authelia.yaml
  - ../../networkpolicy.yaml   # zero-trust tier isolation (opt-in)
  - ../../ingress-traefik.yaml
  - ../../unpackerr.yaml
  - ../../scale-policy.yaml
images:
  - name: harbor.iomio.io/library/media-stack-controller
    newName: harbor.iomio.io/library/media-stack-controller
    newTag: v1.0.1
patches:
  - path: ingress-tls-patch.yaml
