apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-stack-bootstrap
  namespace: media-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-stack-bootstrap
  namespace: media-stack
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-stack-bootstrap
  namespace: media-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-stack-bootstrap
subjects:
  - kind: ServiceAccount
    name: media-stack-bootstrap
    namespace: media-stack
---
apiVersion: batch/v1
kind: Job
metadata:
  name: media-stack-bootstrap
  namespace: media-stack
  annotations:
    media-stack.io/author: Matthew Loschiavo
    media-stack.io/site: https://matthewloschiavo.com
    media-stack.io/contact: mploschiavo@gmail.com
    media-stack.io/linkedin: https://www.linkedin.com/in/matthewloschiavo
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: media-stack-bootstrap
    spec:
      serviceAccountName: media-stack-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: 192.168.1.60:30002/library/media-stack-bootstrap-runner:latest
          imagePullPolicy: Always
          env:
            - name: SABNZBD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: SABNZBD_API_KEY
                  optional: true
            - name: JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYFIN_API_KEY
                  optional: true
            - name: JELLYFIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYFIN_USER_ID
                  optional: true
            - name: JELLYSEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: JELLYSEERR_API_KEY
                  optional: true
            - name: TAUTULLI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: TAUTULLI_API_KEY
                  optional: true
            - name: STACK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: STACK_ADMIN_USERNAME
                  optional: true
            - name: STACK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: STACK_ADMIN_PASSWORD
                  optional: true
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: SONARR_API_KEY
                  optional: true
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: RADARR_API_KEY
                  optional: true
            - name: LIDARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: LIDARR_API_KEY
                  optional: true
            - name: READARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: READARR_API_KEY
                  optional: true
            - name: PROWLARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-stack-secrets
                  key: PROWLARR_API_KEY
                  optional: true
            - name: BOOTSTRAP_WAIT_INTERVAL_SECONDS
              value: "3"
            - name: BOOTSTRAP_WAIT_HEARTBEAT_SECONDS
              value: "15"
            - name: AUTO_INDEXER_HEARTBEAT_EVERY
              value: "25"
            - name: FULLY_PRECONFIGURED
              value: "1"
            - name: BOOTSTRAP_PROFILE_FILE
              value: /profile/profile.yaml
            - name: BOOTSTRAP_CONFIG_FILE
              value: /bootstrap-config/config.json
          command:
            - python3
            - /opt/media-stack/scripts/bootstrap-apps.py
            - --serve
            - --auto-run
            - --config
            - /bootstrap-config/config.json
            - --config-root
            - /srv-config
          ports:
            - containerPort: 9100
              name: api
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: bootstrap-config
              mountPath: /bootstrap-config
              readOnly: true
            - name: bootstrap-profile
              mountPath: /profile
              readOnly: true
            - name: cfg-jellyfin
              mountPath: /srv-config/jellyfin
            - name: cfg-jellyseerr
              mountPath: /srv-config/jellyseerr
            - name: cfg-sonarr
              mountPath: /srv-config/sonarr
            - name: cfg-radarr
              mountPath: /srv-config/radarr
            - name: cfg-lidarr
              mountPath: /srv-config/lidarr
            - name: cfg-readarr
              mountPath: /srv-config/readarr
            - name: cfg-bazarr
              mountPath: /srv-config/bazarr
            - name: cfg-prowlarr
              mountPath: /srv-config/prowlarr
            - name: cfg-sabnzbd
              mountPath: /srv-config/sabnzbd
            - name: cfg-homepage
              mountPath: /srv-config/homepage
            - name: cfg-maintainerr
              mountPath: /srv-config/maintainerr
            - name: cfg-jellyfin-auto-collections
              mountPath: /srv-config/jellyfin-auto-collections
            - name: stack-torrents
              mountPath: /srv-stack/data/torrents
            - name: stack-usenet
              mountPath: /srv-stack/data/usenet
            - name: stack-media
              mountPath: /srv-stack/media
      volumes:
        - name: bootstrap-config
          configMap:
            name: media-stack-bootstrap-config
        - name: bootstrap-profile
          configMap:
            name: media-stack-bootstrap-profile
        - name: cfg-jellyfin
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin
        - name: cfg-jellyseerr
          persistentVolumeClaim:
            claimName: media-stack-config-jellyseerr
        - name: cfg-sonarr
          persistentVolumeClaim:
            claimName: media-stack-config-sonarr
        - name: cfg-radarr
          persistentVolumeClaim:
            claimName: media-stack-config-radarr
        - name: cfg-lidarr
          persistentVolumeClaim:
            claimName: media-stack-config-lidarr
        - name: cfg-readarr
          persistentVolumeClaim:
            claimName: media-stack-config-readarr
        - name: cfg-bazarr
          persistentVolumeClaim:
            claimName: media-stack-config-bazarr
        - name: cfg-prowlarr
          persistentVolumeClaim:
            claimName: media-stack-config-prowlarr
        - name: cfg-sabnzbd
          persistentVolumeClaim:
            claimName: media-stack-config-sabnzbd
        - name: cfg-homepage
          persistentVolumeClaim:
            claimName: media-stack-config-homepage
        - name: cfg-maintainerr
          persistentVolumeClaim:
            claimName: media-stack-config-maintainerr
        - name: cfg-jellyfin-auto-collections
          persistentVolumeClaim:
            claimName: media-stack-config-jellyfin-auto-collections
        - name: stack-torrents
          persistentVolumeClaim:
            claimName: media-stack-data-torrents
        - name: stack-usenet
          persistentVolumeClaim:
            claimName: media-stack-data-usenet
        - name: stack-media
          persistentVolumeClaim:
            claimName: media-stack-media
