# Image references are digest-pinned as of 2026-03-28.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels: {app: sabnzbd}
  template:
    metadata:
      labels: {app: sabnzbd}
    spec:
      initContainers:
        - name: init-sab-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /data/usenet/incomplete /data/usenet/completed /data/usenet/completed/tv /data/usenet/completed/movies /data/usenet/completed/music /data/usenet/completed/books /config/Downloads/incomplete /config/Downloads/complete && chmod -R 0777 /data/usenet /config/Downloads
          volumeMounts:
            - {name: config, mountPath: /config}
            - {name: usenet, mountPath: /data/usenet}
      containers:
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd@sha256:15b1220aaa1f8ff428790a3d56f5ca2822427ea0b33e978eee43554e42579d0f
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          ports:
            - containerPort: 8080
          volumeMounts:
            - {name: config, mountPath: /config}
            - {name: usenet, mountPath: /data/usenet}
          readinessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 60
            periodSeconds: 30
          startupProbe:
            httpGet: {path: /, port: 8080}
            failureThreshold: 60
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim: {claimName: media-stack-config-sabnzbd}
        - name: usenet
          persistentVolumeClaim: {claimName: media-stack-data-usenet}
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: media-stack
spec:
  selector: {app: sabnzbd}
  ports:
    - port: 8080
      targetPort: 8080

