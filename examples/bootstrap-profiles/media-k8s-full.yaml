schema_version: 1
kind: media_stack_profile
metadata:
  name: media-stack
  platform: k8s
  purpose: prod
resources:
  disk_space_gb: 1000
  network_cidr: 10.42.0.0/24
install_profile: full
bootstrap:
  preconfigure_apps: true
  preconfigure_api_keys: true
  apply_initial_preferences: true
  auto_download_content: true
  trigger_indexer_sync: true
  refresh_health_after_setup: true
routing:
  internet_exposed: true
  strategy: hybrid
  provider: traefik
  base_domain: example.com
  stack_subdomain: media
  gateway_host: apps.media.example.com
  app_path_prefix: /app
  direct_hosts:
    media_server: jellyfin.media.example.com
  media_server_service_names:
  - jellyfin
  - jellyfin-nvidia
# SSO is ON by default. The ``standard`` and ``full`` k8s
# overlays already include ``auth-authelia.yaml``, and Authelia's
# access_control rule lets RFC 1918 / loopback clients bypass
# the SSO challenge automatically. ``internet_exposed: true``
# above means anything outside the LAN ranges hits two_factor.
# Same shape as media-compose-full.yaml; keep them aligned.
auth:
  enabled: true
  provider: authelia
  mode: authelia
chaos:
  enabled: false
  duration_minutes: 5
  interval_seconds: 60
  actions:
  - restart_container
  - pause_container
  - network_disconnect
live_tv_defaults:
  tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
  guide_url: https://iptv-epg.org/files/epg-us.xml
  default_program_icon_urls:
  - https://raw.githubusercontent.com/iptv-org/logo/master/tv.png
technology_bindings:
  torrent_client: qbittorrent
  usenet_client: sabnzbd
  media_server: jellyfin
  request_manager: jellyseerr
  indexer_manager: prowlarr
app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses
  fail_on_error: false
  username_env: STACK_ADMIN_USERNAME
  password_env: STACK_ADMIN_PASSWORD
