schema_version: 1
kind: media_stack_profile

metadata:
  name: media-stack
  platform: compose
  purpose: dev

storage:
  config_root: /srv/media-stack/config
  media_root: /srv/media-stack
  data_root: /srv/media-stack/data

resources:
  disk_space_gb: 50
  network_cidr: 192.168.1.0/24

install_profile: standard

bootstrap:
  preconfigure_apps: true
  preconfigure_api_keys: true
  apply_initial_preferences: true
  auto_download_content: false

routing:
  internet_exposed: false
  strategy: hybrid
  provider: envoy
  base_domain: local
  gateway_host: apps.media-dev.local
  gateway_port: 18080
  app_path_prefix: /app
  direct_hosts:
    media_server: jellyfin.media-dev.local

auth:
  enabled: false
  provider: none

chaos:
  enabled: false
  duration_minutes: 5
  interval_seconds: 60
  actions:
    - restart_container
    - pause_container
    - network_disconnect

live_tv_defaults:
  tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
  guide_url: https://iptv-epg.org/files/epg-us.xml
  default_program_icon_url: https://raw.githubusercontent.com/iptv-org/logo/master/tv.png
