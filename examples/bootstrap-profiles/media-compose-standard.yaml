download_categories:
  tv: /data/torrents/completed/tv
  movies: /data/torrents/completed/movies
  music: /data/torrents/completed/music
  books: /data/torrents/completed/books
technology_bindings:
  torrent_client: qbittorrent
  usenet_client: sabnzbd
  media_server: jellyfin
  request_manager: jellyseerr
  indexer_manager: prowlarr
app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses
  fail_on_error: false
  username_env: STACK_ADMIN_USERNAME
  password_env: STACK_ADMIN_PASSWORD
jellyfin:
  libraries:
  - name: Movies
    collection_type: movies
    paths:
    - /media/movies
  - name: TV Shows
    collection_type: tvshows
    paths:
    - /media/tv
  - name: Music
    collection_type: music
    paths:
    - /media/music
  - name: Books
    collection_type: books
    paths:
    - /media/books
