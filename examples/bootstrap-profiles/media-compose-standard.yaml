# Per-service native auth: Forms login on the *arr family etc.
# Disabled for local-network addresses so the controller's API
# calls work without bouncing through a login form.
app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses

# Gateway-level auth (SSO via Authelia/Authentik) is OFF in the
# default profile because the dist compose file gates Authelia
# behind the ``auth-authelia`` profile. Setting ``mode: authelia``
# here while Authelia isn't running causes Envoy's ext_authz
# filter to call a non-existent upstream and fail closed → every
# gateway request 403's. (2026-04-21 production incident.)
#
# To enable SSO:
#   1. Bring up Authelia: ``docker compose --profile auth-authelia up -d authelia``
#   2. Flip ``auth.enabled``/``provider``/``mode`` here to authelia
#   3. Reconcile the controller — Envoy regenerates with ext_authz
auth:
  enabled: false
  provider: none
  mode: none
bootstrap:
  apply_initial_preferences: true
  preconfigure_api_keys: true
  preconfigure_apps: true
install_profile: standard
kind: media_stack_profile
metadata:
  country: US
  description: Standard local stack profile
  language: en
  name: media-stack
  platform: compose
  purpose: standard
resources:
  disk_space_gb: 50
  network_cidr: 192.168.1.0/24
routing:
  app_path_prefix: /app
  base_domain: local
  direct_hosts:
    media_server: true
  gateway_host: apps.media-stack.local
  gateway_port: 443
  internet_exposed: false
  provider: envoy
  scheme: https
  stack_subdomain: media-stack
  strategy: hybrid
schema_version: 1
technology_bindings:
  indexer_manager: prowlarr
  media_server: jellyfin
  request_manager: jellyseerr
  torrent_client: qbittorrent
  usenet_client: sabnzbd
