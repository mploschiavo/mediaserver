# User role catalog. Provider-neutral — core code never mentions specific
# backend names. Provider-specific payloads live under provider_payloads
# keyed by provider id.

version: 1
roles:
  superadmin:
    name: Super Admin
    description: Full control of the stack, user management, and all services.
    sso_groups: [admins]
    # Password changes propagate to every ServiceAdminProvider (qBit, Arrs,
    # Bazarr, etc.) and the same credential authenticates the controller UI.
    propagate_to_service_admins: true
    # Full controller-API access (GET + all mutations).
    controller_admin: true
    provider_payloads:
      jellyfin:
        IsAdministrator: true
        EnableAllFolders: true
        EnableRemoteAccess: true
        MaxActiveSessions: 0
      jellyseerr:
        permissions: 2           # ADMIN
        request_quota: {movies: 0, tv: 0}
  family_admin:
    name: Family Admin
    description: Manage household requests and library settings.
    sso_groups: [family, family_admins]
    # Can read controller dashboards + manage users in the household, but
    # not rotate admin keys / restart services / edit config.
    controller_admin: false
    provider_payloads:
      jellyfin:
        IsAdministrator: false
        EnableAllFolders: true
        EnableRemoteAccess: true
        MaxActiveSessions: 4
      jellyseerr:
        permissions: 256         # MANAGE_REQUESTS
        request_quota: {movies: 20, tv: 20}
  adult:
    name: Adult
    description: Standard user; full library access, can request content.
    sso_groups: [family]
    # End-user: no controller mutations. Reads are allowed for /api/me etc.
    controller_admin: false
    provider_payloads:
      jellyfin:
        IsAdministrator: false
        EnableAllFolders: true
        EnableRemoteAccess: true
        MaxActiveSessions: 3
      jellyseerr:
        permissions: 32          # REQUEST
        request_quota: {movies: 10, tv: 10}
  teen:
    name: Teen
    description: Access to family library with PG-13 ceiling.
    sso_groups: [family, teens]
    controller_admin: false
    provider_payloads:
      jellyfin:
        IsAdministrator: false
        EnableAllFolders: true
        EnableRemoteAccess: false
        MaxActiveSessions: 2
        MaxParentalRating: 13
      jellyseerr:
        permissions: 0
        request_quota: {movies: 0, tv: 0}
  kid:
    name: Kid
    description: Kids library only, G/PG rating ceiling.
    sso_groups: [family, kids]
    controller_admin: false
    provider_payloads:
      jellyfin:
        IsAdministrator: false
        EnableAllFolders: false
        # Human-friendly library names; the Jellyfin provider resolves
        # these to IDs via /Library/MediaFolders at apply time. Unknown
        # names are dropped (partial restriction is preferred over
        # blocking the whole role change).
        EnabledFolderNames: ["Kids", "Family"]
        EnableRemoteAccess: false
        MaxActiveSessions: 2
        MaxParentalRating: 7
      jellyseerr:
        permissions: 0
        request_quota: {movies: 0, tv: 0}
  guest:
    name: Guest
    description: Temporary access; limited streams, cannot request.
    sso_groups: [guests]
    controller_admin: false
    provider_payloads:
      jellyfin:
        IsAdministrator: false
        EnableAllFolders: true
        EnableRemoteAccess: false
        MaxActiveSessions: 1
      jellyseerr:
        permissions: 0
        request_quota: {movies: 0, tv: 0}
