# =============================================================================
# Brand configuration for the controller dashboard
# =============================================================================
#
# Override any of these to white-label the stack. The dashboard fetches this
# via GET /api/branding at load time and renders accordingly.
#
# To use your own assets, drop SVG/PNG files into
# ``src/media_stack/api/static/`` (or any path served at ``/api/static/...``)
# and point ``wordmark`` / ``icon`` / ``illustration`` at them.
#
# To swap brand identity entirely, change ``name`` + ``homepage_url`` and the
# header text, favicon, and "About" link all update in one place.
# =============================================================================

brand:
  # Naming convention (matches the controller defaults in handlers_get.py):
  #   * ``name``    — product short, shown as the sidebar wordmark
  #     ("Media Stack"). This is what dominates the chrome.
  #   * ``vendor``  — company / publisher ("iomio"). Rendered as a
  #     small "by iomio" subtitle, never the primary mark.
  #   * ``tagline`` — full product name for splash screens / about
  #     page ("Media Stack Controller").
  # The dashboard logo always links to ``/`` (the dashboard root),
  # NOT to ``homepage_url`` — that's only for an "About" external
  # link in the footer / settings.
  name: "Media Stack"
  vendor: "iomio"
  tagline: "Media Stack Controller"

  # External homepage for an About / Powered-by footer link.
  # The sidebar logo does NOT use this — it always links to /.
  homepage_url: "https://iomio.io"

  # ---------------------------------------------------------------------------
  # Asset paths. Resolve from the controller's static directory:
  #   <repo>/src/media_stack/api/static/
  # served at  /api/static/<filename>
  # Use absolute http(s):// URLs to point at an external CDN if you prefer.
  # ---------------------------------------------------------------------------

  # Horizontal wordmark, used in the dashboard header (top-left).
  # Recommended aspect ~3.5:1, height ~32-40px.
  wordmark: "/api/static/iomio-wordmark.svg"

  # Square brand icon, used as <link rel="icon"> + PWA install icon.
  # Must be square. SVG ideal — modern browsers handle SVG favicons.
  # Renders down to 16px; keep the design simple.
  icon: "/api/static/iomio-icon.svg"

  # Hero illustration, used on login splash + 404 + Welcome tile.
  # Aspect ~1.2:1, larger detail OK.
  illustration: "/api/static/iomio-orbit.svg"
