schema_version: 1
kind: media_stack_profile
metadata:
  name: media-stack
  platform: compose
  # ``purpose`` is the environment tier (catalog: dev/test/prod),
  # not the feature-set profile (minimal/standard/full — that lives
  # in the file name + the ``install:`` toggles below). The canonical
  # local compose stack is ``dev``: single host, developer hardware,
  # no high-availability expectations. Override to ``prod`` if this
  # YAML is repurposed for a fleet-managed deployment.
  purpose: dev
  description: Standard local stack profile for Docker Compose
  language: en
  country: US
resources:
  disk_space_gb: 500
  network_cidr: 192.168.1.0/24
controller:
  registry: harbor.iomio.io
  image_name: public/media-stack-controller
  image_tag: latest
ui:
  # Symmetric with ``controller`` so build/deploy code can resolve
  # the UI image off the same profile rather than hardcoding the
  # registry path in ``cli/workflows/build_ui_image_service.py``.
  registry: harbor.iomio.io
  image_name: public/media-stack-ui
  image_tag: latest
install_profile: standard
apps:
  lidarr: false
  readarr: false
  tautulli: false
technology_bindings:
  torrent_client: qbittorrent
  usenet_client: sabnzbd
  media_server: jellyfin
  request_manager: jellyseerr
  indexer_manager: prowlarr
bootstrap:
  preconfigure_apps: true
  preconfigure_api_keys: true
  apply_initial_preferences: true
routing:
  internet_exposed: false
  strategy: hybrid
  provider: envoy
  base_domain: local
  stack_subdomain: media-stack
  gateway_host: apps.media-stack.local
  gateway_port: 80
app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses
