schema_version: 1
kind: media_stack_profile

metadata:
  name: media-stack
  platform: compose
  purpose: standard
  description: Standard local stack profile for Docker Compose

resources:
  disk_space_gb: 500
  network_cidr: 192.168.1.0/24

controller:
  registry: harbor.iomio.io
  image_name: library/media-stack-controller
  image_tag: latest

install_profile: standard

# Optional app-level overrides on top of install_profile preset.
apps:
  lidarr: false
  readarr: false
  tautulli: false

bootstrap:
  preconfigure_apps: true
  preconfigure_api_keys: true
  apply_initial_preferences: true
  auto_download_content: false
  trigger_indexer_sync: true
  refresh_health_after_setup: true

# Technology bindings — which implementation to use for each role.
# Change these to swap implementations (e.g., qbittorrent → transmission).
technology_bindings:
  torrent_client: qbittorrent
  usenet_client: sabnzbd
  media_server: jellyfin
  request_manager: jellyseerr
  indexer_manager: prowlarr

routing:
  internet_exposed: false
  strategy: hybrid
  provider: envoy
  base_domain: local
  stack_subdomain: media-stack
  gateway_host: docker.media-stack.local
  gateway_port: 80
  app_path_prefix: /app
  media_server_service_names:
    - jellyfin
    - jellyfin-nvidia
  direct_hosts:
    media_server: jellyfin.docker.media-stack.local

auth:
  enabled: false
  provider: none
  middleware: ""

app_auth:
  enabled: true
  method: Forms
  required: DisabledForLocalAddresses
  fail_on_error: false
  username_env: STACK_ADMIN_USERNAME
  password_env: STACK_ADMIN_PASSWORD

chaos:
  enabled: false
  duration_minutes: 5
  interval_seconds: 60
  actions:
    - restart_container
    - pause_container
    - network_disconnect

# --- User-configurable defaults ---
# These are read by the controller API and dashboard. Change them here
# or via the dashboard UI (Config > Libraries, Metadata, Live TV, Downloads).

# Metadata language for media lookups (TMDb, TheTVDB, etc.)
# ISO 639-1 language code + ISO 3166-1 country code
metadata:
  language: en
  country: US

# Download categories: name → completed path inside the container.
# Add custom categories (anime, audiobooks, etc.) here or via the dashboard.
download_categories:
  tv: /data/torrents/completed/tv
  movies: /data/torrents/completed/movies
  music: /data/torrents/completed/music
  books: /data/torrents/completed/books

# Live TV: IPTV tuner (M3U) and EPG guide (XMLTV) sources.
# Browse https://github.com/iptv-org/iptv for country-specific playlists.
live_tv_defaults:
  tuner_url: https://iptv-org.github.io/iptv/countries/us.m3u
  guide_url: https://iptv-epg.org/files/epg-us.xml
  # URL templates for multi-country IPTV. {code} is replaced with country code.
  tuner_url_template: https://iptv-org.github.io/iptv/countries/{code}.m3u
  guide_url_template: https://iptv-epg.org/files/epg-{code}.xml
  default_program_icon_urls:
    - https://raw.githubusercontent.com/iptv-org/logo/master/tv.png

# Discovery lists: auto-add popular content from Trakt, IMDb, etc.
# These are applied to Sonarr/Radarr during bootstrap.
discovery_lists:
  - name: Trakt Popular
    type: trakt_popular
    apps: [sonarr, radarr]
    enabled: true
    monitor: firstSeason
    search_on_add: true
