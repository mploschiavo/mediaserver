  /api/epg-health:
    get:
      operationId: runEpgHealth
      tags: [Config]
      summary: Probe EPG providers and report health
      description: |
        Synchronously probes every enabled guide provider for every
        configured country. Returns aggregate counts (`healthy` /
        `unhealthy`), the totals each is computed against
        (`countries`, `providers`), and a `details` matrix keyed
        first by country code then by provider id. The matrix is
        sparse: only `(provider, country)` pairs the provider has a
        URL for appear — a missing key means "provider declares no
        URL for that country", NOT "unhealthy". Aggregate counters
        are the source of truth for healthy/unhealthy ratios.
      responses:
        "200":
          description: EPG health
          content:
            application/json:
              schema:
                type: object
                required: [healthy, unhealthy, countries, providers, details]
                properties:
                  healthy:
                    type: integer
                    description: |
                      Number of `(provider, country)` probes that
                      returned an HTTP success status.
                    example: 81
                  unhealthy:
                    type: integer
                    description: |
                      Number of `(provider, country)` probes that
                      did not return success.
                    example: 25
                  countries:
                    type: integer
                    description: |
                      Total country presets considered. Matches
                      `len(countries)` from `/api/iptv-countries`.
                    example: 34
                  providers:
                    type: integer
                    description: |
                      Total enabled guide providers considered.
                    example: 5
                  details:
                    type: object
                    description: |
                      Per-country, per-provider probe outcomes. Outer
                      key is the lowercase country code; inner key is
                      the provider id. Missing inner keys mean the
                      provider has no URL for that country (not a
                      health failure).
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: boolean
                additionalProperties: true
              example:
                providers: 5
                countries: 34
                healthy: 81
                unhealthy: 25
                details:
                  us:
                    iptv-epg: true
                    epg-pw: true
                    epgshare01: false
                    epgtalk: false
                  gb:
                    iptv-epg: true
                    epg-pw: true
                    epgshare01: false
                    epgtalk: false
                    freeview-epg: true

  /api/epg-providers:
    get:
      operationId: listEpgProviders
      tags: [Config]
      summary: Configured EPG (guide) providers
      description: |
        Returns the enabled guide-provider list (sorted by ascending
        priority, the order in which `resolve_guide_url` will try
        them) and the cached probe results from the most recent
        health check. The cache is keyed by `<provider_id>:<country>`
        — split on the colon if you need to bucket per provider or
        per country.
      responses:
        "200":
          description: Providers + cached health
          content:
            application/json:
              schema:
                type: object
                required: [providers, health]
                properties:
                  providers:
                    type: array
                    description: |
                      Enabled guide providers in the order they will
                      be tried for any given country.
                    items:
                      $ref: '#/components/schemas/EpgProviderEntry'
                  health:
                    type: object
                    description: |
                      Cached probe outcomes keyed by
                      `<provider_id>:<country>`. May be empty when
                      no health check has run yet.
                    additionalProperties:
                      $ref: '#/components/schemas/EpgProviderHealthEntry'
                additionalProperties: true
              example:
                health:
                  "epg-pw:au":
                    ok: true
                    ts: 1777137742.6841
                    url: "https://epg.pw/xmltv/epg_AU.xml.gz"
                  "epg-pw:ar":
                    ok: false
                    ts: 1777137729.8048
                    url: "https://epg.pw/xmltv/epg_AR.xml.gz"
                providers:
                  - id: iptv-epg
                    name: IPTV-EPG.org
                    format: xml
                    priority: 1
                    enabled: true
                    url_template: "https://iptv-epg.org/files/epg-{code}.xml"

  /api/iptv-countries:
    get:
      operationId: listIptvCountries
      tags: [Config]
      summary: Available IPTV-country presets
      description: |
        Returns the IPTV country presets with pre-resolved guide and
        tuner URLs. `source` distinguishes `profile` (operator-edited
        list under `iptv_countries` in the controller profile) from
        `defaults` (the built-in catalogue from
        `contracts/ui_defaults/iptv_countries.yaml`).
      responses:
        "200":
          description: Countries
          content:
            application/json:
              schema:
                type: object
                required: [countries, source]
                properties:
                  countries:
                    type: array
                    items:
                      $ref: '#/components/schemas/IptvCountryEntry'
                  source:
                    type: string
                    description: |
                      `profile` when the operator has supplied a
                      custom list; `defaults` when the built-in
                      catalogue is in effect.
                    enum: [profile, defaults]
                    example: defaults
                additionalProperties: true
              example:
                source: defaults
                countries:
                  - code: us
                    name: "United States"
                    guide_url: "https://iptv-epg.org/files/epg-us.xml"
                    tuner_url: ""
                  - code: gb
                    name: "United Kingdom"
                    guide_url: "https://iptv-epg.org/files/epg-gb.xml"
                    tuner_url: ""
                  - code: ca
                    name: "Canada"
                    guide_url: "https://iptv-epg.org/files/epg-ca.xml"
                    tuner_url: ""

  /api/livetv-sources:
    get:
      operationId: getLiveTvSources
      tags: [Config]
      summary: Live-TV sources (M3U/EPG URLs)
      description: |
        Returns the configured M3U tuner URLs (`tuners[]`) and EPG XMLTV
        guide URLs (`guides[]`) as parallel lists. The single currently
        active tuner / guide is duplicated into the scalar `tuner_url`
        and `guide_url` fields for clients that only render the active
        pair.
      responses:
        "200":
          description: Sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  tuners:
                    type: array
                    description: Available IPTV M3U tuner playlists.
                    items:
                      $ref: '#/components/schemas/LivetvUrlEntry'
                  guides:
                    type: array
                    description: Available EPG XMLTV guide URLs.
                    items:
                      $ref: '#/components/schemas/LivetvUrlEntry'
                  tuner_url:
                    type: string
                    description: Currently-selected tuner URL (matches one entry in `tuners[]`).
                    example: "https://iptv-org.github.io/iptv/countries/us.m3u"
                  guide_url:
                    type: string
                    description: Currently-selected guide URL (matches one entry in `guides[]`).
                    example: "https://iptv-epg.org/files/epg-us.xml"
                  load_all_tuners:
                    type: boolean
                    description: |
                      When true, Jellyfin loads every entry in `tuners[]`
                      (multi-tuner mode); when false, only `tuner_url`.
                    example: false
                  source:
                    type: string
                    description: |
                      Where the configuration was loaded from.
                      `app_config` indicates a per-app config under
                      the active media-server's `livetv` section;
                      `profile` indicates `live_tv_defaults` from the
                      controller profile; `not_configured` means
                      neither has any tuners persisted yet.
                    enum: [app_config, profile, not_configured]
                    example: profile
              example:
                tuners:
                  - url: "https://iptv-org.github.io/iptv/countries/us.m3u"
                    name: Default
                guides:
                  - url: "https://iptv-epg.org/files/epg-us.xml"
                    name: Default
                tuner_url: "https://iptv-org.github.io/iptv/countries/us.m3u"
                guide_url: "https://iptv-epg.org/files/epg-us.xml"
                load_all_tuners: false
                source: profile
    post:
      operationId: updateLiveTvSources
      tags: [Config]
      summary: Update live-TV sources
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              tuner_url: "https://iptv-org.github.io/iptv/countries/us.m3u"
              guide_url: "https://iptv-epg.org/files/epg-us.xml"
              load_all_tuners: false
      responses:
        "200":
          description: Updated
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/livetv-sources/probe:
    post:
      operationId: probeLiveTvSource
      tags: [Config]
      summary: Probe an M3U / XMLTV URL before saving
      description: |
        Server-side probe that fetches up to 4 KiB of the supplied
        URL and inspects the leading bytes / Content-Type to
        classify the body as M3U or XMLTV. Returns
        ``{ok, status, content_type, bytes, sample, kind, error}``
        so the dashboard's Probe button can render an at-a-glance
        verdict before the operator commits the source. Server-side
        because most providers don't expose CORS for browser
        fetches.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  description: Tuner / guide URL to probe.
            example:
              url: "https://iptv-org.github.io/iptv/countries/us.m3u"
      responses:
        "200":
          description: Probe result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                status: 206
                content_type: application/vnd.apple.mpegurl
                bytes: 4096
                sample: "#EXTM3U\n#EXTINF:-1 ..."
                kind: m3u
                error: ""
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

