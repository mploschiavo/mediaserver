openapi: 3.0.3
info:
  title: Media Stack Controller API
  version: 1.0.0
  description: |
    REST API for the Media Stack Controller -- the orchestration layer that
    manages Sonarr, Radarr, Lidarr, Readarr, Prowlarr, Bazarr, Jellyfin,
    qBittorrent, SABnzbd, and supporting infrastructure (Envoy, Homepage,
    Tautulli, Jellyseerr).

    ## Authentication

    The controller supports HTTP Basic Auth with three modes controlled by
    the `CONTROLLER_AUTH` environment variable:

    | Mode    | Behavior |
    |---------|----------|
    | `none`  | No auth required (default when `STACK_ADMIN_PASSWORD` is empty) |
    | `write` | POST/PUT/DELETE require auth; GET is open (default when password is set) |
    | `all`   | Every request requires auth |

    Credentials: username from `STACK_ADMIN_USERNAME` (default `admin`),
    password from `STACK_ADMIN_PASSWORD`.

    Health probes (`/healthz`, `/readyz`) are always unauthenticated.

    ## Server-Sent Events

    The `/logs/stream` endpoint provides a real-time log stream via SSE.
    Connect with `EventSource` or `curl -N`.

    ## Action Queue

    Actions are asynchronous. POST to `/actions/{name}` returns immediately
    with `202 Accepted`-style semantics (HTTP 200, status=accepted). Poll
    `/status` to track progress, or subscribe to `/logs/stream` for live
    output. Actions execute in priority order via an internal queue.

    ## Rate Limits

    The controller does not enforce rate limits. However, actions are
    serialized through a priority queue, so submitting many actions rapidly
    will queue them rather than execute in parallel.

    ## Error Reference

    All error responses use a consistent JSON envelope:
    ```json
    { "error": "human-readable message" }
    ```

    | HTTP Code | Name | When It Occurs | How to Handle |
    |-----------|------|----------------|---------------|
    | **400** | Bad Request | Missing or invalid fields in the request body (e.g., `password` too short, missing `services` array, malformed JSON). | Check the `error` field for the specific validation failure. Fix the request body and retry. |
    | **401** | Unauthorized | Request requires authentication but no credentials were provided, or the credentials are invalid. Only returned when `CONTROLLER_AUTH` is `write` (for mutations) or `all`. | Send an `Authorization: Basic <base64>` header with valid credentials. |
    | **404** | Not Found | The requested resource does not exist (e.g., unknown action name, unknown app, unknown service ID, missing snapshot file). | Check the `error` field for details. For actions, the response includes a `known` array listing valid action names. |
    | **500** | Internal Server Error | Unexpected server-side failure (unhandled exception, container runtime unavailable, filesystem error). | Retry after a brief delay. If persistent, check controller logs via `GET /api/logs/controller` or `GET /logs/stream`. |

    **Example error responses:**

    *400 Bad Request* -- password too short:
    ```json
    { "error": "password field required (min 4 chars)" }
    ```

    *401 Unauthorized* -- missing credentials:
    ```
    HTTP/1.1 401 Unauthorized
    WWW-Authenticate: Basic realm="Media Stack Controller"
    ```

    *404 Not Found* -- unknown action:
    ```json
    { "error": "unknown action 'foo'", "known": ["discover-indexers", "bootstrap", "envoy-config", "post-setup", "reconcile", "restart-apps", "push-indexers"] }
    ```

    *500 Internal Server Error*:
    ```json
    { "error": "Docker socket not available" }
    ```

    ## Webhook Events

    When a webhook URL is registered (via `POST /webhooks`), the controller
    sends a POST request to each URL when actions complete, fail, or are
    cancelled. The payload format:

    ```json
    {
      "event": "action_complete",
      "action": "bootstrap",
      "action_id": "bootstrap-3",
      "status": "complete",
      "elapsed_seconds": 45.2,
      "started_at": 1712505600.0,
      "completed_at": 1712505645.2,
      "error": null,
      "triggered_by": "admin",
      "controller_phase": "complete"
    }
    ```

    Event types: `action_complete`, `action_error`, `action_cancelled`, `test`.

    ## Changelog

    ### v1.1.0 (2026-04-08)
    - Added per-service password reset (`services` field in POST /api/reset-password)
    - Added per-service API key rotation (`services` field in POST /api/rotate-keys)
    - Added GET/POST /api/services/{id}/api-key for manual key management
    - Added priority queue for actions (bootstrap=10, envoy-config=30, auto-indexers=70)
    - Added POST /cancel endpoint
    - Added POST /api/jellyfin/reset for hard credential reset
    - Added GET /api/health-history for SLA metrics
    - Added GET /api/cleanup-preview for guardrail dry-run
    - Added GET /api/image-updates for container staleness tracking
    - Added x-codeSamples and enhanced examples across the spec

    ### v1.0.0 (2026-04-01)
    - Initial release with 53 operations
    - Bootstrap orchestration with priority queue
    - Service health monitoring with Prometheus metrics
    - Envoy gateway routing configuration
    - API key rotation and password reset
    - Config backup/restore and snapshot management
    - SSE log streaming and webhook notifications

  contact:
    name: Media Stack Controller
  license:
    name: MIT

# servers: injected dynamically at runtime from routing config.
# See _build_openapi_servers() in server.py.
servers:
  - url: /
    description: Placeholder — replaced at runtime with environment-specific URLs

tags:
  - name: Health
    description: Liveness/readiness probes and service health checks
  - name: State
    description: Controller state, action history, runtime config, webhooks
  - name: Actions
    description: Trigger and cancel asynchronous orchestration actions
  - name: Services
    description: Service registry, categories, and per-service API key management
  - name: Content
    description: Library stats, downloads, indexers, quality profiles, recently added
  - name: Routing
    description: Envoy gateway routing configuration
  - name: Security
    description: API key rotation and password reset across all managed services
  - name: Operations
    description: Containers, images, GPU, snapshots, mounts, service logs
  - name: Disk
    description: Disk usage monitoring and guardrail configuration
  - name: Config
    description: Environment, profile, manifests, env vars, backup/restore
  - name: Metrics
    description: Prometheus metrics, Envoy stats, RSS feed, Grafana dashboard
  - name: Webhooks
    description: Webhook management and testing
  - name: Dashboard
    description: Web dashboard and API documentation UI
  - name: Auth
    description: |
      Authentication and authorization — identity, login/logout, OIDC
      provider configuration, service auth policies, session cookies.
  - name: Users
    description: |
      User-management CRUD — admin operations on user accounts, roles,
      reconciliation with external providers, bulk import, and
      per-user session / login-history visibility.
  - name: Invites
    description: Invitation tokens — create, accept, revoke.
  - name: Tokens
    description: |
      API token lifecycle — programmatic-client bearer tokens with
      refresh/revoke semantics and a family-wide revoke for incident
      response.
  - name: Me
    description: |
      Self-service endpoints for the authenticated user — current
      identity, own sessions/tokens/MFA state, "this wasn't me",
      revoke-other-sessions.
  - name: Sessions
    description: |
      Cross-user session visibility (admin) — the live active-session
      list aggregated from every auth provider.
  - name: Bans
    description: |
      User and IP bans — CRUD on the ban-store with remove endpoints.
      IP bans are merged into Authelia `access_control` rules on save.
  - name: SecurityVisibility
    description: |
      Derived security signals surfaced to admins — failed logins,
      new-location alerts, concurrent-session counts, emergency
      revoke-all.
  - name: AuditLog
    description: |
      Hash-chained audit log — recent entries, chain verification, and
      head/tail pointers for offline verifiers.
  - name: TLS
    description: |
      Controller TLS certificate management — describe, download the
      public cert, install a custom bundle, regenerate the self-signed
      cert.
  - name: PasswordPolicy
    description: |
      Password-policy configuration + the single-use password-ticket
      store used to hand off freshly-minted plaintext passwords.
  - name: Stack
    description: |
      In-place stack upgrade — check for newer releases and trigger a
      compose pull + rolling restart from the controller UI.
  - name: Networking
    description: |
      Routing / DNS / gateway diagnostics — URL reachability probes,
      access-URL discovery, gateway-hostname inventory.
  - name: Jobs
    description: |
      Contract-driven job framework — discovered jobs, tree view,
      schedule CRUD, run history.
  - name: Branding
    description: White-label branding config and brand assets.

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Auth. Username from STACK_ADMIN_USERNAME (default: admin),
        password from STACK_ADMIN_PASSWORD.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token for programmatic clients. Tokens are minted via
        `POST /api/tokens` (short-lived access tokens + refresh tokens),
        rotated via `POST /api/tokens/refresh`, and revoked via
        `POST /api/tokens/{token_id}` or the family-wide revoke at
        `POST /api/tokens/revoke-family`.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "not found"
      required: [error]

    Guardrail:
      type: object
      description: >-
        One row in the cross-domain guardrail registry. Threshold
        merges defaults + operator overrides. last_status is one of
        "ok", "info", "warning", "critical", "disabled", or "unknown".
      properties:
        id:
          type: string
          example: storage:per_mount_threshold
        domain:
          type: string
          enum: [storage, bandwidth, external_api, media_quality, job_health, auth, dependency, cost]
        description:
          type: string
        threshold:
          type: object
          additionalProperties: true
        default_threshold:
          type: object
          additionalProperties: true
        last_status:
          type: string
        last_severity:
          type: string
        last_severity_streak:
          type: integer
        last_evaluated_at:
          type: number
        last_triggered_at:
          type: number
        disabled:
          type: boolean
      required: [id, domain, description, threshold]

    ActionAccepted:
      type: object
      properties:
        status:
          type: string
          enum: [accepted]
        action:
          type: string
          example: bootstrap
        priority:
          type: integer
          example: 10
        overrides:
          type: object
          additionalProperties: true
      required: [status, action, priority]

    ActionRecord:
      type: object
      properties:
        id:
          type: string
          example: bootstrap-1
        name:
          type: string
          example: bootstrap
        status:
          type: string
          enum: [pending, running, complete, error, cancelled, timeout]
        started_at:
          type: number
          nullable: true
          example: 1712505600.0
        completed_at:
          type: number
          nullable: true
          example: 1712505660.5
        elapsed_seconds:
          type: number
          nullable: true
          example: 60.5
        error:
          type: string
          nullable: true
        overrides:
          type: object
          additionalProperties: true
        timeout_seconds:
          type: integer
          example: 600
        triggered_by:
          type: string
          example: admin

    ControllerState:
      # ADR-0005 Phase 5a removed the legacy bootstrap-progress
      # fields (``phase``, ``phases_completed``, ``current_action``);
      # Phase 5c.4c retires ``action_history`` for the same reason —
      # they all duplicated the Job framework's running-tree +
      # history view. Use ``GET /api/jobs/running`` and
      # ``GET /api/jobs?history`` for live progress;
      # ``initial_bootstrap_done`` + ``error`` are the canonical
      # terminal-state signals.
      type: object
      properties:
        started_at:
          type: number
          nullable: true
        completed_at:
          type: number
          nullable: true
        elapsed_seconds:
          type: number
          nullable: true
        error:
          type: string
          nullable: true
        preflight_results:
          type: object
          additionalProperties: true
        app_status:
          type: object
          additionalProperties: true
        run_overrides:
          type: object
          additionalProperties: true
        initial_bootstrap_done:
          type: boolean
          example: true
        runtime_config:
          type: object
          additionalProperties: true
        webhook_urls:
          type: array
          items:
            type: string
        pending_actions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              priority:
                type: integer
              queued_at:
                type: number
              overrides:
                type: object

    ServiceEntry:
      type: object
      properties:
        id:
          type: string
          example: sonarr
        name:
          type: string
          example: Sonarr
        desc:
          type: string
          example: TV series management and automation
        category:
          type: string
          example: management
        host:
          type: string
          example: sonarr
        port:
          type: integer
          example: 8989

    CategoryEntry:
      type: object
      properties:
        label:
          type: string
          example: Management
        ids:
          type: array
          items:
            type: string
          example: [sonarr, radarr, lidarr, readarr]

    ServiceHealth:
      type: object
      properties:
        services:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [ok, error, disabled, unknown]
              code:
                type: integer
              ms:
                type: integer
              auth:
                type: string
                enum: [ok, unauthorized, error, no_key, n/a]
              error:
                type: string
              # Login-probe outcome. health_service.py runs the
              # per-service login flow on every health refresh
              # (when configured) and stamps the result here. Not
              # all services have a login probe — `n/a` covers
              # those. Strict-validator clients failed against the
              # live response until this was declared.
              login:
                type: string
                enum: [ok, error, n/a]
        healthy:
          type: integer
          example: 12
        total:
          type: integer
          example: 14

    DiskInfo:
      type: object
      properties:
        disk:
          type: object
          additionalProperties:
            type: object
            properties:
              path:
                type: string
              total_bytes:
                type: integer
              used_bytes:
                type: integer
              free_bytes:
                type: integer
              percent_used:
                type: number
              fstype:
                type: string
              warning:
                type: string
              error:
                type: string
        guardrails:
          type: object
          properties:
            enabled:
              type: boolean
            max_used_percent:
              type: number
            target_used_percent:
              type: number
            monitor_path:
              type: string
            qbit_cleanup:
              type: object
              properties:
                enabled:
                  type: boolean
                min_completion_age_hours:
                  type: number
                min_ratio:
                  type: number
                min_seeding_time_minutes:
                  type: integer
                max_delete_per_run:
                  type: integer
                delete_files:
                  type: boolean
                categories:
                  type: array
                  items:
                    type: string

    LivetvUrlEntry:
      type: object
      description: |
        One named tuner/guide URL. Used in both the `tuners[]` and
        `guides[]` arrays under `/api/livetv-sources`.
      required: [url, name]
      properties:
        url:
          type: string
          format: uri
          example: "https://iptv-org.github.io/iptv/countries/us.m3u"
        name:
          type: string
          example: Default
      additionalProperties: true

    IptvCountryEntry:
      type: object
      description: |
        One IPTV country preset emitted by `/api/iptv-countries`. The
        `tuner_url` may be the empty string when the active tuner
        provider declares no `url_template` for the country and only
        opts in via `country_urls` for a different region.
      required: [code, name, guide_url, tuner_url]
      properties:
        code:
          type: string
          description: Lowercase ISO-3166-1 alpha-2 country code.
          example: us
        name:
          type: string
          example: "United States"
        guide_url:
          type: string
          description: |
            Best-available EPG XMLTV URL resolved from the configured
            guide-provider chain (priority order from
            `contracts/epg_providers.yaml`). Empty string when no
            provider supports this country.
          example: "https://iptv-epg.org/files/epg-us.xml"
        tuner_url:
          type: string
          description: |
            M3U tuner URL expanded from the active tuner provider's
            `url_template` (lowercased `{code}` substitution). Empty
            string when no tuner template is configured.
          example: ""
      additionalProperties: true

    EpgProviderEntry:
      type: object
      description: |
        One EPG/guide provider definition emitted under
        `/api/epg-providers#providers[]`. Mirrors a row from
        `contracts/epg_providers.yaml`. `url_template` and
        `country_urls` are mutually-supplemental: a provider may have
        either, both, or (rarely) neither when only manual
        `country_urls` overrides are configured.
      required: [id, name, format, priority, enabled]
      properties:
        id:
          type: string
          example: iptv-epg
        name:
          type: string
          example: IPTV-EPG.org
        format:
          type: string
          description: Source-file format (e.g. `xml`, `xml.gz`, `m3u`).
          example: xml
        priority:
          type: integer
          description: |
            Lower numbers are tried first when resolving a guide URL
            for a given country.
          example: 1
        enabled:
          type: boolean
          example: true
        url_template:
          type: string
          description: |
            URL template with `{code}` / `{CODE}` placeholders. May be
            absent for providers that publish per-country URLs via
            `country_urls` only (e.g. `epgtalk`, `freeview-epg`).
          example: "https://iptv-epg.org/files/epg-{code}.xml"
        country_urls:
          type: object
          description: |
            Manual per-country URL overrides. Keys are lowercase
            country codes, values are full URLs (strings). Schema
            uses unconstrained ``type: object`` rather than
            ``additionalProperties: {type: string}`` because the
            stricter form trips openapi-typescript's literal-vs-
            index-signature check on imported JSON fixtures
            (mx/us keys present in some, absent in others). Loosen
            widens this to Record<string, unknown> at the TS layer.
        notes:
          type: string
          example: "Best for US, EU. ~30 countries. 7-day guide data."
      additionalProperties: true

    EpgProviderHealthEntry:
      type: object
      description: |
        One cached health-probe result emitted under
        `/api/epg-providers#health{provider:country}` and used to
        avoid re-probing inside the configured `interval_hours`
        window. The map key is `<provider_id>:<country_code>`.
      required: [ok, ts, url]
      properties:
        ok:
          type: boolean
          description: Last probe outcome (HTTP 200/206/301/302).
          example: true
        ts:
          type: number
          description: |
            UNIX timestamp (seconds, float) of the last probe. Older
            than `health_check.interval_hours` triggers a re-probe.
          example: 1777137742.6841
        url:
          type: string
          description: The exact URL that was probed.
          example: "https://epg.pw/xmltv/epg_AU.xml.gz"
      additionalProperties: true

    PolicyBound:
      type: object
      description: |
        floor/ceiling/default tuple that bounds a numeric policy value.
        The UI hydrates `min`, `max`, and the placeholder default from
        these.
      required: [floor, ceiling, default]
      properties:
        floor:
          type: integer
        ceiling:
          type: integer
        default:
          type: integer

    RecentMediaItem:
      type: object
      description: |
        One recently-added item from an *arr service. Title is the only
        guaranteed-non-empty field; `added` may be empty when the source
        timestamp is unknown.
      required: [title]
      properties:
        title:
          type: string
          example: "The Last of Us"
        added:
          type: string
          description: ISO-8601 timestamp; empty string when unknown.
          example: ""
      additionalProperties: true

    RoutingConfig:
      type: object
      properties:
        base_domain:
          type: string
          example: io
        stack_subdomain:
          type: string
          example: iomio
        gateway_host:
          type: string
          example: m.iomio.io
        gateway_port:
          type: integer
          example: 443
        app_path_prefix:
          type: string
          example: /app
        strategy:
          type: string
          enum: [hybrid, subdomain, path]
          example: hybrid
        scheme:
          type: string
          description: Optional URL scheme override (`http`/`https`); empty when defaulted.
          example: ""
        internet_exposed:
          type: boolean
          example: true
        direct_hosts:
          type: object
          description: Per-service direct hostnames that bypass the gateway.
          additionalProperties:
            type: string
          example:
            media_server: jf.iomio.io
            auth: auth.iomio.io

    GpuInfo:
      type: object
      properties:
        detected:
          type: boolean
        gpus:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: intel/va-api
              name:
                type: string
              driver:
                type: string
              devices:
                type: array
                items:
                  type: string
              container:
                type: string
        jellyfin_configured:
          type: boolean
        jellyfin_has_gpu:
          type: boolean
        host_os:
          type: string
          example: linux
        runtime:
          type: string
          enum: [compose, kubernetes]
        hw_accel_type:
          type: string
          enum: [vaapi, nvenc]
        compose_snippet:
          type: string
        can_auto_configure:
          type: boolean
        note:
          type: string

    WebhookEvent:
      type: object
      description: |
        Payload sent to registered webhook URLs when an action completes,
        fails, or is cancelled. Also used for test events.
      properties:
        event:
          type: string
          enum: [action_complete, action_error, action_cancelled, test]
          description: The event type that triggered this webhook
        action:
          type: string
          description: Name of the action (e.g., bootstrap, envoy-config)
          example: bootstrap
        action_id:
          type: string
          description: Unique action identifier
          example: bootstrap-3
        status:
          type: string
          enum: [complete, error, cancelled, ok]
          description: Final status of the action
        elapsed_seconds:
          type: number
          nullable: true
          description: Wall-clock duration of the action
          example: 45.2
        started_at:
          type: number
          nullable: true
          description: Unix timestamp when the action started
          example: 1712505600.0
        completed_at:
          type: number
          nullable: true
          description: Unix timestamp when the action finished
          example: 1712505645.2
        error:
          type: string
          nullable: true
          description: Error message if the action failed
        triggered_by:
          type: string
          description: Username or source that triggered the action
          example: admin
        controller_phase:
          type: string
          enum: [idle, running, complete, error]
          description: Current controller phase after this event
          example: complete
      required: [event]
      example:
        event: action_complete
        action: bootstrap
        action_id: bootstrap-3
        status: complete
        elapsed_seconds: 45.2
        started_at: 1712505600.0
        completed_at: 1712505645.2
        error: null
        triggered_by: admin
        controller_phase: complete

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not found"
    Unauthorized:
      description: Authentication required
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: 'Basic realm="Media Stack Controller"'
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # Health
  # =========================================================================

  /healthz:
    get:
      operationId: getLiveness
      tags: [Health]
      summary: Liveness probe
      description: |
        Kubernetes/Docker liveness probe. Always returns 200 if the controller
        process is running. Use this for container orchestrator health checks.
        This endpoint never requires authentication.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/healthz
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/healthz")
            print(r.json())  # {"status": "ok"}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/healthz");
            console.log(await r.json()); // { status: "ok" }
      responses:
        "200":
          description: Controller is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
              example:
                status: ok

  /readyz:
    get:
      operationId: getReadiness
      tags: [Health]
      summary: Readiness probe
      description: |
        Kubernetes/Docker readiness probe. Returns the bootstrap phase and
        whether the initial bootstrap has completed. Use this to gate traffic
        until the stack is fully configured. Never requires authentication.
      responses:
        "200":
          description: Readiness status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready]
                  initial_bootstrap_done:
                    type: boolean
                  phase:
                    type: string
              example:
                status: ready
                initial_bootstrap_done: true
                phase: complete

  /api/health:
    get:
      operationId: getServiceHealth
      tags: [Health]
      summary: Live service health probes
      description: |
        Probes every registered service for HTTP reachability and API key
        authentication validity. Results are cached for 10 seconds. Each
        service reports status (ok/error/disabled), response time in ms,
        and auth status (ok/unauthorized/no_key/n/a).

        Use this to build a service status dashboard or trigger alerts when
        services go down.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/health | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/health")
            health = r.json()
            for svc, info in health["services"].items():
                status = "UP" if info["status"] == "ok" else "DOWN"
                print(f"  {svc}: {status} ({info['ms']}ms)")
            print(f"Healthy: {health['healthy']}/{health['total']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/health");
            const health = await r.json();
            Object.entries(health.services).forEach(([svc, info]) => {
              console.log(`${svc}: ${info.status} (${info.ms}ms)`);
            });
      responses:
        "200":
          description: Health probe results for all services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealth'
              example:
                services:
                  sonarr:
                    status: ok
                    code: 200
                    ms: 12
                    auth: ok
                  radarr:
                    status: ok
                    code: 200
                    ms: 8
                    auth: ok
                  lidarr:
                    status: ok
                    code: 200
                    ms: 11
                    auth: ok
                  readarr:
                    status: ok
                    code: 200
                    ms: 14
                    auth: ok
                  prowlarr:
                    status: ok
                    code: 200
                    ms: 9
                    auth: ok
                  jellyfin:
                    status: ok
                    code: 200
                    ms: 15
                    auth: n/a
                  bazarr:
                    status: ok
                    code: 200
                    ms: 22
                    auth: ok
                  qbittorrent:
                    status: ok
                    code: 200
                    ms: 5
                    auth: n/a
                  sabnzbd:
                    status: ok
                    code: 200
                    ms: 7
                    auth: ok
                  jellyseerr:
                    status: ok
                    code: 200
                    ms: 18
                    auth: n/a
                  tautulli:
                    status: ok
                    code: 200
                    ms: 10
                    auth: ok
                  envoy:
                    status: ok
                    code: 200
                    ms: 2
                    auth: n/a
                  homepage:
                    status: error
                    code: 0
                    ms: 0
                    auth: n/a
                    error: "connection refused"
                  controller:
                    status: ok
                    code: 200
                    ms: 1
                    auth: n/a
                healthy: 13
                total: 14

  /api/health-history:
    get:
      operationId: getHealthHistory
      tags: [Health]
      summary: Health history and SLA metrics
      description: |
        Returns up to 24 hours of health probe history (sampled at ~1 minute
        intervals, max 1440 entries). Includes per-service uptime percentage
        for SLA calculations.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/health-history | jq .sla
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/health-history")
            for svc, sla in r.json()["sla"].items():
                print(f"  {svc}: {sla['uptime_pct']:.2f}% uptime")
      responses:
        "200":
          description: Health history with SLA data
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    description: |
                      Raw per-tick samples, newest last. The
                      ops-detail HealthHistorySparkline plots
                      ok/total over time from this array. Older
                      revisions emitted only the SLA aggregate
                      below, which made the sparkline render
                      "no history yet" even when entries was
                      non-zero.
                    items:
                      type: object
                      properties:
                        ts:
                          type: number
                          description: Unix epoch seconds.
                        services:
                          type: object
                          additionalProperties:
                            type: object
                            properties:
                              status:
                                type: string
                              ms:
                                type: number
                                nullable: true
                  sla:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total:
                          type: integer
                        ok:
                          type: integer
                        uptime_pct:
                          type: number
                  period_hours:
                    type: number
                  entries:
                    type: integer
              example:
                sla:
                  sonarr:
                    total: 1440
                    ok: 1438
                    uptime_pct: 99.86
                  radarr:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  lidarr:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  prowlarr:
                    total: 1440
                    ok: 1435
                    uptime_pct: 99.65
                  jellyfin:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  bazarr:
                    total: 1440
                    ok: 1439
                    uptime_pct: 99.93
                  qbittorrent:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  envoy:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                period_hours: 24.0
                entries: 1440

  # =========================================================================
  # State
  # =========================================================================

  /status:
    # Bare-path endpoint historically used by ``kubectl exec`` /
    # CLI wait flows. Dashboard consumers should use
    # ``/api/status`` (below) since the SPA's nginx config only
    # proxies ``/api/*`` to the controller.
    get:
      operationId: getStatus
      tags: [State]
      summary: Full controller state
      description: |
        Returns the complete controller state: action history,
        pending queue, app status, preflight results, runtime config,
        webhook URLs, and ``initial_bootstrap_done``. Primary
        endpoint for monitoring the controller's lifecycle.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/status | jq .initial_bootstrap_done
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/status")
            state = r.json()
            print(f"First-run done: {state['initial_bootstrap_done']}")
            # ADR-0005 Phase 5c.4c: action_history retired from /status.
            # Use GET /api/jobs?history for completed-run history.
            jobs = requests.get("http://localhost:9100/api/jobs?history").json()
            print(f"Job batches recorded: {len(jobs.get('history', []))}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/status");
            const state = await r.json();
            console.log(`First-run done: ${state.initial_bootstrap_done}`);
            console.log(`Queue: ${state.pending_actions?.length ?? 0} pending`);
      responses:
        "200":
          description: Complete controller state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllerState'
              example:
                started_at: 1712505600.0
                completed_at: 1712505660.5
                elapsed_seconds: 60.5
                error: null
                preflight_results:
                  docker: ok
                  config_root: ok
                  media_root: ok
                app_status:
                  sonarr:
                    status: configured
                  radarr:
                    status: configured
                  jellyfin:
                    status: configured
                  prowlarr:
                    status: configured
                run_overrides: {}
                initial_bootstrap_done: true
                runtime_config:
                  skip_envoy: false
                  dry_run: false
                webhook_urls:
                  - "https://hooks.example.com/media-stack"
                pending_actions: []

  /api/status:
    # Dashboard-facing alias of ``/status``. Same response shape;
    # exists so the SPA's nginx ``location /api/`` block reaches
    # the controller without a separate per-config rule for
    # ``/status``. ADR-0005 Phase 5a.
    get:
      operationId: getApiStatus
      tags: [State]
      summary: Full controller state (dashboard alias)
      description: |
        Same response as ``GET /status``. Use this path from the
        SPA — the dashboard's nginx only proxies ``/api/*`` to the
        controller.
      responses:
        "200":
          description: Complete controller state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllerState'

  /apps:
    get:
      operationId: getApps
      tags: [State]
      summary: All app statuses
      description: |
        Returns the bootstrap status of every managed application. Each entry
        shows the configuration outcome from the last bootstrap run.
      responses:
        "200":
          description: Map of app names to their status
          content:
            application/json:
              schema:
                type: object
                properties:
                  apps:
                    type: object
                    additionalProperties:
                      type: object
              example:
                apps:
                  sonarr:
                    status: configured
                  radarr:
                    status: configured
                  jellyfin:
                    status: configured

  /apps/{app_name}:
    get:
      operationId: getAppStatus
      tags: [State]
      summary: Single app status
      description: |
        Returns the bootstrap status for a specific application by name.
        Returns 404 if the app is not tracked.
      parameters:
        - name: app_name
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      responses:
        "200":
          description: App status
          content:
            application/json:
              schema:
                type: object
              example:
                sonarr:
                  status: configured
        "404":
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "app 'unknown' not found"

  /config:
    get:
      operationId: getConfig
      tags: [State]
      summary: Runtime configuration
      description: |
        Returns the current runtime config overrides. These are key-value
        settings that persist across actions and can be toggled via POST.
      responses:
        "200":
          description: Runtime configuration map
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                    additionalProperties: true
              example:
                config:
                  skip_envoy: false
                  dry_run: false
    post:
      operationId: updateConfig
      tags: [State]
      summary: Update runtime configuration
      description: |
        Merge key-value pairs into the runtime config. These overrides affect
        subsequent action runs (e.g., set `skip_envoy: true` to skip Envoy
        regeneration). Returns the full config after update.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              skip_envoy: true
              dry_run: false
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [updated]
                  config:
                    type: object
                    additionalProperties: true
              example:
                status: updated
                config:
                  skip_envoy: true
                  dry_run: false
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Actions
  # =========================================================================

  /actions/{name}:
    post:
      operationId: triggerAction
      tags: [Actions]
      summary: Trigger an orchestration action
      description: |
        Queue an asynchronous action for execution. The request returns
        immediately with `status: accepted`. Actions run in priority order:

        | Action          | Priority | Description |
        |-----------------|----------|-------------|
        | `bootstrap`     | 10       | Full stack setup: preflight, containers, post-setup, envoy config |
        | `finalize`      | 20       | Run post-bootstrap finalization tasks |
        | `envoy-config`  | 30       | Regenerate Envoy proxy configuration |
        | `restart-apps`  | 40       | Restart all managed service containers |
        | `reconcile`     | 50       | Check and fix configuration drift |
        | `sync-indexers`  | 60       | Sync Prowlarr indexers to arr apps |
        | `auto-indexers` | 70       | Auto-discover and add indexers |

        Pass optional overrides in the request body to customize behavior
        (e.g., `{"skip_envoy": true}`).

        Monitor progress via `GET /status` or `GET /logs/stream` (SSE).
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/actions/bootstrap \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"skip_envoy": false}'
        - lang: Python
          label: Python
          source: |
            import requests

            r = requests.post(
                "http://localhost:9100/actions/bootstrap",
                json={"skip_envoy": False},
                auth=("admin", "password"),
            )
            print(r.json())
            # {"status": "accepted", "action": "bootstrap", "priority": 10, ...}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/actions/bootstrap", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ skip_envoy: false }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum: [bootstrap, finalize, auto-indexers, restart-apps, sync-indexers, envoy-config, reconcile, "media-integrity:scan", "media-integrity:reconcile", "media-integrity:enforce-config", "media-integrity:resolve-review"]
          description: The action to trigger
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Optional overrides for the action
            example:
              skip_envoy: true
      responses:
        "200":
          description: Action accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAccepted'
              example:
                status: accepted
                action: bootstrap
                priority: 10
                overrides:
                  skip_envoy: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Unknown action name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  known:
                    type: array
                    items:
                      type: string
              example:
                error: "unknown action 'foo'"
                known: [auto-indexers, bootstrap, envoy-config, finalize, reconcile, restart-apps, sync-indexers]

  /api/actions/{name}:
    # Dashboard-facing alias of ``/actions/{name}``. Same dispatch
    # body and response shape; exists so the SPA's nginx
    # ``location /api/`` block reaches the controller without a
    # separate ``location = /actions`` rule per nginx config.
    # Without it, the SPA's "Run now" / "Cancel" buttons hit the
    # SPA-fallback ``try_files`` block and the operator sees
    # "unknown path '/api/actions/<name>'".
    post:
      operationId: triggerActionApi
      tags: [Actions]
      summary: Trigger an orchestration action (dashboard alias)
      description: |
        Same response as ``POST /actions/{name}``. Use this path
        from the SPA — the dashboard's nginx only proxies
        ``/api/*`` to the controller.
      security:
        - basicAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The action to trigger
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Action accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAccepted'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Unknown action name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  known:
                    type: array
                    items:
                      type: string

  /cancel:
    post:
      operationId: cancelAction
      tags: [Actions]
      summary: Cancel running action
      description: |
        Request cancellation of the currently running action. If an action
        is running, it will be signalled to stop at the next checkpoint.
        Also accessible as `POST /actions/cancel`.

        ADR-0005 Phase 5c.4c response shape: returns the in-flight
        run's `run_id` (Job framework run-history identifier) and
        `run_name` (job name) so callers can drill straight into
        `GET /api/jobs?history` for the cancelled run, instead of
        the legacy `current_action` ActionRecord payload.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/cancel \
              -u admin:password
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.post("http://localhost:9100/cancel",
                              auth=("admin", "password"))
            print(r.json())
            # {"status": "cancel_requested",
            #  "cancelled_run_id": "01HX...", "run_name": "bootstrap"}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/cancel", {
              method: "POST",
              headers: { Authorization: "Basic " + btoa("admin:password") },
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cancel_requested, no_action_running]
                  cancelled_run_id:
                    type: string
                    nullable: true
                  run_name:
                    type: string
                    nullable: true
              example:
                status: cancel_requested
                cancelled_run_id: 01HX9SJ87D2MN6P5VJB27Q3RAB
                run_name: bootstrap

  /run:
    post:
      operationId: triggerBootstrapLegacy
      tags: [Actions]
      summary: Trigger bootstrap (legacy alias)
      description: |
        Backward-compatible alias for `POST /actions/bootstrap`. Triggers a
        full bootstrap run. Prefer `/actions/bootstrap` for new integrations.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Bootstrap action accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAccepted'

  # =========================================================================
  # Services
