  /api/display-preferences:
    get:
      operationId: getDisplayPreferences
      tags: [Config]
      summary: Jellyfin display preferences (backdrop, custom prefs, per-library)
      description: |
        Returns the display-preferences configuration that the controller
        pushes to Jellyfin clients. **Server-side only** — these are
        Jellyfin client knobs (backdrops, home sections, per-library
        sort order). They are NOT browser-UI preferences for the
        controller dashboard; the dashboard's theme/density live in
        `next-themes` + `localStorage`.
      responses:
        "200":
          description: Display preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: Whether display-prefs sync to Jellyfin clients is active.
                    example: true
                  show_backdrop:
                    type: boolean
                    description: Cinema-style backdrops on detail pages.
                    example: true
                  custom_prefs:
                    type: object
                    description: |
                      Free-form Jellyfin client knobs. Keys are the
                      Jellyfin pref names (e.g. `enableThemeVideos`,
                      `homesection0`); values are strings or booleans.
                    additionalProperties: true
                    example:
                      enableNextVideoInfoOverlay: true
                      enableBackdrops: true
                      enableLibraryBackdrops: true
                      enableThemeVideos: true
                      homesection0: smalllibrarytiles
                      homesection1: resume
                      homesection2: latestmedia
                      homesection3: nextup
                      homesection4: livetv
                      homesection5: activerecordings
                      homesection6: none
                      homesection7: none
                      homesection8: none
                      homesection9: none
                  per_library_prefs:
                    type: object
                    description: |
                      Per-library override map. Keyed by library kind
                      (`movies`/`tv`/`music`/`books`); values are
                      Jellyfin display-pref objects (SortBy, SortOrder,
                      etc.).
                    additionalProperties:
                      type: object
                      additionalProperties: true
                    example:
                      movies:
                        SortBy: DateCreated,SortName
                        SortOrder: Descending
                  clients:
                    type: array
                    description: |
                      Jellyfin client identifiers the prefs apply to.
                      Default targets are `emby` (legacy app) and
                      `jellyfin-web` (browser).
                    items:
                      type: string
                    example: [emby, jellyfin-web]
              example:
                enabled: true
                show_backdrop: true
                custom_prefs:
                  enableNextVideoInfoOverlay: true
                  enableBackdrops: true
                  enableLibraryBackdrops: true
                  enableThemeVideos: true
                  homesection0: smalllibrarytiles
                  homesection1: resume
                  homesection2: latestmedia
                  homesection3: nextup
                  homesection4: livetv
                  homesection5: activerecordings
                  homesection6: none
                  homesection7: none
                  homesection8: none
                  homesection9: none
                per_library_prefs:
                  movies:
                    SortBy: DateCreated,SortName
                    SortOrder: Descending
                  tv:
                    SortBy: DateCreated,SortName
                    SortOrder: Descending
                  music:
                    SortBy: DateCreated,SortName
                    SortOrder: Descending
                  books:
                    SortBy: DateCreated,SortName
                    SortOrder: Descending
                clients: [emby, jellyfin-web]
    post:
      operationId: updateDisplayPreferences
      tags: [Config]
      summary: Update Jellyfin display preferences
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              enabled: true
              show_backdrop: true
              custom_prefs:
                enableThemeVideos: true
                homesection0: smalllibrarytiles
                homesection1: resume
              clients: [emby, jellyfin-web]
      responses:
        "200":
          description: Updated
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

