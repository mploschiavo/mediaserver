  # =========================================================================
  # Media integrity — anti-duplicate-download contract
  # =========================================================================

  /api/media-integrity/status:
    get:
      operationId: getMediaIntegrityStatus
      tags: [MediaIntegrity]
      summary: Last-pass status for the media-integrity subsystem
      description: |
        Returns the most recent enforcement + reconciliation outcomes
        across every Servarr (Radarr/Sonarr/Lidarr/Readarr) and Bazarr
        adapter. Read-only; surfaces the Security-tab "media integrity"
        card. Authenticated users can read; admin not required.
      x-status: planned
      x-target-release: v1.x-media-integrity
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Last-pass status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_enforce:
                    type: object
                    additionalProperties: true
                  last_reconcile:
                    type: object
                    additionalProperties: true
                  policy_version:
                    type: integer
                  servarr_adapters:
                    type: array
                    items:
                      type: string
                  bazarr_present:
                    type: boolean
              example:
                last_enforce:
                  detail: {}
                  ts: ""
                last_reconcile:
                  detail: {}
                  ts: ""
                missing_api_keys: []
                policy_version: 1
                servarr_adapters: [lidarr, radarr, readarr, sonarr]
                bazarr_present: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "503":
          description: Service not yet configured

  /api/media-integrity/progress:
    get:
      operationId: getMediaIntegrityProgress
      tags: [MediaIntegrity]
      summary: Poll-able progress of the in-flight reconcile/enforce pass
      description: |
        Returns ``{"in_progress": false}`` when idle, or
        ``{"in_progress": true, "op": "reconcile"|"enforce_config", "phase": "running", "started_at": "iso-ts"}``.
        UI polls this while a button is depressed so the user sees a
        spinner instead of a silent network request.
      x-status: planned
      x-target-release: v1.x-media-integrity
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Progress snapshot
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                idle:
                  summary: No pass currently running
                  value:
                    in_progress: false
                running:
                  summary: Reconcile pass in flight
                  value:
                    in_progress: true
                    op: reconcile
                    phase: running
                    started_at: "2026-04-25T14:30:22Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "503":
          description: Service not yet configured

  /api/media-integrity/reconcile:
    post:
      operationId: triggerMediaIntegrityReconcile
      tags: [MediaIntegrity]
      summary: Trigger a reconciliation pass on-demand (admin)
      description: |
        Walks every adapter, heals duplicate files via the canonical
        winner-picking rules (highest quality-profile rank, earliest
        added, smallest size), and emits ``media_integrity.duplicate_resolved``
        events. Idempotent via ``Idempotency-Key`` header. Admin-only.
        ``?dry_run=1`` reports what WOULD be deleted without touching
        disk. 409 if a pass is already running.
      x-status: planned
      x-target-release: v1.x-media-integrity
      parameters:
        - in: query
          name: dry_run
          schema:
            type: string
            enum: ["0", "1"]
          description: When "1", report the plan without deleting any file.
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Reconciliation summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                started_at: "2026-04-25T14:30:22Z"
                completed_at: "2026-04-25T14:30:48Z"
                adapters:
                  radarr:
                    duplicates_resolved: 3
                    bytes_freed: 5_368_709_120
                    needs_review: 0
                  sonarr:
                    duplicates_resolved: 7
                    bytes_freed: 12_884_901_888
                    needs_review: 1
                dry_run: false
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Admin required
        "409":
          description: A reconcile pass is already in progress
        "503":
          description: Service not yet configured

  /api/media-integrity/resolve-review:
    post:
      operationId: resolveMediaIntegrityReview
      tags: [MediaIntegrity]
      summary: Operator picks a winner for an ambiguous duplicate (admin)
      description: |
        Invoked from the "Keep this one" button on the needs-review
        chip. Deletes every OTHER candidate file (Servarr) or every
        other subtitle in the same (language, forced, hi) group
        (Bazarr). Audited with ``operator_resolved=true``. Shares the
        reconcile mutex → 409 if a reconcile pass is running.
      x-status: planned
      x-target-release: v1.x-media-integrity
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app, release_id]
              properties:
                app:
                  type: string
                  enum: [radarr, sonarr, lidarr, readarr, bazarr]
                release_id:
                  type: string
                winner_file_id:
                  type: string
                  description: Required for Servarr.
                winner_sub_path:
                  type: string
                  description: Required for Bazarr.
                release_kind:
                  type: string
                  enum: [movie, episode]
                language:
                  type: string
                forced:
                  type: boolean
                hi:
                  type: boolean
            examples:
              servarr_movie:
                summary: Servarr (Radarr) movie winner pick
                value:
                  app: radarr
                  release_id: "tmdb:614249"
                  winner_file_id: "12345"
                  release_kind: movie
              bazarr_subtitle:
                summary: Bazarr subtitle winner pick
                value:
                  app: bazarr
                  release_id: "imdb:tt0111161"
                  winner_sub_path: "/media/movies/Shawshank Redemption (1994)/Shawshank.en.srt"
                  language: en
                  forced: false
                  hi: false
      responses:
        "200":
          description: Resolution summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  release_id:
                    type: string
                  deleted_count:
                    type: integer
                  bytes_freed:
                    type: integer
              example:
                app: radarr
                release_id: "tmdb:614249"
                deleted_count: 2
                bytes_freed: 4_294_967_296
        "400":
          description: Missing required fields or unknown app
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Admin required
        "409":
          description: A reconcile pass is already in progress
        "503":
          description: Service not yet configured

  /api/media-integrity/enforce-config:
    post:
      operationId: triggerMediaIntegrityEnforceConfig
      tags: [MediaIntegrity]
      summary: Apply the canonical *arr policy to every adapter (admin)
      description: |
        Brings every adapter's mediamanagement + naming + Bazarr
        settings back into compliance with
        ``contracts/servarr-policy.yaml``. Failures on one adapter
        do not stop enforcement on the others. Audited.
      x-status: planned
      x-target-release: v1.x-media-integrity
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Enforcement summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                policy_version: 1
                started_at: "2026-04-25T14:30:22Z"
                completed_at: "2026-04-25T14:30:25Z"
                adapters:
                  radarr: {applied: true, changes: 4}
                  sonarr: {applied: true, changes: 2}
                  lidarr: {applied: false, error: "API key not set"}
                  readarr: {applied: true, changes: 0}
                  bazarr: {applied: true, changes: 3}
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Admin required
        "503":
          description: Service not yet configured

