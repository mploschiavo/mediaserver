            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                enabled: true
                recent_events: []

  /api/auto-heal/enabled:
    post:
      operationId: setAutoHealEnabled
      tags: [Health]
      summary: Toggle auto-heal on/off
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
            example:
              enabled: true
      responses:
        "200":
          description: Toggled
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auto-heal/run:
    post:
      operationId: runAutoHeal
      tags: [Health]
      summary: Trigger an auto-heal pass now
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Heal result
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/password-propagation:
    get:
      operationId: getPasswordPropagationReport
      tags: [Health]
      summary: Check admin password propagation to each service's local user record
      description: >-
        Read-only metadata probe. For services with a local per-user password
        store (today: Jellyfin), GET the user list via the API key and report
        whether the admin user's ``HasPassword`` flag is true. NO authentication
        attempt is made against any service — this endpoint never touches
        ``/Users/AuthenticateByName`` or equivalent password-login endpoints.
        Distinct from ``/api/credentials``, which verifies the API key works.
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: >-
            Per-service status. Values: ``ok`` (password present),
            ``not_propagated`` (user exists with HasPassword=false),
            ``no_user`` (admin row missing), ``no_key`` (no API key),
            ``error`` (transport / parse), ``n/a`` (service has no local
            password concept, e.g. *arr apps using API key only).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                checked: 1
                ok: 1
                total: 7
                password_propagation:
                  jellyfin: ok
                  sonarr: n/a
                  radarr: n/a
                  lidarr: n/a
                  readarr: n/a
                  prowlarr: n/a
                  qbittorrent: n/a
  /api/ops/health:
    get:
      operationId: getOpsHealth
      tags: [Health]
      summary: Aggregated runtime stats for the /ops dashboard tile
      description: |
        Cheap aggregate intended for the operator's at-a-glance ops
        tile. All four fields come from cached / already-running
        sources (process clock, container set, DiskService, the
        on-disk job-history journal) — no extra HTTP probes are
        kicked off when this endpoint is hit, even on a busy refresh
        cadence. Replaces the UI-side `Promise.resolve` stub that
        produced the "12/31/1969" bootstrap timestamp.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/ops/health | jq .
      responses:
        "200":
          description: Runtime stats snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  uptime_seconds:
                    type: integer
                    description: Seconds since the controller process started. Resets on pod restart.
                  containers:
                    type: integer
                    description: Live media-stack container/pod count.
                  disk_used_pct:
                    type: number
                    description: Highest used-percent across reported volumes.
                  last_bootstrap_at:
                    type: string
                    description: |
                      ISO timestamp of the most recent bootstrap-flavored
                      job-history entry. Empty string when the journal
                      has no bootstrap run (fresh deploy).
              example:
                uptime_seconds: 7842
                containers: 18
                disk_used_pct: 64.2
                last_bootstrap_at: "2026-04-25T15:43:20+00:00"
  /api/credentials:
    get:
      operationId: getCredentialsReport
      tags: [Health]
      summary: Credential validation across services
      responses:
        "200":
          description: Credential status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: 6
                total: 7
                credentials:
                  jellyfin: ok
                  sonarr: ok
                  radarr: ok
                  lidarr: ok
                  readarr: ok
                  prowlarr: ok
                  qbittorrent: no_key
    post:
      operationId: revalidateCredentials
      tags: [Health]
      summary: Ad-hoc credential revalidation for a service list
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                services:
                  type: array
                  items:
                    type: string
            example:
              services: [jellyfin, sonarr, radarr]
      responses:
        "200":
          description: Revalidation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: 3
                total: 3
                credentials:
                  jellyfin: ok
                  sonarr: ok
                  radarr: ok

  /api/failed-services:
    get:
      operationId: getFailedServices
      tags: [Health]
      summary: Services that have tripped the failure threshold
      responses:
        "200":
          description: Failed services
          content:
            application/json:
              schema:
                type: object
                properties:
                  # Live shape is a service-id -> failure-detail map.
                  # ``{}`` is the steady state when nothing is failing
                  # (count: 0). Earlier `array of string` declaration
                  # never matched the live response.
                  failed_services:
                    type: object
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: object
                          additionalProperties: true
                  count:
                    type: integer
              example:
                count: 0
                failed_services: {}

