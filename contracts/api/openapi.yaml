  # =========================================================================
  # Password policy + tickets
  # =========================================================================

  /api/password-policy:
    get:
      operationId: getPasswordPolicy
      tags: [PasswordPolicy]
      summary: Current password policy + bounds
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                type: object
                required: [policy, bounds]
                properties:
                  policy:
                    type: object
                    description: |
                      Currently-active policy values. POST the same
                      shape to `/api/password-policy` to update.

                      v1.0.182 expanded the shape to expose explicit
                      booleans for each character class. The legacy
                      `require_classes` integer is kept on the read
                      side (derived from the booleans) for back-compat;
                      on writes the booleans win and `require_classes`
                      is ignored.
                    properties:
                      min_length:
                        type: integer
                        example: 12
                      require_classes:
                        type: integer
                        description: |
                          DEPRECATED on writes. Read-side count of
                          enabled character-class booleans (1–4).
                        example: 3
                      require_uppercase:
                        type: boolean
                        example: true
                      require_lowercase:
                        type: boolean
                        example: true
                      require_digit:
                        type: boolean
                        example: true
                      require_special:
                        type: boolean
                        example: false
                      history_len:
                        type: integer
                        description: |
                          How many recent passwords to remember and
                          forbid for re-use. 0 disables history.
                        example: 5
                      max_age_days:
                        type: integer
                        description: |
                          Force rotation after N days. 0 = never.
                        example: 0
                      lockout_threshold:
                        type: integer
                        description: |
                          Failed attempts before account lockout.
                          0 disables.
                        example: 5
                      lockout_window_minutes:
                        type: integer
                        description: |
                          Duration of the lockout in minutes.
                        example: 15
                    additionalProperties: true
                  bounds:
                    type: object
                    description: |
                      Per-field min/max/default. Drives the `min` and
                      `max` attributes on the form inputs + sliders.
                      The keys mirror the numeric fields on `policy`.
                    properties:
                      min_length:
                        $ref: '#/components/schemas/PolicyBound'
                      require_classes:
                        $ref: '#/components/schemas/PolicyBound'
                      history_len:
                        $ref: '#/components/schemas/PolicyBound'
                      max_age_days:
                        $ref: '#/components/schemas/PolicyBound'
                      lockout_threshold:
                        $ref: '#/components/schemas/PolicyBound'
                      lockout_window_minutes:
                        $ref: '#/components/schemas/PolicyBound'
                    additionalProperties:
                      $ref: '#/components/schemas/PolicyBound'
              example:
                policy:
                  min_length: 12
                  require_uppercase: true
                  require_lowercase: true
                  require_digit: true
                  require_special: false
                  require_classes: 3
                  history_len: 5
                  max_age_days: 0
                  lockout_threshold: 5
                  lockout_window_minutes: 15
                bounds:
                  min_length:
                    floor: 4
                    ceiling: 128
                    default: 12
                  require_classes:
                    floor: 1
                    ceiling: 4
                    default: 3
                  history_len:
                    floor: 0
                    ceiling: 20
                    default: 5
                  max_age_days:
                    floor: 0
                    ceiling: 365
                    default: 0
                  lockout_threshold:
                    floor: 0
                    ceiling: 50
                    default: 5
                  lockout_window_minutes:
                    floor: 0
                    ceiling: 1440
                    default: 15
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: updatePasswordPolicy
      tags: [PasswordPolicy]
      summary: Update the password policy
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Partial update — any field omitted is preserved. The
                booleans take precedence over the deprecated
                `require_classes` integer; on a body that has only the
                booleans, `require_classes` is ignored on the write path
                (and re-derived on the next read).
              properties:
                min_length:
                  type: integer
                require_uppercase:
                  type: boolean
                require_lowercase:
                  type: boolean
                require_digit:
                  type: boolean
                require_special:
                  type: boolean
                require_classes:
                  type: integer
                  deprecated: true
                history_len:
                  type: integer
                max_age_days:
                  type: integer
                lockout_threshold:
                  type: integer
                lockout_window_minutes:
                  type: integer
              additionalProperties: true
      responses:
        "200":
          description: Updated
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          description: Persist failed

  /api/password-tickets/{ticket_id}:
    get:
      operationId: consumePasswordTicket
      tags: [PasswordPolicy]
      summary: Single-use plaintext-password retrieval (admin-only, audited, rate-limited)
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: ticket_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plaintext password (ticket burned on read)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                ticket_id: "tkt-7e8a1884d5ff45f8"
                username: alice
                password: "***"
                consumed_at: "2026-04-25T14:30:22Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Forbidden
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          description: Rate limited

