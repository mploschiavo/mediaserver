  # =========================================================================
  # Auth
  # =========================================================================

  /api/auth/config:
    get:
      operationId: getAuthConfig
      tags: [Auth]
      summary: Current auth configuration
      responses:
        "200":
          description: Auth config snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    description: Active auth strategy.
                    enum: [authelia, "authelia+oidc", authentik, basic, none]
                    example: authelia
                  internet_exposed:
                    type: boolean
                    description: |
                      True when the controller is reachable from the
                      public internet — drives whether app-auth is
                      required for local addresses.
                    example: false
                  oidc_provider:
                    type: string
                    description: |
                      Currently-active OIDC provider key. Singular —
                      the controller models exactly one configured
                      provider. Use `oidc_config` for its parameters.
                    example: local
                  oidc_config:
                    type: object
                    description: |
                      Provider-specific configuration for the active
                      `oidc_provider`. Keys depend on provider type
                      (e.g. `client_id`, `discovery_url`, `issuer`).
                    additionalProperties: true
                    example: {}
                  per_service:
                    type: object
                    description: |
                      Per-service auth-policy overrides. Keys are
                      service ids (`sonarr`, `radarr`, ...); values
                      are policy strings or partial policy objects.
                    additionalProperties: true
                    example: {}
                  app_auth:
                    type: object
                    description: |
                      Controller-level admin-cookie configuration. The
                      `enabled`/`required` pair gates the basic-auth
                      fallback used when the SSO gateway is unreachable.
                    properties:
                      enabled:
                        type: boolean
                        example: true
                      method:
                        type: string
                        enum: [None, Basic, Bearer]
                        example: None
                      required:
                        type: string
                        enum: [Always, DisabledForLocalAddresses, Never]
                        example: DisabledForLocalAddresses
                      fail_on_error:
                        type: boolean
                        example: false
                      username_env:
                        type: string
                        example: STACK_ADMIN_USERNAME
                      password_env:
                        type: string
                        example: STACK_ADMIN_PASSWORD
                    additionalProperties: true
                  app_auth_method:
                    type: string
                    description: Convenience alias for `app_auth.method`.
                    example: None
                  app_auth_summary:
                    type: string
                    description: Human-readable summary of the active app-auth posture.
                    example: "SSO gateway — arr apps trust local network (no second login)"
              example:
                mode: authelia
                internet_exposed: false
                oidc_provider: local
                oidc_config: {}
                per_service: {}
                app_auth:
                  enabled: true
                  method: None
                  required: DisabledForLocalAddresses
                  fail_on_error: false
                  username_env: STACK_ADMIN_USERNAME
                  password_env: STACK_ADMIN_PASSWORD
                app_auth_method: None
                app_auth_summary: "SSO gateway — arr apps trust local network (no second login)"
    post:
      operationId: updateAuthConfig
      tags: [Auth]
      summary: Update auth configuration
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              mode: authelia
              internet_exposed: false
              oidc_provider: local
              app_auth:
                enabled: true
                method: None
                required: DisabledForLocalAddresses
      responses:
        "200":
          description: Updated auth config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                mode: authelia
                internet_exposed: false
                oidc_provider: local
                oidc_config: {}
                per_service: {}
                app_auth:
                  enabled: true
                  method: None
                  required: DisabledForLocalAddresses
                  fail_on_error: false
                app_auth_method: None
                app_auth_summary: "SSO gateway — arr apps trust local network (no second login)"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Forbidden

  /api/auth/identity:
    get:
      operationId: getAuthIdentity
      tags: [Auth]
      summary: Resolved caller identity (Authelia/Authentik + cookie)
      responses:
        "200":
          description: Identity envelope
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  user:
                    type: string
                  display_name:
                    type: string
                  email:
                    type: string
                  groups:
                    type: string
              example:
                authenticated: true
                user: admin
                display_name: admin
                email: ""
                groups: ""

  /api/auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: Mint a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
            example:
              username: admin
              password: "***"
      responses:
        "200":
          description: Session established; Set-Cookie set
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          description: Rate limited

  /api/auth/logout:
    post:
      operationId: authLogout
      tags: [Auth]
      summary: Revoke session cookie
      responses:
        "200":
          description: Session revoked

  /api/auth/modes:
    get:
      operationId: getAuthModes
      tags: [Auth]
      summary: Supported auth modes
      description: |
        Catalog of auth modes the controller supports. Each entry
        carries enough metadata for the dashboard to render mode-
        chooser tiles (display name, description, controller-side
        auth strategy, gateway-auth boolean, provider service id).
      responses:
        "200":
          description: Mode list
          content:
            application/json:
              schema:
                type: object
                properties:
                  modes:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          description: Stable mode id (none | basic | authelia | authentik).
                          example: authelia
                        display_name:
                          type: string
                          example: Authelia (SSO)
                        description:
                          type: string
                        controller_auth:
                          type: string
                          enum: [none, basic, forwarded]
                        gateway_auth:
                          type: boolean
                        provider_service:
                          type: string
                          description: Service id of the auth provider, or empty when in-process.
                          example: authelia
                      additionalProperties: true
              example:
                modes:
                  - key: none
                    display_name: No Authentication
                    description: No authentication on gateway or controller. Trusted LAN only.
                    controller_auth: none
                    gateway_auth: false
                    provider_service: ""
                  - key: basic
                    display_name: Basic Auth
                    description: HTTP Basic Auth on the controller. No gateway-level auth.
                    controller_auth: basic
                    gateway_auth: false
                    provider_service: ""
                  - key: authelia
                    display_name: Authelia (SSO)
                    description: Authelia forward-auth via Envoy ext_authz.
                    controller_auth: forwarded
                    gateway_auth: true
                    provider_service: authelia
                  - key: authentik
                    display_name: Authentik (IdP)
                    description: Authentik forward-auth via Envoy ext_authz.
                    controller_auth: forwarded
                    gateway_auth: true
                    provider_service: authentik

  /api/auth/oidc-providers:
    get:
      operationId: getOidcProviders
      tags: [Auth]
      summary: Configured OIDC providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                providers:
                  - key: local
                    display_name: Local Accounts
                    description: File-based users managed by the auth provider directly
                    required_fields: []
                  - key: google
                    display_name: Google
                    description: Google Workspace or personal Gmail accounts
                    required_fields: [client_id, client_secret]
                  - key: microsoft
                    display_name: Microsoft Entra ID
                    description: Azure AD / Microsoft 365 accounts
                    required_fields: [tenant_id, client_id, client_secret]
                  - key: keycloak
                    display_name: Keycloak
                    description: Self-hosted open-source IdP
                    required_fields: [host, realm, client_id, client_secret]

  /api/auth/parse-oidc:
    post:
      operationId: parseOidcConfig
      tags: [Auth]
      summary: Parse uploaded OIDC provider JSON
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              provider: google
              client_id: "1234567890.apps.googleusercontent.com"
              client_secret: "***"
              discovery_url: "https://accounts.google.com/.well-known/openid-configuration"
      responses:
        "200":
          description: Parsed OIDC config
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                provider: google
                issuer: "https://accounts.google.com"
                authorization_endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
                token_endpoint: "https://oauth2.googleapis.com/token"
                userinfo_endpoint: "https://openidconnect.googleapis.com/v1/userinfo"
                scopes_supported: [openid, email, profile]
        "400":
          $ref: '#/components/responses/BadRequest'

  /api/auth/oidc/probe:
    post:
      operationId: probeOidcDiscovery
      tags: [Auth]
      summary: Server-side fetch of an OIDC discovery document
      description: |
        Server-side fetch of an OIDC ``.well-known/openid-configuration``
        document. The browser-side fetch hits CORS / rate limits with
        major IdPs (Google in particular CORS-blocks third-party reads);
        the controller probe does it server-side so the form auto-
        populates without those constraints.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                discovery_url:
                  type: string
                  description: |
                    Absolute http(s) URL pointing at the IdP's discovery
                    document — typically ends in
                    ``/.well-known/openid-configuration``.
              required: [discovery_url]
            example:
              discovery_url: "https://accounts.google.com/.well-known/openid-configuration"
      responses:
        "200":
          description: Parsed discovery summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                summary:
                  issuer: "https://accounts.google.com"
                  authorization_endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
                  token_endpoint: "https://oauth2.googleapis.com/token"
        "400":
          $ref: '#/components/responses/BadRequest'
        "502":
          description: Upstream IdP unreachable / returned a non-JSON document.

  /api/auth/service-policies:
    get:
      operationId: getServiceAuthPolicies
      tags: [Auth]
      summary: Per-service auth policies
      description: |
        Resolved auth policy for every service the controller knows
        about. Each entry includes its category, policy verdict
        (`public` | `protected` | `native`), service id+name, and
        the source of the policy (`contract` | `override`).
      responses:
        "200":
          description: Service policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        service_id:
                          type: string
                          example: sonarr
                        service_name:
                          type: string
                          example: Sonarr
                        category:
                          type: string
                          example: automation
                        policy:
                          type: string
                          enum: [public, protected, native]
                        source:
                          type: string
                          enum: [contract, override]
                      additionalProperties: true
              example:
                services:
                  - service_id: sonarr
                    service_name: Sonarr
                    category: automation
                    policy: protected
                    source: contract
                  - service_id: jellyfin
                    service_name: Jellyfin
                    category: media
                    policy: native
                    source: contract
                  - service_id: authelia
                    service_name: Authelia
                    category: infrastructure
                    policy: public
                    source: contract
                  - service_id: qbittorrent
                    service_name: qBittorrent
                    category: downloads
                    policy: protected
                    source: contract

  # =========================================================================
  # Me (self-service)
  # =========================================================================

  /api/me:
    get:
      operationId: getMe
      tags: [Me]
      summary: Authenticated user's record
      responses:
        "200":
          description: Caller identity + user record
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                authenticated: true
                id: "50c37f20-4984-460f-893b-643d6faddbfe"
                username: admin
                display_name: Administrator
                email: admin@local
                role_slug: superadmin
                source: env-legacy
                last_login_at: ""
                needs_rotation: true

  /api/me/change-password:
    post:
      operationId: changeMyPassword
      tags: [Me]
      summary: Self-service password change
      description: |
        Verify ``current_password`` against the controller user store
        and, on success, hand off to the same ``user_write_service``
        method admins use for ``/api/users/{user_id}/reset-password``
        — which propagates the new password to Authelia synchronously
        and to downstream service admins (Sonarr / Radarr / qBittorrent)
        in the background. Errors are intentionally generic — never
        leak whether the username was unknown or only the old password
        was wrong.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: Operator's current password — re-auth proof.
                new_password:
                  type: string
                  description: New password (>= 8 chars, distinct from current).
              required: [current_password, new_password]
            example:
              current_password: "***"
              new_password: "***"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: current_password did not verify.

  /api/me/mfa-state:
    get:
      operationId: getMyMfaState
      tags: [Me]
      summary: Caller's MFA enrollment state
      x-status: planned
      x-target-release: v1.x-session-visibility
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: MFA state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                enrolled: false
                enrolled_methods: []
                last_used_at: ""
                last_used_method: ""
                required: false
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/me/revoke-others:
    post:
      operationId: revokeMyOtherSessions
      tags: [Me]
      summary: Revoke all of the caller's sessions except the current one
      x-status: planned
      x-target-release: v1.x-session-visibility
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Other sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: integer
              example:
                revoked: 3
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          description: Rate limited

  /api/me/sessions:
    get:
      operationId: getMySessions
      tags: [Me]
      summary: Caller's own active sessions
      x-status: planned
      x-target-release: v1.x-session-visibility
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Active sessions for the caller
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                current_session_id: ""
                sessions: []
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/me/this-wasnt-me:
    post:
      operationId: disownSuspiciousSession
      tags: [Me]
      summary: Caller disowns a session/login flagged by anomaly detection
      x-status: planned
      x-target-release: v1.x-session-visibility
      security:
        - basicAuth: []
        - bearerAuth: []
