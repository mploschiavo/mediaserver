              target: "1.0.207"
      responses:
        "200":
          description: Upgrade accepted or rejected with instructions
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                task_id: "stack-upgrade-2026-04-25-14-30-22"
                target: "1.0.207"
                started_at: "2026-04-25T14:30:22Z"
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/stack/upgrade/{task_id}:
