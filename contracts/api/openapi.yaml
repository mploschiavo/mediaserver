  # =========================================================================
  # Jobs + schedules
  # =========================================================================

  /api/jobs:
    get:
      operationId: listJobs
      tags: [Jobs]
      summary: Discovered jobs + dependency tree + run history
      description: |
        Returns the controller's job catalog. `jobs[]` is the discovered
        job descriptors (handler, phase, priority); `tree` is the
        dependency graph (phase → job ids); `history[]` is the most
        recent runs (success / failure / duration). `count` is the
        cardinality of `jobs[]` for clients that don't want to walk
        the array twice.
      responses:
        "200":
          description: Jobs view
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    description: Discovered job descriptors.
                    items:
                      type: object
                      required: [name, handler, phase]
                      properties:
                        name:
                          type: string
                          example: configure-categories
                        handler:
                          type: string
                          description: Dotted Python path to the handler callable.
                          example: media_stack.services.apps.qbittorrent.configure_categories_job:configure_categories
                        phase:
                          type: string
                          description: Bootstrap phase the job runs in.
                          example: download_clients
                        priority:
                          type: integer
                          description: |
                            Within a phase, jobs run in ascending
                            priority order. Lower runs first.
                          example: 10
                        requires:
                          type: array
                          items:
                            type: string
                          description: Names of jobs that must succeed before this one runs.
                          example: []
                        max_attempts:
                          type: integer
                          nullable: true
                          example: null
                        non_blocking:
                          type: boolean
                          description: |
                            When true a failure does not abort the
                            phase; the controller logs and proceeds.
                          example: false
                        after:
                          type: array
                          items:
                            type: string
                          description: Jobs this one prefers to run after (soft-ordering).
                          example: []
                        label:
                          type: string
                          description: Human-readable label for the operator UI.
                          example: Update download categories
                        service:
                          type: string
                          description: Service the job mutates (used for grouping in the UI).
                          example: qbittorrent
                      additionalProperties: true
                  tree:
                    # Live shape (verified 2026-04-25): array of recursive
                    # JobTreeNode objects. The previous `type: object`
                    # declaration was a v1.0.185-era artifact — the
                    # v1.0.186 fix changed the handler to emit an array
                    # but the schema was never updated. Strict OpenAPI
                    # validators (e.g. spectral, openapi-typescript with
                    # --strict) reject the live response against the
                    # current spec.
                    type: array
                    description: |
                      Recursive dependency tree of jobs. Each node is
                      ``{name, requires, sub_jobs}`` where ``sub_jobs``
                      is itself an array of nodes. Suitable for
                      rendering as a collapsible tree in the UI.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: bootstrap
                        requires:
                          type: array
                          items:
                            type: string
                          example: []
                        sub_jobs:
                          type: array
                          # Recursive — each sub_jobs entry has the same
                          # shape. OpenAPI 3.0 doesn't support strict
                          # recursive refs cleanly, so we declare items
                          # as additionalProperties:true and rely on
                          # consumers to walk recursively.
                          items:
                            type: object
                            additionalProperties: true
                      additionalProperties: true
                  count:
                    type: integer
                    description: Cardinality of `jobs[]`.
                    example: 14
                  history:
                    type: array
                    description: Most recent job runs (newest first).
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [succeeded, failed, cancelled, running]
                        started_at:
                          type: string
                        finished_at:
                          type: string
                        duration_ms:
                          type: integer
                        attempt:
                          type: integer
                        error:
                          type: string
                        source:
                          type: string
                          description: |
                            Who triggered this run. The token before
                            the optional ``:<sub-tag>`` is one of
                            ``cron`` / ``manual`` / ``auto-heal`` /
                            ``scheduler`` / ``unknown``.

                            * ``cron`` — one of the three k8s
                              CronJobs. Sub-tagged with the mode,
                              e.g. ``cron:reconcile``,
                              ``cron:media-server-prewarm``,
                              ``cron:media-hygiene``.
                            * ``manual`` — operator clicked "Run
                              now" via ``POST /actions/{name}``.
                              The ``actor`` field carries the
                              authenticated username.
                            * ``auto-heal`` — controller's recovery
                              cascade reacting to crashloops or
                              post-action failures.
                            * ``scheduler`` — in-process scheduler
                              firing a recurring action.
                            * ``unknown`` — pre-1.0.180 entries on
                              disk plus any call site that didn't
                              classify itself. The reader backfills
                              this default when an entry on disk
                              lacks the ``source`` key.

                            The UI persona-questions agent treats
                            anything matching ``^cron(:|$)`` as a
                            cron run for badge selection.
                          # Permissive head set with optional
                          # colon-separated suffixes — auto-heal in
                          # particular nests guardrail-rule ids
                          # (``auto-heal:guardrail:job:runtime_cap``)
                          # that the earlier two-segment pattern
                          # rejected. Validator now accepts a known
                          # head followed by any colon-delimited tail.
                          pattern: '^(cron|manual|auto-heal|scheduler|unknown)(:[A-Za-z0-9_.:-]+)?$'
                          x-source-heads: [cron, manual, auto-heal, scheduler, unknown]
                          example: cron:reconcile
                        actor:
                          type: string
                          nullable: true
                          description: |
                            Authenticated username when ``source`` is
                            ``manual``. ``null`` for cron / auto-heal /
                            scheduler / unknown runs.
                          example: alice
                      additionalProperties: true
              example:
                jobs:
                  - name: configure-categories
                    handler: media_stack.services.apps.qbittorrent.configure_categories_job:configure_categories
                    phase: download_clients
                    priority: 10
                    requires: []
                    max_attempts: null
                    non_blocking: false
                    after: []
                    label: Update download categories
                    service: qbittorrent
                  - name: configure-arr-clients
                    handler: media_stack.services.apps.servarr.configure_arr_clients_job:configure_arr_clients
                    phase: download_clients
                    priority: 10
                    requires: []
                    max_attempts: null
                    non_blocking: false
                    after: []
                    label: Update download client config
                    service: sonarr
                tree: {}
                count: 2
                history: []

  /api/jobs/running:
    get:
      operationId: getJobsRunning
      tags: [Jobs]
      summary: In-flight jobs / actions / k8s job pods
      description: |
        Aggregates every job, action, scan, or operation the
        controller currently has in-flight. Drives the global
        "things are happening right now" banner and the Jobs page's
        ``CurrentlyRunningCard``.

        Sources combined here:
          1. K8s ``Job`` pods in Active phase (CronJob fires that
             haven't completed yet) — best-effort via the in-cluster
             k8s client. Skipped outside k8s.
          2. ``run_history.get_running_tree()`` — in-flight runs
             grouped parent → children for the
             ``CurrentlyRunningCard``. ADR-0005 Phase 5c.4b/c
             retired the ``ActionRecord``-state branch; the run-
             history tree is the authoritative live view.

        Migrated from the legacy ``elif`` chain in v1.0.21X-era
        ADR-0007 Phase 2 wave 3.
      responses:
        "200":
          description: In-flight aggregator snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  running:
                    type: array
                    description: |
                      Flat list of in-flight items. Each entry has at
                      least ``id`` + ``name`` + ``kind`` (one of
                      ``action`` / ``k8s_job``) plus source-specific
                      metadata (``started_at``, ``elapsed_seconds``,
                      ``triggered_by``, ``active_pods``).
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
                    description: Cardinality of ``running[]``.
                  tree:
                    type: array
                    description: |
                      Recursive parent → child run tree as emitted by
                      ``run_history.get_running_tree``. Empty array
                      if no jobs are running.
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
              example:
                running: []
                count: 0
                tree: []
        "500":
          description: Aggregation failure — partial response is empty.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  running:
                    type: array
                    items:
                      type: object
                  tree:
                    type: array
                    items:
                      type: object

  /api/jobs/queue:
    get:
      operationId: getJobsQueue
      tags: [Jobs]
      summary: Operator-managed pending job queue
      description: |
        Returns the persistent queue of operator-requested work
        (distinct from `/api/jobs/running` for in-flight work and
        `/api/schedules` for cadence-based recurring jobs).
        Each entry survives controller restarts.
      responses:
        "200":
          description: Queue snapshot
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                count: 2
                queue:
                  - id: 1777140000001
                    job_name: refresh-iptv-channels
                    source: manual
                    scheduled_at: 0
                    enqueued_at: 1777139999.5
                    label: refresh-iptv-channels
                  - id: 1777140000002
                    job_name: envoy-config-rebuild
                    source: config-save
                    scheduled_at: 0
                    enqueued_at: 1777140000.1
                    label: envoy-config-rebuild
    post:
      operationId: enqueueJob
      tags: [Jobs]
      summary: Append a new entry to the queue
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_name]
              properties:
                job_name:
                  type: string
                source:
                  type: string
                  default: manual
                scheduled_at:
                  type: number
                  description: |
                    Epoch seconds. `0` (default) means run ASAP.
                    Currently informational only — the dispatcher
                    integration is deferred.
                label:
                  type: string
            example:
              job_name: refresh-iptv-channels
              source: manual
              label: refresh IPTV channels
      responses:
        "200":
          description: Enqueued
        "400":
          $ref: '#/components/responses/BadRequest'

  /api/runs:
    get:
      operationId: listRuns
      tags: [Jobs]
      summary: Per-job-run history with optional filters
      description: |
        Returns the run-history buffer (append-only JSONL persisted at
        ``config/.controller/run-history.jsonl``) with optional filters.
        Replaces the legacy "last 10 runs" view that pulled from the
        batch-level ``job-history.json``. Filters AND together; with no
        filters every record up to ``limit`` is returned.

        Each row carries a ``parent_job_name`` field when its
        ``parent_run_id`` resolves against another row in the buffer —
        the dashboard uses this to render "child-job (under
        parent-name)" without an extra fetch per row. Drives the
        Jobs page's run-history table.
      parameters:
        - in: query
          name: job
          schema:
            type: string
          description: Filter to a single ``job_name``.
        - in: query
          name: parent
          schema:
            type: string
          description: Filter to children of a given ``parent_run_id``.
        - in: query
          name: batch
          schema:
            type: string
          description: Filter to a single ``batch_id``.
        - in: query
          name: since
          schema:
            type: number
          description: Only return runs with ``started_at >= since`` (epoch seconds).
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 50000
          description: Cap on returned records. Clamped server-side.
      responses:
        "200":
          description: Filtered run-history snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
              example:
                runs:
                  - run_id: "run-0001"
                    job_name: "ensure-jellyfin-libraries"
                    status: "ok"
                    started_at: 1777140000.0
                    finished_at: 1777140012.5
                    elapsed_seconds: 12.5
                    parent_run_id: ""
                    batch_id: "batch-001"

  /api/runs/latest/{job_name}:
    get:
      operationId: getLatestRunForJob
      tags: [Jobs]
      summary: Most-recent run record for a given job name
      description: |
        Returns the most-recent ``RunRecord`` for the given job name.
        404 when no runs exist for that job yet. Response shape is
        the flat run record dict with ``parent_job_name`` inlined
        when the parent resolves -- no ``children`` array.
      parameters:
        - in: path
          name: job_name
          required: true
          schema:
            type: string
          example: ensure-jellyfin-libraries
      responses:
        "200":
          description: Most-recent run record for the job.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                run_id: "run-0001"
                job_name: "ensure-jellyfin-libraries"
                status: "ok"
                started_at: 1777140000.0
        "404":
          description: No runs found for that job name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "no runs for 'ensure-jellyfin-libraries'"

  /api/runs/{run_id}:
    get:
      operationId: getRunDetail
      tags: [Jobs]
      summary: Single run record with children inlined
      description: |
        Returns the ``RunRecord`` for the given ``run_id`` with its
        child runs inlined under a ``children`` array. 404 when the
        run-id is not in the JSONL persistence window.
        ``parent_job_name`` is inlined on any row whose parent
        resolves against the current persistence window.
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
          example: run-a1b2c3d4
      responses:
        "200":
          description: Run record with children inlined.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                run_id: "run-0001"
                job_name: "ensure-jellyfin-libraries"
                status: "ok"
                started_at: 1777140000.0
                children: []
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "run 'run-0001' not found"

  /api/orchestrator/promises/state:
    get:
      operationId: getOrchestratorPromisesState
      tags: [Operations]
      summary: Last persisted orchestrator promise-evaluation tick
      description: |
        Read-only snapshot of the orchestrator's most recent
        promise-evaluation tick. Sourced from
        ``.controller/promise_state.json`` plus runtime metadata
        (platform, live_services). Read by ``FreshInstallVerifier``
        (ADR-0004) so the verifier's "did the fresh install work?"
        answer matches the live auto-heal cycle.

        Two non-200 modes both carry ``last_tick_age_seconds`` so the
        verifier can distinguish "no state yet" (saved_at=None) from
        "state is stale" (saved_at present, age > threshold) and back
        off accordingly.
      responses:
        "200":
          description: Persisted tick within the freshness threshold.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                version: 1
                saved_at: 1777140000.0
                last_tick_age_seconds: 12.3
                platform: "k8s"
                live_services: ["sonarr", "radarr"]
                totals:
                  total: 42
                  ok: 40
                  failed_transient: 1
                  failed_permanent: 0
                  skipped_cooldown: 1
                  skipped_platform: 0
                  unknown: 0
                attempts: []
        "503":
          description: |
            Persisted state is missing, malformed, or stale. The body
            still carries ``last_tick_age_seconds`` (or ``None`` if no
            ``saved_at``) so callers can choose to retry without
            reparsing.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/jobs/queue/clear:
    post:
      operationId: clearJobsQueue
      tags: [Jobs]
      summary: Wipe every queued entry (admin escape hatch)
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Cleared

  /api/jobs/queue/{entry_id}/remove:
    post:
      operationId: removeQueueEntry
      tags: [Jobs]
      summary: Drop a queued entry by id
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: entry_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
        "400":
          $ref: '#/components/responses/BadRequest'

  /api/jobs/queue/{entry_id}/reorder:
    post:
      operationId: reorderQueueEntry
      tags: [Jobs]
      summary: Move a queued entry up/down or to an absolute index
      description: |
        Either supply `direction` ("up" or "down" — clamped at the
        ends, no-op rather than error) or `position` (0-based
        absolute index, clamped to `[0, count-1]`).
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: entry_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                direction:
                  type: string
                  enum: [up, down]
                position:
                  type: integer
            example:
              direction: up
      responses:
        "200":
          description: Reordered
        "400":
          $ref: '#/components/responses/BadRequest'

  /api/schedules:
    get:
      operationId: listSchedules
      tags: [Jobs]
      summary: Configured schedules
      responses:
        "200":
          description: Schedules
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                count: 3
                schedules:
                  - id: 1776991803778
                    action: run-media-hygiene
                    label: "Auto-cleanup stalled / orphaned downloads (hourly)"
                    interval_seconds: 3600
                    created_at: 1776991803.7784
                    last_run: 1777136520.8929
                  - id: 1776991803893
                    action: scan-completed-downloads
                    label: "Scan completed downloads into *arr libraries (15m)"
                    interval_seconds: 900
                    created_at: 1776991803.8931
                    last_run: 1777136940.9145
                  - id: 1777106899756
                    action: "media-integrity:scan"
                    label: "Media-integrity status scan (every 15m)"
                    interval_seconds: 900
                    created_at: 1777106899.7565
                    last_run: 1777137060.9163
    post:
      operationId: addSchedule
      tags: [Jobs]
      summary: Add a recurring schedule
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                interval_seconds:
                  type: integer
                label:
                  type: string
                enabled:
                  type: boolean
                  default: true
                  description: |
                    Schedules created with `enabled=false` exist in
                    the catalog but the dispatcher never fires them
                    until `/api/schedules/{id}/resume` flips them on.
            example:
              action: run-media-hygiene
              interval_seconds: 3600
              label: "Auto-cleanup stalled / orphaned downloads (hourly)"
              enabled: true
      responses:
        "200":
          description: Added
        "400":
