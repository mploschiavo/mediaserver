                    url: "http://127.0.0.1:9100/"
                    scheme: http
                    kind: direct-ip
                    needs_dns: false
                gateway:
                  - service: gateway
                    url: "https://apps.media-stack.local/"
                    scheme: https
                    kind: gateway
                    needs_dns: true
                jellyfin:
                  - service: jellyfin
                    url: "https://jellyfin.media-stack.local/"
