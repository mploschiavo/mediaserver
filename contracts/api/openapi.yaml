  /api/services/categories:
    get:
      operationId: listServiceCategories
      tags: [Services]
      summary: Service categories
      description: |
        Returns service categories with their member service IDs. Useful for
        building grouped UI views. Categories are derived from the service
        registry YAML.
      responses:
        "200":
          description: Array of category objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryEntry'
              example:
                - label: Management
                  ids: [sonarr, radarr, lidarr, readarr]
                - label: Downloads
                  ids: [qbittorrent, sabnzbd, prowlarr]
                - label: Media
                  ids: [jellyfin, bazarr, jellyseerr, tautulli]
                - label: Infrastructure
                  ids: [envoy, homepage, controller]

  /api/services/{service_id}/api-key:
    get:
      operationId: getServiceApiKey
      tags: [Services]
      summary: Get API key status for a service
      description: |
        Check whether an API key is configured for a service, and get a
        masked preview. Does not return the full key for security.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/services/sonarr/api-key | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/services/sonarr/api-key")
            info = r.json()
            print(f"Has key: {info['has_key']}, Preview: {info['key_preview']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/services/sonarr/api-key");
            const info = await r.json();
            console.log(`${info.service}: ${info.has_key ? info.key_preview : "no key"}`);
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      responses:
        "200":
          description: API key status
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  env:
                    type: string
                  has_key:
                    type: boolean
                  key_preview:
                    type: string
              example:
                service: sonarr
                env: SONARR_API_KEY
                has_key: true
                key_preview: "a1b2...y8z9"
        "404":
          description: Service not found or has no API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Service 'envoy' not found or has no API key"
    post:
      operationId: setServiceApiKey
      tags: [Services]
      summary: Set or auto-discover a service API key
      description: |
        Manually set an API key for a service, or trigger auto-discovery.

        **Manual set**: provide `api_key` in the request body.

        **Auto-discover**: send an empty body or omit `api_key`. The controller
        will try to read the key from the service's config file, then fall back
        to HTTP-based discovery (e.g., reading `/initialize.js`).

        The discovered/set key is persisted to the environment and K8s secret.
      x-codeSamples:
        - lang: curl
          label: "cURL (auto-discover)"
          source: |
            # Auto-discover key from service config file
            curl -X POST http://localhost:9100/api/services/sonarr/api-key \
              -u admin:password
        - lang: curl
          label: "cURL (manual set)"
          source: |
            # Manually set a known key
            curl -X POST http://localhost:9100/api/services/sonarr/api-key \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"api_key": "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"}'
        - lang: Python
          label: Python
          source: |
            import requests
            # Auto-discover
            r = requests.post(
                "http://localhost:9100/api/services/sonarr/api-key",
                auth=("admin", "password"),
            )
            print(r.json())
            # {"status": "discovered", "service": "sonarr", "source": "config_file"}
        - lang: JavaScript
          label: JavaScript
          source: |
            // Manual set
            const r = await fetch("http://localhost:9100/api/services/sonarr/api-key", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ api_key: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4" }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                  description: API key to set. Omit for auto-discovery.
            example:
              api_key: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      responses:
        "200":
          description: Key set or discovered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [set, discovered]
                  service:
                    type: string
                  env:
                    type: string
                  source:
                    type: string
                    description: Only present for auto-discovery
              examples:
                manual:
                  summary: Manually set
                  value:
                    status: set
                    service: sonarr
                    env: SONARR_API_KEY
                autodiscovered:
                  summary: Auto-discovered from config file
                  value:
                    status: discovered
                    service: sonarr
                    source: config_file
        "404":
          description: Service not found or key could not be discovered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Content
  # =========================================================================

  /api/versions:
    get:
      operationId: getVersions
      tags: [Content]
      summary: Service version strings
      description: |
        Fetches version strings from all arr apps, Jellyfin, and Bazarr.
        Cached for 5 minutes. Useful for inventory and update tracking.
      responses:
        "200":
          description: Map of service names to version strings
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: object
                    additionalProperties:
                      type: string
              example:
                versions:
                  sonarr: "4.0.14.2939"
                  radarr: "5.19.3.9730"
                  lidarr: "2.9.6.4552"
                  prowlarr: "1.31.2.4975"
                  jellyfin: "10.10.6"
                  bazarr: "1.5.6"

  /api/downloads:
    get:
      operationId: getDownloads
      tags: [Content]
      summary: Active downloads
      description: |
        Returns active downloads from qBittorrent (torrents) and SABnzbd
        (usenet). Includes download name, progress percentage, speed, and
        state. Limited to 10 items per client.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/downloads | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/downloads")
            dl = r.json()
            for item in dl.get("qbittorrent", {}).get("items", []):
                pct = item["progress"]
                speed_mb = item["dlspeed"] / 1_000_000
                print(f"  {item['name']}: {pct:.1f}% @ {speed_mb:.1f} MB/s")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/downloads");
            const dl = await r.json();
            dl.qbittorrent?.items?.forEach(i =>
              console.log(`${i.name}: ${i.progress}%`)
            );
      responses:
        "200":
          description: Active downloads from all clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  qbittorrent:
                    type: object
                    properties:
                      active:
                        type: integer
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            progress:
                              type: number
                            state:
                              type: string
                            size:
                              type: integer
                            dlspeed:
                              type: integer
                      error:
                        type: string
                  sabnzbd:
                    type: object
                    properties:
                      active:
                        type: integer
                      speed:
                        type: string
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            progress:
                              type: number
                      error:
                        type: string
                  # NZBGet client — same shape as sabnzbd. Emitted
                  # whenever the deploy includes the nzbget service.
                  # The dashboard's DownloadsCard fans out across
                  # qbittorrent, sabnzbd, AND nzbget; missing this
                  # property left the column empty.
                  nzbget:
                    type: object
                    properties:
                      active:
                        type: integer
                      speed:
                        type: string
                      items:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      error:
                        type: string
                    additionalProperties: true
              example:
                qbittorrent:
                  active: 3
                  items:
                    - name: "The.Last.of.Us.S02E01.1080p.WEB-DL"
                      progress: 67.3
                      state: downloading
                      size: 4200000000
                      dlspeed: 12500000
                    - name: "Oppenheimer.2023.2160p.BluRay.REMUX"
                      progress: 23.1
                      state: downloading
                      size: 78500000000
                      dlspeed: 8750000
                    - name: "Dune.Part.Two.2024.1080p.BluRay"
                      progress: 100.0
                      state: seeding
                      size: 15600000000
                      dlspeed: 0
                sabnzbd:
                  active: 1
                  speed: "15000 KB/s"
                  items:
                    - name: "Shogun.S01.Complete.1080p.NZB"
                      progress: 45.2

  /api/stats:
    get:
      operationId: getStats
      tags: [Content]
      summary: Library counts
      description: |
        Returns the number of items (series, movies, artists, books) in
        each arr app library. Cached for 60 seconds.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/stats | jq .stats
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/stats")
            for svc, info in r.json()["stats"].items():
                print(f"  {svc}: {info['count']} {info['label']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/stats");
            const { stats } = await r.json();
            Object.entries(stats).forEach(([svc, info]) =>
              console.log(`${svc}: ${info.count} ${info.label}`)
            );
      responses:
        "200":
          description: Per-service library counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        count:
                          type: integer
                        label:
                          type: string
                        error:
                          type: string
              example:
                stats:
                  sonarr:
                    count: 142
                    label: series
                  radarr:
                    count: 891
                    label: movies
                  lidarr:
                    count: 67
                    label: artists
                  readarr:
                    count: 23
                    label: books

  /api/indexers:
    get:
      operationId: getIndexers
      tags: [Content]
      summary: Prowlarr indexer list
      description: |
        Returns all indexers configured in Prowlarr with their enabled/disabled
        status and protocol (torrent/usenet).
      responses:
        "200":
          description: Indexer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  indexers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        enable:
                          type: boolean
                        protocol:
                          type: string
                  total:
                    type: integer
                  enabled:
                    type: integer
              example:
                indexers:
                  - id: 1
                    name: "1337x"
                    enable: true
                    protocol: torrent
                  - id: 2
                    name: "NZBgeek"
                    enable: true
                    protocol: usenet
                total: 12
                enabled: 10

  /api/indexer-stats:
    get:
      operationId: getIndexerStats
      tags: [Content]
      summary: Prowlarr indexer performance stats
      description: |
        Returns query/grab/failure counts per indexer from Prowlarr's
        statistics API. Useful for identifying underperforming indexers.
      responses:
        "200":
          description: Indexer statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: array
                    items:
                      type: object

  /api/download-history:
    get:
      operationId: getDownloadHistory
      tags: [Content]
      summary: Recent download history
      description: |
        Fetches the 10 most recent download history entries from Sonarr and
        Radarr. Includes title, event type (grabbed/imported/failed), and
        date.
      responses:
        "200":
          description: Download history per service
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          title:
                            type: string
                          event:
                            type: string
                          date:
                            type: string
              example:
                history:
                  sonarr:
                    - title: "Breaking Bad S05E16"
                      event: downloadFolderImported
                      date: "2026-04-07T10:30:00"
                  radarr:
                    - title: "Inception (2010)"
                      event: grabbed
                      date: "2026-04-07T09:15:00"

  /api/quality-profiles:
    get:
      operationId: getQualityProfiles
      tags: [Content]
      summary: Quality profiles
      description: |
        Returns quality profiles configured in Sonarr and Radarr. Useful for
        displaying available quality tiers or building import list UIs.
      responses:
        "200":
          description: Quality profiles per service
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
              example:
                profiles:
                  sonarr:
                    - id: 1
                      name: "HD-1080p"
                    - id: 4
                      name: "Ultra-HD"
                  radarr:
                    - id: 1
                      name: "HD-1080p"

  /api/import-lists:
    get:
      operationId: getImportLists
      tags: [Content]
      summary: Import/discovery lists
      description: |
        Returns import lists (automatic discovery lists) configured in Sonarr
        and Radarr. Shows list name, type, and auto-add status.
      responses:
        "200":
          description: Import lists per service
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          # `enabled` is null in arr APIs when the list
                          # exists but the operator hasn't toggled it
                          # either way (factory default). UI maps null
                          # → "indeterminate" tri-state checkbox.
                          enabled:
                            type: boolean
                            nullable: true
                          listType:
                            type: string
              example:
                lists:
                  sonarr:
                    - id: 1
                      name: "Trakt Popular"
                      enabled: true
                      listType: trakt
                  radarr:
                    - id: 1
                      name: "IMDb Top 250"
                      enabled: true
                      listType: imdb

  /api/libraries:
    get:
      operationId: getJellyfinLibraries
      tags: [Content]
      summary: Jellyfin libraries (live + configured)
      description: |
        Returns the configured library set (always present, sourced from
        the bootstrap profile or persisted overrides) plus the live
        virtual-folder list pulled from Jellyfin when reachable.

        `live[]` is non-empty only after Jellyfin has been bootstrapped
        and the controller can reach its REST API; consumers should fall
        back to `configured[]` for tile counts and library names.
      responses:
        "200":
          description: Jellyfin library list
          content:
            application/json:
              schema:
                type: object
                properties:
                  live:
                    type: array
                    description: |
                      Virtual folders reported by the live Jellyfin
                      instance. Empty until Jellyfin is reachable.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        collection_type:
                          type: string
                        paths:
                          type: array
                          items:
                            type: string
                        item_count:
                          type: integer
                      additionalProperties: true
                  configured:
                    type: array
                    description: |
                      Libraries declared by the controller's profile or
                      a previous POST to this endpoint. Always populated.
                    items:
                      type: object
                      required: [name, collection_type, paths]
                      properties:
                        name:
                          type: string
                          example: Movies
                        collection_type:
                          type: string
                          enum: [movies, tvshows, music, books, mixed, homevideos, musicvideos, photos, livetv]
                          example: movies
                        paths:
                          type: array
                          items:
                            type: string
                          example: ["/media/movies"]
                  source:
                    type: string
                    description: |
                      Where the dashboard should consider authoritative.
                      ``live`` when Jellyfin returned libraries (the
                      common steady state — UI's
                      LibraryDataSourceBanner stays hidden); otherwise
                      passthrough of the configured-libraries source:
                      ``defaults`` (built-in profile), ``profile``
                      (operator-edited), or ``persisted`` (POST
                      overrides).
                    enum: [live, defaults, profile, persisted]
                    example: live
                  media_server:
                    type: string
                    description: Which media server this library set targets.
                    enum: [jellyfin, emby, plex]
                    example: jellyfin
              example:
                live: []
                configured:
                  - name: Movies
                    collection_type: movies
                    paths: ["/media/movies"]
                  - name: TV Shows
                    collection_type: tvshows
                    paths: ["/media/tv"]
                  - name: Music
                    collection_type: music
                    paths: ["/media/music"]
                  - name: Books
                    collection_type: books
                    paths: ["/media/books"]
                source: defaults
                media_server: jellyfin
    post:
      operationId: updateLibraries
      tags: [Config]
      summary: Update configured libraries
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/recent:
    get:
      operationId: getRecent
      tags: [Content]
      summary: Recently added items (per *arr service)
      description: |
        Returns the most recently added items from each *arr service the
        controller is aware of. The top-level `recent` key maps a service
        identifier (`radarr`, `sonarr`, `lidarr`, `readarr`) to the
        service-specific list. Empty arrays appear for services that are
        configured but currently quiet; missing services were never
        configured.

        Each item carries at minimum `{title, added}`. The `added` field
        is best-effort: some controller variants emit an empty string
        when the upstream timestamp is unknown.
      responses:
        "200":
          description: Recently added items per service
          content:
            application/json:
              schema:
                type: object
                required: [recent]
                properties:
                  recent:
                    type: object
                    description: |
                      Service-keyed map. Known keys are `radarr`,
                      `sonarr`, `lidarr`, `readarr` — additional keys
                      may appear for newer *arr integrations.
                    properties:
                      radarr:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecentMediaItem'
                      sonarr:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecentMediaItem'
                      lidarr:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecentMediaItem'
                      readarr:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecentMediaItem'
                    additionalProperties:
                      type: array
                      items:
                        $ref: '#/components/schemas/RecentMediaItem'
              example:
                recent:
                  radarr:
                    - title: "The Super Mario Galaxy Movie"
                      added: ""
                    - title: "Your Heart Will Be Broken"
                      added: ""
                    - title: "Vengeance"
                      added: ""
                    - title: "Project Hail Mary"
                      added: ""
                    - title: "The Mortuary Assistant"
                      added: ""
                  sonarr:
                    - title: "Breaking Bad"
                      added: ""
                    - title: "Stranger Things"
                      added: ""
                    - title: "The Last of Us"
                      added: ""
                    - title: "The Boys"
                      added: ""
                    - title: "Severance"
                      added: ""

  # =========================================================================
  # Keys
  # =========================================================================

  /api/keys:
    get:
      operationId: getKeys
      tags: [Security]
      summary: All API keys and admin credentials
      description: |
        Returns all discovered API keys for managed services and the admin
        credentials. Keys are discovered from environment variables, config
        files, or HTTP fallback in that priority order.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/keys | jq '.keys'
        - lang: Python
          source: |
            import urllib.request, json
            r = urllib.request.urlopen("http://localhost:9100/api/keys")
            data = json.loads(r.read())
            for svc, key in data["keys"].items():
                print(f"{svc}: {key}")
      responses:
        '200':
          description: Discovered API keys and admin credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: object
                    description: |
                      Map of service id → discovered-key envelope.
                      Each entry hides the raw secret behind a
                      ``fingerprint`` (first 4 + last 4 chars), with
                      ``has_key`` for presence and ``source`` for the
                      origin (env / config-file / discovered).
                      Earlier ``additionalProperties: string`` was a
                      v0.x shape; the live response stopped emitting
                      raw strings to avoid leaking keys into logs.
                    additionalProperties:
                      type: object
                      properties:
                        fingerprint:
                          type: string
                          description: Truncated visual hint (e.g. "7e8a…2c24"). Never the full key.
                          example: "7e8a…2c24"
                        has_key:
                          type: boolean
                        source:
                          type: string
                          enum: [env, config-file, discovered, none]
                      additionalProperties: true
                    example:
                      sonarr: { fingerprint: "abcd…ef01", has_key: true, source: discovered }
                      radarr: { fingerprint: "f7d9…f611", has_key: true, source: discovered }
                  admin:
                    type: object
                    properties:
                      username:
                        type: string
                        example: admin
                      # `password_set: bool` replaces the raw `password`
                      # field on the live shape. Same redaction
                      # rationale — never emit the secret.
                      password_set:
                        type: boolean
                  count:
                    type: integer
                    description: Number of keys discovered
                    example: 10

  # =========================================================================
  # Disk
  # =========================================================================

  /api/disk:
    get:
      operationId: getDisk
      tags: [Disk]
      summary: Disk usage and guardrails
      description: |
        Returns disk usage for config, media, torrent, and usenet volumes,
        along with the current guardrail configuration (automatic cleanup
        thresholds). Detects filesystem type and warns about RAM-backed
        filesystems.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/disk | jq '.disk.media.percent_used'
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/disk")
            disk = r.json()
            for name, info in disk["disk"].items():
                free_gb = info["free_bytes"] / (1024**3)
                print(f"  {name}: {info['percent_used']:.1f}% used ({free_gb:.0f} GB free)")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/disk");
            const { disk, guardrails } = await r.json();
            Object.entries(disk).forEach(([name, info]) =>
              console.log(`${name}: ${info.percent_used}% used`)
            );
            console.log(`Guardrails: ${guardrails.enabled ? "ON" : "OFF"}`);
      responses:
        "200":
          description: Disk usage and guardrail config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiskInfo'
              example:
                disk:
                  config:
                    path: /srv-config
                    total_bytes: 107374182400
                    used_bytes: 2147483648
                    free_bytes: 105226698752
                    percent_used: 2.0
                  media:
                    path: /srv-stack/media
                    total_bytes: 2199023255552
                    used_bytes: 1429365116108
                    free_bytes: 769658139444
                    percent_used: 65.0
                guardrails:
                  enabled: true
                  max_used_percent: 65
                  target_used_percent: 58
                  monitor_path: ""
                  qbit_cleanup:
                    enabled: true
                    min_completion_age_hours: 36
                    min_ratio: 1.0
                    min_seeding_time_minutes: 720
                    max_delete_per_run: 80
                    delete_files: true
                    categories: []

  /api/cleanup-preview:
    get:
      operationId: getCleanupPreview
      tags: [Disk]
      summary: Preview guardrail cleanup
      description: |
        Dry-run preview of which completed torrents would be deleted by the
        disk guardrail cleanup policy. Shows each candidate with name, size,
        age, ratio, and seeding time. Also indicates whether the disk is
        currently over the threshold.
      responses:
        "200":
          description: Cleanup preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        category:
                          type: string
                        age_hours:
                          type: number
                        ratio:
                          type: number
                        seed_minutes:
                          type: integer
                  total_candidates:
                    type: integer
                  over_threshold:
                    type: boolean
                  max_used_percent:
                    type: number
                  would_trigger:
                    type: boolean
                  # Human-readable summary the dashboard renders
                  # under the candidates table ("would clean N
                  # candidates totalling X GB"). Always present —
                  # even when there are no candidates.
                  message:
                    type: string
              example:
                candidates:
                  - name: "Old.Torrent.Name"
                    size: 4200000000
                    category: movies
                    age_hours: 120.5
                    ratio: 2.15
                    seed_minutes: 8640
                total_candidates: 15
                over_threshold: true
                max_used_percent: 65
                would_trigger: true

  /api/guardrails:
    get:
      operationId: listGuardrails
      tags: [Guardrails]
      summary: Cross-domain guardrail registry
      description: >-
        Returns every registered guardrail with its current threshold,
        last evaluation status, and last-fire timestamp. Domains:
        storage, bandwidth, external_api, media_quality, job_health,
        auth, dependency, cost.
      responses:
        "200":
          description: Guardrail registry snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  guardrails:
                    type: array
                    items:
                      $ref: '#/components/schemas/Guardrail'
    post:
      operationId: updateGuardrails
      tags: [Disk]
      summary: Update guardrail settings
      description: |
        Update disk guardrail thresholds and qBittorrent cleanup policy in the
        bootstrap config. Changes are persisted to the config JSON file.

        Top-level keys: `enabled`, `max_used_percent`, `target_used_percent`,
        `monitor_path`.

        qBittorrent cleanup keys (prefix with `qbit_`): `qbit_enabled`,
        `qbit_min_completion_age_hours`, `qbit_min_ratio`,
        `qbit_min_seeding_time_minutes`, `qbit_max_delete_per_run`,
        `qbit_delete_files`.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                max_used_percent:
                  type: number
                target_used_percent:
                  type: number
                monitor_path:
                  type: string
                qbit_enabled:
                  type: boolean
                qbit_min_completion_age_hours:
                  type: number
                qbit_min_ratio:
                  type: number
                qbit_min_seeding_time_minutes:
                  type: integer
                qbit_max_delete_per_run:
                  type: integer
                qbit_delete_files:
                  type: boolean
            example:
              enabled: true
              max_used_percent: 70
              qbit_min_ratio: 1.5
      responses:
        "200":
          description: Guardrail update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [updated, no_changes]
                  changed:
                    type: array
                    items:
                      type: string
              example:
                status: updated
                changed: [max_used_percent, qbit_min_ratio]
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/guardrails/config:
    post:
      operationId: setGuardrailsEvaluationCadence
      tags: [Guardrails]
      summary: Set the cross-domain guardrail evaluation cadence
      description: |
        Operator override for how often the cross-domain guardrail
        evaluation loop runs. Persists for the controller process'
        lifetime via ``MEDIA_STACK_GUARDRAIL_INTERVAL_SECONDS``.
        Floor 30s, ceiling 86400s (24h).
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [evaluation_interval_seconds]
              properties:
                evaluation_interval_seconds:
                  type: integer
                  minimum: 30
                  maximum: 86400
            example:
              evaluation_interval_seconds: 300
      responses:
        "200":
          description: New cadence accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluation_interval_seconds:
                    type: integer
              example:
                evaluation_interval_seconds: 300
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Disk-guardrails (ADR-0008 Phase 2)
  # =========================================================================

  /api/disk-guardrails:
    get:
      operationId: getDiskGuardrailsStatus
      tags: [Guardrails]
      summary: Disk-guardrails merged status view
      description: |
        Returns the current lockdown state, registry-resolved
        thresholds, per-mount used-percent snapshot, paused-client
        list, last per-client failures, and a recent-transitions
        feed pulled from the audit log. Read-only; admits any
        authenticated user.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/disk-guardrails | jq .
      responses:
        "200":
          description: Disk-guardrails status snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum: [NORMAL, AUTO_LOCKDOWN, MANUAL_LOCKDOWN]
                  used_percent_by_mount:
                    type: object
                    additionalProperties:
                      type: number
                  thresholds:
                    type: object
                    additionalProperties: true
                  engaged_at:
                    type: number
                  engaged_by:
                    type: string
                  trigger:
                    type: string
                    nullable: true
                  auto_check_paused_until:
                    type: number
                    nullable: true
                  paused_clients:
                    type: array
                    items:
                      type: string
                  last_failures:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  transitions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                state: NORMAL
                used_percent_by_mount:
                  config: 42.1
                  data: 65.8
                thresholds:
                  lockdown_percent: 75
                  release_percent: 60
                engaged_at: 0
                engaged_by: ""
                trigger: null
                auto_check_paused_until: null
                paused_clients: []
                last_failures: []
                transitions: []

  /api/disk-guardrails/cleanup:
    post:
      operationId: runDiskGuardrailsCleanup
      tags: [Guardrails]
      summary: Run cleanup synchronously (force, ignores disk %)
      description: |
        Invokes ``DiskGuardrailsService.enforce(force=True)``
        synchronously. Body fields are optional one-shot overrides
        for the configured ``categories`` / ``max_delete_per_run``
        knobs. Requires CSRF (header ``X-CSRF-Token``) and
        ``controller_admin`` role.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items:
                    type: string
                max_delete:
                  type: integer
            example:
              categories: [tv-sonarr, movies-radarr]
              max_delete: 25
      responses:
        "200":
          description: Cleanup report
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  freed_gb:
                    type: number
                  kept:
                    type: integer
                  candidates_evaluated:
                    type: integer
                  strategy:
                    type: string
              example:
                deleted: 14
                freed_gb: 32.5
                kept: 0
                candidates_evaluated: 14
                strategy: oldest_first
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  /api/disk-guardrails/lockdown:
    post:
      operationId: engageDiskGuardrailsLockdown
      tags: [Guardrails]
      summary: Engage manual download-client lockdown
      description: |
        Pauses every download client (qBittorrent + SABnzbd + arr
        RSS-sync). ``trigger`` is recorded as ``"manual"`` so the
        auto-loop never auto-releases. Requires CSRF + admin role.
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Engaged
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum: [MANUAL_LOCKDOWN]
                  paused_clients:
                    type: array
                    items:
                      type: string
                  failures:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                state: MANUAL_LOCKDOWN
                paused_clients: [qbittorrent, sabnzbd, sonarr, radarr]
                failures: []
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  /api/disk-guardrails/release:
    post:
      operationId: releaseDiskGuardrailsLockdown
      tags: [Guardrails]
      summary: Release lockdown
      description: |
        Resumes previously-paused download clients. Safe to call
        when no lockdown is engaged (returns the same envelope
        with an empty released_clients list). Requires CSRF +
        admin role.
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum: [NORMAL]
                  released_clients:
                    type: array
                    items:
                      type: string
              example:
                state: NORMAL
                released_clients: [qbittorrent, sabnzbd]
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  /api/disk-guardrails/pause-auto:
    post:
      operationId: pauseDiskGuardrailsAutoEvaluation
      tags: [Guardrails]
      summary: Pause auto-evaluation for N hours (1-24)
      description: |
        Sets the lockdown rule's auto-side TTL bypass. While the
        TTL is active, the rule's evaluate() short-circuits to None
        so AUTO-side engages stop firing. Already-paused clients
        stay paused. ``hours`` is the only query parameter; values
        below 1 are rejected with 400; values above 24 are clamped
        server-side to 24. Requires CSRF + admin role.
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: hours
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 24
      responses:
        "200":
          description: TTL set
          content:
            application/json:
              schema:
                type: object
                properties:
                  paused_until:
                    type: number
                    nullable: true
                  hours:
                    type: integer
              example:
                paused_until: 1746463600.0
                hours: 1
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  /api/disk-guardrails/evaluate:
    post:
      operationId: evaluateDiskGuardrails
      tags: [Guardrails]
      summary: Force one immediate guardrail tick
      description: |
        Bypasses the cadence floor and runs one evaluate cycle
        right now. Useful after a manual cleanup ("I just freed
        50 GB, release the lockdown now"). Returns the same
        ``triggers`` / ``actions`` shape the auto-loop emits but
        does NOT write a history row (the audit-log row for the
        manual evaluate IS recorded). Requires CSRF + admin role.
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Evaluation snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ran_at:
                    type: number
                  elapsed:
                    type: number
                  triggers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  actions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
              example:
                ran_at: 1746463600.5
                elapsed: 0.012
                triggers: []
                actions: []
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  /api/disk-guardrails/cleanup-policy:
    post:
      operationId: updateDiskGuardrailsCleanupPolicy
      tags: [Guardrails]
      summary: Persist cleanup-policy overrides (Phase 4)
      description: |
        Writes the on-disk cleanup-policy override file consumed by
        ``DiskGuardrailsService.enforce()``. Every body field is
        optional; the file is a selective overlay over the controller
        defaults at ``cfg["disk_guardrails"]["qbit_cleanup"]``.

        ``order_strategy`` must be one of the four canonical names
        (``oldest_first``, ``largest_first``, ``poor_ratio_first``,
        ``watched_first``). Numeric fields must be positive;
        ``max_delete_per_run`` is server-side capped at 1000.
        Requires CSRF + admin role.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items:
                    type: string
                min_completion_age_hours:
                  type: integer
                  minimum: 0
                min_seeding_time_minutes:
                  type: integer
                  minimum: 0
                min_ratio:
                  type: number
                  minimum: 0
                max_delete_per_run:
                  type: integer
                  minimum: 1
                  maximum: 1000
                order_strategy:
                  type: string
                  enum:
                    - oldest_first
                    - largest_first
                    - poor_ratio_first
                    - watched_first
            example:
              categories: [tv, movies]
              min_completion_age_hours: 24
              min_seeding_time_minutes: 480
              min_ratio: 1.0
              max_delete_per_run: 100
              order_strategy: largest_first
      responses:
        "200":
          description: Policy persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    type: object
                    additionalProperties: true
              example:
                policy:
                  categories: [tv, movies]
                  min_completion_age_hours: 24
                  order_strategy: largest_first
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: CSRF token missing or admin role required

  # =========================================================================
  # Routing
  # =========================================================================

  /api/routing:
    get:
      operationId: getRouting
      tags: [Routing]
      summary: Get routing configuration
      description: |
        Returns the current Envoy gateway routing configuration. Values come
        from the bootstrap profile YAML, overlaid with any persisted runtime
        overrides from previous POST requests.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/routing | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/routing")
            routing = r.json()
            print(f"Gateway: {routing['gateway_host']}:{routing['gateway_port']}")
            print(f"Strategy: {routing['strategy']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/routing");
            const routing = await r.json();
            console.log(`${routing.strategy} routing on ${routing.gateway_host}`);
      responses:
        "200":
          description: Current routing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingConfig'
              example:
                base_domain: io
                stack_subdomain: iomio
                gateway_host: m.iomio.io
                gateway_port: 443
                app_path_prefix: /app
                strategy: hybrid
                scheme: ""
                internet_exposed: true
                direct_hosts:
                  media_server: jf.iomio.io
                  auth: auth.iomio.io
    post:
      operationId: updateRouting
      tags: [Routing]
      summary: Update routing configuration
      description: |
        Update the Envoy routing configuration. Changes are persisted to both
        the routing overrides file and the profile YAML. Automatically triggers
        an `envoy-config` action to regenerate the Envoy configuration.

        The controller auto-syncs related fields: changing `stack_subdomain` or
        `base_domain` updates `gateway_host`, and vice versa.

        Allowed keys: `base_domain`, `stack_subdomain`, `gateway_host`,
        `gateway_port`, `app_path_prefix`, `strategy`, `internet_exposed`,
        `direct_hosts`.

        `direct_hosts` is a per-role hostname map (e.g.
        `{"media_server": "jf.example.com", "auth": "auth.example.com"}`).
        Sub-keys are merged into the existing config — set a sub-key to
        an empty string to clear that one role without touching the
        others. Well-known roles: `media_server` (resolves via
        `technology_bindings` to jellyfin/plex/emby), `auth` (resolves
        to the configured auth provider). Any other key is treated as
        a literal service id.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/api/routing \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"base_domain": "home.lan", "strategy": "path"}'
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.post(
                "http://localhost:9100/api/routing",
                json={"base_domain": "home.lan", "strategy": "path"},
                auth=("admin", "password"),
            )
            result = r.json()
            print(f"Changed: {result['changed']}")
            print(f"New gateway: {result['routing']['gateway_host']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/routing", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ base_domain: "home.lan", strategy: "path" }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                base_domain:
                  type: string
                stack_subdomain:
                  type: string
                gateway_host:
                  type: string
                gateway_port:
                  type: integer
                app_path_prefix:
                  type: string
                strategy:
                  type: string
                  enum: [hybrid, subdomain, path]
                internet_exposed:
                  type: boolean
                direct_hosts:
                  type: object
                  description: |
                    Per-role hostname overrides. Sub-keys are merged into
                    the existing direct_hosts config; pass an empty string
                    to clear a role without affecting the others.
                  additionalProperties:
                    type: string
                  example:
                    media_server: jf.iomio.io
                    auth: auth.iomio.io
            example:
              base_domain: home.lan
              strategy: path
              direct_hosts:
                media_server: jf.home.lan
      responses:
        "200":
          description: Routing update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [updated, no_changes]
                  persisted_to:
                    type: string
                  changed:
                    type: array
                    items:
                      type: string
                  routing:
                    $ref: '#/components/schemas/RoutingConfig'
              example:
                status: updated
                persisted_to: /srv-config/.controller/routing-overrides.yaml
                changed: [base_domain, gateway_host]
                routing:
                  base_domain: home.lan
                  stack_subdomain: media-stack
                  gateway_host: apps.media-stack.home.lan
                  gateway_port: 80
                  app_path_prefix: /app
                  strategy: path
                  internet_exposed: false
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/routing/v2:
    get:
      operationId: getRoutingV2
      tags: [Routing]
      summary: Get routing configuration in v2 schema
      description: |
        Returns the v1 routing dict migrated through ``migrate_v1_to_v2``
        into the structured v2 shape (hosts[], path_aliases[], apex,
        catch_all, defaults, ...) plus a sibling ``validation`` array of
        non-blocking VR-* errors. Read-only in PR-4 of the routing
        redesign; PR-5 adds POST + apply.
      responses:
        "200":
          description: Routing v2 config + validation errors
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  config:
                    type: object
                    additionalProperties: true
                  validation:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "500":
          description: Migration / validation pipeline failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      operationId: updateRoutingV2
      tags: [Routing]
      summary: Apply a partial v2 routing-config update
      description: |
        Accepts a partial ``RoutingConfigV2`` dict; deep-merges with the
        current config (read via ``migrate_v1_to_v2``), validates against
        the active service registry, and persists. v2-only fields
        (``hosts``, ``path_aliases``, ``apex``, ``catch_all``,
        ``defaults``, ``exposure``, ``certs``) write directly to the
        overrides file; v1-compat fields (``gateway_host``, ``strategy``,
        etc.) also flow through ``update_routing`` so the legacy Envoy
        generator picks them up.

        Returns 422 with a ``validation`` array when any VR-* rule
        fails; the overrides file is NOT written in that case.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Update applied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  status:
                    type: string
                    enum: [ok]
                  config:
                    type: object
                    additionalProperties: true
                  v1_legacy_result:
                    type: object
                    additionalProperties: true
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [validation_failed]
                  validation:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "500":
          description: Pipeline drift
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/routing/routes:
    get:
      operationId: getRoutingRoutes
      tags: [Routing]
      summary: Operator-facing route table
      description: |
        Enumerates every URL the gateway emits - per-service path-prefix
        routes, per-service subdomain routes, path aliases, the apex
        action, and the catch-all - flattened into rows with
        ``host``/``match``/``target``/``kind``/``source`` so the
        Routing tab can render a sortable table.
      responses:
        "200":
          description: Flat route table + summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  rows:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  summary:
                    type: object
                    additionalProperties: true
        "500":
          description: Route enumeration failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/routing/preview:
    get:
      operationId: getRoutingPreview
      tags: [Routing]
      summary: Preview generated Envoy + binding plan
      description: |
        Pure-function preview of the Envoy ``route_config`` plus the
        active ``EdgeBindingAdapter``'s ``ApplyPlan`` for the *current*
        v2 config. No body, no mutation - operators see what would get
        applied without touching the cluster.
      responses:
        "200":
          description: Envoy route_config + binding plan
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  envoy:
                    type: object
                    additionalProperties: true
                  binding:
                    type: object
                    additionalProperties: true
        "500":
          description: Preview generation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/routing/effective:
    get:
      operationId: getRoutingEffective
      tags: [Routing]
      summary: Routing config with defaults merged into hosts
      description: |
        Same shape as ``/api/routing/v2`` but with ``defaults`` merged
        into each host's per-field knobs, so the UI shows what Envoy
        actually sees instead of the operator-facing "inherited"
        placeholders. Read-only.
      responses:
        "200":
          description: Effective routing config
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                    additionalProperties: true
        "500":
          description: Effective-config materialisation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # =========================================================================
  # Security
  # =========================================================================

  /api/rotate-keys:
    post:
      operationId: rotateKeys
      tags: [Security]
      summary: Rotate API keys
      description: |
        Regenerate API keys for all services (or a targeted subset). For
        file-based services (arr apps, SABnzbd, Bazarr), generates a new
        UUID key and writes it to the config file. For Jellyfin, creates a
        new key via the Jellyfin API. Services with rotated file-based keys
        are automatically restarted.

        Keys are persisted to the K8s secret (if running in Kubernetes) and
        to environment variables.
      x-codeSamples:
        - lang: curl
          label: "cURL (all services)"
          source: |
            curl -X POST http://localhost:9100/api/rotate-keys \
              -u admin:password
        - lang: curl
          label: "cURL (targeted)"
          source: |
            curl -X POST http://localhost:9100/api/rotate-keys \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"services": ["sonarr", "radarr"]}'
        - lang: Python
          label: Python
          source: |
            import requests
            # Rotate only Sonarr and Radarr keys
            r = requests.post(
                "http://localhost:9100/api/rotate-keys",
                json={"services": ["sonarr", "radarr"]},
                auth=("admin", "password"),
            )
            result = r.json()
            print(f"Rotated: {result['keys']}")
            print(f"Restarted: {result['restarted']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/rotate-keys", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ services: ["sonarr", "radarr"] }),
            });
            const result = await r.json();
            console.log("Rotated:", result.keys);
            console.log("Restarted:", result.restarted);
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                services:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional list of service IDs to target. Omit to rotate all.
            example:
              services: [sonarr, radarr]
      responses:
        "200":
          description: Key rotation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [rotated]
                  keys:
                    type: array
                    items:
                      type: string
                    description: List of env var names that were rotated
                  errors:
                    type: array
                    items:
                      type: string
                  restarted:
                    type: array
                    items:
                      type: string
              example:
                status: rotated
                keys: [SONARR_API_KEY, RADARR_API_KEY, PROWLARR_API_KEY]
                errors: []
                restarted: [sonarr, radarr, prowlarr]
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/reset-password:
    post:
      operationId: resetPassword
      tags: [Security]
      summary: Reset admin password across services
      description: |
        Changes the admin password on all services that support it (or a
        targeted subset). Handles each service's unique password change
        mechanism:

        - **qBittorrent**: form-based login + preferences API
        - **Jellyfin**: user password API (auto-discovers API key and user ID)
        - **Arr apps** (Sonarr, Radarr, etc.): config API PUT
        - **Bazarr**: PATCH settings API
        - **Config-file services**: direct file edit + restart

        Also updates the `STACK_ADMIN_PASSWORD` environment variable and
        K8s secret.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/api/reset-password \
              -H "Content-Type: application/json" \
              -u admin:oldpassword \
              -d '{"password": "my-new-secure-password"}'
        - lang: curl
          label: "cURL (targeted)"
          source: |
            curl -X POST http://localhost:9100/api/reset-password \
              -H "Content-Type: application/json" \
              -u admin:oldpassword \
              -d '{"password": "new-pass", "services": ["sonarr", "jellyfin"]}'
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.post(
                "http://localhost:9100/api/reset-password",
                json={"password": "my-new-secure-password"},
                auth=("admin", "oldpassword"),
            )
            result = r.json()
            print(f"Updated: {result['services']}")
            if result["errors"]:
                print(f"Errors: {result['errors']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/reset-password", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:oldpassword"),
              },
              body: JSON.stringify({ password: "my-new-secure-password" }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 4
                  description: New admin password (min 4 characters)
                services:
                  type: array
                  items:
                    type: string
                  description: Optional list of service IDs to target. Omit for all.
            example:
              password: "my-new-secure-password"
              services: [sonarr, radarr, jellyfin]
      responses:
        "200":
          description: Password reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [updated]
                  services:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
                  restarted:
                    type: array
                    items:
                      type: string
              example:
                status: updated
                services: [qbittorrent, jellyfin, sonarr, radarr, prowlarr, bazarr]
                errors: []
                restarted: [bazarr]
        "400":
          description: Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "password field required (min 4 chars)"
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/jellyfin/reset:
    post:
      operationId: jellyfinHardReset
      tags: [Security]
      summary: Hard-reset Jellyfin credentials
      description: |
        Emergency reset for Jellyfin when the admin password is unknown
        (e.g., after the startup wizard auto-completes with random
        credentials). This performs a direct SQLite database modification:

        1. Clears the password hash in the Jellyfin database
        2. Sets the username to the requested value
        3. Restarts the Jellyfin container
        4. Sets the new password via the Jellyfin API

        Use this when `POST /api/reset-password` fails for Jellyfin because
        the current password is unknown.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Desired admin username (defaults to STACK_ADMIN_USERNAME)
                password:
                  type: string
                  minLength: 4
                  description: New password (min 4 characters)
            example:
              username: admin
              password: "my-new-password"
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, partial, error]
                  user:
                    type: string
                  note:
                    type: string
                  error:
                    type: string
              examples:
                success:
                  summary: Successful reset
                  value:
                    status: ok
                    user: admin
                    note: "Jellyfin restarted."
                partial:
                  summary: DB updated but password set failed
                  value:
                    status: partial
                    error: "Password set failed: connection refused"
                    note: "Restart Jellyfin manually."
        "400":
          description: Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "password required (min 4 chars)"
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Operations
  # =========================================================================

  /api/namespaces:
    get:
      operationId: getNamespaces
      tags: [Operations]
      summary: Containers and resource usage
      description: |
        In Kubernetes mode: returns namespace info, deployments with replica
        counts and resource requests, pod metrics (CPU/memory), and problem
        pods.

        In Compose mode: returns container list with status, images, and
        live CPU/memory usage from Docker stats.
      responses:
        "200":
          description: Container/namespace info
          content:
            application/json:
              schema:
                type: object
                properties:
                  namespaces:
                    type: array
                    items:
                      type: object
                      properties:
                        namespace:
                          type: string
                        current:
                          type: boolean
                        pods:
                          type: integer
                        running:
                          type: integer
                        problems:
                          type: array
                          items:
                            type: object
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        replicas:
                          type: integer
                        ready:
                          type: integer
                        image:
                          type: string
                        cpu_request:
                          type: string
                        mem_request:
                          type: string
                  pod_metrics:
                    type: array
                    items:
                      type: object
                      properties:
                        pod:
                          type: string
                        cpu:
                          type: string
                        memory:
                          type: string
                  # Aggregate pod_metrics + per-namespace counters
                  # rolled up across the cluster. Surfaces in the
                  # InfraDetail "cluster summary" tile.
                  totals:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                      pods:
                        type: integer
                      running:
                        type: integer
                    additionalProperties: true
              example:
                namespaces:
                  - namespace: media-stack
                    current: true
                    pods: 14
                    running: 14
                    problems: []
                services:
                  - name: sonarr
                    replicas: 1
                    ready: 1
                    image: "lscr.io/linuxserver/sonarr:4.0.14"
                pod_metrics:
                  - pod: sonarr-abc123
                    cpu: "50m"
                    memory: "256Mi"

  /api/image-updates:
    get:
      operationId: getImageUpdates
      tags: [Operations]
      summary: Image versions and staleness
      description: |
        Lists all running container images with their tags, start times, and
        image creation dates. Reports how many images are pinned (not using
        `latest`). Useful for tracking which services need updates.
      responses:
        "200":
          description: Image update info
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        image:
                          type: string
                        tag:
                          type: string
                        started_at:
                          type: string
                        image_created:
                          type: string
                        digest:
                          type: string
                  total:
                    type: integer
                  pinned:
                    type: integer
                  # Count of running images whose ``image_created``
                  # is older than the staleness threshold the
                  # controller flags. Surfaces in the OpsDetail
                  # ImageUpdatesCard as "N stale".
                  stale:
                    type: integer
              example:
                images:
                  - name: sonarr
                    image: "lscr.io/linuxserver/sonarr:4.0.14"
                    tag: "4.0.14"
                    started_at: "2026-04-01 08:00:00"
                    image_created: "2026-03-28 12:00:00"
                    digest: "sha256:abc123..."
                total: 14
                pinned: 12

  /api/gpu:
    get:
      operationId: getGpuInfo
      tags: [Operations]
      summary: GPU detection for transcoding
      description: |
        Detects GPU hardware available for Jellyfin transcoding. Checks
        Docker containers for mounted GPU devices, Docker runtime for NVIDIA
        support, and `/dev/dri` for Intel VA-API. Reports whether Jellyfin
        has GPU access and whether hardware transcoding is configured.

        Includes platform-specific guidance (Linux, macOS, Windows, K8s)
        and a compose snippet for enabling GPU passthrough.
      responses:
        "200":
          description: GPU detection results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GpuInfo'
              example:
                detected: true
                gpus:
                  - type: intel/va-api
                    name: "GPU passed to jellyfin (/dev/dri)"
                    container: jellyfin
                jellyfin_configured: true
                jellyfin_has_gpu: true
                host_os: linux
                runtime: compose
                hw_accel_type: vaapi
                can_auto_configure: true

  /api/gpu/enable:
    post:
      operationId: enableGpuTranscoding
      tags: [Operations]
      summary: Auto-configure GPU transcoding
      description: |
        Automatically configures Jellyfin for hardware transcoding based on
        the detected GPU type. Modifies `system.xml`, creates a backup, and
        restarts Jellyfin. If Jellyfin fails to start after the change, the
        configuration is automatically rolled back.

        Prerequisites: GPU must be detected and Jellyfin must have GPU
        devices mounted in its container.
      security:
        - basicAuth: []
      responses:
        "200":
          description: GPU configuration result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                  hw_accel_type:
                    type: string
                  changes:
                    type: array
                    items:
                      type: string
                  note:
                    type: string
                  backup:
                    type: string
                  error:
                    type: string
                  compose_snippet:
                    type: string
              examples:
                success:
                  summary: Successfully configured
                  value:
                    status: ok
                    hw_accel_type: vaapi
                    changes: ["HardwareAccelerationType=vaapi", "EnableHardwareDecoding=true", "EnableHardwareEncoding=true", "VaapiDevice=/dev/dri/renderD128"]
                    note: "Jellyfin restarted and running."
                    backup: "/srv-config/jellyfin/config/system.xml.gpu-backup"
                no_gpu:
                  summary: No GPU detected
                  value:
                    status: error
                    error: "No GPU detected. Mount GPU device to container first."

  /api/snapshots:
    get:
      operationId: listSnapshots
      tags: [Operations]
      summary: List config snapshots
      description: |
        Returns available configuration snapshots with file name, size, and
        creation timestamp. Snapshots capture the state of all service config
        files with API keys redacted. Maximum 24 snapshots retained.
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        size:
                          type: integer
                        created:
                          type: string
                  dir:
                    type: string
              example:
                snapshots:
                  - file: snapshot-20260407T120000.json
                    size: 45280
                    created: "2026-04-07 12:00:00"
                dir: /srv-config/.snapshots

  /api/snapshots/{filename}:
    get:
      operationId: getSnapshotDetail
      tags: [Operations]
      summary: Read a config snapshot
      description: |
        Returns the full content of a specific snapshot file. The snapshot
        is a JSON object mapping service config paths to their content
        (with API keys redacted).
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: snapshot-20260407T120000.json
      responses:
        "200":
          description: Snapshot content
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot:
                    type: object
                    additionalProperties:
                      type: string
                  file:
                    type: string
        "200 ":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Snapshot not found"

  /api/snapshot:
    post:
      operationId: takeSnapshot
      tags: [Operations]
      summary: Take a config snapshot now
      description: |
        Immediately captures the current state of all service configuration
        files into a new snapshot. API keys are automatically redacted.
        Old snapshots beyond 24 are pruned.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [created]
                  file:
                    type: string
                  configs:
                    type: integer
              example:
                status: created
                file: snapshot-20260407T143022.json
                configs: 10

  /api/snapshot-diff:
    get:
      operationId: diffSnapshots
      tags: [Operations]
      summary: Compare two snapshots
      description: |
        Returns a diff between two snapshots, listing which config files
        changed, were added, or were removed.
      parameters:
        - name: a
          in: query
          required: true
          schema:
            type: string
          description: First snapshot filename
          example: snapshot-20260406T120000.json
        - name: b
          in: query
          required: true
          schema:
            type: string
          description: Second snapshot filename
          example: snapshot-20260407T120000.json
      responses:
        "200":
          description: Snapshot diff result
          content:
            application/json:
              schema:
                type: object
                properties:
                  diffs:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        status:
                          type: string
                          enum: [changed, added, removed]
                  file_a:
                    type: string
                  file_b:
                    type: string
                  total_changes:
                    type: integer
                  # On error paths (missing snapshot, parse failure)
                  # the handler returns 200 with ``{error: msg}``
                  # rather than a 4xx — the dashboard renders the
                  # message in-card. Documenting this keeps strict-
                  # mode contract validation honest. Future cleanup:
                  # have the handler 4xx instead and remove this.
                  error:
                    type: string
              example:
                diffs:
                  - file: sonarr/config.xml
                    status: changed
                  - file: tautulli/config.ini
                    status: added
                file_a: snapshot-20260406T120000.json
                file_b: snapshot-20260407T120000.json
                total_changes: 2

  /api/mounts:
    get:
      operationId: getMounts
      tags: [Operations]
      summary: Filesystem mounts
      description: |
        Detects NFS, CIFS/SMB, and local mounts relevant to media storage.
        Scans `/proc/mounts` for paths containing `/media`, `/data`,
        `/config`, `/srv`, `/mnt`, or `/nas`, plus any NFS/CIFS mounts
        regardless of path.
      responses:
        "200":
          description: Mount information
          content:
            application/json:
              schema:
                type: object
                properties:
                  mounts:
                    type: array
                    items:
                      type: object
                      properties:
                        device:
                          type: string
                        mountpoint:
                          type: string
                        fstype:
                          type: string
                  nfs_available:
                    type: boolean
                  cifs_available:
                    type: boolean
              example:
                mounts:
                  - device: "192.168.1.100:/volume1/media"
                    mountpoint: /srv-stack/media
                    fstype: nfs4
                  - device: /dev/sda1
                    mountpoint: /srv-config
                    fstype: ext4
                nfs_available: true
                cifs_available: false

  /api/logs/sources:
    get:
      operationId: listLogSources
      tags: [Operations]
      summary: Available log sources
      description: |
        Dynamic list of services for which `/api/logs/{service}` will
        return logs. Driven by the SERVICES registry plus platform
        pods (controller, ui) plus every CronJob template in the
        namespace. Used by the Logs UI's filter dropdown — the prior
        hardcoded list capped at 8 services even though the registry
        had 27+, so operators couldn't reach jellyfin / jellyseerr /
        sabnzbd / envoy / authelia logs. CronJob entries surface
        transient job pods (e.g. `media-stack-media-hygiene-…`)
        through the same dashboard surface, so operators no longer
        need to drop into `kubectl logs` to debug a CronJob fire.
      responses:
        "200":
          description: Available log sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      type: object
                      required: [id, label, kind]
                      properties:
                        id:
                          type: string
                          description: Service id used as the path segment in `/api/logs/{id}`.
                        label:
                          type: string
                          description: Human-friendly label for the dropdown.
                        kind:
                          type: string
                          enum: [platform, service, cronjob]
                          description: |
                            `platform` for the controller/ui pods
                            (special-cased via `app=media-stack-<id>`
                            label), `service` for registry-listed apps
                            (resolved via `app=<id>`), `cronjob` for
                            CronJob templates whose transient pods are
                            resolved via the `job-name=<id>-…` label
                            (most-recent pod by creationTimestamp).

  /api/logs/{service}:
    get:
      operationId: getServiceLogs
      tags: [Operations]
      summary: Service container logs
      description: |
        Fetches the most recent log lines from a service's container (Docker)
        or pod (Kubernetes). Defaults to 100 lines, configurable up to 500
        via the `lines` query parameter.

        On Kubernetes the lookup tries `app=<service>`, then
        `app=media-stack-<service>`, then `job-name=<service>` (and
        finally `job-name~=<service>-` for transient CronJob pods,
        sorted by `creationTimestamp` descending so the most-recent
        fire wins). When a CronJob source is requested but every pod
        has aged out via TTL, the response is `{"lines": [], "error":
        "no recent pod for <service> — pod may have aged out via
        TTL."}` rather than a 500.
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
          example: sonarr
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Number of log lines to retrieve (max 500)
      responses:
        "200":
          description: Log lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  lines:
                    type: array
                    items:
                      type: string
                  error:
                    type: string
              example:
                lines:
                  - "[2026-04-07 12:00:01] INFO: Application started"
                  - "[2026-04-07 12:00:02] INFO: Listening on port 8989"

  /api/restart/{service}:
    post:
      operationId: restartService
      tags: [Operations]
      summary: Restart a single service
      description: |
        Restarts a service container (Docker) or deletes its pod (Kubernetes,
        triggering recreation by the Deployment controller). Use this for
        applying config changes that require a restart.
      security:
        - basicAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      responses:
        "200":
          description: Restart result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [restarted, error]
                  method:
                    type: string
                    enum: [docker, k8s]
                  error:
                    type: string
              example:
                status: restarted
                method: docker

  /api/batch-restart:
    post:
      operationId: batchRestart
      tags: [Operations]
      summary: Restart multiple services
      description: |
        Restarts multiple services in one request. Each service is restarted
        independently; failures on one do not block others. Returns per-service
        results.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [services]
              properties:
                services:
                  type: array
                  items:
                    type: string
                  description: List of service names to restart
            example:
              services: [sonarr, radarr, prowlarr]
      responses:
        "200":
          description: Batch restart results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                        method:
                          type: string
                        error:
                          type: string
                  restarted:
                    type: integer
                  total:
                    type: integer
              example:
                results:
                  sonarr:
                    status: restarted
                    method: docker
                  radarr:
                    status: restarted
                    method: docker
                  prowlarr:
                    status: restarted
                    method: docker
                restarted: 3
                total: 3
        "400":
          description: Missing services list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "services list required"
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Config / System
  # =========================================================================

  /api/env:
    get:
      operationId: getEnv
      tags: [Config]
      summary: Runtime environment
      description: |
        Returns runtime environment information: K8s namespace, profile name,
        node IPs, platform details, Python version, and runtime type
        (compose vs kubernetes).
      responses:
        "200":
          description: Environment info
          content:
            application/json:
              schema:
                type: object
                properties:
                  namespace:
                    type: string
                  profile_name:
                    type: string
                  node_ip:
                    type: string
                  node_ips:
                    type: array
                    items:
                      type: string
                  node_count:
                    type: integer
                  platform:
                    type: string
                  python:
                    type: string
                  runtime:
                    type: string
                    enum: [compose, kubernetes]
              example:
                namespace: ""
                profile_name: media-compose-standard.yaml
                node_ip: "192.168.1.50"
                node_ips: ["192.168.1.50"]
                node_count: 1
                platform: "Linux-6.8.0-x86_64-with-glibc2.39"
                python: "3.12.3"
                runtime: compose

  /api/profile:
    get:
      operationId: getProfile
      tags: [Config]
      summary: Bootstrap profile
      description: |
        Returns the parsed bootstrap profile YAML document. The profile
        defines routing, service selection, and deployment-specific settings.
      responses:
        "200":
          description: Profile content
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    type: object
                    nullable: true
                  file:
                    type: string
                  error:
                    type: string
                  # List of profile-section keys that have been
                  # migrated out of the legacy ``profile.yaml`` to
                  # ``/srv-config/app-config/*.yaml``. Empty array
                  # when nothing has been migrated yet. The profile
                  # editor surfaces this so operators don't try to
                  # edit migrated sections in the legacy file.
                  moved_to_app_config:
                    type: array
                    items:
                      type: string
    post:
      operationId: saveProfile
      tags: [Config]
      summary: Save bootstrap profile
      description: |
        Overwrite the bootstrap profile YAML with new content. Triggers a
        config reload if available. Use this to change the stack's
        deployment profile (routing strategy, enabled services, etc.).
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Full YAML content to write
            example:
              content: |
                routing:
                  base_domain: example.com
                  strategy: hybrid
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [saved]
                  file:
                    type: string
                  error:
                    type: string
              example:
                status: saved
                file: /opt/media-stack/contracts/media-stack.profile.yaml
        "400":
          description: Missing content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "content field required"
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/envvars:
    get:
      operationId: getEnvVars
      tags: [Config]
      summary: Stack environment variables
      description: |
        Returns all environment variables with recognized prefixes
        (BOOTSTRAP_, STACK_, K8S_, SONARR_, RADARR_, JELLYFIN_, etc.).
        Useful for debugging configuration without shell access.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Filtered environment variables
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
              example:
                STACK_ADMIN_USERNAME: admin
                STACK_ADMIN_PASSWORD: "****"
                TZ: America/New_York
                SONARR_API_KEY: a1b2c3d4...
    post:
      operationId: setEnvVar
      tags: [Config]
      summary: Set an environment variable
      description: |
        Set or update an environment variable in the controller process.
        The change is effective immediately for subsequent API calls and
        action runs. Note: this does not persist across container restarts.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  description: Environment variable name
                value:
                  type: string
                  description: Value to set
            example:
              key: TZ
              value: America/Chicago
      responses:
        "200":
          description: Variable set
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [set]
                  key:
                    type: string
                  value:
                    type: string
              example:
                status: set
                key: TZ
                value: America/Chicago
        "400":
          description: Missing key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "key field required"
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/envvars/delete:
    post:
      operationId: deleteEnvVar
      tags: [Config]
      summary: Remove an environment variable
      description: |
        Drop an environment variable from the controller process.
        Symmetric with ``POST /api/envvars`` (set). The same prefix
        allowlist applies — operators can only remove vars under the
        platform-recognized prefix set, not arbitrary host vars.
        Idempotent: returns ``existed: false`` when the key was
        already absent rather than 4xx-ing on the no-op.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
            example:
              key: TZ
      responses:
        "200":
          description: Variable removed (or already absent).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [deleted]
                  key:
                    type: string
                  existed:
                    type: boolean
              example:
                status: deleted
                key: TZ
                existed: true
        "400":
          description: Missing key, or key not under an allowed prefix.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/manifests:
    get:
      operationId: getManifests
      tags: [Config]
      summary: Deployment manifests
      description: |
        Returns the deployment manifest: Kubernetes deployments (in K8s mode),
        Docker Compose file content (in compose mode), or bootstrap config
        summary as a fallback. If no manifest is found, falls back to listing
        running containers.
      responses:
        "200":
          description: Manifest content
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    enum: [kubernetes, compose, bootstrap-config, compose-runtime, unknown]
                  file:
                    type: string
                  content:
                    type: string
                    nullable: true
                  namespace:
                    type: string
                  deployments:
                    type: integer
                  services:
                    type: array
                    items:
                      type: object
                  error:
                    type: string
                  note:
                    type: string
              example:
                type: kubernetes
                namespace: media-stack
                deployments: 21
                services:
                  - name: sonarr
                    image: lscr.io/linuxserver/sonarr@sha256:76414c033f290d3c9f1f9dfad71150abe71d92592369a3377a5903d579e6e2b2
                  - name: radarr
                    image: lscr.io/linuxserver/radarr@sha256:ca43905eaf2dd11425efdcfe184892e43806b1ae0a830440c825cecbc2629cfb
                  - name: jellyfin
                    image: jellyfin/jellyfin@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
                  - name: media-stack-controller
                    image: harbor.iomio.io/library/media-stack-controller:v1.0.360

  /api/backup:
    get:
      operationId: getBackup
      tags: [Config]
      summary: Download config backup
      description: |
        Downloads a JSON backup file containing: environment info, controller
        state, bootstrap profile, all discoverable service config files, and
        masked API keys. The response has a `Content-Disposition` header for
        browser download.

        Use this backup with `POST /api/restore` to restore configuration.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            # Save backup to a file
            curl -s http://localhost:9100/api/backup \
              -o media-stack-backup-$(date +%Y%m%d).json
        - lang: Python
          label: Python
          source: |
            import requests, json
            r = requests.get("http://localhost:9100/api/backup")
            backup = r.json()
            with open("media-stack-backup.json", "w") as f:
                json.dump(backup, f, indent=2)
            print(f"Backed up {len(backup.get('service_configs', {}))} configs")
      responses:
        "200":
          description: Backup JSON file
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                  version:
                    type: string
                  env:
                    type: object
                  state:
                    type: object
                  profile_raw:
                    type: string
                  service_configs:
                    type: object
                    additionalProperties:
                      type: string
                  api_keys_masked:
                    type: object
                    additionalProperties:
                      type: string
                  # Raw discovered keys (controller-internal — only
                  # makes sense in a backup envelope where the
                  # operator has already proven they hold admin
                  # creds). Live response always includes both maps.
                  api_keys:
                    type: object
                    additionalProperties:
                      type: string
                  # Resolved on-disk paths the controller consulted
                  # while assembling the backup. Useful when the
                  # backup is restored on a host with different
                  # mount layout — operator can spot stale paths.
                  valid_config_paths:
                    type: array
                    items:
                      type: string
              example:
                timestamp: "2026-04-25T14:30:22Z"
                version: "v1.0.314"
                env:
                  namespace: media-stack
                  node_count: 1
                state:
                  phase: complete
                profile_raw: "{\"services\": [...]}"
                service_configs:
                  "sonarr/config.xml": "<Config>...</Config>"
                  "radarr/config.xml": "<Config>...</Config>"
                api_keys_masked:
                  SONARR_API_KEY: "e1402d3d..."
                  RADARR_API_KEY: "f7d9a576..."
                api_keys:
                  SONARR_API_KEY: "***"
                  RADARR_API_KEY: "***"
                valid_config_paths:
                  - sonarr/config.xml
                  - radarr/config.xml
          headers:
            Content-Disposition:
              schema:
                type: string
              example: 'attachment; filename="media-stack-backup-20260407-143022.json"'

  /api/bazarr/subtitle-languages:
    post:
      operationId: updateBazarrSubtitleLanguages
      tags: [Config]
      summary: Overwrite the language list on a Bazarr profile
      description: |
        Overwrites the language list on the given Bazarr language profile.
        The simple home-use case is "I want English + Spanish subs"; the
        body is mapped into Bazarr's items array (one per language) with
        sensible defaults (``forced=false``, ``hi=false``). Operators
        wanting per-language flags use Bazarr's UI directly.
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profile_id, language_codes]
              properties:
                profile_id:
                  oneOf:
                    - type: integer
                    - type: string
                language_codes:
                  type: array
                  items:
                    type: string
                  minItems: 1
                forced:
                  type: boolean
                  default: false
                hi:
                  type: boolean
                  default: false
            example:
              profile_id: 1
              language_codes: [en, es]
              forced: false
              hi: false
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "502":
          description: Bazarr proxy returned an error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          description: Proxy call failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/sw-config:
    get:
      operationId: getServiceWorkerConfig
      tags: [Config]
      summary: Service-worker runtime configuration (alias)
      description: |
        Alias of `/sw-config.json` mounted under `/api/` for ext_authz parity —
        sister apps pass `/api/*` through unauthenticated. The dashboard's PWA
        service worker fetches this on install/update so its navigation
        denylist tracks the routing engine instead of being hard-coded in
        the bundled SW.
      responses:
        "200":
          description: Service-worker configuration payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                  basepath:
                    type: string
                  denylist_patterns:
                    type: array
                    items:
                      type: string
                  allowed_app_prefixes:
                    type: array
                    items:
                      type: string
                  sister_app_prefixes:
                    type: array
                    items:
                      type: string

  /sw-config.json:
    get:
      operationId: getServiceWorkerConfigJson
      tags: [Config]
      summary: Service-worker runtime configuration
      description: |
        Top-level path the dashboard's PWA service worker fetches at install/
        update time. Returns the SW's basepath, sister-app prefixes the SW
        should NOT hijack, and pre-built navigation denylist regex strings.
        See `/api/sw-config` for the same payload mounted under `/api/`.
      responses:
        "200":
          description: Service-worker configuration payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                  basepath:
                    type: string
                  denylist_patterns:
                    type: array
                    items:
                      type: string
                  allowed_app_prefixes:
                    type: array
                    items:
                      type: string
                  sister_app_prefixes:
                    type: array
                    items:
                      type: string

  /api/restore:
    post:
      operationId: restoreBackup
      tags: [Config]
      summary: Restore config from backup
      description: |
        Restores service configuration files from a backup JSON payload
        (created by `GET /api/backup`). Only writes to known config paths
        under the config root. Path traversal is blocked for safety.

        After restoring, restart the affected services to apply the changes.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_configs]
              properties:
                service_configs:
                  type: object
                  additionalProperties:
                    type: string
                  description: Map of relative config paths to file contents
            example:
              service_configs:
                "sonarr/config.xml": "<Config>...</Config>"
                "radarr/config.xml": "<Config>...</Config>"
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, partial]
                  restored:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
                  note:
                    type: string
              example:
                status: ok
                restored: ["sonarr/config.xml", "radarr/config.xml"]
                errors: []
                note: "Restart services to apply restored configs"
        "400":
          description: Invalid backup format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "backup JSON with service_configs required"
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Metrics
  # =========================================================================

  /metrics:
    get:
      operationId: getPrometheusMetrics
      tags: [Metrics]
      summary: Prometheus metrics
      description: |
        Returns Prometheus-format metrics for service health. Exposes:

        - `media_stack_service_up{service="..."}` (gauge, 1=up, 0=down)
        - `media_stack_service_latency_ms{service="..."}` (gauge, probe ms)
        - `media_stack_healthy_total` (gauge, total healthy count)
        - `media_stack_total_services` (gauge, total monitored count)

        Configure your Prometheus instance to scrape this endpoint.

        **Prometheus scrape config:**
        ```yaml
        scrape_configs:
          - job_name: media-stack
            static_configs:
              - targets: ["localhost:9100"]
        ```
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/metrics
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/metrics")
            for line in r.text.splitlines():
                if not line.startswith("#"):
                    print(line)
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP media_stack_service_up Whether a service is reachable (1=up, 0=down)
                # TYPE media_stack_service_up gauge
                media_stack_service_up{service="sonarr"} 1
                media_stack_service_up{service="radarr"} 1
                # HELP media_stack_healthy_total Total healthy services
                # TYPE media_stack_healthy_total gauge
                media_stack_healthy_total 12

  /api/envoy/stats:
    get:
      operationId: getEnvoyStats
      tags: [Metrics]
      summary: Envoy proxy traffic statistics
      description: |
        Fetches traffic statistics from the Envoy proxy admin interface
        (port 9901). Returns filtered stats for downstream/upstream
        connections and request counts (2xx, 4xx, 5xx).
      responses:
        "200":
          description: Envoy statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    additionalProperties:
                      type: integer
                  raw_count:
                    type: integer
                  error:
                    type: string
              example:
                stats:
                  "http.ingress_http.downstream_rq_total": 15423
                  "http.ingress_http.downstream_rq_2xx": 14891
                  "http.ingress_http.downstream_rq_4xx": 412
                  "http.ingress_http.downstream_rq_5xx": 3
                raw_count: 2847

  /api/envoy/admin-summary:
    get:
      operationId: getEnvoyAdminSummary
      tags: [Metrics]
      summary: Envoy admin summary
      description: |
        Operator-facing aggregate of cluster health, request rates,
        p50/p95/p99 latency, active connections, and TLS handshake
        errors. Surfaced on the Routing tab. Each call also appends
        a sample to the rolling buffer that backs
        `/api/envoy/timeseries`.
      responses:
        "200":
          description: Aggregated Envoy admin-API summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/envoy/access-log:
    get:
      operationId: getEnvoyAccessLog
      x-status: planned
      tags: [Metrics]
      summary: Tail recent Envoy access-log entries
      description: |
        Returns the last `limit` entries from the Envoy access log,
        each parsed into a structured row when JSON-formatted. Sources
        tried in order: `ENVOY_ACCESS_LOG_PATH` file, `kubectl logs`
        on the envoy pod, then `docker compose logs envoy`.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum number of log entries to return
      responses:
        "200":
          description: Recent access-log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  limit:
                    type: integer
        "500":
          description: Internal error while tailing the access log
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  rows:
                    type: array
                    items:
                      type: object

  /api/envoy/timeseries:
    get:
      operationId: getEnvoyTimeseries
      x-status: planned
      tags: [Metrics]
      summary: Envoy admin-summary rolling time series
      description: |
        Rolling buffer of recent admin-summary samples plus derived
        rate deltas. The buffer is populated as a side-effect of
        `/api/envoy/admin-summary` polling, so the series only covers
        the time the Routing panel has been open. The `window` query
        param defaults to 1800 (30 min) and clamps to >= 60s.
      parameters:
        - name: window
          in: query
          required: false
          schema:
            type: integer
            minimum: 60
            default: 1800
          description: Window size in seconds (clamps to >= 60)
      responses:
        "200":
          description: Time-series window of admin-summary samples
          content:
            application/json:
              schema:
                type: object
                properties:
                  samples:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  deltas:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  window_seconds:
                    type: integer
                  now:
                    type: integer

  /api/feed.xml:
    get:
      operationId: getRssFeed
      tags: [Metrics]
      summary: RSS feed of events
      description: |
        Returns an RSS 2.0 feed of controller action events and the latest
        health status. Subscribe in any RSS reader to monitor your stack.
      responses:
        "200":
          description: RSS XML feed
          content:
            application/rss+xml:
              schema:
                type: string

  /api/grafana.json:
    get:
      operationId: getGrafanaDashboard
      tags: [Metrics]
      summary: Grafana dashboard JSON
      description: |
        Returns a pre-built Grafana dashboard JSON that queries the `/metrics`
        endpoint. Import this into Grafana to get service health and latency
        panels out of the box.
      responses:
        "200":
          description: Grafana dashboard model
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard:
                    type: object
                  overwrite:
                    type: boolean
              example:
                dashboard:
                  title: Media Stack
                  panels:
                    - title: Healthy services
                      type: stat
                      targets:
                        - expr: media_stack_healthy_total
                  schemaVersion: 38
                overwrite: true

  /api/openapi.json:
    get:
      operationId: getOpenApiJson
      tags: [Metrics]
      summary: OpenAPI spec (JSON, abridged)
      description: |
        Returns an abridged OpenAPI 3.0 JSON spec generated at runtime.
        For the full specification, use `GET /api/openapi.yaml`.
      responses:
        "200":
          description: OpenAPI 3.0 JSON
          content:
            application/json:
              schema:
                type: object
              example:
                openapi: "3.0.3"
                info:
                  title: Media Stack Controller API
                  version: "v1.0.314"
                paths:
                  /api/health:
                    get:
                      summary: Service health

  /api/openapi.yaml:
    get:
      operationId: getOpenApiYaml
      tags: [Dashboard]
      summary: OpenAPI spec (YAML, full)
      description: |
        Returns the complete OpenAPI 3.0.3 specification as YAML. This is
        the authoritative API reference used by the `/api/docs` viewer.
      responses:
        "200":
          description: OpenAPI 3.0.3 YAML specification
          content:
            text/yaml:
              schema:
                type: string

  # =========================================================================
  # Webhooks
  # =========================================================================

  /webhooks:
    get:
      operationId: listWebhooks
      tags: [Webhooks]
      summary: List registered webhook URLs
      description: |
        Returns the list of webhook URLs that receive notifications on action
        completion, error, or cancellation events.
      responses:
        "200":
          description: Webhook URL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_urls:
                    type: array
                    items:
                      type: string
              example:
                webhook_urls:
                  - "https://hooks.example.com/media-stack"
    post:
      operationId: addWebhook
      tags: [Webhooks]
      summary: Register a webhook URL
      description: |
        Add a webhook URL to receive POST notifications on action events.
        Each event payload includes `event` (action_complete, action_error)
        and action details. Duplicate URLs are ignored (set semantics).

        See the **Webhook Events** section in the API overview for the full
        payload schema, or refer to the `WebhookEvent` schema.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/webhooks \
              -H "Content-Type: application/json" \
              -d '{"url": "https://hooks.example.com/media-stack"}'
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.post(
                "http://localhost:9100/webhooks",
                json={"url": "https://hooks.example.com/media-stack"},
            )
            print(f"Registered webhooks: {r.json()['webhook_urls']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/webhooks", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: "https://hooks.example.com/media-stack" }),
            });
            console.log(await r.json());
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: Webhook URL to register
            example:
              url: "https://hooks.example.com/media-stack"
      responses:
        "200":
          description: Updated webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_urls:
                    type: array
                    items:
                      type: string
              example:
                webhook_urls:
                  - "https://hooks.example.com/media-stack"
                  - "https://discord.com/api/webhooks/1234567890/abcdef"

  /webhooks/test:
    post:
      operationId: testWebhooks
      tags: [Webhooks]
      summary: Test all registered webhooks
      description: |
        Sends a test payload (`{"event": "test", "status": "ok"}`) to all
        registered webhook URLs and reports the result for each. Use this
        to verify webhook connectivity before relying on them for alerts.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [tested, no_webhooks]
                  results:
                    type: object
                    additionalProperties:
                      type: string
                  tested:
                    type: integer
              examples:
                with_webhooks:
                  summary: Webhooks tested
                  value:
                    status: tested
                    results:
                      "https://hooks.example.com/media-stack": "ok (200)"
                    tested: 1
                no_webhooks:
                  summary: No webhooks registered
                  value:
                    status: no_webhooks
                    tested: 0

  # =========================================================================
  # SSE Streaming
  # =========================================================================

  /logs/stream:
    get:
      operationId: streamLogs
      tags: [State]
      summary: Real-time log stream (SSE)
      description: |
        Server-Sent Events stream of controller log lines. Each event
        contains a JSON payload with `seq` (sequence number), `ts`
        (timestamp), `msg` (log message), and `action` (current action
        name, if any).

        Use the `after_seq` query parameter to resume from a specific
        sequence number (e.g., after a reconnect).

        **Example (JavaScript):**
        ```javascript
        const es = new EventSource('/logs/stream');
        es.onmessage = (e) => {
          const data = JSON.parse(e.data);
          console.log(`[${data.ts}] ${data.msg}`);
        };
        ```
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            # Stream logs in real-time (Ctrl+C to stop)
            curl -N http://localhost:9100/logs/stream
        - lang: Python
          label: Python
          source: |
            import requests
            import json

            # Stream logs using requests with streaming
            r = requests.get("http://localhost:9100/logs/stream", stream=True)
            for line in r.iter_lines(decode_unicode=True):
                if line.startswith("data: "):
                    event = json.loads(line[6:])
                    print(f"[{event['ts']}] {event['msg']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const es = new EventSource("http://localhost:9100/logs/stream");
            es.onmessage = (e) => {
              const data = JSON.parse(e.data);
              console.log(`[${data.ts}] ${data.msg}`);
            };
            es.onerror = () => console.log("Connection lost, reconnecting...");
      parameters:
        - name: after_seq
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Resume from this sequence number (exclusive)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                id: 42
                data: {"seq": 42, "ts": "2026-04-07T12:00:01", "msg": "Bootstrap started", "action": "bootstrap"}

                id: 43
                data: {"seq": 43, "ts": "2026-04-07T12:00:02", "msg": "Preflight: checking services", "action": "bootstrap"}

  /api/events:
    get:
      operationId: streamEvents
      tags: [State]
      summary: Unified domain-event SSE stream
      description: |
        Server-Sent Events stream of typed domain events from the
        controller's process-wide `EventBus`. Each frame's `event:`
        line carries the dotted event-type (e.g. `job.started`,
        `job.completed`, `login.succeeded`); the `data:` line is a
        JSON object containing every field from the underlying event
        plus `event_type` and `ts`.

        The `topics=` query parameter narrows to a comma-separated
        subset of operator-facing topic names. Empty / missing means
        "all known topics". Unknown topic names are silently dropped
        so a UI shipping a future topic name keeps working against an
        older controller.

        Heartbeat: when the bus is idle the stream emits an SSE
        comment line (`: heartbeat`) every ~25s so reverse proxies
        (Envoy, nginx, Cloudflare) don't idle-kill the connection.

        Foundation for the live UI surfaces — the Jobs page invalidates
        the `runs` query on every `job.completed` frame instead of
        polling on a 5s timer.

        **Example (JavaScript):**
        ```javascript
        const es = new EventSource('/api/events?topics=jobs,sessions');
        es.addEventListener('job.completed', (e) => {
          const data = JSON.parse(e.data);
          console.log(`run ${data.run_id} → ${data.status}`);
        });
        ```
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            # Stream events for the jobs topic (Ctrl+C to stop)
            curl -N "http://localhost:9100/api/events?topics=jobs"
      parameters:
        - name: topics
          in: query
          required: false
          schema:
            type: string
            example: "jobs,sessions"
          description: |
            Comma-separated subset of `jobs`, `sessions`,
            `media_integrity`. Empty / missing means all known
            topics.
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: job.started
                data: {"event_type":"job.started","ts":"2026-04-27T18:00:01Z","run_id":"01J5...","job_name":"scan","triggered_by":"cron","actor":"","parent_run_id":"","batch_id":""}

                event: job.completed
                data: {"event_type":"job.completed","ts":"2026-04-27T18:00:02Z","run_id":"01J5...","job_name":"scan","status":"ok","elapsed":1.23,"error":""}

  # =========================================================================
