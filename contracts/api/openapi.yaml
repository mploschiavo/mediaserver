  # =========================================================================
  # Operations — media-server reset + per-service reset + logs filter
  # =========================================================================

  /api/logs:
    get:
      operationId: getLogRingBuffer
      tags: [Operations]
      summary: Controller log ring buffer (optionally filtered by action)
      parameters:
        - in: query
          name: after_seq
          required: false
          schema:
            type: integer
        - in: query
          name: action
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Ring-buffer entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
              example:
                count: 3
                logs:
                  - seq: 1024
                    ts: "2026-04-25T14:30:22Z"
                    level: INFO
                    action: bootstrap
                    msg: "Bootstrap started (priority=10)"
                  - seq: 1025
                    ts: "2026-04-25T14:30:23Z"
                    level: INFO
                    action: bootstrap
                    msg: "Preflight: checking 28 services"
                  - seq: 1026
                    ts: "2026-04-25T14:30:24Z"
                    level: WARN
                    action: bootstrap
                    msg: "tautulli has no API key; deferring"

  /api/media-server/reset:
    post:
      operationId: mediaServerReset
      tags: [Security]
      summary: Hard-reset the media server's admin credentials (DB-level)
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [password]
            example:
              username: admin
              password: "***"
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                service: jellyfin
                reset_via: db
                username: admin
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/services/{service_id}/reset:
    post:
      operationId: hardResetService
      tags: [Operations]
      summary: Hard-reset a service (restart + re-discover key + re-run preflight)
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: service_id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              wipe_config: false
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                service_id: sonarr
                restarted: true
                api_key_rediscovered: true
                preflight_passed: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # Guardrails — per-rule operations on the cross-domain registry
  # =========================================================================

  /api/guardrails/{id}:
    post:
      operationId: updateGuardrailThreshold
      tags: [Guardrails]
      summary: Update a guardrail threshold (operator override)
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                threshold:
                  type: object
                  additionalProperties: true
              required: [threshold]
            example:
              threshold:
                pct: 90
                bytes_free: 10737418240
      responses:
        "200":
          description: Updated threshold
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                id: "storage:per_mount_threshold"
                threshold:
                  pct: 90
                  bytes_free: 10737418240
                source: override
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/guardrails/{id}/test:
    post:
      operationId: testGuardrail
      tags: [Guardrails]
      summary: Dry-run a single guardrail evaluation
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation result without remediation
          content:
            application/json:
              schema:
                type: object
                properties:
                  would_trigger:
                    type: boolean
                  severity:
                    type: string
                    nullable: true
                  current_value: {}
                  threshold:
                    type: object
                    additionalProperties: true
                  description:
                    type: string
              example:
                would_trigger: false
                severity: null
                current_value:
                  pct: 50.9
                threshold:
                  pct: 90
                description: "Per-mount disk usage above threshold"

  /api/guardrails/{id}/disable:
    post:
      operationId: disableGuardrail
      tags: [Guardrails]
      summary: Soft-disable / re-enable a guardrail rule
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disabled:
                  type: boolean
              required: [disabled]
            example:
              disabled: true
      responses:
        "200":
          description: Disable state set
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                ok: true
                id: "storage:per_mount_threshold"
                disabled: true

  /api/lifecycle-ensurers/{service}/{method}:
    post:
      operationId: invokeLifecycleEnsurer
      tags: [Operations]
      summary: Manually dispatch a single lifecycle ensurer
      description: |
        ADR-0005 Phase 5b. The promise orchestrator already routes
        every unsatisfied promise's ``LifecycleEnsurer`` through the
        single ``dispatch_ensurer`` entry point. This endpoint
        exposes that same entry point for two operator-facing
        callers:

          * Operator dashboard "Run now" buttons (Phase 5b step 3
            migrates the UI off ``POST /api/jobs/run/<legacy-name>``
            for ensurer-shaped names).
          * Auto-heal (Phase 5b step 4 migrates auto-heal off
            ``action_trigger("ensure-X")`` to a typed
            ``(service, method)`` invocation).

        Three callers, one mechanism, no per-caller branching.

        Outcome → HTTP status mapping: a 200 indicates the
        dispatcher RAN. The body's ``status`` field
        (``success`` / ``transient`` / ``permanent``) carries the
        outcome shape. ``404`` means the ``(service, method)`` pair
        is not in the loaded promise registry.
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: service
          required: true
          schema:
            type: string
          description: Service id matching a contract YAML's ``service.id``.
        - in: path
          name: method
          required: true
          schema:
            type: string
          description: Lifecycle method name (``mint_api_key`` etc.).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  description: |
                    Caller tag. Defaults to ``operator``.
                    Recognized: ``operator`` (dashboard "Run now"),
                    ``auto-heal`` (the recovery loop),
                    ``orchestrator-tick`` (reserved; the
                    orchestrator never goes through this endpoint).
                  enum: [operator, auto-heal, orchestrator-tick]
                overrides:
                  type: object
                  additionalProperties: true
                  description: |
                    Per-call config overrides. Reserved for
                    future use; today the dispatcher reads its
                    config from the contract YAML.
            example:
              source: operator
              overrides: {}
      responses:
        "200":
          description: Ensurer ran. Outcome shape in body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success, transient, permanent]
                    description: |
                      ``success`` — ensurer reached the desired
                      state. ``transient`` — failed but worth
                      retrying. ``permanent`` — failed and the
                      operator must intervene.
                  message:
                    type: string
                  source:
                    type: string
                  evidence:
                    type: object
                    additionalProperties: true
                  attempts:
                    type: integer
                  elapsed_seconds:
                    type: number
                required: [status, message, source, evidence]
              example:
                status: success
                message: lifecycle ensurer succeeded
                source: operator
                evidence:
                  reason: minted
                attempts: 1
                elapsed_seconds: 0.42
        "403":
          description: CSRF token missing/invalid or admin gate denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Unknown (service, method) pair.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  service:
                    type: string
                  method:
                    type: string
                required: [error, service, method]
              example:
                error: unknown ensurer
                service: jellyfin
                method: mint_api_key_typo

  # =========================================================================
  # Webhooks — *arr ingest
  # =========================================================================

  /webhooks/arr:
    post:
      operationId: receiveArrWebhook
      tags: [Webhooks]
      summary: Ingest an Arr import/grab webhook and trigger Jellyfin scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              eventType: Download
              instanceName: Sonarr
              series:
                title: "The Last of Us"
                tvdbId: 392256
              episodes:
                - episodeNumber: 1
                  seasonNumber: 2
                  title: "Future Days"
              episodeFile:
                path: "/media/tv/The Last of Us/Season 02/S02E01.mkv"
      responses:
        "200":
          description: Scan triggered (if applicable)
        "403":
          description: HMAC signature missing or invalid

  # =========================================================================
  # Webhooks_and_deferred — final-cleanup wave (ADR-0007 Phase 2 wave 6)
  #
  # The bare `/webhooks` GET + POST + `/webhooks/test` paths are spec'd above
  # under their canonical entries. The `/api/`-prefixed aliases were
  # historically allowlisted in `_HANDLER_ONLY_ALLOWLIST` because they had no
  # spec entry; the OpenAPI Router migration in wave 6 lifts them onto
  # `WebhooksAndDeferredRoutes`, so each alias is now declared explicitly so
  # the spec parity ratchets pin the dispatch surface end-to-end.
  # =========================================================================

  /api/webhooks:
    get:
      operationId: listWebhooksApi
      tags: [Webhooks]
      summary: List registered webhook URLs (alias of `/webhooks`)
      description: |
        SPA-canonical alias of `GET /webhooks`. The dashboard's nginx only
        proxies `/api/*`; the bare `/webhooks` path stays for direct curl
        and for arr-side webhook receivers that hit the controller without
        the `/api` prefix.
      x-status: planned
      responses:
        "200":
          description: Webhook URL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_urls:
                    type: array
                    items:
                      type: string
              example:
                webhook_urls: []
    post:
      operationId: addWebhookApi
      tags: [Webhooks]
      summary: Register a webhook URL (alias of `POST /webhooks`)
      description: |
        SPA-canonical alias of `POST /webhooks`. Validates the URL against
        the SSRF allow-list (no private / loopback / link-local /
        multicast / reserved IP ranges) BEFORE persisting.
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
            example:
              url: "https://hooks.example.com/media-stack"
      responses:
        "200":
          description: Updated webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_urls:
                    type: array
                    items:
                      type: string
        "400":
          description: URL failed SSRF validation or scheme check

  /api/webhooks/test:
    post:
      operationId: testWebhooksApi
      tags: [Webhooks]
      summary: Test all registered webhooks (alias of `/webhooks/test`)
      description: |
        SPA-canonical alias of `POST /webhooks/test`. Sends a test payload
        to every registered webhook URL and reports per-URL status.
      x-status: planned
      responses:
        "200":
          description: Test results
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/bazarr/subtitle-config:
    get:
      operationId: getBazarrSubtitleConfig
      tags: [Config]
      summary: Aggregator over Bazarr's languages + profiles + settings
      description: |
        Surfaces Bazarr's available languages, configured language profiles,
        and the operator-default profile id in a single dashboard-friendly
        shape. Used by Settings → Display → Subtitle preferences.
      x-status: planned
      responses:
        "200":
          description: Subtitle configuration aggregate
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                available_languages: []
                profiles: []
                default_profile_id: null
                errors: []
        "500":
          description: Proxy call failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/logs/stream:
    get:
      operationId: streamControllerLogsFiltered
      tags: [Operations]
      summary: Filterable SSE stream of controller log lines
      description: |
        Server-Sent Events stream of controller log lines with the same
        filter dimensions as `GET /api/logs/{service}` (`action`, `level`,
        `q`, `since`). Replaces the legacy unfiltered `/logs/stream`
        endpoint for the new dashboard tail mode while leaving the bare
        path in place for compat. Heartbeats every ~30s keep reverse
        proxies (Envoy / nginx / Cloudflare) from idle-killing the
        connection.
      parameters:
        - in: query
          name: after_seq
          required: false
          schema:
            type: integer
            default: 0
          description: Resume from this sequence number (exclusive)
        - in: query
          name: action
          required: false
          schema:
            type: string
        - in: query
          name: level
          required: false
          schema:
            type: string
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
