# Arr app default settings (Sonarr, Radarr, Lidarr, Readarr)
# Override in media-stack.config.json

arr_download_handling:
  enabled: true
  enable_completed_download_handling: true
  # Completed torrents STAY in qBit after import — lets seeding
  # continue until media-hygiene prunes by age/ratio. Flipping to
  # true removes the torrent the instant *arr imports, which
  # kills seeding and hurts the swarm. (v1.0.141.)
  remove_completed_downloads: false
  # Failed torrents ARE removed — otherwise "failed" entries pile
  # up in qBit forever and the user has to log in to clean up.
  remove_failed_downloads: true
  auto_redownload_failed: true
arr_media_management:
  enabled: true
  copy_using_hardlinks: true
  create_empty_series_folders: true
arr_quality_upgrade:
  enabled: true
  allow_upgrades: true
  disallow_quality_name_tokens:
  - '2160'
  - 4k
  - uhd
  - remux
  cutoff_preferred_name_tokens:
  - '1080'
  by_app:
    Lidarr:
      enabled: false
    Readarr:
      enabled: false
quality_profiles:
  preferred_names:
  - HD-1080p
  - HD - 720p/1080p
  - HD-720p
  by_app:
    Radarr:
      preferred_names:
      - HD-1080p
      - HD - 720p/1080p
      - HD-720p
    Sonarr:
      preferred_names:
      - HD-1080p
      - HD - 720p/1080p
      - HD-720p
arr_discovery_lists:
  enabled: true
  required: false
  trigger_initial_sync: true
  prune_unmanaged: true
  Radarr:
  - name: TMDb Trending Movies
    implementation: TMDbPopularImport
    enabled: true
    enable_auto: true
    monitor: movieOnly
    minimum_availability: released
    search_on_add: false
    field_overrides:
      tMDbListType: 1
  - name: TMDb Popular Movies
    implementation: TMDbPopularImport
    enabled: true
    enable_auto: true
    monitor: movieOnly
    minimum_availability: released
    search_on_add: false
    field_overrides:
      tMDbListType: 2
  - name: TMDb Top Rated Movies
    implementation: TMDbPopularImport
    enabled: true
    enable_auto: true
    monitor: movieOnly
    minimum_availability: released
    search_on_add: false
    field_overrides:
      tMDbListType: 3
  - name: TMDb Upcoming Movies
    implementation: TMDbPopularImport
    enabled: true
    enable_auto: true
    monitor: movieOnly
    minimum_availability: released
    search_on_add: false
    field_overrides:
      tMDbListType: 4
  Sonarr:
  # Controller-hosted feed of popular TV. Fetches TVMaze (free, no
  # auth), scores by rating, returns a Sonarr CustomImport JSON of
  # TVDB IDs. See ``/api/discovery/popular-tv`` in handlers_get.py.
  # Using CustomImport instead of IMDb/Trakt because IMDb's
  # importer is upstream-broken (returns 202) and Trakt needs
  # per-user OAuth — neither works OTB. (v1.0.143.)
  - name: Popular TV (TVMaze)
    implementation: CustomImport
    enabled: true
    enable_auto: true
    search_on_add: false
    should_monitor: firstSeason
    monitor_new_items: all
    series_type: standard
    season_folder: true
    field_overrides:
      baseUrl: http://media-stack-controller:9100/api/discovery/popular-tv
  Lidarr:
  - name: Last.fm Top Rock Artists (Top 10)
    implementation: LastFmTag
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    field_overrides:
      tagId: rock
      count: 10
  - name: Last.fm Top Pop Artists (Top 10)
    implementation: LastFmTag
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    field_overrides:
      tagId: pop
      count: 10
  - name: Last.fm Top Hip-Hop Artists (Top 10)
    implementation: LastFmTag
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    field_overrides:
      tagId: hip-hop
      count: 10
  - name: Last.fm Top Electronic Artists (Top 10)
    implementation: LastFmTag
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    field_overrides:
      tagId: electronic
      count: 10
  Readarr:
  - name: Goodreads Popular Science Fiction
    implementation: GoodreadsListImportList
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    min_refresh_interval: '168:00:00'
    field_overrides:
      listId: '2681'
  - name: Goodreads Readarr Top 100
    implementation: GoodreadsListImportList
    enabled: true
    enable_automatic_add: true
    should_monitor: all
    monitor_new_items: all
    should_search: false
    min_refresh_interval: '168:00:00'
    field_overrides:
      listId: '184476'
sonarr_seed_series:
  enabled: true
  max_series: 15
  monitor: firstSeason
  season_folder: true
  # Suppressed during seed/import — firing N concurrent searches
  # against ~5 indexers blasts them with 429 TooManyRequests, which
  # Sonarr surfaces as "Indexers unavailable due to failures". The
  # controller-side ``mass-search-throttled`` job (job_adapters.py)
  # paces a follow-up search ~2s/series instead. Sonarr's RSS sync
  # also picks up new episodes naturally on its 15min cadence.
  # (v1.0.145.)
  search_for_missing_episodes: false
  # Default seed series so a fresh install doesn't sit at "Sonarr 0
  # series". Sonarr's import-list ecosystem requires Trakt OAuth or
  # IMDb list IDs that can rot — explicit names are the most stable
  # path. Sonarr looks each up via its metadata provider (Skyhook /
  # TVDB) and adds the matching series. Mainstream titles only —
  # avoids name-collision ambiguity (e.g. "The Office" needs the
  # year to disambiguate UK vs US).
  series:
    - "Breaking Bad"
    - "Game of Thrones"
    - "Stranger Things"
    - "The Mandalorian"
    - "The Office (US)"
    - "House of the Dragon"
    - "Severance"
    - "Better Call Saul"
    - "The Last of Us"
    - "Succession"
  quality_profile_name_tokens:
  - '1080'
  - hd
  series:
  - Breaking Bad
  - Stranger Things
  - The Last of Us
  - The Boys
  - Severance
  - House of the Dragon
  - The Bear
  - Reacher
  - Silo
  - The White Lotus
readarr:
  metadata_source: https://api.bookinfo.pro
  metadata_source_required: false
arr_apps:
- name: Sonarr
  implementation: Sonarr
  url: http://sonarr:8989
  root_folder: /media/tv
  quality_profile_preferred_names:
  - HD-1080p
  - HD - 720p/1080p
  - HD-720p
- name: Radarr
  implementation: Radarr
  url: http://radarr:7878
  root_folder: /media/movies
  quality_profile_preferred_names:
  - HD-1080p
  - HD - 720p/1080p
  - HD-720p
- name: Lidarr
  implementation: Lidarr
  url: http://lidarr:8686
  root_folder: /media/music
- name: Readarr
  implementation: Readarr
  url: http://readarr:8787
  root_folder: /media/books
arr_indexer_sync:
  enabled: true
  prune_stale_indexers: true
