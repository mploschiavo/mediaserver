# Integration defaults (Jellyseerr, Bazarr, Homepage, Maintainerr)
# Override in media-stack.config.json

homepage:
  enabled: true
  required: false
  scheme: http
  services_relative_path: homepage/services.yaml
  hosts:
  - traefik.local
  - envoy.local
  - homepage.local
  - jellyfin.local
  - jellyseerr.local
  - sonarr.local
  - radarr.local
  - lidarr.local
  - readarr.local
  - bazarr.local
  - prowlarr.local
  - qbittorrent.local
  - sabnzbd.local
  - maintainerr.local
  - tautulli.local
  - flaresolverr.local
  - media-stack-controller.local
  - recyclarr.local
  - authelia.local
  - authentik.local
  device_onboarding:
    enabled: true
    qr_size: 220
    jellyfin_url: http://apps.media-dev.local:18080/app/jellyfin
    jellyfin_short_link: apps.media-dev.local:18080/app/jellyfin
    jellyseerr_url: http://apps.media-dev.local:18080/app/jellyseerr
    jellyseerr_short_link: apps.media-dev.local:18080/app/jellyseerr
bazarr:
  enabled: true
  required: false
  url: http://bazarr:6767
  base_url: /app/bazarr
  config_relative_path: bazarr/config/config.yaml
  subtitle_defaults:
    enabled: true
    providers:
    - opensubtitlescom
    - podnapisi
    - addic7ed
    general:
      serie_default_enabled: true
      movie_default_enabled: true
      single_language: false
      minimum_score: 70
      minimum_score_movie: 70
      use_embedded_subs: true
      ignore_pgs_subs: true
      ignore_vobsub_subs: true
jellyseerr:
  enabled: true
  required: false
  url: http://jellyseerr:5055
  application_url: http://apps.media-dev.local:18080/app/jellyseerr
  enforce_settings_file: true
  set_media_server_type_jellyfin: true
  enable_media_server_login: false
  radarr:
    enabled: true
    name: Radarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    minimum_availability: released
    tag_requests: false
    tags: []
  sonarr:
    enabled: true
    name: Sonarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    enable_season_folders: true
    series_type: standard
    anime_series_type: anime
    monitor_new_items: all
    tag_requests: false
    tags: []
    anime_tags: []
  jellyfin:
    configure: true
    url: http://jellyfin:8096
    external_url: http://jellyfin.media-dev.local:18080
    api_key_env: JELLYFIN_API_KEY
    auto_discover_api_key_from_db: true
    api_key_db_path: jellyfin/data/jellyfin.db
    api_key_name_preference:
    - Jellyfin
    - Jellyseerr
maintainerr:
  enabled: true
  required: false
  url: http://maintainerr:6246
  integrations:
    enabled: true
    required: false
    test_connections: true
    main:
      enabled: true
      application_url: maintainerr.local
      media_server_type: jellyfin
      jellyfin_url: http://jellyfin:8096
      jellyfin_server_name: Jellyfin
      jellyfin_api_key_env: JELLYFIN_API_KEY
      jellyfin_user_id_env: JELLYFIN_USER_ID
    radarr:
      enabled: true
      server_name: Radarr
      url: http://radarr:7878
      api_key_env: RADARR_API_KEY
    sonarr:
      enabled: true
      server_name: Sonarr
      url: http://sonarr:8989
      api_key_env: SONARR_API_KEY
    jellyseerr:
      enabled: true
      url: http://jellyseerr:5055
      api_key_env: JELLYSEERR_API_KEY
    tautulli:
      enabled: true
      url: http://tautulli:8181
      api_key_env: TAUTULLI_API_KEY
      api_key_config_path: tautulli/config.ini
  policy_relative_path: maintainerr/policy.json
  rules_library:
    enabled: true
    include_defaults: true
    relative_path: maintainerr/rules
    merge_mode: append
    enabled_files: []
  policy:
    retention:
      max_disk_used_percent: 65
      target_disk_used_percent: 58
      protect_recently_added_days: 21
      protect_unwatched_days: 30
flaresolverr:
  enabled: true
  required: false
  url: http://flaresolverr:8191
  proxy_name: FlareSolverr
  request_timeout_seconds: 60
  test_connection: true
  tags: []
