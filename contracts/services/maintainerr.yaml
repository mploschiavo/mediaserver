service:
  id: maintainerr
  name: Maintainerr
  desc: Library cleanup
  category: management
  host: maintainerr
  port: 6246
  health_path: /app/maintainerr/api/settings
  preserve_path_prefix: true
  top_level_config_key: true
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # Maintainerr is a downstream consumer of other services' API
  # keys; it has no key of its own. The lifecycle implements the
  # "no api key concept" shape (probe_running real, key methods
  # return ProbeResult.ok / Outcome.success(None)).
  lifecycle_class: media_stack.adapters.maintainerr.lifecycle:MaintainerrLifecycle
  technology: maintainerr
  app_service_classes:
    maintainerr_service: media_stack.services.apps.maintainerr.service:MaintainerrService
    maintainerr_policy_service: media_stack.services.apps.maintainerr.policy_service:MaintainerrPolicyService
  service_technology_map:
    maintainerr_service: maintainerr
    maintainerr_policy_service: maintainerr
  jobs:
    # ADR-0010 Phase 7 — promise→Job migration for the
    # ``maintainerr-rules-linked-to-arr`` promise. Replaces the
    # ``ensured_by: type: lifecycle`` indirection.
    "maintainerr:ensure-rules-linked-to-arr":
      handler: media_stack.adapters.maintainerr.lifecycle:ensure_rules_linked_to_arr
      label: "Ensure Maintainerr rules linked to *arr"
      satisfies: [maintainerr-rules-linked-to-arr]
      requires: []
  event_handlers:
    ENSURE:
      ensure_maintainerr_policy: media_stack.services.apps.maintainerr.runtime_ops:ensure_maintainerr_policy
      ensure_maintainerr_integrations: media_stack.services.apps.maintainerr.runtime_ops:ensure_maintainerr_integrations

  # ADR-0006 Phase 3 — Maintainerr family migration. The Maintainerr
  # promise lives HERE alongside the service's lifecycle_class +
  # event_handlers declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Maintainerr guarantee at bootstrap?" audit is one file read;
  # renaming ``configure-collections`` surfaces the promise's
  # ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Only a single Maintainerr promise migrates — collections-link-to-arr
  # is the bootstrap-time guarantee that the Radarr/Sonarr cross-wiring
  # actually populated each collection's ``radarrSettingsId`` /
  # ``sonarrSettingsId`` (Maintainerr is a pure downstream consumer of
  # the *arrs and has no key of its own; see lifecycle_class above).
  promises:
    # --- Maintainerr → *arr cross-wiring ----------------------------------
    #
    # ADR-0005 Phase 3 cutover (2026-05-03): probe + ensured_by
    # flipped to lifecycle-typed dispatch. The legacy
    # ``ensured_by: configure-collections`` reference was a misnomer —
    # ``configure-collections`` is the Jellyfin auto-collections job
    # (see ``contracts/services/jellyfin.yaml``), unrelated to
    # Maintainerr's ``radarrSettingsId`` / ``sonarrSettingsId`` linkage.
    # The lifecycle ensurer (``MaintainerrLifecycle.ensure_rules_linked_to_arr``)
    # delegates to the real handler — ``ensure_maintainerr_integrations``
    # — via the wide-handler delegation pattern (Jellyseerr precedent).
    # See ``src/media_stack/adapters/maintainerr/rules_wiring.py``
    # and ``tests/unit/contracts/test_maintainerr_rules_promise_driven.py``.
    - id: maintainerr-rules-linked-to-arr
      description: Movie rules link to Radarr; TV rules link to Sonarr (not None)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: maintainerr
        method: probe_rules_linked_to_arr
      ensured_by:
        type: job
        job_name: "maintainerr:ensure-rules-linked-to-arr"
defaults:
  enabled: true
  required: false
  url: http://maintainerr:6246
  integrations:
    enabled: true
    required: false
    test_connections: true
    main:
      enabled: true
      media_server_type: jellyfin
      jellyfin_url: http://jellyfin:8096
      jellyfin_server_name: Jellyfin
      jellyfin_api_key_env: JELLYFIN_API_KEY
      jellyfin_user_id_env: JELLYFIN_USER_ID
    radarr:
      enabled: true
      server_name: Radarr
      url: http://radarr:7878
      api_key_env: RADARR_API_KEY
    sonarr:
      enabled: true
      server_name: Sonarr
      url: http://sonarr:8989
      api_key_env: SONARR_API_KEY
    jellyseerr:
      enabled: true
      url: http://jellyseerr:5055
      api_key_env: JELLYSEERR_API_KEY
    tautulli:
      enabled: true
      url: http://tautulli:8181
      api_key_env: TAUTULLI_API_KEY
      api_key_config_path: tautulli/config.ini
  policy_relative_path: maintainerr/policy.json
  rules_library:
    enabled: true
    include_defaults: true
    relative_path: maintainerr/rules
    merge_mode: append
  policy:
    retention:
      max_disk_used_percent: 65
      target_disk_used_percent: 58
      protect_recently_added_days: 21
      protect_unwatched_days: 30
  default_policy:
    version: 1
    retention:
      max_disk_used_percent: 65
      target_disk_used_percent: 58
      protect_recently_added_days: 21
      protect_unwatched_days: 30
      minimum_rating_to_keep: 6.5
    rules: []
