service:
  id: bazarr
  name: Bazarr
  desc: Subtitles
  category: automation
  host: bazarr
  port: 6767
  health_path: /api/system/status
  auth_path: /api/system/status
  auth_mode: X-Api-Key
  api_key_env: BAZARR_API_KEY
  api_key_config: bazarr/config/config.yaml
  api_key_format: yaml
  version_path: /api/system/status
  version_json_key: data.bazarr_version
  password_config: bazarr/config/config.yaml
  preserve_path_prefix: true
  top_level_config_key: true
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # YAML variant of the *arr/Sab "wait for the file" mint pattern.
  # Eliminates the silent-error-as-ok shape that the legacy
  # ensure-bazarr-language-profile job exhibited.
  lifecycle_class: media_stack.adapters.bazarr.lifecycle:BazarrLifecycle
  technology: bazarr
  aliases:
  - barr
  app_service_classes:
    bazarr_service: media_stack.services.apps.bazarr.service:BazarrService
  service_technology_map:
    bazarr_service: bazarr
  jobs:
    # ADR-0010 Phase 7 — single Job satisfies all five bazarr-*
    # promises. The legacy ensurer writes profile + toggles +
    # providers + arr-integration + jellyfin-plugin-config in one
    # form-encoded POST; splitting into per-promise Jobs would
    # cause five redundant POSTs to clobber the shared settings
    # document.
    "bazarr:ensure-config-wiring":
      handler: media_stack.adapters.bazarr.lifecycle:ensure_config_wiring
      label: "Ensure Bazarr config (profile + providers + arr + jellyfin-plugin)"
      satisfies:
        - bazarr-language-profile
        - bazarr-default-profile-toggles
        - bazarr-providers
        - bazarr-arr-integration
        - bazarr-jellyfin-plugin-config
      requires: []
  # ADR-0006 Phase 3b — Bazarr family migration. The five Bazarr
  # promises live HERE alongside the service's lifecycle_class /
  # event_handlers / app_service_classes declarations rather than in
  # the monolithic ``contracts/promises/promises.yaml``. Co-locating
  # means a "what does Bazarr do at bootstrap?" audit is one file
  # read; renaming ``ensure-bazarr-language-profile`` surfaces every
  # promise's ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # ADR-0005 Phase 3 cutover: all five Bazarr promises flipped from
  # http_json/file_text probes + string ``ensured_by:
  # ensure-bazarr-language-profile`` to lifecycle dispatch through
  # ``BazarrLifecycle.probe_*`` and ``BazarrLifecycle.ensure_config_wiring``.
  # Same handler logic under the hood (``BazarrConfigWirer`` ports the
  # legacy ``ensure_bazarr_language_profile`` job verbatim); different
  # invocation. Reverting = restore each promise's http_json/file_text
  # probe and the string ``ensured_by``.
  #
  # All five share ``ensure_config_wiring`` because the legacy ensurer
  # writes profile + toggles + providers + arr-integration in ONE
  # form-encoded POST — five ensurers would mean five redundant POSTs
  # that each clobber the shared settings document. Per-promise
  # probes still differ (each asserts its own slice of the response).
  promises:
    - id: bazarr-language-profile
      description: Bazarr has at least one language profile (default English)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: bazarr
        method: probe_language_profile
      ensured_by:
        type: job
        job_name: "bazarr:ensure-config-wiring"

    - id: bazarr-default-profile-toggles
      description: Bazarr auto-assigns the default profile to new series + movies
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: bazarr
        method: probe_default_profile_toggles
      ensured_by:
        type: job
        job_name: "bazarr:ensure-config-wiring"

    - id: bazarr-providers
      description: Bazarr has the curated subtitle provider set enabled
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: bazarr
        method: probe_providers
      ensured_by:
        type: job
        job_name: "bazarr:ensure-config-wiring"

    - id: bazarr-arr-integration
      description: Bazarr has Sonarr + Radarr connections configured
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: bazarr
        method: probe_arr_integration
      ensured_by:
        type: job
        job_name: "bazarr:ensure-config-wiring"

    - id: bazarr-jellyfin-plugin-config
      description: Jellyfin Bazarr plugin config has the right URL + API key
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: bazarr
        method: probe_jellyfin_plugin_config
      ensured_by:
        type: job
        job_name: "bazarr:ensure-config-wiring"

  event_handlers:
    ENSURE:
      ensure_bazarr_arr_integration: media_stack.services.apps.bazarr.runtime_ops:ensure_bazarr_arr_integration
defaults:
  enabled: true
  required: false
  url: http://bazarr:6767
  base_url: /app/bazarr
  config_relative_path: bazarr/config/config.yaml
  subtitle_defaults:
    enabled: true
    providers:
    - opensubtitlescom
    - podnapisi
    - addic7ed
    general:
      serie_default_enabled: true
      movie_default_enabled: true
      single_language: false
      minimum_score: 70
      minimum_score_movie: 70
      use_embedded_subs: true
      ignore_pgs_subs: true
      ignore_vobsub_subs: true
