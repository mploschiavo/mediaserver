service:
  id: homepage
  name: Homepage
  desc: Dashboard
  category: management
  host: homepage
  port: 3000
  health_path: /
  top_level_config_key: true
plugin:
  technology: homepage
  app_service_classes:
    homepage_service: media_stack.services.apps.homepage.service:HomepageService
  service_technology_map:
    homepage_service: homepage
  event_handlers:
    ENSURE:
      ensure_homepage_services_config: media_stack.services.apps.homepage.runtime_ops:ensure_homepage_services_config
defaults:
  enabled: true
  required: false
  scheme: http
  services_relative_path: homepage/services.yaml
