service:
  id: sonarr
  name: Sonarr
  desc: TV automation
  category: automation
  host: sonarr
  port: 8989
  health_path: /ping
  auth_path: /api/v3/system/status
  auth_mode: X-Api-Key
  api_key_env: SONARR_API_KEY
  api_key_config: sonarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v3/system/status
  version_json_key: version
  stats_path: /api/v3/series
  stats_label: series
  history_path: /api/v3/history?pageSize=10&sortDirection=descending&sortKey=date
  quality_profile_path: /api/v3/qualityprofile
  import_list_path: /api/v3/importlist
  recent_path: /api/v3/series?sortKey=dateAdded&sortDirection=descending
  login_mode: form
  login_path: /login
  password_api_path: /api/v3/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/sonarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: sonarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  technology: sonarr
  aliases:
  - sarr
  adapter_class: media_stack.services.apps.servarr.technologies.sonarr:SonarrAdapter
  capabilities:
    default_download_category: tv
    root_folder: /media/tv
    supports_series_folder_management: true
    supports_seed_series: true
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.sonarr:SonarrAdapter
  jobs:
    configure-arr-clients:
      handler: media_stack.services.apps.servarr.configure_arr_clients_job:configure_arr_clients
      label: "Update download client config"
      phase: download_clients
      priority: 10
      requires: []
    configure-auto-scan:
      handler: media_stack.services.apps.servarr.configure_auto_scan_job:configure_auto_scan
      label: "Update auto-scan"
      phase: post
      priority: 80
      requires: []

  # ADR-0006 Phase 3 — Servarr family migration. The Sonarr-side
  # promises live HERE alongside the service's jobs / lifecycle_class
  # declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Sonarr guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-arr-jellyfin-notifier`` or ``push-indexers``
  # surfaces the promise's ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # The five Sonarr promises preserve their original semantics
  # verbatim (probe shape, ensured_by job-name strings, platform
  # tags). None carry ``bootstrap_blocking`` — the orchestrator's
  # post-bootstrap reconciliation handles them.
  promises:
    # --- Sonarr → Jellyfin notifier ---------------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_jellyfin_notifier /
    # ensure_jellyfin_notifier instead of the legacy
    # ensure-arr-jellyfin-notifier job. Same handler under the hood;
    # different invocation. Reverting = restore the http_json probe
    # + string ``ensured_by``.
    - id: sonarr-jellyfin-notifier
      description: Sonarr has the media-stack-jellyfin MediaBrowser notifier
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_jellyfin_notifier
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_jellyfin_notifier

    # --- Indexer pipeline (Sonarr side) -----------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_has_indexers / ensure_indexers instead
    # of the legacy ``push-indexers`` job. The ensurer narrows the
    # legacy whole-pipeline run to its per-*arr essence: short-
    # circuit if this *arr already has indexers, otherwise trigger
    # Prowlarr's ``ApplicationIndexerSync`` (forceSync=true) — the
    # same HTTP call the legacy pipeline made internally. Reverting
    # = restore the http_json probe + string ``ensured_by``.
    - id: sonarr-has-indexers
      description: Sonarr received at least one indexer from Prowlarr push-sync
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_has_indexers
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_indexers

    # --- Sonarr seed series -----------------------------------------------
    # ADR-0005 Phase 3 cutover (wide-handler delegation): probe +
    # ensurer dispatch through ServarrLifecycle.probe_has_series /
    # ensure_has_series instead of the legacy
    # ensure-sonarr-seed-series job. The wirer's probe owns the
    # idempotent skip (count series >= 5); the ensurer delegates to
    # the legacy handler in services.apps.core.job_adapters via
    # injected configure_handler + job_context_factory callables —
    # the legacy handler is wide enough (~100 LoC of Sonarr-API
    # round-trips + per-title tvdbId lookups) that duplicating it
    # inside the wirer would lose the existing test coverage.
    # Reverting = restore the http_json probe + string ``ensured_by``.
    - id: sonarr-has-series
      description: Sonarr has the seed-series titles + the popular-TV CustomImport
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_has_series
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_has_series

    # --- qBittorrent download client wiring (Sonarr) ----------------------
    # ADR-0005 Phase 5b cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_download_client / ensure_download_client.
    # The ``ensure-arr-download-client`` job in core.yaml stays
    # REGISTERED (auto-heal + run_job(name)) but the bootstrap path is
    # now the orchestrator's lifecycle dispatch via this promise.
    # Reverting = restore the http_json probe + string ``ensured_by``.
    - id: sonarr-download-client
      description: Sonarr has qBit configured as enabled download client (cat=tv)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_download_client
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_download_client

    # --- Quality profiles (Sonarr) ----------------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_quality_profiles /
    # ensure_runtime_defaults instead of the legacy
    # apply-arr-runtime-defaults job. The shared ensurer covers all
    # three runtime-defaults promises (sonarr-quality-profiles +
    # radarr-quality-profiles + radarr-import-lists-auto) because
    # the legacy handler is monolithic — one call patches every
    # *arr's quality / import-list / SAB / delay-profile state in
    # one pass. Splitting into per-promise ensurers would mean three
    # redundant runs that each clobber the shared *arr settings
    # document (Bazarr monolithic-handler lesson). Reverting =
    # restore the http_json probe + string ``ensured_by``.
    - id: sonarr-quality-profiles
      description: Sonarr has at least one quality profile available
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_quality_profiles
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_runtime_defaults

    # --- API-key discoverability (Sonarr) ---------------------------------
    # ADR-0005 Phase 5c.1 (wide) — port the legacy
    # ``container_preflight_handlers`` ``run_preflight`` invocation
    # for Sonarr into the orchestrator's promise model. The probe
    # checks env-or-disk discoverability + (when reachable) validates
    # the key against ``GET /api/v3/system/status``. The ensurer
    # reads the auto-generated ``config.xml`` and persists the key
    # to ``os.environ[SONARR_API_KEY]`` plus best-effort patches the
    # ``media-stack-secrets`` k8s Secret. The ``discover-api-keys``
    # job migrated to ``orchestrator.satisfy_scope([…6 promises])``;
    # this promise is one of those six. Reverting = restore the
    # ``container_preflight_handlers`` entry + ``_run_preflights``.
    - id: sonarr-api-key-discoverable
      description: Sonarr's admin API key is in env / disk so other promises can probe it
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: sonarr
        method: probe_api_key_discoverable
      ensured_by:
        type: lifecycle
        service: sonarr
        method: ensure_api_key_discoverable
defaults:
  root_folder: /media/tv
  discovery_lists:
  - name: Trakt Popular
    type: trakt_popular
    enabled: true
    quality_profile_preferred:
    - HD-1080p
    - HD - 720p/1080p
    monitor: firstSeason
    search_on_add: true
