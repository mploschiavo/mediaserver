# Readarr — Books automation
#
# Single-file service definition. Drop in contracts/services/ to enable.
# Delete to disable. No Python code changes needed.

service:
  id: readarr
  name: Readarr
  desc: Books automation
  category: automation
  host: readarr
  port: 8787
  health_path: /ping
  auth_path: /api/v1/system/status
  auth_mode: X-Api-Key
  api_key_env: READARR_API_KEY
  api_key_config: readarr/config.xml
  api_key_format: xml
  version_path: /api/v1/system/status
  version_json_key: version
  password_api_path: /api/v1/config/host
