service:
  id: readarr
  name: Readarr
  desc: Books automation
  category: automation
  host: readarr
  port: 8787
  health_path: /ping
  auth_path: /api/v1/system/status
  auth_mode: X-Api-Key
  api_key_env: READARR_API_KEY
  api_key_config: readarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v1/system/status
  version_json_key: version
  stats_path: /api/v1/author
  stats_label: books
  login_mode: form
  login_path: /login
  password_api_path: /api/v1/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/readarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: readarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  # See sonarr.yaml for the per-service rationale. Same shared handler.
  compose_preflight_handler: media_stack.services.apps.servarr.http_preflight:run_preflight
  technology: readarr
  aliases:
  - rdr
  adapter_class: media_stack.services.apps.servarr.technologies.readarr:ReadarrAdapter
  capabilities:
    default_download_category: books
    monitor_scope_all_value: entireAuthor
    download_client_dual_priority_fields: true
  before_common_steps:
    readarr: media_stack.services.apps.servarr.servarr_adapters:readarr_before_common_steps
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.readarr:ReadarrAdapter

  # ADR-0006 Phase 3 — Readarr-side promise lives HERE alongside the
  # service's lifecycle_class + adapter declarations rather than in
  # the monolithic ``contracts/promises/promises.yaml``. Loader walks
  # both ``contracts/services/*.yaml::plugin.promises`` AND
  # ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  jobs:
    # ADR-0010 Phase 7 — promise→Job migration.
    "readarr:ensure-api-key-discoverable":
      handler: media_stack.adapters.servarr.lifecycle:readarr_ensure_api_key_discoverable
      label: "Ensure Readarr API key discoverable"
      satisfies: [readarr-api-key-discoverable]
      requires: []
    "readarr:ensure-url-base":
      handler: media_stack.adapters.servarr.lifecycle:readarr_ensure_url_base_synced
      label: "Reconcile Readarr urlBase to /app/readarr"
      satisfies: [readarr-url-base-synced]
      requires: [readarr-api-key-discoverable]
  promises:
    # --- API-key discoverability (Readarr) --------------------------------
    # ADR-0005 Phase 5c.1 (wide) — port the legacy
    # ``container_preflight_handlers`` ``run_preflight`` invocation
    # for Readarr into the orchestrator's promise model. See Sonarr's
    # analogous promise for the rationale. Reverting = restore the
    # ``container_preflight_handlers`` entry + ``_run_preflights``.
    - id: readarr-api-key-discoverable
      description: Readarr's admin API key is in env / disk so other promises can probe it
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: readarr
        method: probe_api_key_discoverable
      ensured_by:
        type: job
        job_name: "readarr:ensure-api-key-discoverable"

    - id: readarr-url-base-synced
      description: Readarr's stored urlBase matches /app/readarr (survives DB rehydration)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      depends_on: [readarr-api-key-discoverable]
      probe:
        type: lifecycle
        service: readarr
        method: probe_url_base_synced
      ensured_by:
        type: job
        job_name: "readarr:ensure-url-base"
