service:
  id: lidarr
  name: Lidarr
  desc: Music automation
  category: automation
  host: lidarr
  port: 8686
  health_path: /ping
  auth_path: /api/v1/system/status
  auth_mode: X-Api-Key
  api_key_env: LIDARR_API_KEY
  api_key_config: lidarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v1/system/status
  version_json_key: version
  stats_path: /api/v1/artist
  stats_label: artists
  login_mode: form
  login_path: /login
  password_api_path: /api/v1/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/lidarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: lidarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  # See sonarr.yaml for the per-service rationale. Same shared handler.
  compose_preflight_handler: media_stack.services.apps.servarr.http_preflight:run_preflight
  technology: lidarr
  aliases:
  - larr
  adapter_class: media_stack.services.apps.servarr.technologies.lidarr:LidarrAdapter
  capabilities:
    default_download_category: music
    monitor_scope_all_value: entireArtist
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.lidarr:LidarrAdapter

  # ADR-0006 Phase 3 — Servarr family migration. The Lidarr-side
  # promise lives HERE alongside the service's lifecycle_class +
  # adapter declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Lidarr guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-arr-jellyfin-notifier`` surfaces the promise's
  # ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Only a single Lidarr promise migrates in Phase 3 — Lidarr's
  # download-client / indexer / quality-profile guarantees aren't
  # currently asserted in the registry (the *arr family currently
  # only pins those for Sonarr + Radarr).
  jobs:
    # ADR-0010 Phase 7 — promise→Job migration.
    "lidarr:ensure-jellyfin-notifier":
      handler: media_stack.adapters.servarr.lifecycle:lidarr_ensure_jellyfin_notifier
      label: "Ensure Lidarr Jellyfin notifier"
      satisfies: [lidarr-jellyfin-notifier]
      requires: []
    "lidarr:ensure-api-key-discoverable":
      handler: media_stack.adapters.servarr.lifecycle:lidarr_ensure_api_key_discoverable
      label: "Ensure Lidarr API key discoverable"
      satisfies: [lidarr-api-key-discoverable]
      requires: []
    "lidarr:ensure-url-base":
      handler: media_stack.adapters.servarr.lifecycle:lidarr_ensure_url_base_synced
      label: "Reconcile Lidarr urlBase to /app/lidarr"
      satisfies: [lidarr-url-base-synced]
      requires: [lidarr-api-key-discoverable]
  promises:
    # --- Lidarr → Jellyfin notifier ---------------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_jellyfin_notifier /
    # ensure_jellyfin_notifier. Reverting = restore the http_json
    # probe + string ``ensured_by``.
    - id: lidarr-jellyfin-notifier
      description: Lidarr has the media-stack-jellyfin MediaBrowser notifier
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: lidarr
        method: probe_jellyfin_notifier
      ensured_by:
        type: job
        job_name: "lidarr:ensure-jellyfin-notifier"

    # --- API-key discoverability (Lidarr) ---------------------------------
    # ADR-0005 Phase 5c.1 (wide) — see Sonarr's analogous promise for
    # the rationale. Reverting = restore the
    # ``container_preflight_handlers`` entry + ``_run_preflights``.
    - id: lidarr-api-key-discoverable
      description: Lidarr's admin API key is in env / disk so other promises can probe it
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: lidarr
        method: probe_api_key_discoverable
      ensured_by:
        type: job
        job_name: "lidarr:ensure-api-key-discoverable"

    - id: lidarr-url-base-synced
      description: Lidarr's stored urlBase matches /app/lidarr (survives DB rehydration)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      depends_on: [lidarr-api-key-discoverable]
      probe:
        type: lifecycle
        service: lidarr
        method: probe_url_base_synced
      ensured_by:
        type: job
        job_name: "lidarr:ensure-url-base"
