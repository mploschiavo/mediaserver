service:
  id: lidarr
  name: Lidarr
  desc: Music automation
  category: automation
  host: lidarr
  port: 8686
  health_path: /ping
  auth_path: /api/v1/system/status
  auth_mode: X-Api-Key
  api_key_env: LIDARR_API_KEY
  api_key_config: lidarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v1/system/status
  version_json_key: version
  stats_path: /api/v1/artist
  stats_label: artists
  login_mode: form
  login_path: /login
  password_api_path: /api/v1/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/lidarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: lidarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  technology: lidarr
  aliases:
  - larr
  adapter_class: media_stack.services.apps.servarr.technologies.lidarr:LidarrAdapter
  capabilities:
    default_download_category: music
    monitor_scope_all_value: entireArtist
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.lidarr:LidarrAdapter

  # ADR-0006 Phase 3 — Servarr family migration. The Lidarr-side
  # promise lives HERE alongside the service's lifecycle_class +
  # adapter declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Lidarr guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-arr-jellyfin-notifier`` surfaces the promise's
  # ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Only a single Lidarr promise migrates in Phase 3 — Lidarr's
  # download-client / indexer / quality-profile guarantees aren't
  # currently asserted in the registry (the *arr family currently
  # only pins those for Sonarr + Radarr).
  promises:
    # --- Lidarr → Jellyfin notifier ---------------------------------------
    - id: lidarr-jellyfin-notifier
      description: Lidarr has the media-stack-jellyfin MediaBrowser notifier
      ensured_by: ensure-arr-jellyfin-notifier
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: lidarr
        path: /app/lidarr/api/v1/notification
        auth: api_key
        assert: |
          any(
            n.get('name') == 'media-stack-jellyfin'
            and n.get('implementation') == 'MediaBrowser'
            and n.get('onReleaseImport') is True
            for n in (response or [])
          )
