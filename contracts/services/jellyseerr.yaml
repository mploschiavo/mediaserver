service:
  id: jellyseerr
  name: Jellyseerr
  desc: Request manager
  category: media
  host: jellyseerr
  port: 5055
  health_path: /api/v1/status
  auth_path: /api/v1/settings/main
  auth_mode: X-Api-Key
  api_key_env: JELLYSEERR_API_KEY
  api_key_config: jellyseerr/settings.json
  api_key_format: json
  top_level_config_key: true
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # JSON variant of the *arr/Sab "wait for the file" mint pattern.
  lifecycle_class: media_stack.adapters.jellyseerr.lifecycle:JellyseerrLifecycle
  technology: jellyseerr
  aliases:
  - seerr
  phase_scripts:
    request_manager_seed_local_admin: media_stack.services.apps.jellyseerr.cli.seed_jellyseerr_local_admin_main
  app_service_classes:
    jellyseerr_service: media_stack.services.apps.jellyseerr.service:JellyseerrService
    request_manager_service: media_stack.services.apps.jellyseerr.service:JellyseerrService
  service_technology_map:
    jellyseerr_service: jellyseerr
    request_manager_service: jellyseerr
  # ADR-0005 Phase 5b.5 retired the legacy ``configure-jellyseerr``
  # registration shell. Lifecycle dispatch via
  # ``JellyseerrLifecycle.ensure_arr_servers`` (which delegates back
  # to the ``configure_jellyseerr`` handler in
  # ``application.jellyseerr.configure_jellyseerr_job``) is now the
  # only path — the ``jellyseerr-arr-servers`` promise binds via
  # lifecycle dispatch. The legacy handler stays importable for the
  # wirer; only the YAML registration shell is gone.
  jobs:
    # ADR-0010 Phase 7 — promise→Job migration. One Job per
    # ensurer-method on JellyseerrLifecycle; each
    # ``handler:`` references a module-level alias produced by
    # ``LifecycleHandlerAdapter.bind`` in ``jellyseerr/lifecycle.py``.
    "jellyseerr:ensure-oidc":
      handler: media_stack.adapters.jellyseerr.lifecycle:ensure_oidc
      label: "Ensure Jellyseerr OIDC sign-in"
      satisfies: [jellyseerr-oidc]
      requires: []
    "jellyseerr:ensure-application-url":
      handler: media_stack.adapters.jellyseerr.lifecycle:ensure_application_url
      label: "Ensure Jellyseerr applicationUrl"
      satisfies: [jellyseerr-application-url]
      requires: []
    "jellyseerr:ensure-arr-servers":
      handler: media_stack.adapters.jellyseerr.lifecycle:ensure_arr_servers
      label: "Ensure Jellyseerr Sonarr+Radarr+Jellyfin connections"
      satisfies: [jellyseerr-arr-servers]
      requires: []
    "jellyseerr:ensure-api-key-discoverable":
      handler: media_stack.adapters.jellyseerr.lifecycle:ensure_api_key_discoverable
      label: "Ensure Jellyseerr API key is discoverable"
      satisfies: [jellyseerr-api-key-discoverable]
      requires: []

  # ADR-0006 Phase 3c — Jellyseerr family migration. The three
  # Jellyseerr promises live HERE alongside the service's jobs /
  # event_handlers / lifecycle_class declarations rather than in
  # the monolithic ``contracts/promises/promises.yaml``.
  # Co-locating means a "what does Jellyseerr do at bootstrap?"
  # audit is one file read; renaming ``ensure-jellyseerr-oidc`` or
  # ``configure-jellyseerr`` surfaces each promise's ``ensured_by``
  # reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # ADR-0005 Phase 3 cutover: probes + ensurers dispatch through
  # JellyseerrLifecycle.{probe|ensure}_{oidc,application_url,arr_servers}
  # instead of the legacy ``ensure-jellyseerr-oidc`` and
  # ``configure-jellyseerr`` job handlers. Same code path under the
  # hood (the arr-servers ensurer delegates back to the existing
  # configure handler); different invocation. Reverting = restore
  # the http_json / file_json probes + string ``ensured_by`` job
  # references. Per the proof-of-pattern convention each promise
  # carries explicit ``bootstrap_blocking: true``.
  promises:
    - id: jellyseerr-oidc
      description: Jellyseerr login page shows the "Sign in with Authelia" button
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_oidc
      ensured_by:
        type: job
        job_name: "jellyseerr:ensure-oidc"

    - id: jellyseerr-application-url
      description: Jellyseerr applicationUrl is set HTTPS so OIDC redirect_uri matches Authelia's registered list
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_application_url
      ensured_by:
        type: job
        job_name: "jellyseerr:ensure-application-url"

    - id: jellyseerr-arr-servers
      description: Jellyseerr has Sonarr+Radarr+Jellyfin connections with API keys
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_arr_servers
      ensured_by:
        type: job
        job_name: "jellyseerr:ensure-arr-servers"

    # --- API-key discoverability (Jellyseerr) -----------------------------
    # ADR-0005 Phase 5c.1 (wide) — port the legacy
    # ``container_preflight_handlers`` ``run_preflight`` invocation
    # for Jellyseerr into the orchestrator's promise model. The
    # probe checks env-or-disk discoverability + (when reachable)
    # validates the key against ``GET /api/v1/auth/me``. The ensurer
    # reads ``settings.json::main.apiKey`` and persists the key to
    # ``os.environ[JELLYSEERR_API_KEY]`` plus best-effort patches the
    # ``media-stack-secrets`` k8s Secret. Reverting = restore the
    # ``container_preflight_handlers`` entry + ``_run_preflights``.
    - id: jellyseerr-api-key-discoverable
      description: Jellyseerr's admin API key is in env / disk so other promises can probe it
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_api_key_discoverable
      ensured_by:
        type: job
        job_name: "jellyseerr:ensure-api-key-discoverable"

  event_handlers:
    RUN:
      configure_jellyseerr: media_stack.services.apps.jellyseerr.runtime_ops:configure_jellyseerr
defaults:
  enabled: true
  required: false
  url: http://jellyseerr:5055
  enforce_settings_file: true
  set_media_server_type_jellyfin: true
  enable_media_server_login: false
  radarr:
    enabled: true
    name: Radarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    minimum_availability: released
  sonarr:
    enabled: true
    name: Sonarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    enable_season_folders: true
    series_type: standard
    anime_series_type: anime
    monitor_new_items: all
  jellyfin:
    configure: true
    url: http://jellyfin:8096
    api_key_env: JELLYFIN_API_KEY
    auto_discover_api_key_from_db: true
    api_key_db_path: jellyfin/data/jellyfin.db
    api_key_name_preference:
    - Jellyfin
    - Jellyseerr
