service:
  id: jellyseerr
  name: Jellyseerr
  desc: Request manager
  category: media
  host: jellyseerr
  port: 5055
  health_path: /api/v1/status
  auth_path: /api/v1/settings/main
  auth_mode: X-Api-Key
  api_key_env: JELLYSEERR_API_KEY
  api_key_config: jellyseerr/settings.json
  api_key_format: json
  top_level_config_key: true
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # JSON variant of the *arr/Sab "wait for the file" mint pattern.
  lifecycle_class: media_stack.adapters.jellyseerr.lifecycle:JellyseerrLifecycle
  technology: jellyseerr
  aliases:
  - seerr
  phase_scripts:
    request_manager_seed_local_admin: media_stack.services.apps.jellyseerr.cli.seed_jellyseerr_local_admin_main
  app_service_classes:
    jellyseerr_service: media_stack.services.apps.jellyseerr.service:JellyseerrService
    request_manager_service: media_stack.services.apps.jellyseerr.service:JellyseerrService
  service_technology_map:
    jellyseerr_service: jellyseerr
    request_manager_service: jellyseerr
  jobs:
    # ADR-0005 Phase 3 cutover: ``phase: post`` + ``priority: 5``
    # removed. The bootstrap-time path is now the orchestrator
    # dispatching ``JellyseerrLifecycle.ensure_arr_servers`` via the
    # ``jellyseerr-arr-servers`` promise above. The job stays
    # REGISTERED so ``run_job(name)`` (auto-heal + operator
    # dashboard) keeps resolving it; without ``phase`` the bootstrap
    # loader's ``phase_order`` never picks it up. Reverting =
    # restore ``phase: post`` + ``priority: 5`` AND flip the
    # promise back to ``ensured_by: configure-jellyseerr``.
    configure-jellyseerr:
      handler: media_stack.services.apps.jellyseerr.configure_jellyseerr_job:configure_jellyseerr
      label: "Update Jellyseerr"
      requires: [media_server_reachable, media_server_api_key]

  # ADR-0006 Phase 3c — Jellyseerr family migration. The three
  # Jellyseerr promises live HERE alongside the service's jobs /
  # event_handlers / lifecycle_class declarations rather than in
  # the monolithic ``contracts/promises/promises.yaml``.
  # Co-locating means a "what does Jellyseerr do at bootstrap?"
  # audit is one file read; renaming ``ensure-jellyseerr-oidc`` or
  # ``configure-jellyseerr`` surfaces each promise's ``ensured_by``
  # reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # ADR-0005 Phase 3 cutover: probes + ensurers dispatch through
  # JellyseerrLifecycle.{probe|ensure}_{oidc,application_url,arr_servers}
  # instead of the legacy ``ensure-jellyseerr-oidc`` and
  # ``configure-jellyseerr`` job handlers. Same code path under the
  # hood (the arr-servers ensurer delegates back to the existing
  # configure handler); different invocation. Reverting = restore
  # the http_json / file_json probes + string ``ensured_by`` job
  # references. Per the proof-of-pattern convention each promise
  # carries explicit ``bootstrap_blocking: true``.
  promises:
    - id: jellyseerr-oidc
      description: Jellyseerr login page shows the "Sign in with Authelia" button
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_oidc
      ensured_by:
        type: lifecycle
        service: jellyseerr
        method: ensure_oidc

    - id: jellyseerr-application-url
      description: Jellyseerr applicationUrl is set HTTPS so OIDC redirect_uri matches Authelia's registered list
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_application_url
      ensured_by:
        type: lifecycle
        service: jellyseerr
        method: ensure_application_url

    - id: jellyseerr-arr-servers
      description: Jellyseerr has Sonarr+Radarr+Jellyfin connections with API keys
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: jellyseerr
        method: probe_arr_servers
      ensured_by:
        type: lifecycle
        service: jellyseerr
        method: ensure_arr_servers

  event_handlers:
    RUN:
      configure_jellyseerr: media_stack.services.apps.jellyseerr.runtime_ops:configure_jellyseerr
defaults:
  enabled: true
  required: false
  url: http://jellyseerr:5055
  enforce_settings_file: true
  set_media_server_type_jellyfin: true
  enable_media_server_login: false
  radarr:
    enabled: true
    name: Radarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    minimum_availability: released
  sonarr:
    enabled: true
    name: Sonarr
    quality_profile_preferred_names:
    - HD-1080p
    - HD - 720p/1080p
    - HD-720p
    is4k: false
    is_default: true
    sync_enabled: true
    prevent_search: false
    enable_season_folders: true
    series_type: standard
    anime_series_type: anime
    monitor_new_items: all
  jellyfin:
    configure: true
    url: http://jellyfin:8096
    api_key_env: JELLYFIN_API_KEY
    auto_discover_api_key_from_db: true
    api_key_db_path: jellyfin/data/jellyfin.db
    api_key_name_preference:
    - Jellyfin
    - Jellyseerr
