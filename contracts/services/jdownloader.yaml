# JDownloader — alternative download client (community)
# To use: set technology_bindings.torrent_client: jdownloader in profile YAML

service:
  id: jdownloader
  name: JDownloader
  desc: Direct download client
  category: downloads
  host: jdownloader
  port: 5800
  health_path: /
plugin:
  technology: jdownloader
  aliases:
    - jd
  adapter_classes:
    download_client: media_stack.services.download_client_adapters.jdownloader:JdownloaderDownloadClientAdapter
