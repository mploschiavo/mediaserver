# =============================================================================
# Core Operations — bootstrap-pipeline jobs that aren't tied to a single app.
# =============================================================================
#
# Before this file existed, six operations (envoy-config,
# validate-credentials, post-setup, restart-apps, discover-indexers,
# push-indexers) were declared as "actions" in a separate hardcoded
# table at handlers_post.py:_CORE_ACTIONS. They had no place in the
# job DAG, no prereqs, no phase ordering — they appeared in Recent
# Activity but never in the Job tree, which made the same operations
# look like two unrelated lists to users.
#
# This contract migrates them to first-class jobs so they show up
# in the Job tree alongside per-app jobs (configure-libraries,
# configure-indexers, etc.) and benefit from the prereq DAG. Each
# job's handler is a thin adapter in
# ``media_stack.services.apps.core.job_adapters`` that calls the
# existing legacy ``action_*`` function — no behaviour change, just
# unified registration.
#
# This is NOT a "service" in the dashboard sense. The id ``core``
# is reserved; nothing renders it on the services page. The service
# block exists only because the discovery loader requires it.
# =============================================================================

service:
  id: core
  name: Core Operations
  desc: Bootstrap-pipeline operations that aren't tied to a single app
  category: infrastructure
  host: ""
  port: 0
  web_ui: false
  scalable: false

plugin:
  technology: core
  # Alias map: ``alias_name: canonical_job_name``. The dispatch
  # resolves an alias to its canonical job before looking it up in
  # the tree. Lets us preserve user-facing labels (the dashboard's
  # "Reconcile" button) without per-action code in the dispatch.
  # Adding an alias is a YAML edit, not a code change — that's the
  # whole point of putting this in the contract.
  job_aliases:
    # ``reconcile`` is what users (and the dashboard) call a
    # whole-tree re-run. Mechanically identical to ``bootstrap``;
    # the distinct name keeps the "fix drift on a running stack"
    # mental model out of the synonym for "first-time setup".
    reconcile: bootstrap

  jobs:

    # ---------------------------------------------------------------
    # pre_bootstrap phase — runs FIRST so per-app jobs find state
    # populated. Replaces the inline preflights+runner.run that used
    # to live in action_bootstrap; without this job the dispatch
    # couldn't be unified through run_job().
    # ---------------------------------------------------------------

    seed-runtime-overrides:
      handler: media_stack.services.apps.core.job_adapters:seed_runtime_overrides
      label: "Seed runtime overrides from profile"
      # Runs FIRST in pre_bootstrap so the merged routing/auth view
      # is complete before any downstream job reads it. Without this
      # seed, on a clean deploy (no operator dashboard interaction)
      # ``.controller/routing-overrides.yaml`` doesn't exist and
      # ``get_routing()`` falls back to bundled LAN defaults —
      # ingress-config then silently skips because the merged view
      # still looks empty. Idempotent: skips when the file is already
      # present (operator saved something via the dashboard). New in
      # v1.0.169 as part of the "clean re-deploy = same result"
      # contract.
      phase: pre_bootstrap
      priority: 5
      requires: []

    discover-api-keys:
      handler: media_stack.services.apps.core.job_adapters:discover_api_keys
      label: "Discover API keys"
      phase: pre_bootstrap
      priority: 10
      requires: []

    run-legacy-pipeline:
      handler: media_stack.services.apps.core.job_adapters:run_legacy_pipeline
      label: "Run legacy bootstrap"
      phase: pre_bootstrap
      priority: 20
      requires: []

    # ---------------------------------------------------------------
    # download_clients phase — sit alongside configure-indexers
    # ---------------------------------------------------------------

    discover-indexers:
      handler: media_stack.services.apps.core.job_adapters:discover_indexers
      label: "Discover indexers"
      phase: download_clients
      priority: 30
      requires: []
      # Probes ~70 candidate trackers through CloudFlare /
      # Flaresolverr, ~8-14 minutes cold. Runs in a daemon thread
      # so the rest of bootstrap completes and the dashboard is
      # usable while this churns. Result lands in job-history when
      # finished.
      non_blocking: true

    tag-indexers-for-apps:
      handler: media_stack.services.apps.core.job_adapters:tag_indexers_for_apps
      label: "Match indexers to apps"
      phase: download_clients
      # Probes each discovered indexer × each *arr app to classify
      # by content type. Another slow one — 70 indexers × 4 apps
      # per cold run. Non-blocking so it doesn't gate dashboard.
      priority: 35
      requires: []
      non_blocking: true
      # Must wait for discover-indexers to FINISH (not just dispatch).
      # Otherwise this races and tags zero indexers because discovery
      # is still in flight. ``after:`` is enforced against the daemon
      # thread's actual completion, not the dispatcher's "started" log.
      after: [discover-indexers]

    reset-prowlarr-app-mappings:
      handler: media_stack.services.apps.core.job_adapters:reset_prowlarr_app_mappings
      label: "Repair indexer sync"
      phase: download_clients
      # Runs after the tagging completes; clearing mapping rows
      # before tags exist would re-create the same race.
      after: [tag-indexers-for-apps]
      # Runs AFTER tagging (so we don't reset mappings while
      # tagging is in flight) and BEFORE push-indexers. Idempotent
      # NOOP when each *arr already has indexers — the heavy work
      # only fires when an *arr is genuinely at zero.
      #
      # Why this exists: Prowlarr's ApplicationIndexerMapping table
      # tracks "what I've already pushed to each *arr". In
      # ``addOnly`` syncLevel mode (the v1.0.110 Fix C default),
      # Prowlarr REFUSES to re-push anything in this table — even
      # when the *arr's actual DB has been wiped. Result: the *arr
      # sits at 0 indexers while Prowlarr's "sync ok" log claims
      # everything is fine. Clearing the mapping rows for any *arr
      # that's actually at zero forces the next push to re-add.
      # (Discovered v1.0.124, fix shipped v1.0.125.)
      priority: 38
      requires: []

    push-indexers:
      handler: media_stack.services.apps.core.job_adapters:push_indexers
      label: "Sync indexers to apps"
      phase: download_clients
      priority: 40
      requires: []
      # ApplicationIndexerSync only pushes indexers whose tags match
      # each *arr's filter tag — so this MUST wait for tagging to
      # finish (which itself waits for discovery via the chain above).
      after: [reset-prowlarr-app-mappings]

    ensure-qbittorrent-categories:
      handler: media_stack.services.apps.core.job_adapters:ensure_qbittorrent_categories
      label: "qBit categories (movies/tv/music/books)"
      phase: post
      priority: 84
      requires: []

    ensure-arr-download-client:
      handler: media_stack.services.apps.core.job_adapters:ensure_arr_download_client
      label: "Wire qBit as download client on each *arr"
      phase: post
      # Must come AFTER qBit categories exist so the *arr's category
      # field references something real.
      priority: 85
      requires: []
      after: [ensure-qbittorrent-categories]

    ensure-jellyfin-libraries:
      handler: media_stack.services.apps.core.job_adapters:ensure_jellyfin_libraries
      label: "Ensure Jellyfin libraries (Movies/TV/Music/Books)"
      phase: post
      priority: 86
      requires: []

    ensure-sonarr-seed-series:
      handler: media_stack.services.apps.core.job_adapters:ensure_sonarr_seed_series
      label: "Seed Sonarr with starter series"
      phase: post
      # Re-asserts the seed-series titles from arr.yaml after every
      # bootstrap. Previously a runtime hook side-effect; promoted
      # to its own job so it survives ``compose down -v`` cycles
      # (v1.0.146 systemic fix).
      priority: 87
      requires: []

    ensure-jellyseerr-oidc:
      handler: media_stack.services.apps.core.job_adapters:ensure_jellyseerr_oidc
      label: "Wire Authelia SSO into Jellyseerr"
      phase: post
      # Writes oidcLogin + oidc provider block to Jellyseerr's
      # settings.json so the login page shows the "Sign in with
      # Authelia" button. Authelia's client entry is already
      # generated from contracts/auth/oidc_clients.yaml.
      priority: 88
      requires: []

    ensure-arr-jellyfin-notifier:
      handler: media_stack.services.apps.core.job_adapters:ensure_arr_jellyfin_notifier
      label: "Wire *arr → Jellyfin library refresh"
      phase: post
      # Replaces the controller's webhook→/Library/Refresh full-scan
      # with a native MediaBrowser notifier per *arr — Jellyfin
      # rescans only the affected path on import/delete/rename.
      priority: 89
      requires: []

    ensure-bazarr-language-profile:
      handler: media_stack.services.apps.core.job_adapters:ensure_bazarr_language_profile
      label: "Set up Bazarr language profile"
      phase: post
      # Without this, Bazarr's UI shows "Missing languages profile"
      # and downloads no subtitles. Idempotent — only creates the
      # default English profile if no profiles exist yet.
      priority: 91
      requires: []

    mass-search-throttled:
      handler: media_stack.services.apps.core.job_adapters:mass_search_throttled
      label: "Search missing (throttled)"
      phase: post
      # Auto-fires at the end of bootstrap after the seed-series and
      # push-indexers jobs have produced monitored items + indexers
      # to search against. Paces dispatch (default 2s/item) so the
      # *arr's RSS sync isn't the only path to grabs — without this,
      # OLDER seed-series titles (Breaking Bad, etc.) never get
      # downloaded because Sonarr's RSS only catches currently-
      # releasing content.
      priority: 95
      requires: []
      after: [ensure-sonarr-seed-series, push-indexers]
      non_blocking: true

    recover-stuck-imports:
      handler: media_stack.services.apps.core.job_adapters:recover_stuck_imports
      label: "Force-import files the *arr queue stalled on"
      phase: post
      # Catches the "qBit-completed but *arr queue still says
      # downloading" failure mode (Shelter incident, v1.0.150).
      # Auto-fired every 30min by the controller scheduler.
      priority: 93
      requires: []

    scan-completed-downloads:
      handler: media_stack.services.apps.core.job_adapters:scan_completed_downloads
      label: "Scan completed downloads"
      phase: post
      # Fires each *arr's DownloadedXScan command against
      # /data/torrents/completed/<category>. Catches files that
      # arrived outside the *arr→webhook flow (user added a
      # torrent to qBit directly). Auto-fired every 15min by the
      # controller scheduler. No prereqs — *arrs that aren't up
      # yet are silently skipped.
      priority: 92
      requires: []

    run-media-hygiene:
      handler: media_stack.services.apps.core.job_adapters:run_media_hygiene
      label: "Clean up downloads"
      phase: post
      # Cleanup pass: prunes stalled, errored, and orphaned downloads
      # from qBit + the *arr queues. Aggressive defaults (v1.0.132):
      # stalled >4h, age >36h, eta >6h, dl<64KB/s with progress<0.98.
      # Bounded at 25 deletes per run for safety. Auto-fired hourly
      # by the controller's scheduler so end users never need to
      # log into qBit to clean up.
      priority: 90
      requires: []

    # ---------------------------------------------------------------
    # default phase — gateway / routing setup
    # ---------------------------------------------------------------

    envoy-config:
      handler: media_stack.services.apps.core.job_adapters:envoy_config
      label: "Update proxy routes"
      # Foundational — see job_framework.py phase_order comment.
      # Promoted from ``default`` to ``infrastructure`` so the
      # gateway routing exists BEFORE media_server + download_clients
      # try to reach services through it. Priority 20 keeps it
      # AFTER configure-auth (priority 5) — Envoy's ext_authz
      # filter references the auth provider config that
      # configure-auth establishes. (v1.0.149.)
      phase: infrastructure
      priority: 20
      requires: []

    ingress-config:
      handler: media_stack.services.apps.core.job_adapters:ingress_config
      label: "Update K8s Ingress rules from routing config"
      # K8s-only sibling of envoy-config. The Ingress controller is
      # the FIRST hop on K8s — without rules for the configured
      # gateway_host / per-service subdomains, requests don't even
      # reach Envoy. Compose has no equivalent (no Ingress layer).
      # No-op outside K8s (K8S_NAMESPACE unset → returns skipped).
      # Same phase + priority as envoy-config so they reconcile
      # together. (v1.0.162.)
      phase: infrastructure
      priority: 21
      requires: []

    # ---------------------------------------------------------------
    # post phase — runs after services are configured
    # ---------------------------------------------------------------

    apply-arr-runtime-defaults:
      handler: media_stack.services.apps.core.job_adapters:apply_arr_runtime_defaults
      label: "Update download settings"
      phase: post
      # Runs BEFORE validate-credentials so the patches affect any
      # subsequent search/grab decisions in this same bootstrap run.
      priority: 55
      requires: [arr_apps_reachable]

    validate-credentials:
      handler: media_stack.services.apps.core.job_adapters:validate_credentials
      label: "Validate credentials"
      phase: post
      priority: 60
      # Without an API key for the media server we can't probe its
      # /Users/AuthenticateByName endpoint — that's the canonical
      # "did the controller's admin password actually take?" signal.
      # ``arr_apps_reachable`` waits for the *arr family to be
      # responding before we run credential probes against them;
      # otherwise the cosmetic "5/7 credential checks did not pass"
      # warning fires on every fresh install while services are
      # still warming up.
      requires: [media_server_api_key, arr_apps_reachable]

    post-setup:
      handler: media_stack.services.apps.core.job_adapters:post_setup
      label: "Finalize setup"
      phase: post
      priority: 70
      # Post-setup tunes the media server (libraries, hardware
      # transcoding hints) and pushes the stack-admin password to
      # service admins. Both depend on the media server being
      # reachable.
      requires: [media_server_api_key, media_server_reachable]

    restart-apps:
      handler: media_stack.services.apps.core.job_adapters:restart_apps
      label: "Restart services"
      phase: post
      priority: 80
      requires: []
