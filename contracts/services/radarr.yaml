service:
  id: radarr
  name: Radarr
  desc: Movie automation
  category: automation
  host: radarr
  port: 7878
  health_path: /ping
  auth_path: /api/v3/system/status
  auth_mode: X-Api-Key
  api_key_env: RADARR_API_KEY
  api_key_config: radarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v3/system/status
  version_json_key: version
  stats_path: /api/v3/movie
  stats_label: movies
  history_path: /api/v3/history?pageSize=10&sortDirection=descending&sortKey=date
  quality_profile_path: /api/v3/qualityprofile
  import_list_path: /api/v3/importlist
  recent_path: /api/v3/movie?sortKey=dateAdded&sortDirection=descending
  login_mode: form
  login_path: /login
  password_api_path: /api/v3/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/radarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: radarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  technology: radarr
  aliases:
  - rarr
  adapter_class: media_stack.services.apps.servarr.technologies.radarr:RadarrAdapter
  capabilities:
    default_download_category: movies
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.radarr:RadarrAdapter

  # ADR-0006 Phase 3 — Servarr family migration. The Radarr-side
  # promises live HERE alongside the service's lifecycle_class +
  # adapter declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Radarr guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-arr-jellyfin-notifier`` or ``push-indexers``
  # surfaces the promise's ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # The five Radarr promises preserve their original semantics
  # verbatim (probe shape, ensured_by job-name strings, platform
  # tags). None carry ``bootstrap_blocking`` — the orchestrator's
  # post-bootstrap reconciliation handles them.
  jobs:
    # ADR-0010 Phase 7 — promise→Job migration. Each handler binds
    # to ``ServarrLifecycle.<method>`` parameterized with
    # ``service_id="radarr"`` via ``LifecycleHandlerAdapter.bind``
    # (see servarr/lifecycle.py module-level aliases).
    "radarr:ensure-jellyfin-notifier":
      handler: media_stack.adapters.servarr.lifecycle:radarr_ensure_jellyfin_notifier
      label: "Ensure Radarr Jellyfin notifier"
      satisfies: [radarr-jellyfin-notifier]
      requires: []
    "radarr:ensure-indexers":
      handler: media_stack.adapters.servarr.lifecycle:radarr_ensure_indexers
      label: "Ensure Radarr indexers"
      satisfies: [radarr-has-indexers]
      requires: []
    "radarr:ensure-runtime-defaults":
      handler: media_stack.adapters.servarr.lifecycle:radarr_ensure_runtime_defaults
      label: "Ensure Radarr runtime defaults (quality profiles + import-lists-auto)"
      satisfies: [radarr-import-lists-auto, radarr-quality-profiles]
      requires: []
    "radarr:ensure-download-client":
      handler: media_stack.adapters.servarr.lifecycle:radarr_ensure_download_client
      label: "Ensure Radarr download client"
      satisfies: [radarr-download-client]
      requires: []
    "radarr:ensure-api-key-discoverable":
      handler: media_stack.adapters.servarr.lifecycle:radarr_ensure_api_key_discoverable
      label: "Ensure Radarr API key discoverable"
      satisfies: [radarr-api-key-discoverable]
      requires: []
  promises:
    # --- Radarr → Jellyfin notifier ---------------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_jellyfin_notifier /
    # ensure_jellyfin_notifier. Reverting = restore the http_json
    # probe + string ``ensured_by``.
    - id: radarr-jellyfin-notifier
      description: Radarr has the media-stack-jellyfin MediaBrowser notifier
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_jellyfin_notifier
      ensured_by:
        type: job
        job_name: "radarr:ensure-jellyfin-notifier"

    # --- Indexer pipeline (Radarr side) -----------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_has_indexers / ensure_indexers instead
    # of the legacy ``push-indexers`` job. The ensurer narrows the
    # legacy whole-pipeline run to its per-*arr essence: short-
    # circuit if this *arr already has indexers, otherwise trigger
    # Prowlarr's ``ApplicationIndexerSync`` (forceSync=true) — the
    # same HTTP call the legacy pipeline made internally. Reverting
    # = restore the http_json probe + string ``ensured_by``.
    - id: radarr-has-indexers
      description: Radarr received at least one indexer from Prowlarr push-sync
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_has_indexers
      ensured_by:
        type: job
        job_name: "radarr:ensure-indexers"

    # --- Default-profile content (Radarr import lists) --------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_import_lists_auto /
    # ensure_runtime_defaults. Probe is Radarr-only (sonarr lifecycle
    # short-circuits via the unsupported-service pattern). Ensurer
    # is shared with the two quality-profiles promises — the legacy
    # handler reconciles every *arr's import-lists in one pass, so
    # per-promise ensurers would clobber each other. Reverting =
    # restore the http_json probe + string ``ensured_by``.
    - id: radarr-import-lists-auto
      description: Radarr import lists have enableAuto=true (TMDb popular movies auto-add)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_import_lists_auto
      ensured_by:
        type: job
        job_name: "radarr:ensure-runtime-defaults"

    # --- qBittorrent download client wiring (Radarr) ----------------------
    # ADR-0005 Phase 5b cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_download_client / ensure_download_client.
    # The ``ensure-arr-download-client`` job in core.yaml stays
    # REGISTERED (auto-heal + run_job(name)) but the bootstrap path is
    # now the orchestrator's lifecycle dispatch via this promise.
    # Reverting = restore the http_json probe + string ``ensured_by``.
    - id: radarr-download-client
      description: Radarr has qBit configured as enabled download client (cat=movies)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_download_client
      ensured_by:
        type: job
        job_name: "radarr:ensure-download-client"

    # --- Quality profiles (Radarr) ----------------------------------------
    # ADR-0005 Phase 3 cutover: probe + ensurer dispatch through
    # ServarrLifecycle.probe_quality_profiles /
    # ensure_runtime_defaults. Shared ensurer with the other two
    # runtime-defaults promises (rationale on the Sonarr-side cutover
    # comment + the wirer module top — Bazarr monolithic-handler
    # lesson). Reverting = restore the http_json probe + string
    # ``ensured_by``.
    - id: radarr-quality-profiles
      description: Radarr has at least one quality profile available
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_quality_profiles
      ensured_by:
        type: job
        job_name: "radarr:ensure-runtime-defaults"

    # --- API-key discoverability (Radarr) ---------------------------------
    # ADR-0005 Phase 5c.1 (wide) — see Sonarr's analogous promise for
    # the rationale. Reverting = restore the
    # ``container_preflight_handlers`` entry + ``_run_preflights``.
    - id: radarr-api-key-discoverable
      description: Radarr's admin API key is in env / disk so other promises can probe it
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: radarr
        method: probe_api_key_discoverable
      ensured_by:
        type: job
        job_name: "radarr:ensure-api-key-discoverable"
