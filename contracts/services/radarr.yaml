service:
  id: radarr
  name: Radarr
  desc: Movie automation
  category: automation
  host: radarr
  port: 7878
  health_path: /ping
  auth_path: /api/v3/system/status
  auth_mode: X-Api-Key
  api_key_env: RADARR_API_KEY
  api_key_config: radarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v3/system/status
  version_json_key: version
  stats_path: /api/v3/movie
  stats_label: movies
  history_path: /api/v3/history?pageSize=10&sortDirection=descending&sortKey=date
  quality_profile_path: /api/v3/qualityprofile
  import_list_path: /api/v3/importlist
  recent_path: /api/v3/movie?sortKey=dateAdded&sortDirection=descending
  login_mode: form
  login_path: /login
  password_api_path: /api/v3/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/radarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: radarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  technology: radarr
  aliases:
  - rarr
  adapter_class: media_stack.services.apps.servarr.technologies.radarr:RadarrAdapter
  capabilities:
    default_download_category: movies
  adapter_classes:
    servarr: media_stack.services.apps.servarr.technologies.radarr:RadarrAdapter

  # ADR-0006 Phase 3 — Servarr family migration. The Radarr-side
  # promises live HERE alongside the service's lifecycle_class +
  # adapter declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Radarr guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-arr-jellyfin-notifier`` or ``push-indexers``
  # surfaces the promise's ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # The five Radarr promises preserve their original semantics
  # verbatim (probe shape, ensured_by job-name strings, platform
  # tags). None carry ``bootstrap_blocking`` — the orchestrator's
  # post-bootstrap reconciliation handles them.
  promises:
    # --- Radarr → Jellyfin notifier ---------------------------------------
    - id: radarr-jellyfin-notifier
      description: Radarr has the media-stack-jellyfin MediaBrowser notifier
      ensured_by: ensure-arr-jellyfin-notifier
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: radarr
        path: /app/radarr/api/v3/notification
        auth: api_key
        assert: |
          any(
            n.get('name') == 'media-stack-jellyfin'
            and n.get('implementation') == 'MediaBrowser'
            and n.get('onDownload') is True
            for n in (response or [])
          )

    # --- Indexer pipeline (Radarr side) -----------------------------------
    - id: radarr-has-indexers
      description: Radarr received at least one indexer from Prowlarr push-sync
      ensured_by: push-indexers
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: radarr
        path: /app/radarr/api/v3/indexer
        auth: api_key
        assert: "isinstance(response, list) and len(response) >= 1"

    # --- Default-profile content (Radarr import lists) --------------------
    - id: radarr-import-lists-auto
      description: Radarr import lists have enableAuto=true (TMDb popular movies auto-add)
      ensured_by: apply-arr-runtime-defaults
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: radarr
        path: /app/radarr/api/v3/importlist
        auth: api_key
        assert: |
          isinstance(response, list) and response
          and all(l.get('enableAuto') is True for l in response if l.get('enabled'))

    # --- qBittorrent download client wiring (Radarr) ----------------------
    - id: radarr-download-client
      description: Radarr has qBit configured as enabled download client (cat=movies)
      ensured_by: ensure-arr-download-client
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: radarr
        path: /app/radarr/api/v3/downloadclient
        auth: api_key
        assert: |
          any(
            c.get('enable') is True
            and c.get('implementation') == 'QBittorrent'
            and any(f.get('name') == 'movieCategory' and f.get('value') == 'movies'
                    for f in c.get('fields') or [])
            for c in (response or [])
          )

    # --- Quality profiles (Radarr) ----------------------------------------
    - id: radarr-quality-profiles
      description: Radarr has at least one quality profile available
      ensured_by: apply-arr-runtime-defaults
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: radarr
        path: /app/radarr/api/v3/qualityprofile
        auth: api_key
        assert: "isinstance(response, list) and len(response) >= 1"
