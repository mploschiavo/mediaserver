service:
  id: qbittorrent
  name: qBittorrent
  desc: Torrent client
  category: downloads
  host: qbittorrent
  port: 8080
  health_path: /api/v2/app/version
  login_mode: form
  login_path: /api/v2/auth/login
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # qBit's "key" is the WebUI admin password (no static API key); see
  # the lifecycle module docstring for the auth-flow rationale.
  lifecycle_class: media_stack.adapters.qbittorrent.lifecycle:QbittorrentLifecycle
  technology: qbittorrent
  aliases:
  - qbit
  - qb
  adapter_class: media_stack.services.apps.qbittorrent.download_client_adapter:QbittorrentDownloadClientAdapter
  app_service_classes:
    qbittorrent_service: media_stack.services.apps.qbittorrent.service:QBittorrentService
    torrent_client_service: media_stack.services.apps.qbittorrent.service:QBittorrentService
  service_technology_map:
    qbittorrent_service: qbittorrent
    torrent_client_service: qbittorrent
  jobs:
    configure-categories:
      handler: media_stack.services.apps.qbittorrent.configure_categories_job:configure_categories
      label: "Update download categories"
      phase: download_clients
      priority: 10

    # ADR-0010 Phase 7 — promise→Job migration. Replaces the
    # ``ensured_by: type: lifecycle`` indirection: the promise's
    # ``ensured_by`` now points at this Job by name; JobRunner.run
    # invokes the wirer's ensure() via the module-level alias.
    # ``satisfies:`` mirrors the promise id so the orchestrator's
    # promise-id → Job-name resolution is data-driven.
    "qbittorrent:ensure-categories":
      handler: media_stack.adapters.qbittorrent.categories_wiring:ensure_categories
      label: "Ensure qBittorrent categories"
      satisfies: [qbittorrent-categories]
      requires: []

    # ADR-0013 Phase 2 — verify the stored stack-admin credentials
    # authenticate against qBittorrent's WebUI. Replaces the legacy
    # ``runner.run`` path's inline login check that produced the
    # 2026-05-10 compose error ``run-legacy-pipeline: qBittorrent
    # login failed with secret credentials`` when the controller's
    # stored secret no longer matched qBittorrent's password.
    #
    # On the framework path the orchestrator ticks this job until
    # the promise ``qbittorrent-credentials-synced`` is satisfied;
    # the cooldown machinery handles transient (WebUI unreachable)
    # vs permanent (cred mismatched) failures honestly. The actual
    # password rotation lives in
    # ``infrastructure.qbittorrent.compose_preflight`` because
    # rotating requires container access (docker exec / kubectl
    # exec) which the lifecycle layer does not have; Phase 3+ of
    # ADR-0013 will fold the rotation into a sibling ensurer that
    # takes a container-access port from
    # ``OrchestrationContext.extra``.
    "qbittorrent:ensure-credentials":
      handler: media_stack.adapters.qbittorrent.lifecycle:ensure_credentials
      label: "Verify qBittorrent stack-admin credentials"
      satisfies: [qbittorrent-credentials-synced]
      requires: []
  event_handlers:
    ACQUIRE:
      torrent_client_login: media_stack.services.apps.qbittorrent.runtime_ops:torrent_client_login
    ENSURE:
      setup_torrent_categories: media_stack.services.apps.qbittorrent.runtime_ops:setup_torrent_categories
  adapter_classes:
    download_client: media_stack.services.apps.qbittorrent.download_client_adapter:QbittorrentDownloadClientAdapter
  preflight_handler:
    name: qbittorrent
    handler: media_stack.services.apps.qbittorrent.http_preflight:run_preflight
    optional: true
  phase_scripts:
    torrent_client_credentials: media_stack.services.apps.qbittorrent.cli.ensure_qbit_credentials_main
  compose_preflight_handler: media_stack.services.apps.qbittorrent.compose_preflight:ensure_compose_torrent_client_credentials

  # ADR-0006 Phase 3 — qBittorrent family migration. The qBit-side
  # promise lives HERE alongside the service's lifecycle_class /
  # jobs / event_handlers declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does qBit guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-qbittorrent-categories`` surfaces the promise's
  # ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Only a single qBit promise migrates in this batch — the
  # categories ensurer is the only registry-level guarantee qBit
  # currently exposes (login / WebUI-up / category-create itself
  # are covered by the lifecycle + ACQUIRE/ENSURE event handlers
  # above, not by separate promises).
  promises:
    # --- Default-profile content -----------------------------------------------
    #
    # ADR-0005 Phase 3 cutover. Probe + ensurer flipped from
    # ``http_text`` + string ``ensured_by: ensure-qbittorrent-categories``
    # to ``{type: lifecycle, service: qbittorrent, method: …}``. The
    # orchestrator now dispatches ``QbittorrentLifecycle.ensure_categories``
    # (which delegates to ``CategoriesWirer``) at bootstrap time.
    #
    # Why the cutover: the legacy ``ensure_qbittorrent_categories`` job
    # is the canonical example in the silent-error-as-ok bug class — a
    # login failure logs ``err=…`` while the run reports ``status=ok``,
    # masking the real config-level problem. The lifecycle path returns
    # ``Outcome.failure(transient=…, evidence=…)`` honestly.
    #
    # Reverting = flip both ``probe`` and ``ensured_by`` back to the
    # legacy shape AND restore ``phase: post`` + ``priority: 84`` on
    # the ``ensure-qbittorrent-categories`` job in
    # ``contracts/services/core.yaml``.
    - id: qbittorrent-categories
      description: qBit has the four content categories (movies/tv/music/books)
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: qbittorrent
        method: probe_categories
      ensured_by:
        type: job
        job_name: "qbittorrent:ensure-categories"

    # ADR-0013 Phase 2 — credential verification promise. Mirrors the
    # categories promise shape: a cheap HTTP login check on the
    # probe side, the same call (via ensure_credentials) on the
    # ensurer side. Marked ``bootstrap_blocking: true`` because every
    # downstream qBit work (categories, *arr download-client wiring)
    # depends on the controller being able to authenticate.
    - id: qbittorrent-credentials-synced
      description: Stored stack-admin creds authenticate against qBittorrent WebUI
      platforms: [compose, k8s]
      bootstrap_blocking: true
      probe:
        type: lifecycle
        service: qbittorrent
        method: probe_credentials_synced
      ensured_by:
        type: job
        job_name: "qbittorrent:ensure-credentials"
