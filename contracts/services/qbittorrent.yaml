service:
  id: qbittorrent
  name: qBittorrent
  desc: Torrent client
  category: downloads
  host: qbittorrent
  port: 8080
  health_path: /api/v2/app/version
  login_mode: form
  login_path: /api/v2/auth/login
plugin:
  # ADR-0003 Phase 3: ServiceLifecycle Protocol implementation.
  # qBit's "key" is the WebUI admin password (no static API key); see
  # the lifecycle module docstring for the auth-flow rationale.
  lifecycle_class: media_stack.adapters.qbittorrent.lifecycle:QbittorrentLifecycle
  technology: qbittorrent
  aliases:
  - qbit
  - qb
  adapter_class: media_stack.services.apps.qbittorrent.download_client_adapter:QbittorrentDownloadClientAdapter
  app_service_classes:
    qbittorrent_service: media_stack.services.apps.qbittorrent.service:QBittorrentService
    torrent_client_service: media_stack.services.apps.qbittorrent.service:QBittorrentService
  service_technology_map:
    qbittorrent_service: qbittorrent
    torrent_client_service: qbittorrent
  jobs:
    configure-categories:
      handler: media_stack.services.apps.qbittorrent.configure_categories_job:configure_categories
      label: "Update download categories"
      phase: download_clients
      priority: 10
  event_handlers:
    ACQUIRE:
      torrent_client_login: media_stack.services.apps.qbittorrent.runtime_ops:torrent_client_login
    ENSURE:
      setup_torrent_categories: media_stack.services.apps.qbittorrent.runtime_ops:setup_torrent_categories
  adapter_classes:
    download_client: media_stack.services.apps.qbittorrent.download_client_adapter:QbittorrentDownloadClientAdapter
  preflight_handler:
    name: qbittorrent
    handler: media_stack.services.apps.qbittorrent.http_preflight:run_preflight
    optional: true
  phase_scripts:
    torrent_client_credentials: media_stack.services.apps.qbittorrent.cli.ensure_qbit_credentials_main
  compose_preflight_handler: media_stack.services.apps.qbittorrent.compose_preflight:ensure_compose_torrent_client_credentials

  # ADR-0006 Phase 3 — qBittorrent family migration. The qBit-side
  # promise lives HERE alongside the service's lifecycle_class /
  # jobs / event_handlers declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does qBit guarantee at bootstrap?" audit is one file read;
  # renaming ``ensure-qbittorrent-categories`` surfaces the promise's
  # ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Only a single qBit promise migrates in this batch — the
  # categories ensurer is the only registry-level guarantee qBit
  # currently exposes (login / WebUI-up / category-create itself
  # are covered by the lifecycle + ACQUIRE/ENSURE event handlers
  # above, not by separate promises).
  promises:
    # --- Default-profile content -----------------------------------------------
    - id: qbittorrent-categories
      description: qBit has the four content categories (movies/tv/music/books)
      ensured_by: ensure-qbittorrent-categories
      platforms: [compose, k8s]
      probe:
        type: http_text
        service: qbittorrent
        path: /api/v2/torrents/categories
        auth: qbit_basic
        assert: |
          all(c in data for c in ('"movies"', '"tv"', '"music"', '"books"'))
