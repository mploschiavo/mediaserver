# Envoy — gateway proxy / reverse proxy
#
# This single file fully defines the Envoy service.

service:
  id: envoy
  name: Envoy
  desc: Gateway proxy
  category: infrastructure
  host: envoy
  port: 9901
  health_path: /ready

  web_ui: false
  scalable: false
plugin:
  # ADR-0003 Phase 3c: ServiceLifecycle Protocol implementation.
  # Envoy config is generated by envoy-config-init from the
  # compose/K8s spec — no API key surface from the controller's
  # perspective. /ready is the admin-port liveness endpoint.
  lifecycle_class: media_stack.adapters.envoy.lifecycle:EnvoyLifecycle
  technology: envoy
