# Authelia — SSO auth provider
#
# Single-file service definition. Drop in contracts/services/ to enable.
# Delete to disable. No Python code changes needed.

service:
  id: authelia
  name: Authelia
  desc: SSO auth provider
  category: infrastructure
  host: authelia
  port: 9091
  health_path: /api/health
  profiles: ['auth-authelia']

  scalable: false
plugin:
  technology: authelia
  jobs:
    configure-auth:
      handler: media_stack.core.auth.configure_auth_job:configure_auth
      label: "Update authentication"
      # Foundational — see job_framework.py phase_order comment.
      # Promoted to ``infrastructure`` (was ``default``) so OIDC
      # clients are registered + Authelia is reachable BEFORE
      # any media_server / download_clients job tries to talk
      # through the gateway. (v1.0.149.)
      phase: infrastructure
      priority: 5
      requires: []