# Authentik — Identity provider
#
# Single-file service definition. Drop in contracts/services/ to enable.
# Delete to disable. No Python code changes needed.

service:
  id: authentik
  name: Authentik
  desc: Identity provider
  category: infrastructure
  host: authentik
  port: 9000
  health_path: /-/health/live/
  profiles: ['auth-authentik']

  scalable: false
plugin:
  # ADR-0003 Phase 3c: ServiceLifecycle Protocol implementation.
  # Authentik does have API tokens but the controller doesn't mint
  # or manage them today (operator-provisioned out-of-band). For
  # now, Authentik uses the no-API-key shape from the lifecycle's
  # perspective. Phase 5+ may add token-management.
  lifecycle_class: media_stack.adapters.authentik.lifecycle:AuthentikLifecycle
  technology: authentik