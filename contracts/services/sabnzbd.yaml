service:
  id: sabnzbd
  name: SABnzbd
  desc: Usenet client
  category: downloads
  host: sabnzbd
  port: 8080
  health_path: /
  auth_path: /api
  auth_mode: query:apikey
  api_key_env: SABNZBD_API_KEY
  api_key_config: sabnzbd/sabnzbd.ini
  api_key_format: ini
  password_config: sabnzbd/sabnzbd.ini
plugin:
  technology: sabnzbd
  aliases:
  - sab
  adapter_class: media_stack.services.download_client_adapters.sabnzbd:SabnzbdDownloadClientAdapter
