service:
  id: prowlarr
  name: Prowlarr
  desc: Indexer manager
  category: automation
  host: prowlarr
  port: 9696
  health_path: /ping
  auth_path: /api/v1/system/status
  auth_mode: X-Api-Key
  api_key_env: PROWLARR_API_KEY
  api_key_config: prowlarr/config.xml
  api_key_format: xml
  api_key_http_path: /initialize.js
  version_path: /api/v1/system/status
  version_json_key: version
  indexer_path: /api/v1/indexer
  indexer_stats_path: /api/v1/indexerstats
  login_mode: form
  login_path: /login
  password_api_path: /api/v1/config/host
  preserve_path_prefix: true
plugin:
  # ADR-0003 Phase 2: ServiceLifecycle Protocol implementation.
  # Phase 4 switches the orchestrator over; today this is consumed
  # by the permissive lifecycle ratchet only.
  lifecycle_class: media_stack.adapters.servarr.lifecycle:ServarrLifecycle
  # Preflight — Envoy keeps the /app/prowlarr prefix on forwarded
  # requests, so the app must be told to serve from that base.
  # Shared handler across the *arr family; iterates internally
  # and is idempotent.
  preflight_handler:
    name: prowlarr
    handler: media_stack.services.apps.servarr.http_preflight:run_preflight
    optional: true
  # See sonarr.yaml for the per-service rationale. Same shared handler.
  compose_preflight_handler: media_stack.services.apps.servarr.http_preflight:run_preflight
  technology: prowlarr
  aliases:
  - prow
  app_service_classes:
    prowlarr_service: media_stack.services.apps.prowlarr.service:ProwlarrService
    prowlarr_flaresolverr_service: media_stack.services.apps.prowlarr.flaresolverr_service:ProwlarrFlareSolverrService
    prowlarr_precheck_service: media_stack.services.apps.prowlarr.precheck_service:ProwlarrPrecheckService
    prowlarr_indexer_pipeline_service: media_stack.services.apps.prowlarr.pipeline_service:ProwlarrIndexerPipelineService
  service_technology_map:
    prowlarr_service: prowlarr
    prowlarr_flaresolverr_service: prowlarr
    prowlarr_precheck_service: prowlarr
    prowlarr_indexer_pipeline_service: prowlarr
  jobs:
    configure-indexers:
      handler: media_stack.services.apps.prowlarr.configure_indexers_job:configure_indexers
      label: "Configure indexers"
      phase: download_clients
      priority: 20
      requires: []
      # Iterates the configured indexer set, posting each one to
      # Prowlarr (each post triggers Prowlarr's "test" against the
      # actual tracker — slow on cold network). Non-blocking so it
      # doesn't gate the rest of bootstrap.
      non_blocking: true
  event_handlers:
    VALIDATE:
      ensure_prowlarr_ready: media_stack.services.apps.prowlarr.runtime_ops:ensure_prowlarr_ready
    ENSURE:
      ensure_prowlarr_flaresolverr_proxy: media_stack.services.apps.prowlarr.runtime_ops:ensure_prowlarr_flaresolverr_proxy
      ensure_prowlarr_indexer: media_stack.services.apps.prowlarr.runtime_ops:ensure_prowlarr_indexer
    RUN:
      auto_add_tested_indexers: media_stack.services.apps.prowlarr.runtime_ops:auto_add_tested_indexers
      run_prowlarr_indexer_pipeline: media_stack.services.apps.prowlarr.runtime_ops:run_prowlarr_indexer_pipeline
    POST:
      trigger_prowlarr_sync: media_stack.services.apps.prowlarr.runtime_ops:trigger_prowlarr_sync
      sync_arr_indexers_from_prowlarr: media_stack.services.apps.prowlarr.runtime_ops:sync_arr_indexers_from_prowlarr

  # Per-service split — Prowlarr family. The Prowlarr-side promises
  # live HERE alongside the service's jobs / lifecycle_class
  # declarations rather than in the monolithic
  # ``contracts/promises/promises.yaml``. Co-locating means a "what
  # does Prowlarr guarantee at bootstrap?" audit is one file read;
  # renaming ``discover-indexers`` or ``tag-indexers-for-apps``
  # surfaces the promise's ``ensured_by`` reference in the same diff.
  #
  # Loader walks both ``contracts/services/*.yaml::plugin.promises``
  # AND ``contracts/promises/cross_cutting.yaml`` (or legacy
  # ``promises.yaml``) and aggregates with cross-file id-uniqueness +
  # depends_on resolution — see
  # ``infrastructure/promises/registry.py::PromiseRegistryLoader``.
  #
  # Both Prowlarr promises preserve their original semantics
  # verbatim (probe shape, ensured_by job-name strings, platform
  # tags). Neither carries ``bootstrap_blocking`` — the loader
  # default (True) applies, matching pre-split runtime behaviour.
  promises:
    # --- Indexer discovery (Prowlarr) -------------------------------------
    - id: prowlarr-indexers-discovered
      description: Prowlarr has at least one indexer from the curated allowlist
      ensured_by: discover-indexers
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: prowlarr
        path: /app/prowlarr/api/v1/indexer
        auth: api_key
        assert: "isinstance(response, list) and len(response) >= 1"

    # --- Indexer tagging (Prowlarr) ---------------------------------------
    - id: prowlarr-indexers-tagged
      description: Tag-indexers ran and produced sync-* tags on at least one indexer
      ensured_by: tag-indexers-for-apps
      platforms: [compose, k8s]
      probe:
        type: http_json
        service: prowlarr
        path: /app/prowlarr/api/v1/indexer
        auth: api_key
        # Some indexers legitimately can't be tagged (CF-blocked at
        # probe time, content-type mismatch). The promise is "the
        # tag pipeline ran successfully" — at least one tagged
        # indexer is the proof. The downstream sonarr-has-indexers
        # / radarr-has-indexers promises catch the case where ZERO
        # indexers ended up reaching the *arrs.
        assert: |
          isinstance(response, list) and response
          and any(len(i.get('tags') or []) >= 1 for i in response)
