service:
  id: unpackerr
  name: Unpackerr
  desc: Archive extractor
  category: downloads
  host: unpackerr
  port: 0
  web_ui: false
  scale_to_zero: true
plugin:
  post_setup_handler:
    name: unpackerr
    handler: media_stack.api.preflight.unpackerr:write_config_and_restart
    optional: true
  phase_scripts:
    component_key_sync: media_stack.services.apps.unpackerr.cli.sync_unpackerr_keys_main
  jobs:
    # The ``unpackerr-post`` ensurer name is referenced by the
    # ``unpackerr-config-valid`` promise. Same handler the legacy
    # post_setup_handler dispatches to (kept above for back-compat
    # during the ADR-0003 migration). Phase 6 will collapse the two
    # registration paths into one.
    unpackerr-post:
      handler: media_stack.api.preflight.unpackerr:write_config_and_restart
      label: "Write unpackerr config and restart"
      phase: post
      priority: 60
      requires: []

  # Per-service registry split — Phase 2 missed unpackerr because
  # the promise's id starts with ``unpackerr-`` and lives in the
  # cross-cutting registry, but the probe (``unpackerr/unpackerr.conf``)
  # and the ensurer (``unpackerr-post``) are both unpackerr-owned.
  # Re-homing it here as part of ADR-0006 Phase 4.
  promises:
    - id: unpackerr-config-valid
      description: Unpackerr config has resolved arr URLs (not literal service_internal_url() text)
      ensured_by: unpackerr-post
      platforms: [compose, k8s]
      # v1.0.150 shipped a bug where the config writer emitted
      # ``url = service_internal_url("sonarr")`` as literal TOML text
      # (forgot to CALL the function). Unpackerr's TOML parser choked
      # and the container went CrashLoop. The fresh-install path ran
      # preflight ONCE with the broken image, wrote a broken conf, and
      # never re-wrote it — even after the image was upgraded. This
      # probe catches both the original bug AND any future "the config
      # on disk is stale and references a function name instead of a
      # URL" regression.
      probe:
        type: file_text
        path: unpackerr/unpackerr.conf
        assert: |
          'service_internal_url' not in data
          and ('url = "http://sonarr:8989"' in data
               or 'url = "http://radarr:7878"' in data
               or 'url = "http://lidarr:8686"' in data
               or 'url = "http://readarr:8787"' in data)
