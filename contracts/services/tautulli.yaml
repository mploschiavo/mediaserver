service:
  id: tautulli
  name: Tautulli
  desc: Analytics
  category: management
  # Gated behind the ``tautulli`` compose profile / k8s overlay.
  # Most home deploys don't run Tautulli (Plex-specific stats);
  # marking it opt-in keeps the dashboard from showing
  # "API key missing" / "service unhealthy" tiles for a service
  # the operator never wired up. Re-enable by setting
  # COMPOSE_PROFILES=...,tautulli (compose) or applying the
  # tautulli overlay (k8s).
  profiles:
    - tautulli
  host: tautulli
  port: 8181
  health_path: /status
  auth_path: /api/v2
  auth_mode: query:apikey
  api_key_env: TAUTULLI_API_KEY
  api_key_config: tautulli/config.ini
  api_key_format: ini
  password_config: tautulli/config.ini
plugin:
  technology: tautulli
  aliases:
  - tau
  app_service_classes:
    tautulli_service: media_stack.services.apps.tautulli.service:TautulliService
  service_technology_map:
    tautulli_service: tautulli
