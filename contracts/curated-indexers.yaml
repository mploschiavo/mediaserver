# =============================================================================
# Curated public-tracker allowlist for first-boot discoverability
# =============================================================================
#
# Why this exists
# ---------------
# ``discover-indexers`` (in ``services/apps/prowlarr/reputation_ops.py``)
# auto-enables every Cardigann definition Prowlarr ships (~70). Most are
# dead, language-fringe, CloudFlare-only, or niche. A fresh deploy with
# the full set produces grabs that Sonarr/Radarr can't parse
# (``MonoTorrent.TorrentException: Invalid torrent file``) and qBit stays
# at zero downloads.
#
# This file pins the SHORT LIST of public trackers that actually work,
# grouped by content type so each *arr gets coverage from sources that
# specialize in its content. Adding here is one edit — no Python changes.
#
# Selection criteria
# ------------------
# 1. Public — no signup/credentials required.
# 2. Returns valid ``.torrent`` bytes or magnet links from the Cardigann
#    def (no HTML CloudFlare challenge in the payload).
# 3. English-language content as the primary catalog (with anime + music
#    exceptions that have specialized non-English coverage).
# 4. Either no CloudFlare gate, OR survives Flaresolverr proxying. The
#    Flaresolverr proxy is auto-attached to all sync-* tagged indexers
#    (v1.0.130 fix), so CF-protected trackers work transparently.
# 5. Active uptime — the catalog is current, not abandoned.
#
# Update cadence
# --------------
# Re-evaluate quarterly. Health probe shape:
#
#   GET /api/v1/search?type=search&query=ubuntu&categories=2000&indexerIds=N
#
# A failing tracker returns 0 results for a known-popular query; drop it
# from the list. The loader silently skips entries that don't exist in
# Prowlarr's current Cardigann set (renamed/removed upstream), so a
# missing slug warns but doesn't fail the deploy.
#
# Format
# ------
# Either form is accepted by the loader:
#
#   1. ``allowed: [a, b, c]``           — flat list, simple.
#   2. ``categories: {tv: [a, b], ...}`` — grouped, easier to maintain.
#      The loader merges the union into a single allowlist.
#
# We use the grouped form here for readability.
# =============================================================================

mode: allowlist           # one of: "allowlist" | "all"

categories:

  # --- TV (Sonarr) -------------------------------------------------------
  # Sonarr's queries are season+episode tuples (e.g. "Breaking Bad S01E01").
  # TV-focused trackers index by exact episode tag and yield far cleaner
  # results than broad sites that mix in unrelated content.
  tv:
    - eztv                # TV-only, magnet-based, no CloudFlare. Best
                          # default for current and back-catalog English TV.
    - ettv                # TV-only mirror; lower latency than EZTV when
                          # EZTV is rate-limiting.
    - showrss             # RSS-style TV index; no search, but sees all
                          # new episodes immediately. Pairs well with
                          # Sonarr's automatic-search defaults.
    - magnetdl            # Broad index with strong TV episode coverage;
                          # CloudFlare-protected (uses Flaresolverr).
    - torrentgalaxy       # Broad public, well-tagged TV releases.
    - therarbg            # RARBG mirror — TV catalog is comprehensive.
    - thepiratebay        # Breadth fallback. Active, CF-protected
                          # (uses Flaresolverr). Release naming is
                          # noisier than eztv, so prefer specialists
                          # first, but useful when others miss.

  # --- Movies (Radarr) ---------------------------------------------------
  # Movie searches are TMDB-id + quality (1080p/2160p). YTS dominates
  # for small-file rips; RARBG mirrors cover REMUX/full-disc for users
  # with the bandwidth.
  movies:
    - yts                 # Movies-only. Small-file 720p/1080p encodes;
                          # extremely reliable and CF-free.
    - 1337x               # Broad index — good for movies the small-file
                          # specialists don't carry. Needs Flaresolverr.
    - therarbg            # RARBG mirror; full-fidelity remux/4K coverage.
    - torrentgalaxy       # Broad public; movie tagging is solid.
    - torlock             # CloudFlare-protected; works through the auto-
                          # attached Flaresolverr proxy.
    - bitsearch           # Aggregator. Catches the long tail when the
                          # primary movie sources miss.
    - thepiratebay        # Breadth fallback for older/obscure titles
                          # the dedicated movie sources don't carry.
                          # CF-protected (Flaresolverr handles it).

  # --- Music (Lidarr) ----------------------------------------------------
  # Public music coverage is thin — the best music libraries are on
  # private trackers (RED, OPS). These are the few public ones that
  # carry decent FLAC / lossless catalogs.
  music:
    - rutracker           # Russian-language UI but the music catalog is
                          # one of the largest public ones. Lidarr handles
                          # the language gracefully.
    - bitsearch           # Aggregator with reasonable music indexing.
    - 1337x               # Has a "Music" category; small but maintained.
    - solidtorrents       # Aggregator; music coverage is uneven but
                          # better than nothing.

  # --- Books (Readarr) ---------------------------------------------------
  # Book grabs prefer epub/mobi/azw3. The major sources here aren't
  # always in Prowlarr's preset list — operators may need to add custom
  # Cardigann defs from the unofficial Prowlarr-Indexers repo.
  books:
    - libgen-non-fiction  # Library Genesis non-fiction — very large
                          # catalog, reliable.
    - libgen-fiction      # LibGen fiction split.
    - annas-archive       # Anna's Archive — meta-aggregator over LibGen,
                          # Z-Library, IPFS shadow libraries. Excellent
                          # coverage; CF-protected.
    - audiobookbay        # Audiobooks. Niche but the public default.
    - bitsearch           # Aggregator fallback for books not in the
                          # specialists.

  # --- Anime (Sonarr with anime category) -------------------------------
  # Anime needs its own bucket because the major TV trackers don't carry
  # it well, and anime fans expect Romaji/translated season tagging that
  # only the specialists do correctly.
  anime:
    - nyaasi              # The Nyaa.si index. Essential — nothing else
                          # covers seasonal anime as well.
    - subsplease          # SubsPlease — official subtitle group's
                          # current-season releases, fastest path to
                          # day-of episode availability.
    - tokyotoshokan       # Tokyo Toshokan — back-catalog anime including
                          # rare/older titles Nyaa doesn't index well.
    - animetosho          # AnimeTosho mirror; redundancy when Nyaa is
                          # rate-limiting or down.

# Optional flat override. When ``allowed:`` is set, it takes precedence
# over the categories above (use this for hyper-curated deployments or
# CI test fixtures). Leave empty to use the categories union.
allowed: []
