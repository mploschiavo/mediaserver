# Service Registry — defines all managed services.
#
# To add a service: add an entry below.
# To remove a service: delete its entry.
# No Python code changes needed.
#
# The controller reads this file at startup and derives:
# - Health probes, auth probes
# - API key discovery, rotation
# - Password reset targets
# - Dashboard service list and categories
# - Compose profile detection
#
# Fields:
#   id:               Unique identifier (used in URLs, config keys)
#   name:             Display name
#   desc:             Short description
#   category:         media | automation | downloads | management | infrastructure
#   host:             Container/pod hostname
#   port:             Primary port (0 = no HTTP endpoint)
#   health_path:      HTTP health check path (empty = skip probe)
#   auth_path:        Authenticated API probe path (empty = no auth check)
#   auth_mode:        Header name (e.g. X-Api-Key) or "query:param"
#   api_key_env:      Env var name for the API key
#   api_key_config:   Config file path relative to config root
#   api_key_format:   xml | ini | yaml | json | sqlite
#   version_path:     API path to get version
#   version_json_key: JSON key in version response (dot-separated for nested)
#   password_api_path:  API path for password change (PUT)
#   password_config:    Config file for file-based password change
#   profiles:         Compose profiles (empty = always active)

categories:
  - media
  - automation
  - downloads
  - management
  - infrastructure

services:
  # --- Media servers ---
  - id: jellyfin
    name: Jellyfin
    desc: Media server
    category: media
    host: jellyfin
    port: 8096
    health_path: /System/Info/Public
    auth_path: /System/Info
    auth_mode: X-Emby-Token
    api_key_env: JELLYFIN_API_KEY
    api_key_config: jellyfin/data/jellyfin.db
    api_key_format: sqlite
    version_path: /System/Info/Public
    version_json_key: Version

  - id: plex
    name: Plex
    desc: Alt media server
    category: media
    host: plex
    port: 32400
    health_path: /identity
    profiles: [plex]

  - id: jellyseerr
    name: Jellyseerr
    desc: Request manager
    category: media
    host: jellyseerr
    port: 5055
    health_path: /api/v1/status
    auth_path: /api/v1/settings/main
    auth_mode: X-Api-Key
    api_key_env: JELLYSEERR_API_KEY
    api_key_config: jellyseerr/settings.json
    api_key_format: json

  # --- Arr automation ---
  - id: sonarr
    name: Sonarr
    desc: TV automation
    category: automation
    host: sonarr
    port: 8989
    health_path: /ping
    auth_path: /api/v3/system/status
    auth_mode: X-Api-Key
    api_key_env: SONARR_API_KEY
    api_key_config: sonarr/config.xml
    api_key_format: xml
    version_path: /api/v3/system/status
    version_json_key: version
    password_api_path: /api/v3/config/host

  - id: radarr
    name: Radarr
    desc: Movie automation
    category: automation
    host: radarr
    port: 7878
    health_path: /ping
    auth_path: /api/v3/system/status
    auth_mode: X-Api-Key
    api_key_env: RADARR_API_KEY
    api_key_config: radarr/config.xml
    api_key_format: xml
    version_path: /api/v3/system/status
    version_json_key: version
    password_api_path: /api/v3/config/host

  - id: lidarr
    name: Lidarr
    desc: Music automation
    category: automation
    host: lidarr
    port: 8686
    health_path: /ping
    auth_path: /api/v1/system/status
    auth_mode: X-Api-Key
    api_key_env: LIDARR_API_KEY
    api_key_config: lidarr/config.xml
    api_key_format: xml
    version_path: /api/v1/system/status
    version_json_key: version
    password_api_path: /api/v1/config/host

  - id: readarr
    name: Readarr
    desc: Books automation
    category: automation
    host: readarr
    port: 8787
    health_path: /ping
    auth_path: /api/v1/system/status
    auth_mode: X-Api-Key
    api_key_env: READARR_API_KEY
    api_key_config: readarr/config.xml
    api_key_format: xml
    version_path: /api/v1/system/status
    version_json_key: version
    password_api_path: /api/v1/config/host

  - id: prowlarr
    name: Prowlarr
    desc: Indexer manager
    category: automation
    host: prowlarr
    port: 9696
    health_path: /ping
    auth_path: /api/v1/system/status
    auth_mode: X-Api-Key
    api_key_env: PROWLARR_API_KEY
    api_key_config: prowlarr/config.xml
    api_key_format: xml
    version_path: /api/v1/system/status
    version_json_key: version
    password_api_path: /api/v1/config/host

  - id: bazarr
    name: Bazarr
    desc: Subtitles
    category: automation
    host: bazarr
    port: 6767
    health_path: /
    auth_path: /api/system/status
    auth_mode: X-Api-Key
    api_key_env: BAZARR_API_KEY
    api_key_config: bazarr/config/config.yaml
    api_key_format: yaml
    version_path: /api/system/status
    version_json_key: data.bazarr_version
    password_config: bazarr/config/config.yaml

  # --- Download clients ---
  - id: qbittorrent
    name: qBittorrent
    desc: Torrent client
    category: downloads
    host: qbittorrent
    port: 8080
    health_path: /

  - id: sabnzbd
    name: SABnzbd
    desc: Usenet client
    category: downloads
    host: sabnzbd
    port: 8080
    health_path: /
    auth_path: /api
    auth_mode: "query:apikey"
    api_key_env: SABNZBD_API_KEY
    api_key_config: sabnzbd/sabnzbd.ini
    api_key_format: ini
    password_config: sabnzbd/sabnzbd.ini

  - id: unpackerr
    name: Unpackerr
    desc: Archive extractor
    category: downloads
    host: unpackerr
    port: 0

  # --- Management ---
  - id: flaresolverr
    name: FlareSolverr
    desc: Indexer proxy
    category: management
    host: flaresolverr
    port: 8191
    health_path: /

  - id: maintainerr
    name: Maintainerr
    desc: Library cleanup
    category: management
    host: maintainerr
    port: 6246
    health_path: /app/maintainerr/api/settings

  - id: tautulli
    name: Tautulli
    desc: Analytics
    category: management
    host: tautulli
    port: 8181
    health_path: /
    auth_path: /api/v2
    auth_mode: "query:apikey"
    api_key_env: TAUTULLI_API_KEY
    api_key_config: tautulli/config.ini
    api_key_format: ini
    password_config: tautulli/config.ini

  - id: homepage
    name: Homepage
    desc: Dashboard
    category: management
    host: homepage
    port: 3000
    health_path: /

  # --- Infrastructure ---
  - id: envoy
    name: Envoy
    desc: Gateway proxy
    category: infrastructure
    host: envoy
    port: 9901
    health_path: /ready

  - id: traefik
    name: Traefik
    desc: Reverse proxy (alt)
    category: infrastructure
    host: traefik
    port: 8080
    health_path: /ping
    profiles: [traefik]

  - id: authelia
    name: Authelia
    desc: SSO auth provider
    category: infrastructure
    host: authelia
    port: 9091
    health_path: /api/health
    profiles: [auth-authelia]

  - id: authentik
    name: Authentik
    desc: Identity provider
    category: infrastructure
    host: authentik
    port: 9000
    health_path: /-/health/live/
    profiles: [auth-authentik]
