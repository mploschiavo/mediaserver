  /api/services/categories:
    get:
      operationId: listServiceCategories
      tags: [Services]
      summary: Service categories
      description: |
        Returns service categories with their member service IDs. Useful for
        building grouped UI views. Categories are derived from the service
        registry YAML.
      responses:
        "200":
          description: Array of category objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryEntry'
              example:
                - label: Management
                  ids: [sonarr, radarr, lidarr, readarr]
                - label: Downloads
                  ids: [qbittorrent, sabnzbd, prowlarr]
                - label: Media
                  ids: [jellyfin, bazarr, jellyseerr, tautulli]
                - label: Infrastructure
                  ids: [envoy, homepage, controller]

  /api/services/{serviceId}/api-key:
    get:
      operationId: getServiceApiKey
      tags: [Services]
      summary: Get API key status for a service
      description: |
        Check whether an API key is configured for a service, and get a
        masked preview. Does not return the full key for security.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/services/sonarr/api-key | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/services/sonarr/api-key")
            info = r.json()
            print(f"Has key: {info['has_key']}, Preview: {info['key_preview']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/services/sonarr/api-key");
            const info = await r.json();
            console.log(`${info.service}: ${info.has_key ? info.key_preview : "no key"}`);
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      responses:
        "200":
          description: API key status
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  env:
                    type: string
                  has_key:
                    type: boolean
                  key_preview:
                    type: string
              example:
                service: sonarr
                env: SONARR_API_KEY
                has_key: true
                key_preview: "a1b2...y8z9"
        "404":
          description: Service not found or has no API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Service 'envoy' not found or has no API key"
    post:
      operationId: setServiceApiKey
      tags: [Services]
      summary: Set or auto-discover a service API key
      description: |
        Manually set an API key for a service, or trigger auto-discovery.

        **Manual set**: provide `api_key` in the request body.

        **Auto-discover**: send an empty body or omit `api_key`. The controller
        will try to read the key from the service's config file, then fall back
        to HTTP-based discovery (e.g., reading `/initialize.js`).

        The discovered/set key is persisted to the environment and K8s secret.
      x-codeSamples:
        - lang: curl
          label: "cURL (auto-discover)"
          source: |
            # Auto-discover key from service config file
            curl -X POST http://localhost:9100/api/services/sonarr/api-key \
              -u admin:password
        - lang: curl
          label: "cURL (manual set)"
          source: |
            # Manually set a known key
            curl -X POST http://localhost:9100/api/services/sonarr/api-key \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"api_key": "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"}'
        - lang: Python
          label: Python
          source: |
            import requests
            # Auto-discover
            r = requests.post(
                "http://localhost:9100/api/services/sonarr/api-key",
                auth=("admin", "password"),
            )
            print(r.json())
            # {"status": "discovered", "service": "sonarr", "source": "config_file"}
        - lang: JavaScript
          label: JavaScript
          source: |
            // Manual set
            const r = await fetch("http://localhost:9100/api/services/sonarr/api-key", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ api_key: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4" }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                  description: API key to set. Omit for auto-discovery.
            example:
              api_key: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      responses:
        "200":
          description: Key set or discovered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [set, discovered]
                  service:
                    type: string
                  env:
                    type: string
                  source:
                    type: string
                    description: Only present for auto-discovery
              examples:
                manual:
                  summary: Manually set
                  value:
                    status: set
                    service: sonarr
                    env: SONARR_API_KEY
                autodiscovered:
                  summary: Auto-discovered from config file
                  value:
                    status: discovered
                    service: sonarr
                    source: config_file
        "404":
          description: Service not found or key could not be discovered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Content
  # =========================================================================

  /api/versions:
    get:
      operationId: getVersions
      tags: [Content]
