      summary: List all managed services
      description: |
        Returns every service in the registry, including the controller itself
        as a virtual entry. Each entry includes the service ID, display name,
        description, category, hostname, and port. Use this to discover which
        services are available in the stack.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/services | jq '.[].id'
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/services")
            for svc in r.json():
                print(f"{svc['id']:15s} {svc['name']:25s} :{svc['port']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/services");
            const services = await r.json();
            services.forEach(s => console.log(`${s.id}: ${s.name} (${s.host}:${s.port})`));
      responses:
        "200":
          description: Array of service entries
