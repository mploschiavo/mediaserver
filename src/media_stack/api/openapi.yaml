                  host: lidarr
                  port: 8686
                - id: readarr
                  name: Readarr
                  desc: Book management and automation
                  category: management
                  host: readarr
                  port: 8787
                - id: prowlarr
                  name: Prowlarr
                  desc: Indexer manager and proxy
                  category: downloads
                  host: prowlarr
                  port: 9696
                - id: jellyfin
                  name: Jellyfin
                  desc: Media server with hardware transcoding
                  category: media
                  host: jellyfin
                  port: 8096
                - id: bazarr
                  name: Bazarr
                  desc: Subtitle management and download
                  category: media
                  host: bazarr
                  port: 6767
                - id: qbittorrent
                  name: qBittorrent
                  desc: Torrent download client
                  category: downloads
