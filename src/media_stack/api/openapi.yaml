      description: |
        Fetches version strings from all arr apps, Jellyfin, and Bazarr.
        Cached for 5 minutes. Useful for inventory and update tracking.
      responses:
        "200":
          description: Map of service names to version strings
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: object
                    additionalProperties:
                      type: string
              example:
                versions:
                  sonarr: "4.0.14.2939"
                  radarr: "5.19.3.9730"
                  lidarr: "2.9.6.4552"
                  prowlarr: "1.31.2.4975"
                  jellyfin: "10.10.6"
                  bazarr: "1.5.6"

  /api/downloads:
    get:
      operationId: getDownloads
      tags: [Content]
      summary: Active downloads
      description: |
        Returns active downloads from qBittorrent (torrents) and SABnzbd
        (usenet). Includes download name, progress percentage, speed, and
        state. Limited to 10 items per client.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/downloads | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/downloads")
            dl = r.json()
            for item in dl.get("qbittorrent", {}).get("items", []):
                pct = item["progress"]
                speed_mb = item["dlspeed"] / 1_000_000
                print(f"  {item['name']}: {pct:.1f}% @ {speed_mb:.1f} MB/s")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/downloads");
            const dl = await r.json();
            dl.qbittorrent?.items?.forEach(i =>
              console.log(`${i.name}: ${i.progress}%`)
            );
      responses:
        "200":
          description: Active downloads from all clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  qbittorrent:
                    type: object
                    properties:
                      active:
                        type: integer
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            progress:
                              type: number
                            state:
                              type: string
                            size:
                              type: integer
                            dlspeed:
                              type: integer
                      error:
                        type: string
                  sabnzbd:
                    type: object
                    properties:
                      active:
                        type: integer
                      speed:
                        type: string
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            progress:
                              type: number
                      error:
                        type: string
              example:
                qbittorrent:
                  active: 3
                  items:
                    - name: "The.Last.of.Us.S02E01.1080p.WEB-DL"
                      progress: 67.3
                      state: downloading
                      size: 4200000000
                      dlspeed: 12500000
                    - name: "Oppenheimer.2023.2160p.BluRay.REMUX"
                      progress: 23.1
                      state: downloading
                      size: 78500000000
                      dlspeed: 8750000
                    - name: "Dune.Part.Two.2024.1080p.BluRay"
                      progress: 100.0
                      state: seeding
                      size: 15600000000
                      dlspeed: 0
                sabnzbd:
                  active: 1
                  speed: "15000 KB/s"
                  items:
                    - name: "Shogun.S01.Complete.1080p.NZB"
                      progress: 45.2

  /api/stats:
    get:
      operationId: getStats
      tags: [Content]
      summary: Library counts
      description: |
        Returns the number of items (series, movies, artists, books) in
        each arr app library. Cached for 60 seconds.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/stats | jq .stats
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/stats")
            for svc, info in r.json()["stats"].items():
                print(f"  {svc}: {info['count']} {info['label']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/stats");
            const { stats } = await r.json();
            Object.entries(stats).forEach(([svc, info]) =>
              console.log(`${svc}: ${info.count} ${info.label}`)
            );
      responses:
        "200":
          description: Per-service library counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        count:
                          type: integer
                        label:
                          type: string
                        error:
                          type: string
              example:
                stats:
                  sonarr:
                    count: 142
                    label: series
                  radarr:
                    count: 891
                    label: movies
                  lidarr:
                    count: 67
                    label: artists
                  readarr:
                    count: 23
                    label: books

  /api/indexers:
