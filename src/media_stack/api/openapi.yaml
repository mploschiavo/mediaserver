openapi: 3.0.3
info:
  title: Media Stack Controller API
  version: 1.0.0
  description: |
    REST API for the Media Stack Controller -- the orchestration layer that
    manages Sonarr, Radarr, Lidarr, Readarr, Prowlarr, Bazarr, Jellyfin,
    qBittorrent, SABnzbd, and supporting infrastructure (Envoy, Homepage,
    Tautulli, Jellyseerr).

    ## Authentication

    The controller supports HTTP Basic Auth with three modes controlled by
    the `CONTROLLER_AUTH` environment variable:

    | Mode    | Behavior |
    |---------|----------|
    | `none`  | No auth required (default when `STACK_ADMIN_PASSWORD` is empty) |
    | `write` | POST/PUT/DELETE require auth; GET is open (default when password is set) |
    | `all`   | Every request requires auth |

    Credentials: username from `STACK_ADMIN_USERNAME` (default `admin`),
    password from `STACK_ADMIN_PASSWORD`.

    Health probes (`/healthz`, `/readyz`) are always unauthenticated.

    ## Server-Sent Events

    The `/logs/stream` endpoint provides a real-time log stream via SSE.
    Connect with `EventSource` or `curl -N`.

    ## Action Queue

    Actions are asynchronous. POST to `/actions/{name}` returns immediately
    with `202 Accepted`-style semantics (HTTP 200, status=accepted). Poll
    `/status` to track progress, or subscribe to `/logs/stream` for live
    output. Actions execute in priority order via an internal queue.

    ## Rate Limits

    The controller does not enforce rate limits. However, actions are
    serialized through a priority queue, so submitting many actions rapidly
    will queue them rather than execute in parallel.

    ## Error Reference

    All error responses use a consistent JSON envelope:
    ```json
    { "error": "human-readable message" }
    ```

    | HTTP Code | Name | When It Occurs | How to Handle |
    |-----------|------|----------------|---------------|
    | **400** | Bad Request | Missing or invalid fields in the request body (e.g., `password` too short, missing `services` array, malformed JSON). | Check the `error` field for the specific validation failure. Fix the request body and retry. |
    | **401** | Unauthorized | Request requires authentication but no credentials were provided, or the credentials are invalid. Only returned when `CONTROLLER_AUTH` is `write` (for mutations) or `all`. | Send an `Authorization: Basic <base64>` header with valid credentials. |
    | **404** | Not Found | The requested resource does not exist (e.g., unknown action name, unknown app, unknown service ID, missing snapshot file). | Check the `error` field for details. For actions, the response includes a `known` array listing valid action names. |
    | **500** | Internal Server Error | Unexpected server-side failure (unhandled exception, container runtime unavailable, filesystem error). | Retry after a brief delay. If persistent, check controller logs via `GET /api/logs/controller` or `GET /logs/stream`. |

    **Example error responses:**

    *400 Bad Request* -- password too short:
    ```json
    { "error": "password field required (min 4 chars)" }
    ```

    *401 Unauthorized* -- missing credentials:
    ```
    HTTP/1.1 401 Unauthorized
    WWW-Authenticate: Basic realm="Media Stack Controller"
    ```

    *404 Not Found* -- unknown action:
    ```json
    { "error": "unknown action 'foo'", "known": ["auto-indexers", "bootstrap", "envoy-config", "finalize", "reconcile", "restart-apps", "sync-indexers"] }
    ```

    *500 Internal Server Error*:
    ```json
    { "error": "Docker socket not available" }
    ```

    ## Webhook Events

    When a webhook URL is registered (via `POST /webhooks`), the controller
    sends a POST request to each URL when actions complete, fail, or are
    cancelled. The payload format:

    ```json
    {
      "event": "action_complete",
      "action": "bootstrap",
      "action_id": "bootstrap-3",
      "status": "complete",
      "elapsed_seconds": 45.2,
      "started_at": 1712505600.0,
      "completed_at": 1712505645.2,
      "error": null,
      "triggered_by": "admin",
      "controller_phase": "complete"
    }
    ```

    Event types: `action_complete`, `action_error`, `action_cancelled`, `test`.

    ## Changelog

    ### v1.1.0 (2026-04-08)
    - Added per-service password reset (`services` field in POST /api/reset-password)
    - Added per-service API key rotation (`services` field in POST /api/rotate-keys)
    - Added GET/POST /api/services/{id}/api-key for manual key management
    - Added priority queue for actions (bootstrap=10, envoy-config=30, auto-indexers=70)
    - Added POST /cancel endpoint
    - Added POST /api/jellyfin/reset for hard credential reset
    - Added GET /api/health-history for SLA metrics
    - Added GET /api/cleanup-preview for guardrail dry-run
    - Added GET /api/image-updates for container staleness tracking
    - Added x-codeSamples and enhanced examples across the spec

    ### v1.0.0 (2026-04-01)
    - Initial release with 53 operations
    - Bootstrap orchestration with priority queue
    - Service health monitoring with Prometheus metrics
    - Envoy gateway routing configuration
    - API key rotation and password reset
    - Config backup/restore and snapshot management
    - SSE log streaming and webhook notifications

  contact:
    name: Media Stack Controller
  license:
    name: MIT

# servers: injected dynamically at runtime from routing config.
# See _build_openapi_servers() in server.py.
servers:
  - url: /
    description: Placeholder — replaced at runtime with environment-specific URLs

tags:
  - name: Health
    description: Liveness/readiness probes and service health checks
  - name: State
    description: Controller state, action history, runtime config, webhooks
  - name: Actions
    description: Trigger and cancel asynchronous orchestration actions
  - name: Services
    description: Service registry, categories, and per-service API key management
  - name: Content
    description: Library stats, downloads, indexers, quality profiles, recently added
  - name: Routing
    description: Envoy gateway routing configuration
  - name: Security
    description: API key rotation and password reset across all managed services
  - name: Operations
    description: Containers, images, GPU, snapshots, mounts, service logs
  - name: Disk
    description: Disk usage monitoring and guardrail configuration
  - name: Config
    description: Environment, profile, manifests, env vars, backup/restore
  - name: Metrics
    description: Prometheus metrics, Envoy stats, RSS feed, Grafana dashboard
  - name: Webhooks
    description: Webhook management and testing
  - name: Dashboard
    description: Web dashboard and API documentation UI

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Auth. Username from STACK_ADMIN_USERNAME (default: admin),
        password from STACK_ADMIN_PASSWORD.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "not found"
      required: [error]

    ActionAccepted:
      type: object
      properties:
        status:
          type: string
          enum: [accepted]
        action:
          type: string
          example: bootstrap
        priority:
          type: integer
          example: 10
        overrides:
          type: object
          additionalProperties: true
      required: [status, action, priority]

    ActionRecord:
      type: object
      properties:
        id:
          type: string
          example: bootstrap-1
        name:
          type: string
          example: bootstrap
        status:
          type: string
          enum: [pending, running, complete, error, cancelled, timeout]
        started_at:
          type: number
          nullable: true
          example: 1712505600.0
        completed_at:
          type: number
          nullable: true
          example: 1712505660.5
        elapsed_seconds:
          type: number
          nullable: true
          example: 60.5
        error:
          type: string
          nullable: true
        overrides:
          type: object
          additionalProperties: true
        timeout_seconds:
          type: integer
          example: 600
        triggered_by:
          type: string
          example: admin

    ControllerState:
      type: object
      properties:
        phase:
          type: string
          enum: [idle, running, complete, error]
          example: complete
        started_at:
          type: number
          nullable: true
        completed_at:
          type: number
          nullable: true
        elapsed_seconds:
          type: number
          nullable: true
        error:
          type: string
          nullable: true
        phases_completed:
          type: array
          items:
            type: string
          example: [preflight, containers, post-setup, envoy]
        preflight_results:
          type: object
          additionalProperties: true
        app_status:
          type: object
          additionalProperties: true
        run_overrides:
          type: object
          additionalProperties: true
        initial_bootstrap_done:
          type: boolean
          example: true
        runtime_config:
          type: object
          additionalProperties: true
        webhook_urls:
          type: array
          items:
            type: string
        current_action:
          $ref: '#/components/schemas/ActionRecord'
        action_history:
          type: array
          items:
            $ref: '#/components/schemas/ActionRecord'
        pending_actions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              priority:
                type: integer
              queued_at:
                type: number
              overrides:
                type: object

    ServiceEntry:
      type: object
      properties:
        id:
          type: string
          example: sonarr
        name:
          type: string
          example: Sonarr
        desc:
          type: string
          example: TV series management and automation
        category:
          type: string
          example: management
        host:
          type: string
          example: sonarr
        port:
          type: integer
          example: 8989

    CategoryEntry:
      type: object
      properties:
        label:
          type: string
          example: Management
        ids:
          type: array
          items:
            type: string
          example: [sonarr, radarr, lidarr, readarr]

    ServiceHealth:
      type: object
      properties:
        services:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [ok, error, disabled, unknown]
              code:
                type: integer
              ms:
                type: integer
              auth:
                type: string
                enum: [ok, unauthorized, error, no_key, n/a]
              error:
                type: string
        healthy:
          type: integer
          example: 12
        total:
          type: integer
          example: 14

    DiskInfo:
      type: object
      properties:
        disk:
          type: object
          additionalProperties:
            type: object
            properties:
              path:
                type: string
              total_bytes:
                type: integer
              used_bytes:
                type: integer
              free_bytes:
                type: integer
              percent_used:
                type: number
              fstype:
                type: string
              warning:
                type: string
              error:
                type: string
        guardrails:
          type: object
          properties:
            enabled:
              type: boolean
            max_used_percent:
              type: number
            target_used_percent:
              type: number
            monitor_path:
              type: string
            qbit_cleanup:
              type: object
              properties:
                enabled:
                  type: boolean
                min_completion_age_hours:
                  type: number
                min_ratio:
                  type: number
                min_seeding_time_minutes:
                  type: integer
                max_delete_per_run:
                  type: integer
                delete_files:
                  type: boolean
                categories:
                  type: array
                  items:
                    type: string

    RoutingConfig:
      type: object
      properties:
        base_domain:
          type: string
          example: example.com
        stack_subdomain:
          type: string
          example: media-stack
        gateway_host:
          type: string
          example: apps.media-stack.example.com
        gateway_port:
          type: integer
          example: 80
        app_path_prefix:
          type: string
          example: /app
        strategy:
          type: string
          enum: [hybrid, subdomain, path]
          example: hybrid
        internet_exposed:
          type: boolean
          example: false
        direct_hosts:
          type: object
          additionalProperties:
            type: string

    GpuInfo:
      type: object
      properties:
        detected:
          type: boolean
        gpus:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: intel/va-api
              name:
                type: string
              driver:
                type: string
              devices:
                type: array
                items:
                  type: string
              container:
                type: string
        jellyfin_configured:
          type: boolean
        jellyfin_has_gpu:
          type: boolean
        host_os:
          type: string
          example: linux
        runtime:
          type: string
          enum: [compose, kubernetes]
        hw_accel_type:
          type: string
          enum: [vaapi, nvenc]
        compose_snippet:
          type: string
        can_auto_configure:
          type: boolean
        note:
          type: string

    WebhookEvent:
      type: object
      description: |
        Payload sent to registered webhook URLs when an action completes,
        fails, or is cancelled. Also used for test events.
      properties:
        event:
          type: string
          enum: [action_complete, action_error, action_cancelled, test]
          description: The event type that triggered this webhook
        action:
          type: string
          description: Name of the action (e.g., bootstrap, envoy-config)
          example: bootstrap
        action_id:
          type: string
          description: Unique action identifier
          example: bootstrap-3
        status:
          type: string
          enum: [complete, error, cancelled, ok]
          description: Final status of the action
        elapsed_seconds:
          type: number
          nullable: true
          description: Wall-clock duration of the action
          example: 45.2
        started_at:
          type: number
          nullable: true
          description: Unix timestamp when the action started
          example: 1712505600.0
        completed_at:
          type: number
          nullable: true
          description: Unix timestamp when the action finished
          example: 1712505645.2
        error:
          type: string
          nullable: true
          description: Error message if the action failed
        triggered_by:
          type: string
          description: Username or source that triggered the action
          example: admin
        controller_phase:
          type: string
          enum: [idle, running, complete, error]
          description: Current controller phase after this event
          example: complete
      required: [event]
      example:
        event: action_complete
        action: bootstrap
        action_id: bootstrap-3
        status: complete
        elapsed_seconds: 45.2
        started_at: 1712505600.0
        completed_at: 1712505645.2
        error: null
        triggered_by: admin
        controller_phase: complete

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not found"
    Unauthorized:
      description: Authentication required
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: 'Basic realm="Media Stack Controller"'
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # Health
  # =========================================================================

  /healthz:
    get:
      operationId: getLiveness
      tags: [Health]
      summary: Liveness probe
      description: |
        Kubernetes/Docker liveness probe. Always returns 200 if the controller
        process is running. Use this for container orchestrator health checks.
        This endpoint never requires authentication.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/healthz
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/healthz")
            print(r.json())  # {"status": "ok"}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/healthz");
            console.log(await r.json()); // { status: "ok" }
      responses:
        "200":
          description: Controller is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
              example:
                status: ok

  /readyz:
    get:
      operationId: getReadiness
      tags: [Health]
      summary: Readiness probe
      description: |
        Kubernetes/Docker readiness probe. Returns the bootstrap phase and
        whether the initial bootstrap has completed. Use this to gate traffic
        until the stack is fully configured. Never requires authentication.
      responses:
        "200":
          description: Readiness status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready]
                  initial_bootstrap_done:
                    type: boolean
                  phase:
                    type: string
              example:
                status: ready
                initial_bootstrap_done: true
                phase: complete

  /api/health:
    get:
      operationId: getServiceHealth
      tags: [Health]
      summary: Live service health probes
      description: |
        Probes every registered service for HTTP reachability and API key
        authentication validity. Results are cached for 10 seconds. Each
        service reports status (ok/error/disabled), response time in ms,
        and auth status (ok/unauthorized/no_key/n/a).

        Use this to build a service status dashboard or trigger alerts when
        services go down.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/health | jq .
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/health")
            health = r.json()
            for svc, info in health["services"].items():
                status = "UP" if info["status"] == "ok" else "DOWN"
                print(f"  {svc}: {status} ({info['ms']}ms)")
            print(f"Healthy: {health['healthy']}/{health['total']}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/api/health");
            const health = await r.json();
            Object.entries(health.services).forEach(([svc, info]) => {
              console.log(`${svc}: ${info.status} (${info.ms}ms)`);
            });
      responses:
        "200":
          description: Health probe results for all services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealth'
              example:
                services:
                  sonarr:
                    status: ok
                    code: 200
                    ms: 12
                    auth: ok
                  radarr:
                    status: ok
                    code: 200
                    ms: 8
                    auth: ok
                  lidarr:
                    status: ok
                    code: 200
                    ms: 11
                    auth: ok
                  readarr:
                    status: ok
                    code: 200
                    ms: 14
                    auth: ok
                  prowlarr:
                    status: ok
                    code: 200
                    ms: 9
                    auth: ok
                  jellyfin:
                    status: ok
                    code: 200
                    ms: 15
                    auth: n/a
                  bazarr:
                    status: ok
                    code: 200
                    ms: 22
                    auth: ok
                  qbittorrent:
                    status: ok
                    code: 200
                    ms: 5
                    auth: n/a
                  sabnzbd:
                    status: ok
                    code: 200
                    ms: 7
                    auth: ok
                  jellyseerr:
                    status: ok
                    code: 200
                    ms: 18
                    auth: n/a
                  tautulli:
                    status: ok
                    code: 200
                    ms: 10
                    auth: ok
                  envoy:
                    status: ok
                    code: 200
                    ms: 2
                    auth: n/a
                  homepage:
                    status: error
                    code: 0
                    ms: 0
                    auth: n/a
                    error: "connection refused"
                  controller:
                    status: ok
                    code: 200
                    ms: 1
                    auth: n/a
                healthy: 13
                total: 14

  /api/health-history:
    get:
      operationId: getHealthHistory
      tags: [Health]
      summary: Health history and SLA metrics
      description: |
        Returns up to 24 hours of health probe history (sampled at ~1 minute
        intervals, max 1440 entries). Includes per-service uptime percentage
        for SLA calculations.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/api/health-history | jq .sla
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/api/health-history")
            for svc, sla in r.json()["sla"].items():
                print(f"  {svc}: {sla['uptime_pct']:.2f}% uptime")
      responses:
        "200":
          description: Health history with SLA data
          content:
            application/json:
              schema:
                type: object
                properties:
                  sla:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total:
                          type: integer
                        ok:
                          type: integer
                        uptime_pct:
                          type: number
                  period_hours:
                    type: number
                  entries:
                    type: integer
              example:
                sla:
                  sonarr:
                    total: 1440
                    ok: 1438
                    uptime_pct: 99.86
                  radarr:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  lidarr:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  prowlarr:
                    total: 1440
                    ok: 1435
                    uptime_pct: 99.65
                  jellyfin:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  bazarr:
                    total: 1440
                    ok: 1439
                    uptime_pct: 99.93
                  qbittorrent:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                  envoy:
                    total: 1440
                    ok: 1440
                    uptime_pct: 100.0
                period_hours: 24.0
                entries: 1440

  # =========================================================================
  # State
  # =========================================================================

  /status:
    get:
      operationId: getStatus
      tags: [State]
      summary: Full controller state
      description: |
        Returns the complete controller state: current phase, action history,
        pending queue, app status, preflight results, runtime config, and
        webhook URLs. This is the primary endpoint for monitoring the
        controller's lifecycle.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -s http://localhost:9100/status | jq .phase
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.get("http://localhost:9100/status")
            state = r.json()
            print(f"Phase: {state['phase']}")
            print(f"Actions completed: {len(state.get('action_history', []))}")
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/status");
            const state = await r.json();
            console.log(`Phase: ${state.phase}`);
            console.log(`Queue: ${state.pending_actions?.length ?? 0} pending`);
      responses:
        "200":
          description: Complete controller state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllerState'
              example:
                phase: complete
                started_at: 1712505600.0
                completed_at: 1712505660.5
                elapsed_seconds: 60.5
                error: null
                phases_completed:
                  - preflight
                  - containers
                  - post-setup
                  - envoy
                preflight_results:
                  docker: ok
                  config_root: ok
                  media_root: ok
                app_status:
                  sonarr:
                    status: configured
                  radarr:
                    status: configured
                  jellyfin:
                    status: configured
                  prowlarr:
                    status: configured
                run_overrides: {}
                initial_bootstrap_done: true
                runtime_config:
                  skip_envoy: false
                  dry_run: false
                webhook_urls:
                  - "https://hooks.example.com/media-stack"
                current_action: null
                action_history:
                  - id: bootstrap-1
                    name: bootstrap
                    status: complete
                    started_at: 1712505600.0
                    completed_at: 1712505660.5
                    elapsed_seconds: 60.5
                    error: null
                    overrides: {}
                    timeout_seconds: 600
                    triggered_by: admin
                pending_actions: []

  /apps:
    get:
      operationId: getApps
      tags: [State]
      summary: All app statuses
      description: |
        Returns the bootstrap status of every managed application. Each entry
        shows the configuration outcome from the last bootstrap run.
      responses:
        "200":
          description: Map of app names to their status
          content:
            application/json:
              schema:
                type: object
                properties:
                  apps:
                    type: object
                    additionalProperties:
                      type: object
              example:
                apps:
                  sonarr:
                    status: configured
                  radarr:
                    status: configured
                  jellyfin:
                    status: configured

  /apps/{appName}:
    get:
      operationId: getAppStatus
      tags: [State]
      summary: Single app status
      description: |
        Returns the bootstrap status for a specific application by name.
        Returns 404 if the app is not tracked.
      parameters:
        - name: appName
          in: path
          required: true
          schema:
            type: string
          example: sonarr
      responses:
        "200":
          description: App status
          content:
            application/json:
              schema:
                type: object
              example:
                sonarr:
                  status: configured
        "404":
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "app 'unknown' not found"

  /config:
    get:
      operationId: getConfig
      tags: [State]
      summary: Runtime configuration
      description: |
        Returns the current runtime config overrides. These are key-value
        settings that persist across actions and can be toggled via POST.
      responses:
        "200":
          description: Runtime configuration map
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                    additionalProperties: true
              example:
                config:
                  skip_envoy: false
                  dry_run: false
    post:
      operationId: updateConfig
      tags: [State]
      summary: Update runtime configuration
      description: |
        Merge key-value pairs into the runtime config. These overrides affect
        subsequent action runs (e.g., set `skip_envoy: true` to skip Envoy
        regeneration). Returns the full config after update.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              skip_envoy: true
              dry_run: false
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [updated]
                  config:
                    type: object
                    additionalProperties: true
              example:
                status: updated
                config:
                  skip_envoy: true
                  dry_run: false
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # Actions
  # =========================================================================

  /actions/{name}:
    post:
      operationId: triggerAction
      tags: [Actions]
      summary: Trigger an orchestration action
      description: |
        Queue an asynchronous action for execution. The request returns
        immediately with `status: accepted`. Actions run in priority order:

        | Action          | Priority | Description |
        |-----------------|----------|-------------|
        | `bootstrap`     | 10       | Full stack setup: preflight, containers, post-setup, envoy config |
        | `finalize`      | 20       | Run post-bootstrap finalization tasks |
        | `envoy-config`  | 30       | Regenerate Envoy proxy configuration |
        | `restart-apps`  | 40       | Restart all managed service containers |
        | `reconcile`     | 50       | Check and fix configuration drift |
        | `sync-indexers`  | 60       | Sync Prowlarr indexers to arr apps |
        | `auto-indexers` | 70       | Auto-discover and add indexers |

        Pass optional overrides in the request body to customize behavior
        (e.g., `{"skip_envoy": true}`).

        Monitor progress via `GET /status` or `GET /logs/stream` (SSE).
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/actions/bootstrap \
              -H "Content-Type: application/json" \
              -u admin:password \
              -d '{"skip_envoy": false}'
        - lang: Python
          label: Python
          source: |
            import requests

            r = requests.post(
                "http://localhost:9100/actions/bootstrap",
                json={"skip_envoy": False},
                auth=("admin", "password"),
            )
            print(r.json())
            # {"status": "accepted", "action": "bootstrap", "priority": 10, ...}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/actions/bootstrap", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Basic " + btoa("admin:password"),
              },
              body: JSON.stringify({ skip_envoy: false }),
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum: [bootstrap, finalize, auto-indexers, restart-apps, sync-indexers, envoy-config, reconcile]
          description: The action to trigger
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Optional overrides for the action
            example:
              skip_envoy: true
      responses:
        "200":
          description: Action accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAccepted'
              example:
                status: accepted
                action: bootstrap
                priority: 10
                overrides:
                  skip_envoy: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Unknown action name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  known:
                    type: array
                    items:
                      type: string
              example:
                error: "unknown action 'foo'"
                known: [auto-indexers, bootstrap, envoy-config, finalize, reconcile, restart-apps, sync-indexers]

  /cancel:
    post:
      operationId: cancelAction
      tags: [Actions]
      summary: Cancel running action
      description: |
        Request cancellation of the currently running action. If an action
        is running, it will be signalled to stop at the next checkpoint.
        Also accessible as `POST /actions/cancel`.
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST http://localhost:9100/cancel \
              -u admin:password
        - lang: Python
          label: Python
          source: |
            import requests
            r = requests.post("http://localhost:9100/cancel",
                              auth=("admin", "password"))
            print(r.json())
            # {"status": "cancel_requested", "current_action": {...}}
        - lang: JavaScript
          label: JavaScript
          source: |
            const r = await fetch("http://localhost:9100/cancel", {
              method: "POST",
              headers: { Authorization: "Basic " + btoa("admin:password") },
            });
            console.log(await r.json());
      security:
        - basicAuth: []
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cancel_requested, no_action_running]
                  current_action:
                    $ref: '#/components/schemas/ActionRecord'
              example:
                status: cancel_requested
                current_action:
                  id: bootstrap-3
                  name: bootstrap
                  status: running
                  started_at: 1712505600.0
                  elapsed_seconds: 12.3

  /run:
    post:
      operationId: triggerBootstrapLegacy
      tags: [Actions]
      summary: Trigger bootstrap (legacy alias)
      description: |
        Backward-compatible alias for `POST /actions/bootstrap`. Triggers a
        full bootstrap run. Prefer `/actions/bootstrap` for new integrations.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Bootstrap action accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAccepted'

  # =========================================================================
  # Services
  # =========================================================================

  /api/services:
    get:
      operationId: listServices
